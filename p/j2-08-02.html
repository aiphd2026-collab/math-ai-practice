:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;margin:0 0 14px}.diagram{margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:#7d6a58;font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:#fffefa;color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:none}.option.correct{border-color:#1f8f70;background:#d7f1e4;color:#0f5b48}.option.wrong{border-color:#c95342;background:#ffe1d9;color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:94px;padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;justify-content:center}.stat b{font-size:1.35rem;color:#5b341e}.summary{line-height:1.75;background:#fff7ea;border:1px solid #ead8c1;border-radius:18px;padding:14px;margin-top:12px}.small{font-size:.88rem;color:#7d6a58;line-height:1.6}.status-ok{color:#0f7a61;font-weight:900}.status-bad{color:#b33a2e;font-weight:900}

<script>
const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';
const META={school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'j2_zhong',practice_id:'J2-08-02',practice_name:'初二下册第8章毕氏定理有图片版',practice_round:'02',quiz_id:'J2-08-02-QZ',quiz_name:'初二下册第8章毕氏定理有图片版',chapter_name:'初二下册第8章｜毕氏定理',total_questions:10};
const tri=(a,b,c)=>`<svg viewBox="0 0 360 220" role="img"><rect x="0" y="0" width="360" height="220" fill="transparent"/><path d="M70 170 L270 170 L70 50 Z" fill="#fff7e8" stroke="#5b341e" stroke-width="4"/><path d="M70 148 L92 148 L92 170" fill="none" stroke="#5b341e" stroke-width="3"/><text x="160" y="194" font-size="22" text-anchor="middle" fill="#5b341e">${a}</text><text x="45" y="112" font-size="22" text-anchor="middle" fill="#5b341e">${b}</text><text x="182" y="100" font-size="22" text-anchor="middle" fill="#c65b2d">${c}</text></svg>`;
const QUESTIONS=[
{id:'Q1',text:'在直角三角形中，两条直角边分别为 6 cm 和 8 cm，斜边长是多少？',options:{A:'10 cm',B:'12 cm',C:'14 cm',D:'16 cm'},answer:'A',knowledge:'毕氏定理求斜边',difficulty:'基础',diagram_svg:tri('8 cm','6 cm','？'),visual_note:'图形已尽量按比例绘制；解题以题目数字为准。',explanation:'6²+8²=36+64=100，斜边=10 cm。',common_misconception:'把两边直接相加，忽略平方和再开方。',coach_tip:'先确认要求的是斜边，再用两直角边平方和开方。'},
{id:'Q2',text:'一个直角三角形的斜边为 13 cm，其中一条直角边为 5 cm，另一条直角边是多少？',options:{A:'8 cm',B:'10 cm',C:'12 cm',D:'14 cm'},answer:'C',knowledge:'毕氏定理求直角边',difficulty:'基础',diagram_svg:tri('？','5 cm','13 cm'),visual_note:'图形已尽量按比例绘制；解题以题目数字为准。',explanation:'另一边²=13²−5²=169−25=144，所以另一边=12 cm。',common_misconception:'误用 13²+5²。',coach_tip:'已知斜边和一直角边时，要用斜边平方减直角边平方。'},
{id:'Q3',text:'下列哪一组三边可以组成直角三角形？',options:{A:'4，5，6',B:'5，12，13',C:'6，7，8',D:'8，9，10'},answer:'B',knowledge:'毕氏定理逆定理',difficulty:'基础',diagram_svg:'',visual_note:'',explanation:'5²+12²=25+144=169=13²，所以是直角三角形。',common_misconception:'没有先找最长边当斜边。',coach_tip:'判断直角三角形时，先找最长边，再检验较短两边平方和是否等于最长边平方。'},
{id:'Q4',text:'点 A(1,2)，点 B(4,6)，AB 的长度是多少？',options:{A:'3',B:'4',C:'6',D:'5'},answer:'D',knowledge:'坐标平面距离公式',difficulty:'基础',diagram_svg:`<svg viewBox="0 0 360 230"><path d="M40 190 H320 M70 210 V30" stroke="#8b6a4f" stroke-width="2"/><path d="M110 150 L230 70" stroke="#c65b2d" stroke-width="4"/><circle cx="110" cy="150" r="6" fill="#1f8f70"/><circle cx="230" cy="70" r="6" fill="#1f8f70"/><path d="M110 150 H230 V70" fill="none" stroke="#5b341e" stroke-width="3" stroke-dasharray="8 6"/><text x="100" y="172" font-size="18">A(1,2)</text><text x="238" y="64" font-size="18">B(4,6)</text><text x="170" y="172" font-size="18">3</text><text x="238" y="116" font-size="18">4</text></svg>`,visual_note:'示意图显示横差为3、纵差为4。',explanation:'横差为3，纵差为4，AB=√(3²+4²)=5。',common_misconception:'只算横坐标差或纵坐标差。',coach_tip:'坐标距离其实就是把横差和纵差看作两条直角边。'},
{id:'Q5',text:'一个长方形长 9 cm，宽 12 cm，它的对角线长是多少？',options:{A:'15 cm',B:'18 cm',C:'20 cm',D:'21 cm'},answer:'A',knowledge:'长方形对角线与毕氏定理',difficulty:'基础',diagram_svg:`<svg viewBox="0 0 360 230"><rect x="70" y="55" width="210" height="120" fill="#fff7e8" stroke="#5b341e" stroke-width="4"/><path d="M70 175 L280 55" stroke="#c65b2d" stroke-width="4"/><text x="175" y="202" font-size="22" text-anchor="middle">9 cm</text><text x="42" y="120" font-size="22">12 cm</text><text x="188" y="102" font-size="22" fill="#c65b2d">？</text></svg>`,visual_note:'长方形对角线把长方形分成两个直角三角形。',explanation:'对角线²=9²+12²=81+144=225，所以对角线=15 cm。',common_misconception:'把对角线误认为长与宽之和。',coach_tip:'看到长方形对角线，就把长和宽看成直角边。'},
{id:'Q6',text:'一架梯子长 10 m，梯脚离墙 6 m，梯子顶端离地高度是多少？',options:{A:'6 m',B:'7 m',C:'9 m',D:'8 m'},answer:'D',knowledge:'实际情境中的毕氏定理',difficulty:'基础',diagram_svg:`<svg viewBox="0 0 360 240"><path d="M80 200 H300" stroke="#5b341e" stroke-width="5"/><path d="M80 200 V40" stroke="#5b341e" stroke-width="5"/><path d="M80 52 L250 200" stroke="#c65b2d" stroke-width="7" stroke-linecap="round"/><path d="M80 178 L102 178 L102 200" fill="none" stroke="#5b341e" stroke-width="3"/><text x="170" y="114" font-size="22" fill="#c65b2d">10 m</text><text x="165" y="226" font-size="22">6 m</text><text x="45" y="125" font-size="22">？</text></svg>`,visual_note:'梯子是斜边，墙和地面构成直角。',explanation:'高度²=10²−6²=100−36=64，所以高度=8 m。',common_misconception:'没有判断梯子是斜边。',coach_tip:'生活题先找直角，再判断哪一条是斜边。'},
{id:'Q7',text:'小明向东走 8 km，再向北走 15 km，他离出发点的直线距离是多少？',options:{A:'19 km',B:'20 km',C:'17 km',D:'23 km'},answer:'C',knowledge:'直角路径与距离',difficulty:'基础',diagram_svg:`<svg viewBox="0 0 360 230"><path d="M70 180 H190 V55" fill="none" stroke="#5b341e" stroke-width="5"/><path d="M70 180 L190 55" stroke="#c65b2d" stroke-width="5"/><path d="M70 158 L92 158 L92 180" fill="none" stroke="#5b341e" stroke-width="3"/><text x="130" y="207" font-size="22">8 km</text><text x="202" y="122" font-size="22">15 km</text><text x="104" y="105" font-size="22" fill="#c65b2d">？</text><text x="55" y="197" font-size="18">起点</text></svg>`,visual_note:'向东与向北互相垂直，直线距离是斜边。',explanation:'直线距离=√(8²+15²)=√289=17 km。',common_misconception:'把走过的路程 8+15 当作直线距离。',coach_tip:'路线长度和直线距离不同，直线距离通常是斜边。'},
{id:'Q8',text:'若三角形三边为 7 cm、24 cm、25 cm，下列说法正确的是哪一项？',options:{A:'不是直角三角形',B:'是直角三角形，25 cm 是斜边',C:'是直角三角形，24 cm 是斜边',D:'是等腰直角三角形'},answer:'B',knowledge:'毕氏定理逆定理判断',difficulty:'中等',diagram_svg:tri('24 cm','7 cm','25 cm'),visual_note:'图形已尽量按比例绘制；判断以平方关系为准。',explanation:'7²+24²=49+576=625=25²，所以是直角三角形，25 cm 是斜边。',common_misconception:'没有把最长边 25 cm 当作斜边检验。',coach_tip:'逆定理判断时，最长边必须放在等式右边。'},
{id:'Q9',text:'一个长方体的长、宽、高分别为 3 cm、4 cm、12 cm，它的体对角线长是多少？',options:{A:'13 cm',B:'14 cm',C:'15 cm',D:'16 cm'},answer:'A',knowledge:'简单空间中的毕氏定理',difficulty:'中等',diagram_svg:`<svg viewBox="0 0 360 250"><path d="M80 185 H210 V95 H80 Z" fill="#fff7e8" stroke="#5b341e" stroke-width="3"/><path d="M120 145 H250 V55 H120 Z" fill="none" stroke="#5b341e" stroke-width="3"/><path d="M80 185 L120 145 M210 185 L250 145 M210 95 L250 55 M80 95 L120 55" stroke="#5b341e" stroke-width="3"/><path d="M80 185 L250 55" stroke="#c65b2d" stroke-width="5"/><text x="142" y="213" font-size="20">3 cm</text><text x="232" y="174" font-size="20">4 cm</text><text x="260" y="103" font-size="20">12 cm</text><text x="160" y="110" font-size="22" fill="#c65b2d">？</text></svg>`,visual_note:'体对角线可分两步用毕氏定理求。',explanation:'底面对角线=√(3²+4²)=5，再算体对角线=√(5²+12²)=13 cm。',common_misconception:'只求底面对角线，忘记再与高构成直角三角形。',coach_tip:'空间题可以先求一个面上的对角线，再与第三条边组成新的直角三角形。'},
{id:'Q10',text:'三角形的三边为 9 cm、12 cm、15 cm。若以最长边为底，它对应的高是多少？',options:{A:'6 cm',B:'7 cm',C:'8 cm',D:'7.2 cm'},answer:'D',knowledge:'毕氏定理逆定理与面积关系',difficulty:'挑战',diagram_svg:`<svg viewBox="0 0 360 240"><path d="M70 185 L250 185 L70 65 Z" fill="#fff7e8" stroke="#5b341e" stroke-width="4"/><path d="M70 185 L128 107" stroke="#c65b2d" stroke-width="4" stroke-dasharray="8 6"/><text x="160" y="210" font-size="22">12 cm</text><text x="45" y="130" font-size="22">9 cm</text><text x="168" y="115" font-size="22">15 cm</text><text x="105" y="145" font-size="22" fill="#c65b2d">高？</text></svg>`,visual_note:'图形用于表示“以最长边为底求高”的转化，解题以面积关系为准。',explanation:'9²+12²=15²，所以是直角三角形。面积=1/2×9×12=54。若以15为底，54=1/2×15×高，高=7.2 cm。',common_misconception:'判断出直角三角形后，不会转化面积求高。',coach_tip:'同一个三角形面积不变，可以用不同底和对应高来列式。'}
];
let order=[],idx=0,selected=false,score=0,startTime=0,student={},answers=[];
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);}
function $(id){return document.getElementById(id)}
$('startBtn').onclick=()=>{const c=$('className').value.trim(),n=$('studentNo').value.trim(),name=$('studentName').value.trim();if(!c||!n||!name){alert('请填写班级、学号和姓名');return;}student={class_name:c,student_no:n,student_name:name,seat_no:$('seatNo').value.trim()};order=shuffle(QUESTIONS);idx=0;score=0;answers=[];startTime=Date.now();window.onbeforeunload=()=> '刷新或离开后，本次作答可能无法继续，请确认是否离开。';$('home').classList.add('hidden');$('quiz').classList.remove('hidden');render();};
function render(){selected=false;const q=order[idx];$('qCount').textContent='第'+(idx+1)+'题 / '+order.length;$('scoreNow').textContent='已答'+idx+'题';$('barSpan').style.width=(idx/order.length*100)+'%';$('difficultyTag').textContent=q.difficulty;$('knowledgeTag').textContent=q.knowledge;$('questionText').textContent=q.text;$('diagramBox').innerHTML=q.diagram_svg||'';$('diagramBox').style.display=q.diagram_svg?'block':'none';$('diagramNote').textContent=q.visual_note||'';$('diagramNote').style.display=q.visual_note?'block':'none';$('feedback').className='feedback';$('feedback').innerHTML='';$('nextBtn').classList.add('hidden');$('nextBtn').textContent=idx===order.length-1?'完成并提交':'下一题';const box=$('options');box.innerHTML='';Object.entries(q.options).forEach(([k,v])=>{const b=document.createElement('button');b.className='option';b.textContent=k+'. '+v;b.onclick=()=>choose(k,b);box.appendChild(b);});}
function choose(k,btn){if(selected)return;selected=true;const q=order[idx],ok=k===q.answer;if(ok)score++;document.querySelectorAll('.option').forEach(b=>{b.disabled=true;const key=b.textContent.slice(0,1);if(key===q.answer)b.classList.add('correct');if(key===k&&key!==q.answer)b.classList.add('wrong');});const fb=$('feedback');fb.className='feedback '+(ok?'ok':'bad');fb.innerHTML=(ok?'答对了。':'还差一步。')+'<br>你的答案：'+k+'. '+q.options[k]+'<br>正确答案：'+q.answer+'. '+q.options[q.answer]+'<br>解析：'+q.explanation+'<br>AI学习提示：'+q.coach_tip+'<br>本题知识点：'+q.knowledge;answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty,common_misconception:q.common_misconception});$('nextBtn').classList.remove('hidden');}
$('nextBtn').onclick=()=>{if(idx<order.length-1){idx++;render();}else finish();};
function finish(){window.onbeforeunload=null;$('quiz').classList.add('hidden');$('done').classList.remove('hidden');$('barSpan').style.width='100%';const total=QUESTIONS.length,wrong=total-score,acc=Math.round(score/total*100),time=Math.round((Date.now()-startTime)/1000);$('finalScore').textContent=score+'/'+total;$('finalAccuracy').textContent=acc+'%';$('wrongCount').textContent=wrong;$('finalInfo').innerHTML='学校：'+META.school_name+'<br>老师：'+META.teacher_name+'<br>练习编号：'+META.practice_id+'<br>练习名称：'+META.practice_name+'<br>章节：'+META.chapter_name+'<br>班级：'+student.class_name+'<br>学号：'+student.student_no+'<br>姓名：'+student.student_name+'<br>座号：'+(student.seat_no||'未填')+'<br>用时：'+time+'秒';const wrongs=answers.filter(a=>!a.is_correct);$('wrongInfo').innerHTML='错题记录：<br>'+(wrongs.length?wrongs.map(a=>a.display_order+'. '+a.question_text+'<br>你的答案：'+a.selected_answer_text+'；正确答案：'+a.correct_answer_text).join('<br>'):'本次没有错题。');const weak=[...new Set(wrongs.map(a=>a.knowledge_tag))];$('weakInfo').innerHTML='薄弱知识点：'+(weak.length?weak.join('、'):'暂未发现明显薄弱点');$('studySummary').innerHTML='学习总结：'+(acc>=80?'掌握情况较好，可继续练习综合应用题。':acc>=60?'基础已有一定掌握，建议重点复习错题对应知识点。':'建议先回顾毕氏定理公式、逆定理和斜边判断方法，再完成补救练习。');const payload={action:'submit_response',school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:student.class_name,student_no:student.student_no,student_name:student.student_name,seat_no:student.seat_no,practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:score,accuracy:acc,total_questions:total,time_used:time,answers_json:JSON.stringify(answers),correct_json:JSON.stringify(QUESTIONS.map(q=>({question_id:q.id,answer:q.answer,answer_text:q.answer+'. '+q.options[q.answer]}))),wrong_question_ids:wrongs.map(a=>a.question_id).join(','),weak_knowledge_tags:weak.join(','),abnormal_flag:''};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{$('submitStatus').textContent='已送达';$('submitStatus').className='status-ok';$('studySummary').innerHTML+=' <br>作答数据已送达。请保留本页截图，以备老师核对。';}).catch(()=>{$('submitStatus').textContent='提交失败';$('submitStatus').className='status-bad';$('studySummary').innerHTML+=' <br>提交失败，请截图给老师。';});}
