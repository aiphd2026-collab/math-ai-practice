<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>初三忠｜第8章圆｜线上练习</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(145deg,#fff3df 0%,#f7fbff 48%,#ffe8d6 100%);color:#10212f;min-height:100vh}
    .wrap{max-width:720px;margin:0 auto;padding:16px}
    .card{background:rgba(255,255,255,.96);border-radius:18px;padding:18px;box-shadow:0 14px 30px rgba(154,88,42,.14);border:1px solid rgba(255,238,218,.9);margin-bottom:14px}
    h1{font-size:24px;margin:8px 0;text-align:center;color:#884513}
    .sub{width:max-content;max-width:100%;margin:10px auto 14px;padding:7px 14px;border-radius:999px;text-align:center;background:#fff0dc;color:#9a4f16;font-size:14px;font-weight:700}
    label{display:block;margin:10px 0 6px;font-weight:700}
    input{width:100%;padding:13px 14px;border:1.5px solid #f0d3b6;border-radius:16px;font-size:16px;outline:none;background:#fff}
    input:focus{border-color:#df7f2a;box-shadow:0 0 0 4px rgba(223,127,42,.14)}
    button{width:100%;padding:14px;border:0;border-radius:18px;background:linear-gradient(105deg,#f28c28,#b84f1d);color:#fff;font-size:17px;font-weight:800;margin-top:14px;cursor:pointer;box-shadow:0 8px 16px rgba(184,79,29,.22)}
    button:disabled{background:linear-gradient(105deg,#b8c9d5,#93a7b4);box-shadow:none;cursor:not-allowed}
    .q{font-size:20px;font-weight:800;margin:12px 0;line-height:1.5}
    .option{display:block;width:100%;text-align:left;background:#fffaf3;color:#3d2b1f;border:2px solid #f2dcc2;border-radius:16px;margin:10px 0;font-weight:700;box-shadow:0 2px 6px rgba(154,88,42,.06)}
    .option.selected{background:#ffe1bd;border-color:#f28c28}
    .option.correct{background:#d9f5e0;border-color:#2e7d32}
    .option.wrong{background:#ffe0e0;border-color:#c62828}
    .explain{margin-top:14px;padding:13px;border-radius:16px;background:#fff9e8;border:1px solid #ffe0a3;line-height:1.6}
    .hidden{display:none}
    .result{font-size:20px;font-weight:800}
    .small{color:#5d6b75;font-size:14px;line-height:1.5}
    .ok{color:#2e7d32;font-weight:800}
    .warn{color:#c62828;font-weight:800}
    .row{padding:8px 0;border-bottom:1px dashed #ead7c3;line-height:1.6}
    .tag{display:inline-block;background:#fff0dc;border-radius:999px;padding:4px 10px;margin:4px 4px 0 0;color:#884513;font-weight:700;font-size:13px}
    .summaryBox{background:#f8fbff;border:1px solid #d9e7f5;border-radius:16px;padding:12px;margin-top:12px;line-height:1.7}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card" id="home">
    <h1>初三忠｜第8章圆｜线上练习</h1>
    <div class="sub">宽柔中学古来分校｜陈天龙老师</div>
    <p class="small">2026年｜第一学期｜初三下册第8章｜圆｜线上练习｜即时反馈</p>

    <label>班级</label>
    <input id="className" placeholder="请输入班级，例如：初三忠">

    <label>学号</label>
    <input id="studentNo" inputmode="numeric" placeholder="请输入学号">

    <label>姓名</label>
    <input id="studentName" placeholder="请输入姓名">

    <label>座号（可选）</label>
    <input id="seatNo" inputmode="numeric" placeholder="如老师有要求，请填写座号">

    <button onclick="startPractice()">开始练习</button>
    <p class="small">每题作答后会立即显示解析，完成后会提交学习数据给老师。</p>
  </div>

  <div class="card hidden" id="practice">
    <div class="small" id="progress"></div>
    <div class="q" id="questionText"></div>
    <div id="options"></div>
    <div id="feedback" class="explain hidden"></div>
    <button id="nextBtn" class="hidden" onclick="nextStep()">下一题</button>
  </div>

  <div class="card hidden" id="finish">
    <h1>练习完成</h1>
    <div id="resultBox"></div>
    <div class="summaryBox" id="studyAdvice"></div>
    <p class="small" id="submitStatus">提交中……</p>
  </div>
</div>

<script>
const SUBMIT_URL = "https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";
const META = {
  schoolName: "宽柔中学古来分校",
  teacherName: "陈天龙老师",
  academicYear: "2026年",
  semester: "第一学期",
  classNameDefault: "初三忠",
  chapterName: "初三下册第8章｜圆",
  practiceName: "初三忠｜第8章圆｜线上练习",
  practiceMode: "练习模式",
  questionType: "选择题"
};
const QUESTIONS = [
  {id:"Q1",text:"圆 O 中，∠AOB 是弧 AB 所对的圆心角，∠ACB 是同弧 AB 所对的圆周角。若 ∠AOB = 120°，则 ∠ACB =（ ）",options:{A:"30°",B:"60°",C:"90°",D:"120°"},answer:"B",knowledge:"圆心角与圆周角",explanation:"同弧所对的圆周角等于圆心角的一半，所以 ∠ACB=120°÷2=60°。",difficulty:"基础",commonMistake:"把圆周角与圆心角的倍半关系用反。"},
  {id:"Q2",text:"圆 O 中，∠ACB 是弧 AB 所对的圆周角。若 ∠ACB = 35°，则同弧 AB 所对的圆心角 ∠AOB =（ ）",options:{A:"17.5°",B:"35°",C:"70°",D:"145°"},answer:"C",knowledge:"圆周角定理",explanation:"同弧所对的圆心角是圆周角的 2 倍，所以 ∠AOB=35°×2=70°。",difficulty:"基础",commonMistake:"误以为圆心角等于圆周角。"},
  {id:"Q3",text:"在圆 O 中，直径 AB 垂直于弦 CD，垂足为 E。若 CD = 16 cm，OE = 6 cm，则圆的半径为（ ）",options:{A:"8 cm",B:"10 cm",C:"12 cm",D:"14 cm"},answer:"B",knowledge:"垂径定理",explanation:"直径垂直弦会平分弦，所以 CE=8 cm。直角三角形 OEC 中，OC²=OE²+CE²=6²+8²=100，所以 OC=10 cm。",difficulty:"基础",commonMistake:"忘记垂直于弦的直径会平分弦。"},
  {id:"Q4",text:"圆的半径为 13 cm，圆心到一条弦的距离为 5 cm，则这条弦长为（ ）",options:{A:"10 cm",B:"12 cm",C:"24 cm",D:"26 cm"},answer:"C",knowledge:"垂径定理与毕氏关系",explanation:"圆心到弦的垂线平分弦。半弦长为 √(13²−5²)=√144=12 cm，所以弦长为 24 cm。",difficulty:"基础",commonMistake:"只求出半弦长，忘记乘以 2。"},
  {id:"Q5",text:"四边形 ABCD 内接于圆，若 ∠A = 110°，则 ∠C =（ ）",options:{A:"55°",B:"70°",C:"90°",D:"110°"},answer:"B",knowledge:"圆内接四边形",explanation:"圆内接四边形的对角互补，所以 ∠C=180°−110°=70°。",difficulty:"基础",commonMistake:"忘记圆内接四边形对角互补。"},
  {id:"Q6",text:"直线 l 与圆 O 相切于点 T，OT 是半径。则 OT 与直线 l 的关系是（ ）",options:{A:"平行",B:"相等",C:"垂直",D:"不确定"},answer:"C",knowledge:"切线性质",explanation:"圆的切线垂直于过切点的半径，因此 OT 垂直于直线 l。",difficulty:"基础",commonMistake:"把切线与半径的关系记成平行。"},
  {id:"Q7",text:"要证明直线 PT 是圆 O 在点 T 处的切线，较合适的条件是（ ）",options:{A:"OP = PT",B:"OT ⟂ PT，且 T 在圆上",C:"OP ⟂ OT",D:"PT 经过圆心 O"},answer:"B",knowledge:"切线判定",explanation:"若一条直线经过圆上一点，并且垂直于过该点的半径，则这条直线是圆的切线。",difficulty:"基础",commonMistake:"只写垂直，漏掉切点必须在圆上。"},
  {id:"Q8",text:"圆 O 中，弦 AB 与弦 CD 相等，则下列说法正确的是（ ）",options:{A:"AB 与 CD 一定平行",B:"AB 与 CD 所对的圆心角相等",C:"AB 与 CD 一定互相垂直",D:"AB 与 CD 必定是直径"},answer:"B",knowledge:"等弦与等圆心角",explanation:"在同圆或等圆中，相等的弦所对的圆心角相等，但位置不一定平行或垂直。",difficulty:"中等",commonMistake:"把“等弦”误解成“位置一定相同”。"},
  {id:"Q9",text:"圆 O 中，AB 是弦，PT 是过点 A 的切线。若弦 AB 与切线 PT 所成的角为 48°，则与弦 AB 所对的圆周角为（ ）",options:{A:"24°",B:"42°",C:"48°",D:"96°"},answer:"C",knowledge:"弦切角",explanation:"弦切角等于它所夹弧所对的圆周角，所以对应圆周角为 48°。",difficulty:"中等",commonMistake:"把弦切角误当成对应圆周角的一半。"},
  {id:"Q10",text:"圆 O 中，AB 是直径，点 C 在圆上。若 ∠ABC = 40°，则 ∠ACB 与 ∠BAC 分别为（ ）",options:{A:"90°，50°",B:"50°，90°",C:"40°，50°",D:"90°，40°"},answer:"A",knowledge:"直径所对圆周角",explanation:"直径所对的圆周角是直角，所以 ∠ACB=90°。三角形内角和为 180°，∠BAC=180°−90°−40°=50°。",difficulty:"挑战",commonMistake:"忘记直径所对的圆周角是直角。"}
];
let current = 0;
let answers = [];
let student = {};
let startedAt = null;

function $(id){return document.getElementById(id)}
function escapeHtml(str){return String(str || "").replace(/[&<>'"]/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[s]));}
function startPractice(){
  const className = $("className").value.trim();
  const studentNo = $("studentNo").value.trim();
  const studentName = $("studentName").value.trim();
  const seatNo = $("seatNo").value.trim();
  if(!className){alert("请填写班级。");return;}
  if(!/^\d{1,20}$/.test(studentNo)){alert("学号格式不正确，请输入数字学号。");return;}
  if(!studentName){alert("请填写姓名。");return;}
  if(seatNo && !/^\d{1,20}$/.test(seatNo)){alert("座号格式不正确，请输入数字。");return;}
  student = {className, studentNo, studentName, seatNo};
  startedAt = new Date();
  $("home").classList.add("hidden");
  $("practice").classList.remove("hidden");
  renderQuestion();
}
function renderQuestion(){
  const q = QUESTIONS[current];
  $("progress").textContent = "第 " + (current+1) + " 题 / 共 " + QUESTIONS.length + " 题";
  $("questionText").textContent = q.text;
  $("feedback").classList.add("hidden");
  $("feedback").innerHTML = "";
  $("nextBtn").classList.add("hidden");
  $("nextBtn").textContent = current === QUESTIONS.length - 1 ? "完成并提交" : "下一题";
  const options = $("options");
  options.innerHTML = "";
  Object.keys(q.options).forEach(key => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = key + ". " + q.options[key];
    btn.onclick = () => chooseAnswer(key);
    options.appendChild(btn);
  });
}
function chooseAnswer(choice){
  const q = QUESTIONS[current];
  const correct = choice === q.answer;
  const optionButtons = document.querySelectorAll(".option");
  optionButtons.forEach(btn => {
    btn.disabled = true;
    if(btn.textContent.startsWith(q.answer + ".")){btn.classList.add("correct");}
    if(btn.textContent.startsWith(choice + ".")){btn.classList.add("selected"); if(!correct){btn.classList.add("wrong");}}
  });
  answers[current] = {
    id: q.id,
    question: q.text,
    choice,
    answer: q.answer,
    correct,
    knowledge: q.knowledge,
    difficulty: q.difficulty,
    commonMistake: q.commonMistake
  };
  $("feedback").classList.remove("hidden");
  $("feedback").innerHTML = "<div class='result " + (correct ? "ok" : "warn") + "'>" + (correct ? "答对了" : "答错了") + "</div>" +
    "<div>正确答案：" + q.answer + "</div>" +
    "<div>解析：" + escapeHtml(q.explanation) + "</div>" +
    "<div>本题知识点：" + escapeHtml(q.knowledge) + "</div>";
  $("nextBtn").classList.remove("hidden");
}
function nextStep(){
  if(current < QUESTIONS.length - 1){
    current++;
    renderQuestion();
  }else{
    finishPractice();
  }
}
function finishPractice(){
  const endedAt = new Date();
  const correctCount = answers.filter(a => a && a.correct).length;
  const score = correctCount * 10;
  const accuracy = Math.round((correctCount / QUESTIONS.length) * 100);
  const wrong = answers.filter(a => a && !a.correct);
  const weakMap = {};
  wrong.forEach(w => weakMap[w.knowledge] = (weakMap[w.knowledge] || 0) + 1);
  const weakPoints = Object.keys(weakMap).sort((a,b)=>weakMap[b]-weakMap[a]);
  const wrongHtml = wrong.length ? wrong.map(w => "<div class='row'>" + w.id + "｜你的答案：" + w.choice + "｜正确答案：" + w.answer + "｜" + escapeHtml(w.knowledge) + "</div>").join("") : "<div class='row ok'>本次没有错题，继续保持。</div>";
  const weakHtml = weakPoints.length ? weakPoints.map(k => "<span class='tag'>" + escapeHtml(k) + "</span>").join("") : "<span class='tag'>暂无明显薄弱点</span>";
  const summary = weakPoints.length ? "本次练习主要需要复习：" + weakPoints.join("、") + "。建议先回看对应题目的解析，再用同类型题巩固。" : "本次掌握情况良好，可继续挑战综合题，特别注意书写理由完整。";
  $("practice").classList.add("hidden");
  $("finish").classList.remove("hidden");
  $("resultBox").innerHTML =
    "<div class='row'>学校：" + escapeHtml(META.schoolName) + "</div>" +
    "<div class='row'>老师：" + escapeHtml(META.teacherName) + "</div>" +
    "<div class='row'>练习名称：" + escapeHtml(META.practiceName) + "</div>" +
    "<div class='row'>章节：" + escapeHtml(META.chapterName) + "</div>" +
    "<div class='row'>班级：" + escapeHtml(student.className) + "</div>" +
    "<div class='row'>学号：" + escapeHtml(student.studentNo) + "</div>" +
    "<div class='row'>姓名：" + escapeHtml(student.studentName) + "</div>" +
    "<div class='row'>座号：" + escapeHtml(student.seatNo || "未填写") + "</div>" +
    "<div class='row result'>得分：" + score + " / 100</div>" +
    "<div class='row'>正确率：" + accuracy + "%</div>" +
    "<div class='row'>错题记录：</div>" + wrongHtml +
    "<div class='row'>薄弱知识点：" + weakHtml + "</div>" +
    "<div class='row'>学习总结：" + escapeHtml(summary) + "</div>";
  $("studyAdvice").textContent = summary;
  const payload = {
    school_name: META.schoolName,
    teacher_name: META.teacherName,
    academic_year: META.academicYear,
    semester: META.semester,
    class_name: student.className,
    student_no: student.studentNo,
    student_name: student.studentName,
    seat_no: student.seatNo,
    chapter_name: META.chapterName,
    practice_name: META.practiceName,
    practice_mode: META.practiceMode,
    question_type: META.questionType,
    score: score,
    total_score: 100,
    correct_count: correctCount,
    total_questions: QUESTIONS.length,
    accuracy: accuracy,
    wrong_records: wrong,
    weak_points: weakPoints,
    answers: answers,
    started_at: startedAt ? startedAt.toISOString() : "",
    ended_at: endedAt.toISOString(),
    duration_seconds: startedAt ? Math.round((endedAt - startedAt) / 1000) : ""
  };
  submitPayload(payload);
}
function submitPayload(payload){
  fetch(SUBMIT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  }).then(() => {
    $("submitStatus").innerHTML = "<span class='ok'>已提交。老师稍后可查看学习数据。</span>";
  }).catch(() => {
    $("submitStatus").innerHTML = "<span class='warn'>提交失败，请截图给老师。</span>";
  });
}
</script>
</body>
</html>
