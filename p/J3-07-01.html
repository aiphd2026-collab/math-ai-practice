<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J3-07-01｜初三下册第7章三角函数基础练习</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2B1D14;min-height:100vh;background:radial-gradient(circle at 12% 8%,rgba(255,214,153,.55),transparent 28%),radial-gradient(circle at 88% 18%,rgba(255,178,128,.42),transparent 30%),radial-gradient(circle at 50% 100%,rgba(255,236,190,.7),transparent 35%),linear-gradient(160deg,#FFF8ED 0%,#FFEBD8 45%,#F9D7B5 100%)}.wrap{max-width:720px;margin:0 auto;padding:16px}.card{background:rgba(255,252,246,.96);border:1px solid rgba(231,201,166,.85);border-radius:22px;padding:20px;margin-bottom:16px;box-shadow:0 14px 34px rgba(139,74,34,.14),inset 0 1px 0 rgba(255,255,255,.9)}h1{font-size:25px;line-height:1.35;margin:10px 0 16px;text-align:center;color:#7A3F1D}h2{font-size:20px;color:#7A3F1D;margin:8px 0 14px}.sub{width:max-content;max-width:100%;margin:12px auto 18px;padding:10px 18px;border-radius:999px;text-align:center;background:linear-gradient(135deg,#FFF2D8,#FFE2BD);color:#8B4A22;font-size:14px;font-weight:800;border:1px solid rgba(231,201,166,.85);box-shadow:0 5px 14px rgba(139,74,34,.08)}label{display:block;margin:13px 0 7px;font-weight:800;color:#2B1D14}input{width:100%;padding:14px 15px;border:1.6px solid #E7C9A6;border-radius:18px;font-size:16px;outline:none;background:#FFFDF9;color:#2B1D14;box-shadow:inset 0 1px 2px rgba(139,74,34,.05)}input:focus{border-color:#F28C28;box-shadow:0 0 0 4px rgba(242,140,40,.16),inset 0 1px 2px rgba(139,74,34,.05)}button{width:100%;padding:15px;border:0;border-radius:20px;background:linear-gradient(135deg,#F6B44B 0%,#E47C2C 48%,#B94F25 100%);color:#fff;font-size:17px;font-weight:900;margin-top:16px;cursor:pointer;box-shadow:0 10px 20px rgba(185,79,37,.24),inset 0 1px 0 rgba(255,255,255,.35)}button:active{transform:translateY(1px)}button:disabled{background:linear-gradient(135deg,#CAB8A2,#AFA094);box-shadow:none;cursor:not-allowed}.q{font-size:20px;font-weight:900;margin:14px 0;line-height:1.55;color:#2B1D14}.option{display:block;width:100%;text-align:left;background:#FFF8ED;color:#2B1D14;border:2px solid #E7C9A6;border-radius:18px;margin:10px 0;font-weight:800;box-shadow:0 3px 8px rgba(139,74,34,.06)}.option.selected{background:#FFE2BD;border-color:#F28C28}.option.correct{background:#DFF4E8;border-color:#2E8B57;color:#174B30}.option.wrong{background:#FFE1DA;border-color:#C94A3A;color:#6B2018}.explain{margin-top:14px;padding:14px;border-radius:18px;background:#FFF2BF;border:1px solid #F1D477;color:#3A2A13;line-height:1.65}.hidden{display:none}.result{font-size:20px;font-weight:900;color:#7A3F1D}.small{color:#6E5542;font-size:14px;line-height:1.7}.line{padding:9px 0;border-bottom:1px dashed rgba(139,74,34,.22);line-height:1.7}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#F9D7B5;color:#7A3F1D;font-weight:900;margin:4px 4px 4px 0}.infoBox{background:#F6F0FF;border:1px solid #CAB8E8;border-radius:18px;padding:13px;line-height:1.7;margin-top:12px;color:#3E315F}.greenBox{background:#E0F5EE;border:1px solid #78BFA3;border-radius:18px;padding:13px;line-height:1.7;margin-top:12px;color:#174B30}.roseBox{background:#FFECEF;border:1px solid #E8A1AD;border-radius:18px;padding:13px;line-height:1.7;margin-top:12px;color:#6B2018}
  </style>
</head>
<body>
<div class="wrap">
  <section id="home" class="card">
    <h1>初三下册第7章三角函数基础练习</h1>
    <div class="sub">练习编号：J3-07-01｜练习模式｜10题选择题</div>
    <div class="small">学校：宽柔中学古来分校<br>老师：陈天龙<br>学年学期：2026 上学期<br>章节：初三下册第7章｜三角函数</div>
    <label for="className">班级（必填）</label><input id="className" autocomplete="off" placeholder="例如：初三仁">
    <label for="studentNo">学号（必填，只能输入数字或英文字母）</label><input id="studentNo" autocomplete="off" placeholder="例如：23">
    <label for="studentName">姓名（必填）</label><input id="studentName" autocomplete="off" placeholder="请输入姓名">
    <label for="seatNo">座号（可选）</label><input id="seatNo" autocomplete="off" placeholder="例如：12">
    <button id="startBtn">开始作答</button><div id="homeMsg" class="roseBox hidden"></div>
  </section>
  <section id="quiz" class="card hidden"><div class="sub" id="progressText"></div><div class="q" id="questionText"></div><div id="optionsBox"></div><div id="feedback" class="explain hidden"></div><button id="nextBtn" class="hidden">下一题</button></section>
  <section id="done" class="card hidden"><h1>完成页</h1><div class="sub">请截图保存本页，并按老师要求提交</div><div id="summaryBox"></div><div id="submitStatus" class="infoBox">正在发送作答数据……</div></section>
</div>
<script>
const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";
const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"student_input",practice_id:"J3-07-01",practice_name:"初三下册第7章三角函数基础练习",practice_round:"01",quiz_id:"J3-07-01-QZ",quiz_name:"初三下册第7章三角函数基础练习",chapter_name:"初三下册第7章｜三角函数"};
const QUESTIONS=[
{id:"Q1",text:"在直角三角形 ABC 中，∠C = 90°，对于锐角 A，sin A 表示：",options:{A:"A 的对边 ÷ 斜边",B:"A 的邻边 ÷ 斜边",C:"A 的对边 ÷ 邻边",D:"斜边 ÷ A 的对边"},answer:"A",knowledge:"正弦定义",explanation:"sin A = 对边 ÷ 斜边。",difficulty:"基础",commonMistake:"把对边、邻边、斜边位置看错。"},
{id:"Q2",text:"在直角三角形中，对于锐角 θ，cos θ 等于：",options:{A:"对边 ÷ 斜边",B:"邻边 ÷ 斜边",C:"对边 ÷ 邻边",D:"斜边 ÷ 邻边"},answer:"B",knowledge:"余弦定义",explanation:"cos θ = 邻边 ÷ 斜边。",difficulty:"基础",commonMistake:"把 sin 与 cos 的边长比混淆。"},
{id:"Q3",text:"在直角三角形中，对于锐角 θ，tan θ 等于：",options:{A:"邻边 ÷ 对边",B:"邻边 ÷ 斜边",C:"对边 ÷ 邻边",D:"斜边 ÷ 对边"},answer:"C",knowledge:"正切定义",explanation:"tan θ = 对边 ÷ 邻边。",difficulty:"基础",commonMistake:"把 tan θ 写成邻边 ÷ 对边。"},
{id:"Q4",text:"sin 30° 的值是：",options:{A:"√3/2",B:"√2/2",C:"1",D:"1/2"},answer:"D",knowledge:"特别角三角函数值",explanation:"sin 30° = 1/2。",difficulty:"基础",commonMistake:"把 sin 30° 与 cos 30° 混淆。"},
{id:"Q5",text:"tan 45° 的值是：",options:{A:"1",B:"√3",C:"√3/3",D:"1/2"},answer:"A",knowledge:"特别角三角函数值",explanation:"45° 等腰直角三角形中，对边与邻边相等，所以 tan 45° = 1。",difficulty:"基础",commonMistake:"把 tan 45° 误记成 √3 或 √3/3。"},
{id:"Q6",text:"直角三角形中，某锐角 θ 的对边为 6，邻边为 8，斜边为 10，则 cos θ =：",options:{A:"3/5",B:"4/5",C:"3/4",D:"5/4"},answer:"B",knowledge:"由边长求余弦值",explanation:"cos θ = 邻边 ÷ 斜边 = 8/10 = 4/5。",difficulty:"基础",commonMistake:"把 cos θ 误用成对边 ÷ 斜边。"},
{id:"Q7",text:"直角三角形中，某锐角 θ 的对边为 5，邻边为 12，斜边为 13，则 tan θ =：",options:{A:"12/13",B:"5/13",C:"5/12",D:"12/5"},answer:"C",knowledge:"由边长求正切值",explanation:"tan θ = 对边 ÷ 邻边 = 5/12。",difficulty:"基础",commonMistake:"把 tan θ 的分子分母写反。"},
{id:"Q8",text:"若 sin θ = 3/5，且 θ 为锐角，则可看成直角三角形中：",options:{A:"对边:斜边 = 5:3",B:"邻边:斜边 = 3:5",C:"对边:邻边 = 3:5",D:"对边:斜边 = 3:5"},answer:"D",knowledge:"正弦值与边长比",explanation:"sin θ = 对边 ÷ 斜边，所以对边:斜边 = 3:5。",difficulty:"中等",commonMistake:"把 sin θ 的对边与斜边顺序看反。"},
{id:"Q9",text:"一棵树的顶端相对于地面某点的仰角为 30°，该点到树根的水平距离为 12 m。若不计观察者身高，树高为：",options:{A:"12√3 m",B:"6√3 m",C:"4√3 m",D:"12 m"},answer:"C",knowledge:"仰角与正切应用",explanation:"tan 30° = 树高 ÷ 12，所以树高 = 12 × √3/3 = 4√3 m。",difficulty:"中等",commonMistake:"未先画直角三角形，导致用错边。"},
{id:"Q10",text:"楼顶看地面一点的俯角为 45°，楼高为 20 m，则该地面点到楼底的水平距离为：",options:{A:"10 m",B:"20 m",C:"20√2 m",D:"40 m"},answer:"B",knowledge:"俯角与正切应用",explanation:"俯角 45° 可转化为地面点的仰角 45°，tan 45° = 20 ÷ 水平距离，所以水平距离 = 20 m。",difficulty:"挑战",commonMistake:"把俯角与水平线、地面夹角关系判断错误。"}
];
let student={},order=[],currentIndex=0,started=false,completed=false,startTime=0,records=[];
function $(id){return document.getElementById(id)}function shuffle(arr){const copy=arr.slice();for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]]}return copy}function esc(str){return String(str).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}function show(el){el.classList.remove('hidden')}function hide(el){el.classList.add('hidden')}
function validateStudent(){const class_name=$('className').value.trim(),student_no=$('studentNo').value.trim(),student_name=$('studentName').value.trim(),seat_no=$('seatNo').value.trim();if(!class_name)return"请填写班级。";if(!student_no)return"请填写学号。";if(!/^[A-Za-z0-9\-]+$/.test(student_no))return"学号只能输入数字、英文字母或短横线。";if(!student_name)return"请填写姓名。";student={class_name,student_no,student_name,seat_no};return""}
function startQuiz(){const msg=validateStudent();if(msg){$('homeMsg').textContent=msg;show($('homeMsg'));return}hide($('homeMsg'));order=shuffle(QUESTIONS);currentIndex=0;records=[];started=true;completed=false;startTime=Date.now();hide($('home'));show($('quiz'));renderQuestion()}
function renderQuestion(){const q=order[currentIndex];$('progressText').textContent=`第 ${currentIndex+1} / ${order.length} 题｜${q.difficulty}｜${q.knowledge}`;$('questionText').textContent=q.text;$('optionsBox').innerHTML="";hide($('feedback'));hide($('nextBtn'));$('nextBtn').textContent=(currentIndex===order.length-1)?"完成并提交":"下一题";Object.keys(q.options).forEach(letter=>{const btn=document.createElement('button');btn.className='option';btn.textContent=`${letter}. ${q.options[letter]}`;btn.onclick=()=>chooseAnswer(letter,btn);$('optionsBox').appendChild(btn)})}
function chooseAnswer(letter,btn){const q=order[currentIndex];const optionButtons=Array.from(document.querySelectorAll('.option'));optionButtons.forEach(b=>b.disabled=true);const isCorrect=letter===q.answer;optionButtons.forEach(b=>{const key=b.textContent.slice(0,1);if(key===q.answer)b.classList.add('correct');if(key===letter&&!isCorrect)b.classList.add('wrong');if(key===letter)b.classList.add('selected')});records.push({question_id:q.id,display_order:currentIndex+1,question_text:q.text,selected_answer:letter,correct_answer:q.answer,is_correct:isCorrect,knowledge_tag:q.knowledge,difficulty:q.difficulty});$('feedback').innerHTML=`<strong>${isCorrect?'答对了':'答错了'}</strong><br>正确答案：${q.answer}<br>解析：${esc(q.explanation)}<br>本题知识点：${esc(q.knowledge)}`;show($('feedback'));show($('nextBtn'))}
function nextQuestion(){if(currentIndex===order.length-1){finishQuiz();return}currentIndex+=1;renderQuestion()}
function buildPayload(){const correctCount=records.filter(r=>r.is_correct).length,score=correctCount*10,accuracy=Math.round(correctCount/QUESTIONS.length*100),time_used=Math.max(1,Math.round((Date.now()-startTime)/1000)),wrong_question_ids=records.filter(r=>!r.is_correct).map(r=>r.question_id),weak_knowledge_tags=Array.from(new Set(records.filter(r=>!r.is_correct).map(r=>r.knowledge_tag))),correct_json={};records.forEach(r=>{correct_json[r.question_id]=r.is_correct});const attemptKey=`attempt_${META.practice_id}_${student.class_name}_${student.student_no}_${student.student_name}`,prev=parseInt(localStorage.getItem(attemptKey)||"0",10),submit_attempt=prev+1;localStorage.setItem(attemptKey,String(submit_attempt));return{action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:student.class_name,student_no:student.student_no,student_name:student.student_name,seat_no:student.seat_no,practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score,accuracy,total_questions:QUESTIONS.length,time_used,answers_json:records,correct_json,wrong_question_ids,weak_knowledge_tags,abnormal_flag:"none",submit_attempt,duplicate_status:submit_attempt===1?"original":"duplicate"}}
function finishQuiz(){completed=true;started=false;hide($('quiz'));show($('done'));const payload=buildPayload();renderSummary(payload);submitPayload(payload)}
function renderSummary(payload){const wrongText=payload.wrong_question_ids.length?payload.wrong_question_ids.join('、'):'无',weakText=payload.weak_knowledge_tags.length?payload.weak_knowledge_tags.join('、'):'暂无明显薄弱点';let learnText=payload.accuracy>=90?'掌握较好，可继续练习综合应用题。':payload.accuracy>=70?'基础已有掌握，建议重点回看错题对应知识点。':'建议先复习三角函数定义、特别角函数值，再做应用题。';$('summaryBox').innerHTML=`<div class="result">得分：${payload.score} 分｜正确率：${payload.accuracy}%</div><div class="line">学校：${esc(payload.school_name)}</div><div class="line">老师：${esc(payload.teacher_name)}</div><div class="line">练习编号：${esc(payload.practice_id)}</div><div class="line">练习名称：${esc(payload.practice_name)}</div><div class="line">章节：${esc(payload.chapter_name)}</div><div class="line">班级：${esc(payload.class_name)}</div><div class="line">学号：${esc(payload.student_no)}</div><div class="line">姓名：${esc(payload.student_name)}</div><div class="line">座号：${esc(payload.seat_no||'未填')}</div><div class="line">得分：${payload.score} / 100</div><div class="line">正确率：${payload.accuracy}%</div><div class="line">错题记录：${esc(wrongText)}</div><div class="line">薄弱知识点：${esc(weakText)}</div><div class="greenBox">学习总结：${esc(learnText)}</div><div class="infoBox">提交状态：正在发送。若老师稍后未看到数据，请截图给老师。</div>`}
async function submitPayload(payload){try{await fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});$('submitStatus').className='greenBox';$('submitStatus').textContent='已发送。若老师稍后未看到数据，请截图给老师。'}catch(e){$('submitStatus').className='roseBox';$('submitStatus').textContent='提交失败，请截图给老师。'}}
window.addEventListener('beforeunload',function(e){if(started&&!completed){e.preventDefault();e.returnValue='刷新或离开后，本次作答可能无法继续，请确认是否离开。'}});$('startBtn').addEventListener('click',startQuiz);$('nextBtn').addEventListener('click',nextQuestion);
</script>
</body>
</html>
