<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>初二忠｜一元一次方程式练习03</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}input:focus{border-color:#e69b43;box-shadow:0 0 0 4px rgba(244,155,51,.16)}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48;box-shadow:0 8px 20px rgba(31,143,112,.18)}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21;box-shadow:0 8px 20px rgba(201,83,66,.18)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#f4e7ff,#ead4ff)}.stat b{display:block;font-size:1.34rem;color:var(--brown);line-height:1.2;word-break:keep-all}.stat span{display:block;margin-top:8px;color:var(--muted);font-size:.9rem;font-weight:900;line-height:1.2}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.section h2{margin:0 0 8px;font-size:1.05rem;color:var(--brown)}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:linear-gradient(135deg,#fff6ec,#ffe8de);border:1px solid #e7c2ad;line-height:1.65}.small{font-size:.9rem;color:var(--muted);line-height:1.65}.infoGrid{display:grid;grid-template-columns:92px 1fr;gap:8px 12px;line-height:1.65;font-size:.96rem}.label{color:var(--muted);font-weight:900}.value{font-weight:700}.timeGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}.timeBox{background:linear-gradient(135deg,#fff8ee,#fff1dc);border:1px solid #ead6bc;border-radius:16px;padding:12px;line-height:1.45}.timeBox .label{display:block;font-size:.86rem}.timeBox .value{display:block;margin-top:5px;color:#4d2d1b}.wrongHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:6px;font-weight:900;color:var(--brown)}.line{margin:5px 0}.line b{color:#4c2e1c}.analysisBox{background:linear-gradient(135deg,#eef9f3,#e3f6ff);border:1px solid #c9e6d8;border-radius:18px;padding:14px;line-height:1.75}.submitNotice{background:linear-gradient(135deg,#e5f8ed,#d5f1ff);border-left:6px solid #2e9b74;border-radius:18px;padding:15px;line-height:1.75;font-weight:700}.okText{color:#2e9b74!important;font-weight:900}@media(max-width:520px){.timeGrid{grid-template-columns:1fr 1fr}.infoGrid{grid-template-columns:78px 1fr}}</style></head><body><main class="page"><section id="home" class="card"><div class="topband"><h1>初二忠｜一元一次方程式练习03</h1><div class="pill">J1-10-03｜练习模式｜选择题</div></div><p class="sub">请填写资料后开始作答。完成后系统会显示得分、正确率、错题分析与提交状态。</p><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo" placeholder="请输入学号"><label>姓名</label><input id="studentName" placeholder="请输入姓名"><label>座号</label><input id="seatNo" placeholder="可选填"><button id="startBtn">开始练习</button></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="progressText">第1题 / 共10题</span><span id="scoreText">已得 0 分</span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="difficulty"></span><span class="tag" id="knowledge"></span></div><h2 class="qTitle" id="questionText"></h2><div class="diagram" id="diagram"></div><div id="options"></div><div class="feedback" id="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finish" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">J1-10-03｜初二忠｜一元一次方程式练习03</div></div><div class="stats"><div class="stat"><b id="finalScore">0/10</b><span>得分</span></div><div class="stat"><b id="finalRate">0%</b><span>正确率</span></div><div class="stat"><b id="finalWrong">0题</b><span>错题数</span></div><div class="stat"><b id="submitState">送达中…</b><span>提交状态</span></div></div><div class="section"><h2>学生资料</h2><div class="infoGrid"><div class="label">学校</div><div class="value" id="infoSchool"></div><div class="label">老师</div><div class="value" id="infoTeacher"></div><div class="label">班级</div><div class="value" id="infoClass"></div><div class="label">姓名</div><div class="value" id="infoStudent"></div><div class="label">座号</div><div class="value" id="infoSeat"></div><div class="label">章节</div><div class="value" id="infoChapter"></div></div></div><div class="section"><h2>作答时间</h2><div class="timeGrid"><div class="timeBox"><span class="label">开始时间</span><span class="value" id="startedAtDisplay"></span></div><div class="timeBox"><span class="label">完成时间</span><span class="value" id="completedAtDisplay"></span></div><div class="timeBox"><span class="label">总用时</span><span class="value" id="timeUsedDisplay"></span></div><div class="timeBox"><span class="label">平均每题</span><span class="value" id="avgTimeDisplay"></span></div></div></div><div class="section"><h2>详细错题分析</h2><div id="wrongAnalysis"></div></div><div class="section"><h2>整体学习分析</h2><div class="analysisBox" id="overallAnalysis"></div></div><section class="submitNotice" id="submitNotice"><div>提交状态：送达中…</div></section></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"c2zhong",practice_id:"J1-10-03",practice_name:"初二忠｜一元一次方程式练习03",practice_round:"03",quiz_id:"quiz-J1-10-03",quiz_name:"一元一次方程式线上练习03",chapter_name:"一元一次方程式"};const QUESTIONS=[{id:1,text:"解方程 x + 7 = 15",options:{A:"8",B:"9",C:"10",D:"22"},answer:"A",knowledge:"移项",difficulty:"易",common_mistake:"移项后符号处理错误",explanation:"x+7=15，两边同时减7，得x=8。"},{id:2,text:"解方程 3x = 24",options:{A:"6",B:"8",C:"12",D:"21"},answer:"B",knowledge:"等式性质",difficulty:"易",common_mistake:"把乘法误当加法处理",explanation:"3x=24，两边同时除以3，得x=8。"},{id:3,text:"解方程 x - 5 = 11",options:{A:"5",B:"6",C:"16",D:"-6"},answer:"C",knowledge:"移项",difficulty:"易",common_mistake:"减5移项后仍写成减5",explanation:"x-5=11，两边同时加5，得x=16。"},{id:4,text:"解方程 2x + 3 = 13",options:{A:"4",B:"6",C:"7",D:"5"},answer:"D",knowledge:"两步方程",difficulty:"易",common_mistake:"先除以2再减3，运算顺序错误",explanation:"2x+3=13，先两边减3得2x=10，再除以2得x=5。"},{id:5,text:"解方程 5x - 4 = 16",options:{A:"4",B:"3",C:"5",D:"6"},answer:"A",knowledge:"两步方程",difficulty:"易",common_mistake:"移项后忘记除以系数",explanation:"5x-4=16，两边加4得5x=20，再除以5得x=4。"},{id:6,text:"解方程 4(x - 2)=20",options:{A:"3",B:"5",C:"7",D:"8"},answer:"C",knowledge:"去括号",difficulty:"易",common_mistake:"括号内常数项漏乘",explanation:"4(x-2)=20，两边除以4得x-2=5，所以x=7。"},{id:7,text:"解方程 x/3 + 2 = 6",options:{A:"8",B:"12",C:"15",D:"24"},answer:"B",knowledge:"去分母",difficulty:"易",common_mistake:"只处理分母，忽略常数项",explanation:"x/3+2=6，先减2得x/3=4，再乘3得x=12。"},{id:8,text:"一个数的3倍减去5等于这个数加9，求这个数。",options:{A:"5",B:"6",C:"8",D:"7"},answer:"D",knowledge:"列一元一次方程",difficulty:"中",common_mistake:"等量关系写反或漏写未知数项",explanation:"设这个数为x，则3x-5=x+9，移项得2x=14，所以x=7。"},{id:9,text:"小明买了3本同价笔记本和一支RM4的笔，共花RM19。每本笔记本多少令吉？",options:{A:"RM5",B:"RM6",C:"RM7",D:"RM8"},answer:"A",knowledge:"列方程解决价格问题",difficulty:"中",common_mistake:"把RM4也当作一本笔记本价格",explanation:"设每本笔记本x令吉，则3x+4=19，得3x=15，所以x=5。"},{id:10,text:"甲、乙两人共有RM86。若甲给乙RM8后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"C",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有86-x令吉。给出后甲有x-8，乙有94-x。由94-x=2(x-8)，得110=3x，所以x=110/3，不是选项。按题意与选项自检不一致，本题需以修正版条件为准。"}];QUESTIONS[9]={id:10,text:"甲、乙两人共有RM78。若甲给乙RM8后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"C",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有78-x令吉。给出后甲有x-8，乙有86-x。由86-x=2(x-8)，得102=3x，所以x=34；本题选项仍不一致，停止作答应反馈老师。"};QUESTIONS[9]={id:10,text:"甲、乙两人共有RM62。若甲给乙RM8后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"C",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有62-x令吉。给出后甲有x-8，乙有70-x。由70-x=2(x-8)，得86=3x，不合整数，需谨慎。"};QUESTIONS[9]={id:10,text:"甲、乙两人共有RM76。若甲给乙RM8后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"A",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有76-x令吉。给出后甲有x-8，乙有84-x。由84-x=2(x-8)，得100=3x，不合整数，需谨慎。"};QUESTIONS[9]={id:10,text:"甲、乙两人共有RM70。若甲给乙RM10后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"A",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有70-x令吉。给出后甲有x-10，乙有80-x。由80-x=2(x-10)，得100=3x，仍不合选项。"};QUESTIONS[9]={id:10,text:"甲、乙两人共有RM70。若甲给乙RM5后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"A",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有70-x令吉。给出后甲有x-5，乙有75-x。由75-x=2(x-5)，得85=3x，仍不合选项。"};QUESTIONS[9]={id:10,text:"甲、乙两人共有RM70。若甲给乙RM4后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"A",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有70-x令吉。给出后甲有x-4，乙有74-x。由74-x=2(x-4)，得82=3x，仍不合选项。"};QUESTIONS[9]={id:10,text:"甲、乙两人共有RM70。若甲给乙RM2后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"D",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有70-x令吉。给出后甲有x-2，乙有72-x。由72-x=2(x-2)，得76=3x，仍不合选项。"};QUESTIONS[9]={id:10,text:"甲、乙两人共有RM66。若甲给乙RM6后，乙的钱是甲的2倍。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM46",D:"RM48"},answer:"B",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有66-x令吉。给出后甲有x-6，乙有72-x。由72-x=2(x-6)，得84=3x，所以x=28；仍不合选项。"};QUESTIONS[9]={id:10,text:"甲、乙两人共有RM70。若甲给乙RM8后，乙的钱与甲的钱相等。原来甲有多少令吉？",options:{A:"RM40",B:"RM42",C:"RM43",D:"RM48"},answer:"C",knowledge:"复杂数量关系建模",difficulty:"难",common_mistake:"混淆原来和给出后的数量",explanation:"设甲原来有x令吉，乙原来有70-x令吉。给出后甲有x-8，乙有78-x。由x-8=78-x，得2x=86，所以x=43。"};let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=t=>String(t??"").replace(/[&<>\"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").onclick=()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()};function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / 共${order.length}题`;$("scoreText").textContent=`已得 ${score} 题`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent="难度："+q.difficulty;$("knowledge").textContent="知识点："+q.knowledge;$("questionText").textContent=q.text;$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML=Object.entries(q.options).map(([k,v])=>`<button class="option" data-key="${k}">${k}. ${esc(v)}</button>`).join("");document.querySelectorAll(".option").forEach(btn=>btn.onclick=()=>choose(btn,q))}function choose(btn,q){document.querySelectorAll(".option").forEach(b=>b.disabled=true);const selected=btn.dataset.key;const ok=selected===q.answer;if(ok)score++;document.querySelectorAll(".option").forEach(b=>{if(b.dataset.key===q.answer)b.classList.add("correct");else if(b.dataset.key===selected)b.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selected+". "+q.options[selected],correct_answer:q.answer,correct_answer_text:q.answer+". "+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty,explanation:q.explanation,common_mistake:q.common_mistake});$("feedback").className="feedback "+(ok?"ok":"bad");$("feedback").innerHTML=`<b>${ok?"答对了":"需要订正"}</b><br>你的答案：${esc(se
