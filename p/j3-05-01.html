ckground:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#ede2ff,#d8c5ff)}.stat b{display:block;font-size:1.35rem;color:#5b341e}.summaryBox{padding:14px;border-radius:18px;background:#fff7ea;border:1px solid #ead8c1;line-height:1.7;margin-top:12px}.small{font-size:.86rem;color:#7d6a58;line-height:1.6}.statusOk{color:#0f6c52;font-weight:900}.statusBad{color:#9d3025;font-weight:900}ul{padding-left:1.2rem;line-height:1.8}@media(max-width:430px){html{font-size:16px}.page{padding:10px 8px 20px}.card{border-radius:20px;padding:18px 12px}.topband{margin:-18px -12px 16px}.stats{grid-template-columns:1fr}}</style></head><body><div class="page"><section id="start" class="card"><div class="topband"><h1>相似形基础练习</h1><div class="pill">练习编号：J3-05-01</div><p class="sub">宽柔中学古来分校｜陈天龙｜2026上学期<br>初三上册第5章｜相似形｜练习模式</p></div><label>班级</label><input id="className" value="初三A" autocomplete="off"><label>学号</label><input id="studentNo" autocomplete="off"><label>姓名</label><input id="studentName" autocomplete="off"><label>座号（可选）</label><input id="seatNo" autocomplete="off"><button id="startBtn">开始作答</button><p class="small">开始后请依序作答。刷新或离开后，本次作答可能无法继续，请确认是否离开。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="qCount">第1题/10题</span><span id="scoreNow">得分 0</span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span class="tag" id="difficultyTag"></span><span class="tag" id="knowledgeTag"></span></div><div id="qText" class="qTitle"></div><div id="diagram" class="diagram"></div><div id="diagramNote" class="diagramNote"></div><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" class="hidden">下一题</button></section><section id="done" class="card hidden"><div class="topband"><h1>完成页</h1><div class="pill">练习编号：J3-05-01</div><p class="sub">作答数据已送达。请保留本页截图，以备老师核对。</p></div><div class="stats"><div class="stat"><b id="finalScore">0</b>得分</div><div class="stat"><b id="finalAcc">0%</b>正确率</div><div class="stat"><b id="wrongCount">0</b>错题数</div><div class="stat"><b id="timeUsed">0秒</b>用时</div></div><div id="infoBox" class="summaryBox"></div><div id="wrongBox" class="summaryBox"></div><div id="weakBox" class="summaryBox"></div><div id="summaryBox" class="summaryBox"></div><div id="submitStatus" class="summaryBox">提交状态：正在送达……</div></section></div><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"初三A",practice_id:"J3-05-01",practice_name:"相似形基础练习",practice_round:"1",quiz_id:"J3-05-01-QZ",quiz_name:"相似形基础练习",chapter_name:"初三上册第5章｜相似形"};const QUESTIONS=[{id:"Q1",text:"下列哪一组图形一定相似？",options:{A:"两个正方形",B:"两个长方形",C:"两个梯形",D:"两个菱形"},answer:"A",knowledge:"相似图形的概念",difficulty:"基础",explanation:"任意两个正方形对应角相等，对应边成比例，所以一定相似。",diagram_svg:'<svg viewBox="0 0 420 170" xmlns="http://www.w3.org/2000/svg"><rect x="50" y="45" width="70" height="70" fill="#fff" stroke="#70401f" stroke-width="3"/><rect x="220" y="25" width="110" height="110" fill="#fff" stroke="#70401f" stroke-width="3"/><text x="60" y="135" font-size="16">正方形1</text><text x="235" y="155" font-size="16">正方形2</text></svg>',visual_note:"示意图已尽量按比例绘制。",common_misconception:"把形状看起来相近误认为一定相似。",coach_tip:"判断相似时，要同时看角和边的比例关系。"},{id:"Q2",text:"若 △ABC ∼ △DEF，且 AB 对应 DE，AB=6，DE=9，则相似比 AB:DE 为多少？",options:{A:"3:2",B:"2:3",C:"6:15",D:"9:6"},answer:"B",knowledge:"相似比",difficulty:"基础",explanation:"AB:DE = 6:9 = 2:3。",diagram_svg:'<svg viewBox="0 0 430 190" xmlns="http://www.w3.org/2000/svg"><polygon points="55,145 135,145 85,65" fill="#fff" stroke="#70401f" stroke-width="3"/><polygon points="235,145 355,145 280,25" fill="#fff" stroke="#70401f" stroke-width="3"/><text x="82" y="160" font-size="16">AB=6</text><text x="270" y="160" font-size="16">DE=9</text><text x="70" y="60" font-size="16">C</text><text x="270" y="22" font-size="16">F</text></svg>',visual_note:"示意图已尽量按比例绘制。",common_misconception:"把AB:DE写成DE:AB。",coach_tip:"写比例前先确认谁对应谁，顺序要一致。"},{id:"Q3",text:"△ABC ∼ △DEF，若 AB=4，BC=6，DE=8，则 EF 等于多少？",options:{A:"10",B:"11",C:"12",D:"14"},answer:"C",knowledge:"对应边成比例",difficulty:"基础",explanation:"AB:DE = 4:8 = 1:2，所以 BC:EF = 1:2，EF=12。",diagram_svg:'<svg viewBox="0 0 430 190" xmlns="http://www.w3.org/2000/svg"><polygon points="45,145 125,145 125,85" fill="#fff" stroke="#70401f" stroke-width="3"/><polygon points="235,145 395,145 395,25" fill="#fff" stroke="#70401f" stroke-width="3"/><path d="M125 132 L112 132 L112 145" fill="none" stroke="#70401f" stroke-width="2"/><path d="M395 132 L382 132 L382 145" fill="none" stroke="#70401f" stroke-width="2"/><text x="76" y="165" font-size="16">AB=4</text><text x="132" y="118" font-size="16">BC=6</text><text x="293" y="165" font-size="16">DE=8</text><text x="400" y="90" font-size="16">EF=?</text></svg>',visual_note:"示意图已尽量按比例绘制。",common_misconception:"把BC误对应DE。",coach_tip:"先找一组已知对应边求相似比，再求未知边。"},{id:"Q4",text:"若两个相似三角形的相似比为 3:5，则它们的面积比为多少？",options:{A:"3:5",B:"5:3",C:"6:10",D:"9:25"},answer:"D",knowledge:"面积比与相似比",difficulty:"基础",explanation:"面积比等于相似比的平方，所以为 3²:5²=9:25。",diagram_svg:'<svg viewBox="0 0 420 190" xmlns="http://www.w3.org/2000/svg"><polygon points="60,145 150,145 105,75" fill="#fff3d5" stroke="#70401f" stroke-width="3"/><polygon points="230,145 380,145 305,28" fill="#ffe1d9" stroke="#70401f" stroke-width="3"/><text x="88" y="166" font-size="16">边比3</text><text x="282" y="166" font-size="16">边比5</text></svg>',visual_note:"示意图已尽量按比例绘制。",common_misconception:"直接把相似比当面积比。",coach_tip:"遇到面积，记得边比平方。"},{id:"Q5",text:"在 △ABC 中，DE ∥ BC，D 在 AB 上，E 在 AC 上。下列说法正确的是：",options:{A:"△ADE ∼ △ABC",B:"△ADE ≅ △ABC",C:"△ADE 与 △ABC 面积一定相等",D:"AD=DB"},answer:"A",knowledge:"平行线截三角形定理",difficulty:"基础",explanation:"DE ∥ BC，可得对应角相等，所以 △ADE ∼ △ABC。",diagram_svg:'<svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg"><polygon points="70,180 350,180 210,40" fill="#fff" stroke="#70401f" stroke-width="3"/><line x1="140" y1="110" x2="280" y2="110" stroke="#1f8f70" stroke-width="3"/><text x="205" y="35" font-size="16">A</text><text x="55" y="195" font-size="16">B</text><text x="355" y="195" font-size="16">C</text><text x="126" y="106" font-size="16">D</text><text x="286" y="106" font-size="16">E</text><text x="178" y="102" font-size="15">DE ∥ BC</text></svg>',visual_note:"示意图已尽量按比例绘制。",common_misconception:"把相似误判为全等。",coach_tip:"看到三角形中有一条线平行于另一边，要主动想到相似。"},{id:"Q6",text:"一个模型楼高 12 cm，实际楼高 24 m。若模型中门高 1 cm，则实际门高为多少？",options:{A:"1 m",B:"2 m",C:"12 m",D:"24 m"},answer:"B",knowledge:"比例尺与模型",difficulty:"基础",explanation:"12 cm 对应 24 m，所以 1 cm 对应 2 m。",diagram_svg:'<svg viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg"><rect x="80" y="80" width="70" height="110" fill="#fff" stroke="#70401f" stroke-width="3"/><rect x="105" y="160" width="20" height="30" fill="#ffe1d9" stroke="#70401f" stroke-width="2"/><rect x="250" y="30" width="100" height="160" fill="#fff" stroke="#70401f" stroke-width="3"/><rect x="288" y="145" width="28" height="45" fill="#ffe1d9" stroke="#70401f" stroke-width="2"/><text x="72" y="70" font-size="16">模型高12cm</text><text x="248" y="22" font-size="16">实际高24m</text><text x="65" y="210" font-size="15">门1cm</text><text x="265" y="210" font-size="15">门?m</text></svg>',visual_note:"示意图不按严格比例，解题以题目数字为准。",common_misconception:"单位没有统一。",coach_tip:"模型题先建立模型长度与实际长度的固定比例。"},{id:"Q7",text:"一根 1.5 m 的竹竿影长 2 m，同一时间树的影长 8 m，则树高为多少？",options:{A:"4 m",B:"5 m",C:"6 m",D:"8 m"},answer:"C",knowledge:"影子测高",difficulty:"基础",explanation:"树高:1.5 = 8:2，所以树高 = 6 m。",diagram_svg:'<svg viewBox="0 0 450 240" xmlns="http://www.w3.org/2000/svg"><line x1="50" y1="200" x2="420" y2="200" stroke="#70401f" stroke-width="3"/><line x1="90" y1="200" x2="90" y2="145" stroke="#1f8f70" stroke-width="6"/><line x1="90" y1="145" x2="160" y2="200" stroke="#70401f" stroke-width="2"/><line x1="250" y1="200" x2="250" y2="60" stroke="#1f8f70" stroke-width="10"/><line x1="250" y1="60" x2="410" y2="200" stroke="#70401f" stroke-width="2"/><text x="65" y="135" font-size="15">1.5m</text><text x="110" y="222" font-size="15">2m</text><text x="220" y="55" font-size="15">?m</text><text x="320" y="222" font-size="15">8m</text></svg>',visual_note:"示意图已尽量按比例绘制。",common_misconception:"比例式分子分母不一致。",coach_tip:"同一时间阳光下，物高与影长形成相似三角形。"},{id:"Q8",text:"△ABC ∼ △PQR，若 AB、BC、AC 分别对应 PQ、QR、PR。已知 AB=5，BC=7，PQ=15，QR=x，则 x 为多少？",options:{A:"18",B:"19",C:"20",D:"21"},answer:"D",knowledge:"相似三角形对应边比例",difficulty:"中等",explanation:"5:15 = 7:x，比例为 1:3，所以 x=21。",diagram_svg:'<svg viewBox="0 0 450 205" xmlns="http://www.w3.org/2000/svg"><polygon points="55,160 155,160 95,80" fill="#fff" stroke="#70401f" stroke-width="3"/><polygon points="235,160 415,160 305,30" fill="#fff" stroke="#70401f" stroke-width="3"/><text x="82" y="178" font-size="15">AB=5</text><text x="132" y="123" font-size="15">BC=7</text><text x="292" y="178" font-size="15">PQ=15</text><text x="382" y="94" font-size="15">QR=x</text></svg>',visual_note:"示意图已尽量按比例绘制。",common_misconception:"把5:15与7:x的顺序写乱。",coach_tip:"比例式中每一边都要按同一方向比较。"},{id:"Q9",text:"△ABC ∼ △DEF，若相似比 AB:DE = 2:5，且 △ABC 的面积为 12 cm²，则 △DEF 的面积为多少？",options:{A:"75 cm²",B:"60 cm²",C:"30 cm²",D:"24 cm²"},answer:"A",knowledge:"相似形面积比",difficulty:"中等",explanation:"面积比为 2²:5² = 4:25，所以 △DEF 面积 = 12×25÷4 = 75 cm²。",diagram_svg:'<svg viewBox="0 0 440 205" xmlns="http://www.w3.org/2000/svg"><polygon points="65,160 145,160 105,100" fill="#fff3d5" stroke="#70401f" stroke-
