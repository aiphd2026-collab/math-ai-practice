k" class="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finish" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">J3-03-01｜初三A｜统计表与统计图基础练习</div></div><div class="stats"><div class="stat"><b id="finalScore"></b><span>得分</span></div><div class="stat"><b id="finalRate"></b><span>正确率</span></div><div class="stat"><b id="finalWrong"></b><span>错题数</span></div><div class="stat"><b id="submitState">发送中</b><span>提交状态</span></div></div><div id="studentSummary" class="section"></div><div class="section"><h2>错题记录</h2><div id="wrongList"></div></div><div class="section"><h2>薄弱知识点</h2><div id="weakList"></div></div><div class="section"><h2>学习总结</h2><p id="studyAdvice"></p></div><div class="section"><h2>提交状态</h2><p id="submitMessage">正在发送学习数据...</p></div></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:"2026",semester:"上学期",class_id:"j3a",practice_id:"J3-03-01",practice_name:"初三A｜统计表与统计图基础练习",practice_round:"01",quiz_id:"J3-03-01-QZ",quiz_name:"初三A｜统计表与统计图基础练习",chapter_name:"初三上册第3章｜统计表与统计图"};const S={bar:d=>`<svg viewBox="0 0 420 250"><rect x="40" y="25" width="340" height="195" rx="12" fill="#fffdf8" stroke="#ead8c1"/><line x1="70" y1="190" x2="360" y2="190" stroke="#6d4512"/><line x1="70" y1="45" x2="70" y2="190" stroke="#6d4512"/>${d.map((v,i)=>`<rect x="${90+i*55}" y="${190-v.h}" width="34" height="${v.h}" rx="6" fill="#e8863a"/><text x="${107+i*55}" y="${184-v.h}" font-size="14" fill="#5b341e" text-anchor="middle">${v.n}</text><text x="${107+i*55}" y="214" font-size="13" fill="#5b341e" text-anchor="middle">${v.l}</text>`).join("")}</svg>`,table:rows=>`<svg viewBox="0 0 420 245"><rect x="50" y="30" width="320" height="170" rx="12" fill="#fffdf8" stroke="#ead8c1"/><line x1="210" y1="30" x2="210" y2="200" " r="6"/><circle cx="275" cy="85" r="6"/><circle cx="335" cy="65" r="6"/></g><g font-size="13" fill="#5b341e" text-anchor="middle"><text x="95" y="212">周一</text><text x="155" y="212">周二</text><text x="215" y="212">周三</text><text x="275" y="212">周四</text><text x="335" y="212">周五</text><text x="95" y="150">120</text><text x="155" y="120">135</text><text x="215" y="130">130</text><text x="275" y="80">150</text><text x="335" y="60">160</text></g></svg>`,visual_note:"线形图已按借书量变化大致绘制。",common_misconception:"只看某一天下降，忽略整体变化。",coach_tip:"AI提示：判断趋势时看整体方向，不只盯住一个局部变化。"},{id:"Q10",text:"若要表示某班40名学生数学成绩在各分数段的人数分布，并突出连续分组情况，最适合使用哪一种图？",options:{A:"象形图",B:"直方图",C:"圆形图",D:"折线统计图"},answer:"B",knowledge:"直方图与分组数据",difficulty:"挑战",explanation:"成绩分数段属于连续分组数据，用直方图更合适。",diagram_svg:`<svg viewBox="0 0 420 235"><rect x="45" y="25" width="335" height="180" rx="12" fill="#fffdf8" stroke="#ead8c1"/><line x1="80" y1="180" x2="350" y2="180" stroke="#6d4512"/><line x1="80" y1="50" x2="80" y2="180" stroke="#6d4512"/><rect x="92" y="135" width="55" height="45" fill="#f08a35" stroke="#fffdf8"/><rect x="147" y="100" width="55" height="80" fill="#f08a35" stroke="#fffdf8"/><rect x="202" y="70" width="55" height="110" fill="#f08a35" stroke="#fffdf8"/><rect x="257" y="115" width="55" height="65" fill="#f08a35" stroke="#fffdf8"/><rect x="312" y="145" width="35" height="35" fill="#f08a35" stroke="#fffdf8"/><g font-size="13" fill="#5b341e" text-anchor="middle"><text x="120" y="202">50-59</text><text x="174" y="202">60-69</text><text x="229" y="202">70-79</text><text x="284" y="202">80-89</text><text x="332" y="202">90-99</text><text x="215" y="45">连续分组数据</text></g></svg>`,visual_note:"图形用于提示连续分组数据适合直方图。",common_misconception:"看到人数分布就选条形图，没有注意连续分组。",coach_tip:"AI提示：成绩分数段是连续分组，选择直方图更合适。"}];let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=text=>String(text??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / ${order.length}题`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent=q.difficulty||"基础";$("knowledge").textContent=q.knowledge||"知识点";$("questionText").textContent=q.text;if(q.diagram_svg){$("diagram").style.display="block";$("diagram").innerHTML=q.diagram_svg;$("diagramNote").classList.remove("hidden");$("diagramNote").textContent=q.visual_note||"图形为示意图，解题以题目数字为准。"}else{$("diagram").style.display="none";$("diagram").innerHTML="";$("diagramNote").classList.add("hidden");$("diagramNote").textContent=""}$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.textContent=`${key}. ${value}`;btn.addEventListener("click",()=>chooseAnswer(key));$("options").appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||""}`}function coachTip(q,correct){if(q.coach_tip)return q.coach_tip;if(!correct&&q.common_misconception)return `常见错因：${q.common_misconception}`;return correct?"继续保持：先看清图表类型，再读取对应数据。":"AI提示：先看题目问的是频数、频率、趋势还是图表类型，再选择方法。"}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.textContent.startsWith(q.answer+"."))btn.classList.add("correct");if(btn.textContent.startsWith(selected+".")&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||""});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<b>${correct?"答对了":"还差一点"}</b><br>你的答案：${esc(selectedText)}<br>正确答案：${esc(correctText)}<br>解析：${esc(q.explanation||"")}<br><b>AI学习提示：</b>${esc(coachTip(q,correct))}<br>知识点：${esc(q.knowledge||"")}`;$("nextBtn").disabled=false}$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else{finishQuiz()}});function finishQuiz(){const total=QUESTIONS.length,finalScore=Math.round(score/total*100),rate=finalScore,timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000)),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))];$("barFill").style.width="100%";$("finalScore").textContent=finalScore+"分";$("finalRate").textContent=rate+"%";$("finalWrong").textContent=wrong.length+"题";$("studentSummary").innerHTML=`<h2>学生资料</h2><p>学校：${esc(META.school_name)}<br>老师：${esc(META.teacher_name)}<br>练习编号：${esc(META.practice_id)}<br>练习名称：${esc(META.practice_name)}<br>章节：${esc(META.chapter_name)}<br>班级：${esc($("className").value.trim())}<br>学号：${esc($("studentNo").value.trim())}<br>姓名：${esc($("studentName").value.trim())}<br>座号：${esc($("seatNo").value.trim()||"未填")}</p>`;$("wrongList").innerHTML=wrong.length?wrong.map(a=>`<div class="wrongItem">第${a.display_order}题（原题 ${esc(a.question_id)}）｜你的答案：${esc(a.selected_answer_text||a.selected_answer)}｜正确答案：${esc(a.correct_answer_text||a.correct_answer)}<br>${esc(a.question_text)}<br>知识点：${esc(a.knowledge_tag)}</div>`).join(""):"<p>本次没有错题，保持这个节奏。</p>";$("weakList").innerHTML=weak.length?weak.map(k=>`<span class="tag">${esc(k)}</span>`).join(" "):"<p>暂无明显薄弱知识点。</p>";$("studyAdvice").textContent=weak.length?`建议先复习：${weak.join("、")}，再做同类基础题巩固。`:"本次掌握较稳定，可以继续挑战中等题。";show("finish");submitPayload(finalScore,total,timeUsed,wrong,weak)}function submitPayload(finalScore,total,timeUsed,wrong,weak){const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:finalScore,accuracy:finalScore,total_questions:total,time_used:timeUsed,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已送达";$("submitMessage").textContent="作答数据已送达。请保留本页截图，以备老师核对。"}).catch(()=>{$("submitState").textContent="失败";$("submitMessage").textContent="提交失败，请截图给老师。"})}</script></body></html>
