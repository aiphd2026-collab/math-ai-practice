<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>一元一次方程式线上练习</title><style>*{box-sizing:border-box}:root{--ink:#2c2118;--muted:#7b6756;--brown:#5a351e;--navy:#17406f;--gold:#ffb000;--orange:#ff8a1f;--green:#35b983;--blue:#61b5f7;--red:#f47668;--purple:#9b7cf7;--line:rgba(125,89,53,.14);--shadow:0 18px 46px rgba(111,62,22,.15);--hand:"Comic Sans MS","Segoe Print","KaiTi","Microsoft YaHei",Arial,sans-serif}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 8%,rgba(255,211,106,.62),transparent 26%),radial-gradient(circle at 90% 12%,rgba(97,181,247,.24),transparent 30%),radial-gradient(circle at 86% 78%,rgba(53,185,131,.18),transparent 32%),linear-gradient(150deg,#fff7e8 0%,#ffe1c2 48%,#f8d0a1 100%)}.page{max-width:760px;margin:0 auto;padding:16px 10px 30px}.card{margin-bottom:18px;overflow:hidden;border-radius:28px;background:rgba(255,253,248,.94);border:1px solid rgba(255,255,255,.66);box-shadow:var(--shadow)}.topband{padding:28px 16px 24px;text-align:center;background:linear-gradient(135deg,#fff0d8,#ffe2ae 48%,#dff4ff);border-bottom:1px solid rgba(126,82,36,.12)}h1{margin:0;color:var(--navy);font-family:var(--hand);font-size:2.05rem;line-height:1.24;text-shadow:0 3px 0 rgba(255,255,255,.8),0 8px 18px rgba(23,64,111,.14)}.pill{display:inline-block;margin-top:12px;padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.68);color:#6e401e;font-weight:900}.sub{margin:13px 0 0;color:var(--muted);line-height:1.7;text-align:center}.body{padding:17px 16px 20px}label{display:block;margin:14px 0 8px;font-weight:900}input{width:100%;min-height:56px;border:2px solid #ead7bf;border-radius:18px;padding:0 15px;font-size:1rem;background:#fffefa;outline:none}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:#fff;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f5aa41,#e8782c 60%,#b45825);box-shadow:0 12px 26px rgba(199,91,30,.22);cursor:pointer}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-17px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:10px;color:var(--brown);font-weight:900}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f1dec6;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd36a,#f59f3a,#35b983);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:13px}.tag{padding:7px 10px;border-radius:999px;font-size:.82rem;font-weight:900;background:#fff0c9;color:#6d4b13}.tag.blue{background:#e5f4ff;color:#24567c}.qTitle{font-size:1.15rem;line-height:1.55;font-weight:900;margin:0 0 14px}.small{font-size:.9rem;color:var(--muted);line-height:1.65}.option{width:100%;margin:10px 0;padding:14px;border:2px solid #eddac1;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff3df);font-weight:800;line-height:1.5;cursor:pointer}.option.selected{border-color:#f59f3a;background:#fff1c4}.option.correct{border-color:#35b983;background:#e5fff4}.option.wrong{border-color:#f47668;background:#fff0ee}.explain{display:none;margin-top:12px;padding:12px 13px;border-radius:18px;background:#f7fbff;border:1px solid #d7ebff;color:#294763;line-height:1.65}.result{font-size:1.2rem;font-weight:900;color:var(--navy);line-height:1.7}.status{margin-top:12px;padding:12px;border-radius:16px;background:#fff7df;color:#6e401e;font-weight:800;line-height:1.6}</style></head><body><div class="page"><section class="card"><div class="topband"><h1>一元一次方程式线上练习</h1><div class="pill">练习编号：J1-10-01｜班级：初二忠</div><p class="sub">关丹德信中学｜陈天龙老师｜初一下册第10章 一元一次方程式</p></div><div class="body" id="start"><label>学生姓名</label><input id="studentName" placeholder="请输入姓名"><label>学号</label><input id="studentNo" placeholder="请输入学号"><button onclick="startQuiz()">开始作答</button><p class="small">共10题。提交后可查看得分与错题提示。</p></div></section><section class="card hidden" id="quiz"><div class="body"><div class="progressBox"><div class="progressMeta"><span id="countText">第1/10题</span><span id="scoreText">已答0题</span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span class="tag" id="diffTag"></span><span class="tag blue" id="kpTag"></span></div><p class="qTitle" id="qTitle"></p><div id="options"></div><div class="explain" id="explain"></div><button id="nextBtn" onclick="nextQuestion()" disabled>下一题</button></div></section><section class="card hidden" id="done"><div class="topband"><h1>完成练习</h1><p class="sub">请查看成绩与错题提醒。</p></div><div class="body"><div class="result" id="result"></div><div class="status" id="submitStatus">提交状态：准备提交</div><button onclick="location.reload()">重新开始</button></div></section></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const QUESTIONS=[{"id":1,"difficulty":"易","knowledge":"一元一次方程式定义","question":"下列哪一个是一元一次方程式？","options":{"A":"x²+1=10","B":"2x+5=13","C":"x+y=8","D":"3x−4"},"answer":"B","explain":"一元一次方程式只含一个未知数，且未知数最高次数为1。"},{"id":2,"difficulty":"易","knowledge":"移项","question":"解方程：x−6=11。","options":{"A":"x=5","B":"x=−17","C":"x=11","D":"x=17"},"answer":"D","explain":"x−6=11，所以x=17。"},{"id":3,"difficulty":"易","knowledge":"等式性质","question":"解方程：4x=28。","options":{"A":"x=7","B":"x=6","C":"x=8","D":"x=24"},"answer":"A","explain":"两边同时除以4，x=7。"},{"id":4,"difficulty":"易","knowledge":"等式性质","question":"解方程：x+9=20。","options":{"A":"x=29","B":"x=20","C":"x=11","D":"x=−11"},"answer":"C","explain":"两边同时减9，x=11。"},{"id":5,"difficulty":"易","knowledge":"两步方程","question":"解方程：3x+2=14。","options":{"A":"x=5","B":"x=4","C":"x=6","D":"x=12"},"answer":"B","explain":"3x=12，所以x=4。"},{"id":6,"difficulty":"易","knowledge":"移项与除法","question":"解方程：5x−7=18。","options":{"A":"x=5","B":"x=4","C":"x=6","D":"x=25"},"answer":"A","explain":"5x=25，所以x=5。"},{"id":7,"difficulty":"易","knowledge":"去括号","question":"解方程：2(x+4)=18。","options":{"A":"x=13","B":"x=7","C":"x=9","D":"x=5"},"answer":"D","explain":"2x+8=18，2x=10，x=5。"},{"id":8,"difficulty":"中","knowledge":"去括号、移项","question":"解方程：3(x−2)+5=2x+8。","options":{"A":"x=5","B":"x=7","C":"x=9","D":"x=8"},"answer":"C","explain":"3x−6+5=2x+8，3x−1=2x+8，x=9。"},{"id":9,"difficulty":"中","knowledge":"列一元一次方程","question":"小华买了4支同价圆珠笔，又买了3令吉的尺子，共花23令吉。每支圆珠笔多少钱？","options":{"A":"5令吉","B":"6令吉","C":"7令吉","D":"8令吉"},"answer":"A","explain":"设每支圆珠笔x令吉，4x+3=23，x=5。"},{"id":10,"difficulty":"难","knowledge":"多条件整合列方程","question":"学校买两种文具礼包。基础礼包含2本练习册和1支笔，进阶礼包含3本练习册和2支笔。每本练习册比每支笔贵3令吉。若买5个基础礼包和4个进阶礼包共花241令吉，每支笔多少钱？","options":{"A":"4令吉","B":"5令吉","C":"6令吉","D":"7令吉"},"answer":"B","explain":"设每支笔x令吉，练习册x+3令吉。总练习册22本，总笔13支，22(x+3)+13x=241，x=5。"}];let idx=0,answers=[],locked=false;function startQuiz(){const n=document.getElementById('studentName').value.trim();const no=document.getElementById('studentNo').value.trim();if(!n){alert('请先输入姓名');return}if(!no){alert('请先输入学号');return}document.getElementById('start').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');render()}function render(){locked=false;const q=QUESTIONS[idx];document.getElementById('countText').textContent='第'+(idx+1)+'/'+QUESTIONS.length+'题';document.getElementById('scoreText').textContent='已答'+answers.length+'题';document.getElementById('bar').style.width=(idx/QUESTIONS.length*100)+'%';document.getElementById('diffTag').textContent='难度：'+q.difficulty;document.getElementById('kpTag').textContent='知识点：'+q.knowledge;document.getElementById('qTitle').textContent='第'+q.id+'题｜'+q.question;document.getElementById('explain').style.display='none';document.getElementById('explain').textContent='';document.getElementById('nextBtn').disabled=true;document.getElementById('nextBtn').textContent=idx===QUESTIONS.length-1?'提交':'下一题';const box=document.getElementById('options');box.innerHTML='';['A','B','C','D'].forEach(k=>{const b=document.createElement('button');b.className='option';b.textContent=k+'. '+q.options[k];b.onclick=()=>choose(k,b);box.appendChild(b)})}function choose(k,btn){if(locked)return;locked=true;const q=QUESTIONS[idx];const ok=k===q.answer;answers.push({question_id:q.id,answer:k,correct_answer:q.answer,is_correct:ok,knowledge:q.knowledge,difficulty:q.difficulty});document.querySelectorAll('.option').forEach(el=>{const key=el.textContent[0];if(key===q.answer)el.classList.add('correct');if(key===k&&key!==q.answer)el.classList.add('wrong')});const ex=document.getElementById('explain');ex.style.display='block';ex.textContent=(ok?'答对了。':'答错了。')+q.explain;document.getElementById('nextBtn').disabled=false}function nextQuestion(){if(idx<QUESTIONS.length-1){idx++;render()}else finish()}function finish(){document.getElementById('quiz').classList.add('hidden');document.getElementById('done').classList.remove('hidden');const total_questions=QUESTIONS.length;const score=answers.filter(a=>a.is_correct).length;const accuracy=Math.round(score/total_questions*10000)/100;document.getElementById('result').textContent='得分：'+score+'/'+total_questions+'｜正确率：'+accuracy+'%';submit_response(score,total_questions,accuracy)}function submit_response(score,total_questions,accuracy){const payload={action:'submit_response',school_id:'kds',school_name:'关丹德信中学',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_name:'初二忠',chapter_name:'初一下册第10章 一元一次方程式',practice_id:'J1-10-01',practice_name:'一元一次方程式线上练习',quiz_id:'J1-10-01',quiz_name:'一元一次方程式线上练习',student_name:document.getElementById('studentName').value.trim(),student_no:document.getElementById('studentNo').value.trim(),question_count:total_questions,total_questions:total_questions,total_score:total_questions,score:score,accuracy:accuracy,answers:answers,submitted_at:new Date().toISOString()};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{document.getElementById('submitStatus').textContent='提交状态：已提交'}).catch(()=>{document.getElementById('submitStatus').textContent='提交状态：提交可能未成功，请告知老师'})}</script></body></html>
