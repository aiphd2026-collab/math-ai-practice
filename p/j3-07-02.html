const QUESTIONS=[{id:'Q1',text:'在直角三角形中，某锐角 θ 的对边为 3，斜边为 5，则 sin θ 的值是：',options:{A:'3/5',B:'4/5',C:'3/4',D:'4/3'},answer:'A',knowledge:'正弦的定义',difficulty:'基础',explanation:'sin θ = 对边 ÷ 斜边 = 3/5。',common_misconception:'把对边和邻边混淆。',coach_tip:'先找清楚角 θ，再标出对边、邻边和斜边。',ability:'概念理解'},{id:'Q2',text:'在直角三角形中，某锐角 θ 的邻边为 12，斜边为 13，则 cos θ 的值是：',options:{A:'5/13',B:'12/13',C:'5/12',D:'13/12'},answer:'B',knowledge:'余弦的定义',difficulty:'基础',explanation:'cos θ = 邻边 ÷ 斜边 = 12/13。',common_misconception:'把邻边误看成对边。',coach_tip:'余弦看邻边和斜边，不看对边。',ability:'概念理解'},{id:'Q3',text:'tan 45° 的值是：',options:{A:'1/2',B:'√3',C:'1',D:'√3/3'},answer:'C',knowledge:'特别角三角函数值',difficulty:'基础',explanation:'tan 45° = 1。',common_misconception:'把 tan 45° 与 sin 45° 混淆。',coach_tip:'特别角函数值建议用表格横向记忆。',ability:'记忆理解'},{id:'Q4',text:'sin 30° 的值是：',options:{A:'√3/2',B:'√2/2',C:'1',D:'1/2'},answer:'D',knowledge:'特别角三角函数值',difficulty:'基础',explanation:'sin 30° = 1/2。',common_misconception:'把 sin 30° 与 cos 30° 互换。',coach_tip:'30° 对应较短直角边，所以 sin 30° 是 1/2。',ability:'记忆理解'},{id:'Q5',text:'若 tan θ = 3/4，则 θ 的对边与邻边之比是：',options:{A:'3:4',B:'4:3',C:'3:5',D:'4:5'},answer:'A',knowledge:'正切的定义',difficulty:'基础',explanation:'tan θ = 对边 ÷ 邻边，所以对边:邻边 = 3:4。',common_misconception:'把 tan θ 误认为邻边比对边。',coach_tip:'看到 tan，就先写出“对边/邻边”。',ability:'概念理解'},{id:'Q6',text:'若 sin θ = 5/13，且 θ 为锐角，则可判断对应直角三角形中：',options:{A:'对边为 12，斜边为 13',B:'对边为 5，斜边为 13',C:'邻边为 5，斜边为 13',D:'对边为 13，斜边为 5'},answer:'B',knowledge:'由三角函数值判断边的关系',difficulty:'基础',explanation:'sin θ = 对边 ÷ 斜边 = 5/13。',common_misconception:'忽略 sin θ 是对边与斜边的比。',coach_tip:'分数的分子、分母可分别对应对边与斜边的比例。',ability:'条件转化'},{id:'Q7',text:'已知 cos 60° = 1/2。若直角三角形中某锐角为 60°，斜边长为 10 cm，则该角的邻边长是：',options:{A:'20 cm',B:'10 cm',C:'5 cm',D:'8 cm'},answer:'C',knowledge:'余弦值求边长',difficulty:'基础',explanation:'cos 60° = 邻边 ÷ 斜边，所以邻边 = 10 × 1/2 = 5 cm。',common_misconception:'把斜边乘成除，或找错邻边。',coach_tip:'已知斜边求邻边，用 cos 60° × 斜边。',ability:'公式选择'},{id:'Q8',text:'一根梯子长 10 m，靠在墙上，梯子与地面的夹角为 60°。梯子顶端离地面的高度约为：',options:{A:'5 m'  13，AC = 5。若 θ = ∠A，则 tan θ 的值是：',options:{A:'5/12',B:'12/13',C:'5/13',D:'12/5'},answer:'D',knowledge:'先用毕氏定理求边，再求正切',difficulty:'挑战',explanation:'BC = √(13² − 5²) = √144 = 12。对 ∠A 而言，对边是 BC，邻边是 AC，所以 tan θ = 12/5。',common_misconception:'没有先求出 BC，或把 ∠A 的对边、邻边看反。',coach_tip:'先补全直角三角形的边长，再围绕指定角 θ 判断对边和邻边。',ability:'关系推理',visual_note:'图形已按 5-12-13 直角三角形大致比例绘制。',diagram_svg:"<svg viewBox='0 0 380 230' xmlns='http://www.w3.org/2000/svg'><line x1='70' y1='180' x2='170' y2='180' stroke='#5b341e' stroke-width='5'/><line x1='170' y1='180' x2='170' y2='48' stroke='#5b341e' stroke-width='5'/><line x1='70' y1='180' x2='170' y2='48' stroke='#d76b2d' stroke-width='5'/><path d='M170 164 L154 164 L154 180' fill='none' stroke='#5b341e' stroke-width='3'/><text x='56' y='202' font-size='18' fill='#5b341e'>A</text><text x='178' y='46' font-size='18' fill='#5b341e'>B</text><text x='176' y='202' font-size='18' fill='#5b341e'>C</text><text x='112' y='202' font-size='18' fill='#5b341e'>5</text><text x='91' y='105' font-size='18' fill='#5b341e'>13</text><path d='M102 180 A32 32 0 0 0 88 151' fill='none' stroke='#5b341e' stroke-width='3'/><text x='104' y='159' font-size='18' fill='#5b341e'>θ</text></svg>"}];
function shuffle(a){let b=a.slice();for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}let order=shuffle(QUESTIONS),idx=0,score=0,answers=[],started=false,finished=false,startTime=0,currentAnswered=false;const $=id=>document.getElementById(id);window.addEventListener('beforeunload',e=>{if(started&&!finished){e.preventDefault();e.returnValue='刷新或离开后，本次作答可能无法继续，请确认是否离开。'}});$('startBtn').onclick=()=>{if(!$('className').value.trim()||!$('studentNo').value.trim()||!$('studentName').value.trim()){alert('请先填写班级、学号、姓名。');return}started=true;startTime=Date.now();$('home').classList.add('hidden');$('quiz').classList.remove('hidden');renderQ()};function renderQ(){currentAnswered=false;let q=order[idx];$('qCount').textContent=`第${idx+1}题 / 共${order.length}题`;$('scoreLive').textContent=`已答${idx}题`;$('barFill').style.width=(idx/order.length*100)+'%';$('tagKnowledge').textContent=q.knowledge;$('tagDiff').textContent=q.difficulty;$('qTitle').textContent=q.text;$('feedback').className='feedback';$('feedback').innerHTML='';$('nextBtn').classList.add('hidden');$('nextBtn').textContent=idx===order.length-1?'完成并提交':'下一题';if(q.diagram_svg){$('diagram').innerHTML=q.diagram_svg;$('diagram').style.display='block';$('diagramNote').textContent=q.visual_note||'';$('diagramNote').classList.toggle('hidden',!q.visual_note)}else{$('diagram').innerHTML='';$('diagram').style.display='none';$('diagramNote').classList.add('hidden')}let ops=$('options');ops.innerHTML='';['A','B','C','D'].forEach(k=>{let btn=document.createElement('button');btn.className='option';btn.textContent=k+'. '+q.options[k];btn.onclick=()=>choose(k,btn);ops.appendChild(btn)})}function choose(k,btn){if(currentAnswered)return;currentAnswered=true;let q=order[idx],ok=k===q.answer;if(ok)score++;document.querySelectorAll('.option').forEach(b=>{b.disabled=true;if(b.textContent.startsWith(q.answer+'.'))b.classList.add('correct')});if(!ok)btn.classList.add('wrong');answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty,ability:q.ability,common_misconception:q.common_misconception});let fb=$('feedback');fb.className='feedback '+(ok?'ok':'bad');fb.innerHTML=`<b>${ok?'回答正确':'回答错误'}</b><br>你的答案：${k}. ${q.options[k]}<br>正确答案：${q.answer}. ${q.options[q.answer]}<br>解析：${q.explanation}<br>AI学习提示：${ok?'继续保持，注意把定义和边的位置对应起来。':q.coach_tip}<br>本题知识点：${q.knowledge}`;$('nextBtn').classList.remove('hidden')}$('nextBtn').onclick=()=>{if(idx<order.length-1){idx++;renderQ()}else{finish()}};function finish(){finished=true;started=false;$('quiz').classList.add('hidden');$('result').classList.remove('hidden');let total=QUESTIONS.length,wrong=answers.filter(a=>!a.is_correct),acc=Math.round(score/total*100);$('finalScore').textContent=score+'/'+total;$('finalAcc').textContent=acc+'%';$('wrongNum').textContent=wrong.length;$('basicInfo').innerHTML=`学校：${META.school_name}<br>老师：${META.teacher_name}<br>练习编号：${META.practice_id}<br>练习名称：${META.practice_name}<br>章节：${META.chapter_name}<br>班级：${$('className').value.trim()}<br>学号：${$('studentNo').value.trim()}　姓名：${$('studentName').value.trim()}　座号：${$('seatNo').value.trim()||'未填'}`;let weak=[...new Set(wrong.map(a=>a.knowledge_tag))];$('learningSummary').innerHTML=`学习总结：本次共答对 ${score} 题，正确率 ${acc}%。${weak.length?'薄弱知识点：'+weak.join('、')+'。建议回看对应定义，并重新判断题中的对边、邻边、斜边。':'本次基础掌握较稳，可以继续练习应用题。'}`;let wl=$('wrongList');wl.innerHTML='';if(!wrong.length){let li=document.createElement('li');li.textContent='无错题。';wl.appendChild(li)}else{wrong.forEach(w=>{let li=document.createElement('li');li.textContent=`第${w.display_order}题：${w.knowledge_tag}｜你的答案：${w.selected_answer_text}｜正确答案：${w.correct_answer_text}`;wl.appendChild(li)})}submitData(acc,wrong,weak)}function submitData(acc,wrong,weak){let timeUsed=Math.round((Date.now()-startTime)/1000);let payload={...META,class_name:$('className').value.trim(),student_no:$('studentNo').value.trim(),student_name:$('studentName').value.trim(),seat_no:$('seatNo').value.trim(),score:score,accuracy:acc,total_questions:QUESTIONS.length,time_used:timeUsed,answers_json:JSON.stringify(answers),correct_json:JSON.stringify(QUESTIONS.map(q=>({question_id:q.id,correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer]}))),wrong_question_ids:wrong.map(w=>w.question_id).join(','),weak_knowledge_tags:weak.join(','),abnormal_flag:''};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{$('submitStatus').textContent='已送达'}).catch(()=>{$('submitStatus').textContent='提交失败';alert('提交失败，请截图给老师。')})}
