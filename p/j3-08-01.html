{display:block}.feedbackTitle{font-weight:900;color:#a83a2f;margin-bottom:6px}.feedback.ok .feedbackTitle{color:#14533f}.fbLine{margin-top:5px}.fbLabel{display:inline-flex;min-width:76px;justify-content:center;margin-right:6px;padding:4px 8px;border-radius:999px;color:#fff;font-size:.86rem;font-weight:900;background:#f47668}.fbLabel.ok{background:#35b983}.fbLabel.blue{background:#61b5f7}.hero{padding:28px 16px 25px;text-align:center;background:linear-gradient(135deg,#eaf5ff,#ffd16d 56%,#ffb26b);border-bottom:1px solid rgba(126,82,36,.12)}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px;margin-top:-30px;position:relative}.stat{min-height:106px;padding:16px 12px;border-radius:24px;border:2px solid rgba(255,255,255,.82);box-shadow:0 15px 30px rgba(78,46,20,.13);text-align:center}.stat b{display:block;font-size:1.62rem}.stat span{display:block;margin-top:10px;color:#4d3f35;font-weight:900}.score{background:linear-gradient(145deg,#fff4cf 0%,#ffd36a 100%)}.rate{background:linear-gradient(145deg,#e8f7ff 0%,#9bd8ff 100%)}.wrongStat{background:linear-gradient(145deg,#fff0ee 0%,#ffb6aa 100%)}.sent{background:linear-gradient(145deg,#e5fff0 0%,#91e6bd 100%)}.section{margin-top:15px;padding:15px;border-radius:23px;border:1px solid var(--line);background:rgba(255,255,255,.66)}.infoGrid{display:grid;grid-template-columns:86px 1fr;gap:9px 10px;line-height:1.55}.label,.miniTitle{display:inline-flex;align-items:center;justify-content:center;min-height:30px;border-radius:999px;color:#fff;font-size:.88rem;font-weight:900}.miniTitle{width:max-content;max-width:100%;padding:5px 11px;margin:12px 0 6px}.adviceBlock{display:block;margin-bottom:8px}.c1{background:#f59f3a}.c2{background:#61b5f7}.c3{background:#35b983}.c4{background:#9b7cf7}.c5{background:#f47668}.c6{background:#8b6f47}.value{min-height:30px;padding:3px 0 0 2px;font-weight:800;border-bottom:1px dashed rgba(122,91,60,.18)}.timeGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.tim </head><body><main class="page"><section id="home" class="card"><div class="topband"><h1>圆</h1><div class="pill">线上练习｜J3-08-01｜初三忠｜共10题</div><p class="sub">请填写资料后开始作答。系统会记录正确题数、正确率、错题、用时与薄弱知识点。</p></div><div class="body"><label for="className">班级</label><input id="className" value="初三忠" autocomplete="off" placeholder="请输入班级"><label for="studentNo">学号</label><input id="studentNo" inputmode="numeric" autocomplete="off" placeholder="请输入学号"><label for="studentName">姓名</label><input id="studentName" autocomplete="off" placeholder="请输入姓名"><label for="seatNo">座号（可不填）</label><input id="seatNo" inputmode="numeric" autocomplete="off" placeholder="请输入座号"><button id="startBtn">开始练习</button></div></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><div id="progressText">第1题 / 共10题</div><div id="scoreText">答对 0 题</div></div><div class="bar"><span id="barFill"></span></div></div><div class="body"><div class="tagrow"><span class="tag" id="difficulty"></span><span class="tag blue" id="knowledge"></span></div><div class="qTitle" id="questionText"></div><div class="diagram" id="diagram"></div><div id="diagramNote" class="small hidden"></div><div id="options"></div><div class="feedback" id="feedback"></div><button id="nextBtn" disabled>下一题</button></div></section><section id="finish" class="card hidden"><div class="hero"><h1>练习完成</h1><div class="pill">线上练习｜J3-08-01｜初三忠<br>初三忠｜圆练习01</div></div><div class="body"><div class="stats"><div class="stat score"><b id="finalScore">0/10</b><span>答对题数</span></div><div class="stat rate"><b id="finalRate">0%</b><span>正确率</span></div><div class="stat wrongStat"><b id="finalWrong">0题</b><span>错题数</span></div><div class="stat sent"><b id="submitState">送达中…</b><span>提交状态</span></div></div><div class="section"><h2>学生资料</h2><div class="infoGrid"><div class="label c1">学校</div><div class="value" id="infoSchool"></div><div class="label c2">老师</div><div class="value" id="infoTeacher"></div><div class="label c3">班级</div><div class="value" id="infoClass"></div><div class="label c4">姓名</div><div class="value" id="infoStudent"></div><div class="label c5">座号</div><div class="value" id="infoSeat"></div><div class="label c6">章节</div><div class="value" id="infoChapter"></div></div></div><div class="section"><h2>用时记录</h2><div class="timeGrid"><div class="timeLine"><div class="label c1">开始</div><div class="value" id="startedAtDisplay"></div></div><div class="timeLine"><div class="label c2">完成</div><div class="value" id="completedAtDisplay"></div></div><div class="timeLine"><div class="label c3">总用时</div><div class="value" id="timeUsedDisplay"></div></div><div class="timeLine"><div class="label c4">平均</div><div class="value" id="avgTimeDisplay"></div></div></div></div><div class="section"><h2>错题分析</h2><div id="wrongAnalysis"></div></div><div class="section"><h2>整体建议</h2><div class="analysisBox" id="overallAnalysis"></div><div class="warm" id="warmEncouragement"></div></div><div class="notice" id="submitNotice"><div>提交状态：送达中…</div></div></div></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:"2026",semester:"上学期",class_id:"c_初三忠",class_name:"初三忠",practice_id:"J3-08-01",practice_name:"初三忠｜圆练习01",practice_round:"01",quiz_id:"quiz-J3-08-01",quiz_name:"圆线上练习01",chapter_name:"圆"};const QUESTIONS=[{"id":1,"difficulty":"易","knowledge":"圆心角与圆周角","text":"同弧所对的圆心角为 120°，则同弧所对的圆周角为：","options":{"A":"60°","B":"90°","C":"120°","D":"30°"},"answer":"A","explanation":"同弧所对圆周角等于圆心角的一半，所以为60°。","common_misconception":"把圆周角与圆心角的倍半关系用反。","coach_tip":"同弧关系中，圆心角是圆周角的2倍。","image_required":false,"diagram_svg":""},{"id":2,"difficulty":"易","knowledge":"垂径定理","text":"直径 AB 垂直弦 CD 于 E，若 CD=20 cm，则 CE 为：","options":{"A":"20 cm","B":"12 cm","C":"5 cm","D":"10 cm"},"answer":"D","explanation":"垂直于弦的直径平分这条弦，所以CE=20÷2=10 cm。","common_misconception":"忘记垂径定理中的平分弦结论。","coach_tip":"看到直径垂直弦，要想到弦被平分。","image_required":false,"diagram_svg":""},{"id":3,"difficulty":"易","knowledge":"切线定义","text":"与圆只有一个公共点的直线称为：","options":{"A":"割线","B":"切线","C":"弦","D":"直径"},"answer":"B","explanation":"与圆只有一个公共点的直线叫切线。","common_misconception":"把切线和割线混淆。","coach_tip":"公共点一个是切线，两个是割线。","image_required":false,"diagram_svg":""},{"id":4,"difficulty":"易","knowledge":"圆内接四边形","text":"圆内接四边形 ABCD 中，∠A=68°，则∠C 为：","options":{"A":"68°","B":"90°","C":"112°","D":"122°"},"answer":"C","explanation":"圆内接四边形对角互补，∠C=180°−68°=112°。","common_misconception":"误以为圆内接四边形对角相等。","coach_tip":"圆内接四边形的对角互补。","image_required":false,"diagram_svg":""},{"id":5,"difficulty":"易","knowledge":"圆周角关系","text":"等弧所对的圆周角：","options":{"A":"相等","B":"互补","C":"互余","D":"无法判断"},"answer":"A","explanation":"等弧所对的圆周角相等。","common_misconception":"把等弧关系误判为互补。","coach_tip":"等弧、等弦、等圆周角之间常互相转化。","image_required":false,"diagram_svg":""},{"id":6,"difficulty":"易","knowledge":"切线判定","text":"半径垂直于过圆上一点的直线，则该直线是圆的：","options":{"A":"割线","B":"弦","C":"切线","D":"直径"},"answer":"C","explanation":"经过半径外端且垂直于半径的直线是圆的切线。","common_misconception":"漏掉直线经过圆上一点这个条件。","coach_tip":"切线判定要抓住“过半径外端且垂直”。","image_required":false,"diagram_svg":""},{"id":7,"difficulty":"易","knowledge":"圆周角与弧","text":"若圆周角为 35°，则它所对的弧为：","options":{"A":"35°","B":"105°","C":"17.5°","D":"70°"},"answer":"D","explanation":"圆周角等于所对弧度数的一半，所以弧为70°。","common_misconception":"把弧度数误当作圆周角度数。","coach_tip":"由圆周角求弧，要乘以2。","image_required":false,"diagram_svg":""},{"id":8,"difficulty":"中","knowledge":"垂径定理与直角三角形","text":"圆半径为 13 cm，圆心到弦 AB 的距离为 5 cm，则弦 AB 长为：","options":{"A":"10 cm","B":"24 cm","C":"12 cm","D":"26 cm"},"answer":"B","explanation":"半弦长=√(13²−5²)=√144=12，所以弦AB=24 cm。","common_misconception":"求出半弦长后忘记乘以2。","coach_tip":"圆心到弦的垂线会平分弦，常与半径组成直角三角形。","image_required":false,"diagram_svg":""},{"id":9,"difficulty":"中","knowledge":"圆内接四边形","text":"圆内接四边形 ABCD 中，∠A=3∠C，求∠C。","options":{"A":"30°","B":"60°","C":"45°","D":"90°"},"answer":"C","explanation":"∠A+∠C=180°，且∠A=3∠C，所以4∠C=180°，∠C=45°。","common_misconception":"只看到倍数关系，忘记对角互补。","coach_tip":"先列对角互补，再代入倍数关系。","image_required":false,"diagram_svg":""},{"id":10,"difficulty":"难","knowledge":"切线性质与圆心角综合","text":"PA、PB 为圆 O 的两条切线，A、B 为切点。若∠AOB=130°，则∠APB 为：","options":{"A":"130°","B":"65°","C":"40°","D":"50°"},"answer":"D","explanation":"OA⊥PA，OB⊥PB，所以四边形AOBP中∠AOB+∠APB=180°，∠APB=50°。","common_misconception":"不知道切线与半径垂直，无法建立四边形角关系。","coach_tip":"两条切线问题常用OA⊥PA、OB⊥PB，再看四边形角和。","image_required":false,"diagram_svg":""}];let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=text=>String(text??"").replace(/[&<>\"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / 共${order.length}题`;$("scoreText").textContent=`答对 ${score} 题`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent=`难度：${q.difficulty||""}`;$("knowledge").textContent=`知识点：${q.knowledge||""}`;$("questionText").textContent=q.text;if(q.image_required===true&&q.diagram_svg){$("diagram").style.display="block";$("diagram").innerHTML=q.diagram_svg}else{$("diagram").style.display="none";$("diagram").innerHTML=""}$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.dataset.option=key;btn.textContent=`${key}. ${value}`;$("options").appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||""}`}function coachTip(q,correct){if(q.coach_tip)return q.coach_tip;if(correct)return"继续保持：先找条件，再确认题目问的是哪个量。";return q.common_misconception?`常见错因：${q.common_misconception}`:"先找等量关系，再列式检验。"}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.dataset.option===q.answer)btn.classList.add("correct");if(btn.dataset.option===selected&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||"",explanation:q.explanation||"",common_misconception:q.common_misconception||"",coach_tip:q.coach_tip||coachTip(q,correct)});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<div class="feedbackTitle">${correct?"答对了。":"还差一点，先看清楚题目关系。"}</div><div class="fbLine"><span class="fbLabel">你的答案</span>${esc(selectedText)}</div><div class="fbLine"><span class="fbLabel ok">正确答案</span>${esc(correctText)}</div><div class="fbLine"><span class="fbLabel blue">解析</span>${esc(q.explanation||"")}</div><div class="fbLine"><span class="fbLabel blue">提醒</span>${esc(coachTip(q,correct))}</div>`;$("nextBtn").disable
