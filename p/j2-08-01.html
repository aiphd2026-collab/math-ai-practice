  <style>

  <script>
    const SUBMIT_URL = "https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";
    const META = {school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:"2026",semester:"上学期",class_id:"student_input",practice_id:"J2-08-01",practice_name:"初二下册第8章毕氏定理有图片版",practice_round:"1",quiz_id:"J2-08-01-QZ",quiz_name:"初二下册第8章毕氏定理有图片版",chapter_name:"初二下册第8章｜毕氏定理"};
    const QUESTIONS = [{"id": "Q1", "text": "如图，直角三角形的两条直角边分别为 6 cm 和 8 cm，斜边长是多少？", "options": {"A": "10 cm", "B": "12 cm", "C": "14 cm", "D": "100 cm"}, "answer": "A", "knowledge": "毕氏定理求斜边", "difficulty": "基础", "explanation": "斜边平方等于两直角边平方和：6²+8²=36+64=100，所以斜边为10 cm。", "diagram_svg": "<svg viewBox=\"0 0 360 220\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"直角三角形示意图\"><rect width=\"360\" height=\"220\" rx=\"18\" fill=\"#fff8ed\"/><path d=\"M75 165 L75 55 L275 165 Z\" fill=\"#fff3dd\" stroke=\"#5b341e\" stroke-width=\"4\"/><path d=\"M75 145 L95 145 L95 165\" fill=\"none\" stroke=\"#1f8f70\" stroke-width=\"4\"/><text x=\"62\" y=\"112\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"end\">6 cm</text><text x=\"174\" y=\"193\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">8 cm</text><text x=\"190\" y=\"100\" font-size=\"22\" fill=\"#df6d25\" text-anchor=\"middle\">？</text><circle cx=\"75\" cy=\"165\" r=\"5\" fill=\"#5b341e\"/><circle cx=\"75\" cy=\"55\" r=\"5\" fill=\"#5b341e\"/><circle cx=\"275\" cy=\"165\" r=\"5\" fill=\"#5b341e\"/></svg>"}, {"id": "Q2", "text": "直角三角形的斜边为 13 cm，一条直角边为 5 cm，另一条直角边是多少？", "options": {"A": "8 cm", "B": "10 cm", "C": "12 cm", "D": "18 cm"}, "answer": "C", "knowledge": "毕氏定理求直角边", "difficulty": "基础", "explanation": "未知直角边平方为13²-5²=169-25=144，所以未知边为12 cm。", "diagram_svg": "<svg viewBox=\"0 0 360 220\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"直角三角形示意图\"><rect width=\"360\" height=\"220\" rx=\"18\" fill=\"#fff8ed\"/><path d=\"M75 165 L75 55 L275 165 Z\" fill=\"#fff3dd\" stroke=\"#5b341e\" stroke-width=\"4\"/><path d=\"M75 145 L95 145 L95 165\" fill=\"none\" stroke=\"#1f8f70\" stroke-width=\"4\"/><text x=\"62\" y=\"112\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"end\">5 cm</text><text x=\"174\" y=\"193\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">？</text><text x=\"190\" y=\"100\" font-size=\"22\" fill=\"#df6d25\" text-anchor=\"middle\">13 cm</text><circle cx=\"75\" cy=\"165\" r=\"5\" fill=\"#5b341e\"/><circle cx=\"75\" cy=\"55\" r=\"5\" fill=\"#5b341e\"/><circle cx=\"275\" cy=\"165\" r=\"5\" fill=\"#5b341e\"/></svg>"}, {"id": "Q3", "text": "下列三组长度中，能组成直角三角形的是哪一组？", "options": {"A": "4，5，6", "B": "5，12，13", "C": "6，7，8", "D": "7，8，10"}, "answer": "B", "knowledge": "毕氏定理逆定理", "difficulty": "基础", "explanation": "5²+12²=25+144=169=13²，所以5、12、13能组成直角三角形。", "diagram_svg": ""}, {"id": "Q4", "text": "如图，长方形的长为 12 cm，宽为 5 cm，它的对角线长是多少？", "options": {"A": "11 cm", "B": "12 cm", "C": "13 cm", "D": "17 cm"}, "answer": "C", "knowledge": "长方形对角线应用", "difficulty": "基础", "explanation": "对角线、长和宽构成直角三角形，12²+5²=144+25=169，所以对角线为13 cm。", "diagram_svg": "<svg viewBox=\"0 0 360 220\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"长方形对角线示意图\"><rect width=\"360\" height=\"220\" rx=\"18\" fill=\"#fff8ed\"/><rect x=\"58\" y=\"62\" width=\"244\" height=\"104\" fill=\"#fff3dd\" stroke=\"#5b341e\" stroke-width=\"4\"/><path d=\"M58 166 L302 62\" stroke=\"#df6d25\" stroke-width=\"5\"/><text x=\"180\" y=\"194\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">12 cm</text><text x=\"35\" y=\"118\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">5 cm</text><text x=\"194\" y=\"104\" font-size=\"22\" fill=\"#df6d25\" text-anchor=\"middle\">？</text></svg>"}, {"id": "Q5", "text": "一个直角三角形的两条直角边分别为 9 和 12，则斜边的平方是多少？", "options": {"A": "15", "B": "81", "C": "144", "D": "225"}, "answer": "D", "knowledge": "斜边平方计算", "difficulty": "基础", "explanation": "斜边平方=9²+12²=81+144=225，题目问的是平方，不是斜边长。", "diagram_svg": "<svg viewBox=\"0 0 360 230\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"斜边平方示意图\"><rect width=\"360\" height=\"230\" rx=\"18\" fill=\"#fff8ed\"/><path d=\"M78 168 L78 68 L238 168 Z\" fill=\"#fff3dd\" stroke=\"#5b341e\" stroke-width=\"4\"/><path d=\"M78 148 L98 148 L98 168\" fill=\"none\" stroke=\"#1f8f70\" stroke-width=\"4\"/><rect x=\"238\" y=\"78\" width=\"86\" height=\"86\" fill=\"#d7f1e4\" stroke=\"#1f8f70\" stroke-width=\"3\" transform=\"rotate(26 238 168)\"/><text x=\"58\" y=\"122\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">6</text><text x=\"156\" y=\"198\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">8</text><text x=\"176\" y=\"105\" font-size=\"22\" fill=\"#df6d25\" text-anchor=\"middle\">c</text><text x=\"286\" y=\"128\" font-size=\"20\" fill=\"#1f604d\" text-anchor=\"middle\">c²</text></svg>"}, {"id": "Q6", "text": "一架梯子长 10 m，梯脚离墙 6 m，梯顶离地面的高度是多少？", "options": {"A": "6 m", "B": "7 m", "C": "8 m", "D": "9 m"}, "answer": "C", "knowledge": "毕氏定理生活应用", "difficulty": "中等", "explanation": "墙、地面和梯子构成直角三角形，高度平方=10²-6²=100-36=64，所以高度为8 m。", "diagram_svg": "<svg viewBox=\"0 0 360 220\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"梯子靠墙示意图\"><rect width=\"360\" height=\"220\" rx=\"18\" fill=\"#fff8ed\"/><path d=\"M82 176 L82 42\" stroke=\"#5b341e\" stroke-width=\"7\"/><path d=\"M82 176 L282 176\" stroke=\"#5b341e\" stroke-width=\"7\"/><path d=\"M282 176 L82 42\" stroke=\"#df6d25\" stroke-width=\"6\"/><path d=\"M82 154 L104 154 L104 176\" fill=\"none\" stroke=\"#1f8f70\" stroke-width=\"4\"/><text x=\"176\" y=\"91\" font-size=\"22\" fill=\"#df6d25\">10 m</text><text x=\"182\" y=\"204\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">6 m</text><text x=\"58\" y=\"112\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">？</text></svg>"}, {"id": "Q7", "text": "若三角形三边为 8、15、17，则这个三角形是什么三角形？", "options": {"A": "锐角三角形", "B": "钝角三角形", "C": "等边三角形", "D": "直角三角形"}, "answer": "D", "knowledge": "毕氏定理逆定理判定", "difficulty": "中等", "explanation": "8²+15²=64+225=289=17²，因此这个三角形是直角三角形。", "diagram_svg": ""}, {"id": "Q8", "text": "点 A 到点 B 向东 7 km，再向北 24 km。若直接从 A 到终点，直线距离是多少？", "options": {"A": "17 km", "B": "24 km", "C": "25 km", "D": "31 km"}, "answer": "C", "knowledge": "平面路径最短距离", "difficulty": "中等", "explanation": "东向7 km和北向24 km构成直角边，直线距离平方=7²+24²=625，所以距离为25 km。", "diagram_svg": "<svg viewBox=\"0 0 360 220\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"东西北路径示意图\"><rect width=\"360\" height=\"220\" rx=\"18\" fill=\"#fff8ed\"/><path d=\"M78 170 L210 170 L210 50\" fill=\"none\" stroke=\"#5b341e\" stroke-width=\"6\"/><path d=\"M78 170 L210 50\" stroke=\"#df6d25\" stroke-width=\"5\"/><path d=\"M210 150 L190 150 L190 170\" fill=\"none\" stroke=\"#1f8f70\" stroke-width=\"4\"/><text x=\"144\" y=\"198\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">7 km</text><text x=\"238\" y=\"112\" font-size=\"22\" fill=\"#5b341e\">24 km</text><text x=\"132\" y=\"100\" font-size=\"22\" fill=\"#df6d25\">？</text></svg>"}, {"id": "Q9", "text": "直角三角形中，斜边为 20，另一条直角边为 16，则未知直角边是多少？", "options": {"A": "10", "B": "12", "C": "14", "D": "18"}, "answer": "B", "knowledge": "毕氏定理求直角边", "difficulty": "挑战", "explanation": "未知边平方=20²-16²=400-256=144，所以未知边为12。", "diagram_svg": "<svg viewBox=\"0 0 360 220\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"直角三角形示意图\"><rect width=\"360\" height=\"220\" rx=\"18\" fill=\"#fff8ed\"/><path d=\"M75 165 L75 55 L275 165 Z\" fill=\"#fff3dd\" stroke=\"#5b341e\" stroke-width=\"4\"/><path d=\"M75 145 L95 145 L95 165\" fill=\"none\" stroke=\"#1f8f70\" stroke-width=\"4\"/><text x=\"62\" y=\"112\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"end\">16</text><text x=\"174\" y=\"193\" font-size=\"22\" fill=\"#5b341e\" text-anchor=\"middle\">？</text><text x=\"190\" y=\"100\" font-size=\"22\" fill=\"#df6d25\" text-anchor=\"middle\">20</text><circle cx=\"75\" cy=\"165\" r=\"5\" fill=\"#5b341e\"/><circle cx=\"75\" cy=\"55\" r=\"5\" fill=\"#5b341e\"/><circle cx=\"275\" cy=\"165\" r=\"5\" fill=\"#5b341e\"/></svg>"}, {"id": "Q10", "text": "判断 9、40、41 是否能组成直角三角形，正确说法是哪一项？", "options": {"A": "不能，因为9+40=49", "B": "不能，因为41最大", "C": "能，因为9²+40²=41²", "D": "能，因为9+40>41"}, "answer": "C", "knowledge": "毕氏定理逆定理判定", "difficulty": "挑战", "explanation": "判断直角三角形要比较平方关系：9²+40²=81+1600=1681=41²。", "diagram_svg": ""}];
    let order=[], index=0, score=0, startTime=0, submitted=false, answers=[];
    const $=id=>document.getElementById(id);
    const esc=text=>String(text??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
    function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}
    window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});
    $("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});
    function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / ${order.length}题`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent=q.difficulty||"基础";$("knowledge").textContent=q.knowledge||"知识点";$("questionText").textContent=q.text;if(q.diagram_svg){$("diagram").style.display="block";$("diagram").innerHTML=q.diagram_svg}else{$("diagram").style.display="none";$("diagram").innerHTML=""}$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.textContent=`${key}. ${value}`;btn.addEventListener("click",()=>chooseAnswer(key));$("options").appendChild(btn)})}
    function chooseAnswer(selected){const q=order[index],correct=selected===q.answer;if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.textContent.startsWith(q.answer+"."))btn.classList.add("correct");if(btn.textContent.startsWith(selected+".")&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,correct_answer:q.answer,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||""});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<b>${correct?"答对了":"还差一点"}</b><br>正确答案：${esc(q.answer)}<br>解析：${esc(q.explanation||"")}<br>知识点：${esc(q.knowledge||"")}`;$("nextBtn").disabled=false;$("barFill").style.width=`${(index+1)/order.length*100}%`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`}
    $("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else{renderFinish()}});
    function renderFinish(){const total=order.length,finalScore=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))],timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000));$("finalScore").textContent=finalScore+"分";$("finalRate").textContent=finalScore+"%";$("finalWrong").textContent=wrong.length+"题";$("studentSummary").innerHTML=`<h2>学生资料</h2>学校：${esc(META.school_name)}<br>老师：${esc(META.teacher_name)}<br>练习编号：${esc(META.practice_id)}<br>练习名称：${esc(META.practice_name)}<br>章节：${esc(META.chapter_name)}<br>班级：${esc($("className").value.trim())}<br>学号：${esc($("studentNo").value.trim())}<br>姓名：${esc($("studentName").value.trim())}<br>座号：${esc($("seatNo").value.trim()||"未填写")}<br>得分：${finalScore}分<br>正确率：${finalScore}%`;$("wrongList").innerHTML=wrong.length?wrong.map(a=>`<div class="wrongItem">Q${a.display_order}｜你的答案：${esc(a.selected_answer)}｜正确答案：${esc(a.correct_answer)}<br>${esc(a.knowledge_tag)}</div>`).join(""):"<p>本次没有错题，保持这个节奏。</p>";$("weakList").innerHTML=weak.length?weak.map(k=>`<span class="tag">${esc(k)}</span>`).join(" "):"<p>暂无明显薄弱知识点。</p>";$("studyAdvice").textContent=weak.length?`建议先复习：${weak.join("、")}，再做同类基础题巩固。`:"本次掌握较稳定，可以继续挑战中等题。";show("finish");submitPayload(finalScore,total,timeUsed,wrong,weak)}
    function submitPayload(finalScore,total,timeUsed,wrong,weak){const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:finalScore,accuracy:finalScore,total_questions:total,time_used:timeUsed,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已发送";$("submitMessage").textContent="已发送。若老师稍后未看到数据，请截图给老师。"}).catch(()=>{$("submitState").textContent="失败";$("submitMessage").textContent="提交失败，请截图给老师。"})}
  </script>
</body>
