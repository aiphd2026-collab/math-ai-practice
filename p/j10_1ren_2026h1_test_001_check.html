<!doctype html>
<html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>初一仁｜一元一次方程式线上测验检查版</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(145deg,#eef7ff 0%,#fff7ea 55%,#f7fbff 100%);color:#10212f;min-height:100vh}.wrap{max-width:720px;margin:0 auto;padding:16px}.card{background:rgba(255,255,255,.97);border-radius:18px;padding:18px;box-shadow:0 14px 30px rgba(30,82,130,.12);border:1px solid rgba(220,235,250,.9);margin-bottom:14px}h1{font-size:23px;margin:8px 0;text-align:center;color:#194b7d}.sub{width:max-content;max-width:100%;margin:10px auto 14px;padding:7px 14px;border-radius:999px;text-align:center;background:#eaf4ff;color:#225f99;font-size:14px;font-weight:700}label{display:block;margin:10px 0 6px;font-weight:700}input{width:100%;padding:13px 14px;border:1.5px solid #cfe3f8;border-radius:16px;font-size:16px;outline:none;background:#fff}input:focus{border-color:#3c8bdc;box-shadow:0 0 0 4px rgba(60,139,220,.13)}button{width:100%;padding:14px;border:0;border-radius:18px;background:linear-gradient(105deg,#2f86d9,#174d8d);color:#fff;font-size:17px;font-weight:800;margin-top:14px;cursor:pointer;box-shadow:0 8px 16px rgba(23,77,141,.2)}button:disabled{background:linear-gradient(105deg,#b8c9d5,#93a7b4);box-shadow:none;cursor:not-allowed}.q{font-size:20px;font-weight:800;margin:12px 0;line-height:1.5}.option{display:block;width:100%;text-align:left;background:#f9fcff;color:#203447;border:2px solid #dcecff;border-radius:16px;margin:10px 0;font-weight:700;box-shadow:0 2px 6px rgba(30,82,130,.05)}.option.selected{background:#dbeeff;border-color:#2f86d9}.hidden{display:none}.result{font-size:20px;font-weight:800}.small{color:#5d6b75;font-size:14px;line-height:1.6}.ok{color:#2e7d32;font-weight:800}.warn{color:#c62828;font-weight:800}.explain{margin-top:14px;padding:13px;border-radius:16px;background:#fff9e8;border:1px solid #ffe0a3;line-height:1.6}.notice{background:#fff8e5;border:1px solid #f0d88a;border-radius:14px;padding:12px;line-height:1.6;color:#6b4b00}</style></head><body><div class="wrap"><div class="card" id="home"><h1>初一仁｜一元一次方程式线上测验</h1><div class="sub">宽柔中学古来分校｜陈天龙老师｜检查版</div><p class="small">章节：初一下册第10章｜一元一次方程式<br>模式：测验模式</p><div class="notice small">这是检查版：可测试题目、流程、手机显示和完成页；本版不作为正式收集学情数据使用。</div><label>班级</label><input id="className" value="初一仁" placeholder="请输入班级，例如：初一仁"><label>学号</label><input id="studentNo" inputmode="numeric" placeholder="请输入学号"><label>姓名</label><input id="studentName" placeholder="请输入姓名"><label>座号（可选）</label><input id="seatNo" inputmode="numeric" placeholder="如老师有要求，请填写座号"><button onclick="startQuiz()">开始测验</button></div><div class="card hidden" id="quiz"><div class="small" id="progress"></div><div class="q" id="questionText"></div><div id="options"></div><button id="nextBtn" onclick="nextQuestion()" disabled>下一题</button></div><div class="card hidden" id="result"><h1>测验完成</h1><div class="small" id="studentInfo"></div><p class="result" id="scoreText"></p><div id="summaryBox" class="explain"></div><p class="warn">检查版提示：此结果未写入正式学情数据。请截图检查。</p></div></div><script>const quizMeta={school_name:"宽柔中学古来分校",teacher_name:"陈天龙老师",practice_name:"初一仁｜一元一次方程式线上测验",chapter_name:"初一下册第10章｜一元一次方程式"};const questions=[{id:"Q1",text:"下列哪一个是一元一次方程式？",options:{A:"x² + 3 = 7",B:"2x + 5 = 11",C:"x + y = 9",D:"3 + 4 = 7"},answer:"B",knowledge:"一元一次方程式定义"},{id:"Q2",text:"解方程：x + 8 = 15，x 的值是：",options:{A:"5",B:"6",C:"7",D:"23"},answer:"C",knowledge:"等式基本性质"},{id:"Q3",text:"解方程：3x = 18，x 的值是：",options:{A:"3",B:"6",C:"15",D:"21"},answer:"B",knowledge:"两边同除以非零数"},{id:"Q4",text:"解方程：2x − 5 = 9，x 的值是：",options:{A:"2",B:"5",C:"7",D:"14"},answer:"C",knowledge:"移项与合并"},{id:"Q5",text:"解方程：4(x − 2) = 20，x 的值是：",options:{A:"3",B:"5",C:"7",D:"8"},answer:"C",knowledge:"去括号"},{id:"Q6",text:"解方程：x/3 + 2 = 6，x 的值是：",options:{A:"4",B:"8",C:"12",D:"24"},answer:"C",knowledge:"去分母"},{id:"Q7",text:"小明买了3本相同的练习本和一支 RM2 的笔，共用 RM14。每本练习本的价钱是多少？",options:{A:"RM3",B:"RM4",C:"RM5",D:"RM6"},answer:"B",knowledge:"列一元一次方程解决购物问题"},{id:"Q8",text:"一个数的2倍加上5，等于这个数的3倍减去4。这个数是：",options:{A:"7",B:"8",C:"9",D:"10"},answer:"C",knowledge:"列方程与移项"}];let current=0,answers={},correctMap={},selected="";function $(id){return document.getElementById(id)}function startQuiz(){const c=$("className").value.trim(),no=$("studentNo").value.trim(),name=$("studentName").value.trim();if(!c||!no||!name){alert("请填写班级、学号和姓名");return}if(!/^\d+$/.test(no)){alert("学号请只填写数字");return}$("home").classList.add("hidden");$("quiz").classList.remove("hidden");renderQuestion()}function renderQuestion(){selected="";$("nextBtn").disabled=true;const q=questions[current];$("progress").textContent=`第 ${current+1} / ${questions.length} 题`;$("questionText").textContent=q.text;const box=$("options");box.innerHTML="";["A","B","C","D"].forEach(letter=>{const btn=document.createElement("button");btn.className="option";btn.textContent=`${letter}. ${q.options[letter]}`;btn.onclick=()=>{if(selected)return;selected=letter;answers[q.id]=letter;correctMap[q.id]=letter===q.answer;document.querySelectorAll(".option").forEach(b=>b.disabled=true);btn.classList.add("selected");$("nextBtn").disabled=false};box.appendChild(btn)});$("nextBtn").textContent=current===questions.length-1?"完成并提交":"下一题"}function nextQuestion(){if(current<questions.length-1){current++;renderQuestion()}else{finishQuiz()}}function finishQuiz(){$("quiz").classList.add("hidden");$("result").classList.remove("hidden");const correctCount=Object.values(correctMap).filter(Boolean).length;const score=Math.round(correctCount/questions.length*100);const weak=[],wrong=[];questions.forEach((q,i)=>{if(!correctMap[q.id]){wrong.push(`第${i+1}题：${q.knowledge}`);weak.push(q.knowledge)}});$("studentInfo").innerHTML=`学校：${quizMeta.school_name}｜老师：${quizMeta.teacher_name}<br>练习名称：${quizMeta.practice_name}<br>章节：${quizMeta.chapter_name}<br>班级：${$("className").value.trim()}｜学号：${$("studentNo").value.trim()}｜姓名：${$("studentName").value.trim()}｜座号：${$("seatNo").value.trim()||"未填"}`;$("scoreText").textContent=`得分：${score}｜正确率：${score}%`;let advice=score>=70?"整体掌握尚可，建议检查错题对应步骤。":"建议先复习方程基本性质，再练习移项、去括号和去分母。";$("summaryBox").innerHTML=`错题记录：${wrong.length?wrong.join("；"):"没有错题"}。<br>薄弱知识点：${weak.length?[...new Set(weak)].join("、"):"暂无明显薄弱点"}。<br>学习总结：${advice}<br><span class="small">测验模式不显示正确答案与解析。</span>`}</script></body></html>
