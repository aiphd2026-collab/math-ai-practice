<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>一元一次方程式线上练习</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(155deg,#fff7e9,#ffe7cd,#f8cfa6);color:#2b2119}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:#fffdf8;border:1px solid #ead8c1;border-radius:24px;box-shadow:0 18px 42px rgba(142,79,31,.18);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);text-align:center}h1{margin:0;color:#5b341e;font-size:1.45rem}.pill{display:inline-block;margin-top:14px;padding:10px 16px;border-radius:999px;background:#fff0d8;font-weight:900;color:#70401f}.sub{text-align:center;color:#7d6a58;line-height:1.7}label{display:block;margin:16px 0 8px;font-weight:900}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;background:#fffefa}button{width:100%;min-height:58px;margin-top:16px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);cursor:pointer}button:disabled{opacity:.55}.hidden{display:none}.progressBox{position:sticky;top:0;margin:-20px -16px 18px;padding:14px 16px 12px;background:#fffdf8;border-bottom:1px solid #ead8c1}.progressMeta{display:flex;justify-content:space-between;font-weight:900;color:#5b341e}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35,#c65b2d)}.tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900}.option{margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:#fff8ef;color:#2b2119;font-weight:900;text-align:left}.option.correct{border-color:#1f8f70;background:#d7f1e4;color:#0f5b48}.option.wrong{border-color:#c95342;background:#ffe1d9;color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1}.feedback.ok{display:block;background:#d7f1e4;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0}.stat{padding:16px 10px;border-radius:18px;text-align:center;background:#fff0c7}.stat b{display:block;font-size:1.34rem;color:#5b341e}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:#fff6ec;border:1px solid #e7c2ad}.small{font-size:.9rem;color:#7d6a58;line-height:1.65}</style></head><body><main class="page"><section id="home" class="card"><div class="topband"><h1>一元一次方程式线上练习</h1><div class="pill">宽柔中学古来分校｜陈天龙｜J10-10-04</div></div><p class="sub">第10章 一元一次方程式｜练习｜即时反馈</p><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo" inputmode="numeric"><label>姓名</label><input id="studentName"><label>座号</label><input id="seatNo" inputmode="numeric"><button id="startBtn">开始练习</button><p class="small">每题作答后立即显示解析，完成后自动提交学习记录。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="progressText"></span><span id="scoreText"></span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span id="difficulty" class="tag"></span><span id="knowledge" class="tag"></span></div><p id="questionText" class="qTitle"></p><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finish" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">J10-10-04｜一元一次方程式线上练习</div></div><div class="stats"><div class="stat"><b id="finalScore"></b><span>得分</span></div><div class="stat"><b id="finalRate"></b><span>正确率</span></div><div class="stat"><b id="finalWrong"></b><span>错题数</span></div><div class="stat"><b id="submitState">送达中</b><span>提交状态</span></div></div><div id="studentSummary" class="section"></div><div class="section"><h2>错题记录</h2><div id="wrongList"></div></div><div class="section"><h2>薄弱知识点</h2><div id="weakList"></div></div><div class="section"><h2>学习总结</h2><p id="studyAdvice"></p></div></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"chu2_zhong",practice_id:"J10-10-04",practice_name:"一元一次方程式线上练习",practice_round:"04",quiz_id:"quiz_J10_10_04_20260624",quiz_name:"一元一次方程式线上练习",chapter_name:"第10章 一元一次方程式"};const QUESTIONS=[{id:"Q1",text:"方程 x+7=15，x=？",options:{A:"8",B:"9",C:"22",D:"-8"},answer:"A",knowledge:"移项",difficulty:"易",explanation:"两边同时减7，x=15-7=8。",common_misconception:"移项忘记变号"},{id:"Q2",text:"方程 3x=18，x=？",options:{A:"3",B:"6",C:"15",D:"21"},answer:"B",knowledge:"等式性质",difficulty:"易",explanation:"两边同时除以3，x=18÷3=6。",common_misconception:"把除以3算成减3"},{id:"Q3",text:"方程 x-5=12，x=？",options:{A:"7",B:"-7",C:"17",D:"-17"},answer:"C",knowledge:"解一元一次方程",difficulty:"易",explanation:"两边同时加5，x=12+5=17。",common_misconception:"把加5误作减5"},{id:"Q4",text:"方程 2x+3=11，x=？",options:{A:"7",B:"5",C:"6",D:"4"},answer:"D",knowledge:"两步方程",difficulty:"易",explanation:"先减3得2x=8，再除以2得x=4。",common_misconception:"先除后减，顺序错误"},{id:"Q5",text:"方程 5(x-2)=20，x=？",options:{A:"4",B:"5",C:"6",D:"2"},answer:"C",knowledge:"去括号与整体思想",difficulty:"易",explanation:"先两边除以5，得x-2=4，所以x=6。",common_misconception:"漏乘括号内的 -2"},{id:"Q6",text:"方程 4x-7=x+8，x=？",options:{A:"5",B:"15",C:"3",D:"-5"},answer:"A",knowledge:"未知数在两边",difficulty:"易",explanation:"4x-x=8+7，得3x=15，所以x=5。",common_misconception:"移项时符号错误"},{id:"Q7",text:"方程 x/3+2=6，x=？",options:{A:"4",B:"8",C:"10",D:"12"},answer:"D",knowledge:"含分母方程",difficulty:"易",explanation:"先减2得x/3=4，再乘3得x=12。",common_misconception:"只减2，忘记再乘3"},{id:"Q8",text:"小明买3本相同笔记本和一支 RM2 的笔，共花 RM17。每本笔记本多少元？",options:{A:"RM3",B:"RM4",C:"RM5",D:"RM6"},answer:"C",knowledge:"列一元一次方程",difficulty:"中",explanation:"设每本笔记本x元，3x+2=17，3x=15，x=5。",common_misconception:"未先扣除笔的价钱"},{id:"Q9",text:"一个数的2倍加上5，等于这个数加17。这个数是？",options:{A:"10",B:"11",C:"13",D:"12"},answer:"D",knowledge:"文字转方程",difficulty:"中",explanation:"设这个数为x，2x+5=x+17，x=12。",common_misconception:"把“2倍加5”写成 2(x+5)"},{id:"Q10",text:"一个两位数，十位数字比个位数字小3。若把十位与个位对调，新数比原数大27。原来的两位数是？",options:{A:"36",B:"47",C:"58",D:"69"},answer:"C",knowledge:"设未知数与两位数表示",difficulty:"难",explanation:"选项中只有58满足十位5比个位8小3，且85-58=27。",common_misconception:"把十位、个位对调方向弄反"}];let order=[],index=0,score=0,startTime=0,answers=[],submitted=false;const $=id=>document.getElementById(id);const esc=t=>String(t??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");scrollTo(0,0)}function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}startBtn.onclick=()=>{if(!className.value.trim()||!studentNo.value.trim()||!studentName.value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");render()};function render(){let q=order[index];progressText.textContent=`第${index+1}题 / ${order.length}题`;scoreText.textContent=`已得 ${Math.round(score/order.length*100)} 分`;barFill.style.width=`${index/order.length*100}%`;difficulty.textContent=q.difficulty;knowledge.textContent=q.knowledge;questionText.textContent=q.text;feedback.className="feedback";feedback.innerHTML="";nextBtn.disabled=true;nextBtn.textContent=index===order.length-1?"完成并提交":"下一题";options.innerHTML="";Object.entries(q.options).forEach(([k,v])=>{let b=document.createElement("button");b.className="option";b.type="button";b.textContent=`${k}. ${v}`;b.onclick=()=>choose(k);options.appendChild(b)})}function choose(k){let q=order[index],ok=k===q.answer,selected=`${k}. ${q.options[k]}`,correct=`${q.answer}. ${q.options[q.answer]}`;if(ok)score++;document.querySelectorAll(".option").forEach(b=>{b.disabled=true;if(b.textContent.startsWith(q.answer+"."))b.classList.add("correct");if(b.textContent.startsWith(k+".")&&!ok)b.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:k,selected_answer_text:selected,correct_answer:q.answer,correct_answer_text:correct,is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});feedback.className="feedback "+(ok?"ok":"bad");feedback.innerHTML=`<b>${ok?"答对了":"还差一点"}</b><br>你的答案：${esc(selected)}<br>正确答案：${esc(correct)}<br>解析：${esc(q.explanation)}<br>常见错因：${esc(q.common_misconception)}<br>知识点：${esc(q.knowledge)}`;nextBtn.disabled=false;barFill.style.width=`${(index+1)/order.length*100}%`;scoreText.textContent=`已得 ${Math.round(score/order.length*100)} 分`}nextBtn.onclick=()=>{index<order.length-1?(index++,render()):finish()};function finish(){let total=order.length,finalScore=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag))],timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000));finalScore.textContent=finalScore+"分";finalRate.textContent=finalScore+"%";finalWrong.textContent=wrong.length+"题";studentSummary.innerHTML=`<h2>学生资料</h2>练习编号：${META.practice_id}<br>章节：${META.chapter_name}<br>班级：${esc(className.value)}<br>学号：${esc(studentNo.value)}<br>姓名：${esc(studentName.value)}<br>座号：${esc(seatNo.value||"未填写")}`;wrongList.innerHTML=wrong.length?wrong.map(a=>`<div class="wrongItem">第${a.display_order}题｜你的答案：${esc(a.selected_answer_text)}｜正确答案：${esc(a.correct_answer_text)}<br>${esc(a.question_text)}<br>知识点：${esc(a.knowledge_tag)}</div>`).join(""):"<p>本次没有错题。</p>";weakList.innerHTML=weak.length?weak.map(k=>`<span class="tag">${esc(k)}</span>`).join(" "):"<p>暂无明显薄弱知识点。</p>";studyAdvice.textContent=weak.length?`建议先复习：${weak.join("、")}。`:"本次掌握较稳定。";show("finish");submit(finalScore,total,timeUsed,wrong,weak)}function submit(finalScore,total,timeUsed,wrong,weak){let payload={action:"submit_response",...META,class_name:className.value.trim(),student_no:studentNo.value.trim(),student_name:studentName.value.trim(),seat_no:seatNo.value.trim(),score:finalScore,accuracy:finalScore,total_questions:total,time_used:timeUsed,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,submit_attempt:1,duplicate_status:"original",is_latest:true,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;submitState.textContent="已送达"}).catch(()=>{submitState.textContent="提交失败"})}</script></body></html>
