#fff8ed;line-height:1.7;margin:12px 0}</style></head><body><div class="page"><section id="home" class="card"><div class="topband"><h1>初三下册第7章 三角函数 练习</h1><div class="pill">练习编号：J3-07-01</div><p class="sub">初三下册第7章｜三角函数｜练习模式｜选择题10题</p></div><div class="summaryBox">学校：宽柔中学古来分校<br>老师：陈天龙<br>班级：3A班</div><label>班级</label><input id="className" value="3A班" required><label>学号</label><input id="studentNo" placeholder="请输入学号" required><label>姓名</label><input id="studentName" placeholder="请输入姓名" required><label>座号（可选）</label><input id="seatNo" placeholder="可不填"><button id="startBtn">开始作答</button><p class="small">开始后请依序作答。每题作答后会立即显示反馈。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="qIndexText"></span><span id="scoreText"></span></div><div class="bar"><span id="bar"></span></div></div><div id="qArea"></div></section><section id="done" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">J3-07-01｜初三下册第7章 三角函数 练习</div></div><div class="stats"><div class="stat"><span>得分</span><b id="finalScore">0/10</b></div><div class="stat"><span>正确率</span><b id="finalAcc">0%</b></div><div class="stat"><span>错题数</span><b id="wrongCount">0</b></div><div class="stat"><span>提交状态</span><b id="submitStatus">送达中</b></div></div><div class="summaryBox" id="finalInfo"></div><div class="summaryBox" id="wrongList"></div><div class="summaryBox" id="weakTags"></div><div class="summaryBox" id="learnSummary"></div><p class="small">作答数据已送达后，请保留本页截图，以备老师核对。若显示提交失败，请截图给老师。</p></section></div><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const meta={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"3A",practice_id:"J3-07-01",practice_name:"初三下册第7章 三角函数 练习",practice_round:"01",quiz_id:"J3-07-01-QZ",quiz_name:"初三下册第7章 三角函数 练习",chapter_name:"初三下册第7章｜三角函数"};const QUESTIONS=[{id:"Q1",text:"在直角三角形 ABC 中，∠C=90°，AC=3，BC=4，AB=5。求 sin A 的值。",options:{A:"3/5",B:"4/5",C:"3/4",D:"4/3"},answer:"B",knowledge:"正弦的定义",difficulty:"基础",explanation:"sin A=对边/斜边=BC/AB=4/5。",common_misconception:"把对边与邻边看反。",coach_tip:"先站在角A的位置，再判断对边、邻边和斜边。",diagram_svg:'<svg viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg"><rect width="360" height="210" fill="none"/><path d="M70 160 L250 160 L250 40 Z" fill="#fffdf8" stroke="#5b341e" stroke-width="4"/><path d="M250 160 L230 160 L230 140 L250 140" fill="none" stroke="#5b341e" stroke-width="3"/><text x="58" y="178" font-size="20">A</text><text x="258" y="178" font-size="20">C</text><text x="258" y="42" font-size="20">B</text><text x="148" y="184" font-size="18">AC=3</text><text x="258" y="104" font-size="18">BC=4</text><text x="138" y="92" font-size="18">AB=5</text></svg>',visual_note:"图形按3-4-5直角三角形比例绘制。"},{id:"Q2",text:"在直角三角形中，某锐角为 A，其邻边长为6，斜边长为10，则 cos A 等于多少？",options:{A:"3/5",B:"5/3",C:"4/5",D:"5/4"},answer:"A",knowledge:"余弦的定义",difficulty:"基础",explanation:"cos A=邻边/斜边=6/10=3/5。",common_misconception:"误把余弦写成对边比斜边。",coach_tip:"余弦看邻边，正弦看对边，斜边永远在分母。",diagram_svg:'<svg viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg"><path d="M70 160 L250 160 L250 80 Z" fill="#fffdf8" stroke="#5b341e" stroke-width="4"/><path d="M250 160 L232 160 L232 142 L250 142" fill="none" stroke="#5b341e" stroke-width="3"/><path d="M92 160 A26 26 0 0 0 98 145" fill="none" stroke="#df6d25" stroke-width="3"/><text x="88" y="144" font-size="18" fill="#df6d25">A</text><text x="148" y="184" font-size="18">邻边=6</text><text x="138" y="111" font-size="18">斜边=10</text></svg>',visual_note:"示意图用于辨认邻边与斜边。"},{id:"Q3",text:"tan 45° 的值是？",options:{A:"√3/2",B:"1/2",C:"1",D:"√3"},answer:"C",knowledge:"特别角的三角函数值",difficulty:"基础",explanation:"tan 45°=1。",common_misconception:"把30°、45°、60°的函数值混淆。",coach_tip:"45°直角三角形两直角边相等，所以正切值为1。",diagram_svg:"",visual_note:""},{id:"Q4",text:"sin 30° 的值是？",options:{A:"√3/2",B:"1/2",C:"1",D:"√2/2"},answer:"B",knowledge:"特别角的三角函数值",difficulty:"基础",explanation:"sin 30°=1/2。",common_misconception:"误把 sin 30° 写成 cos 30°。",coach_tip:"30°所对的边是斜边的一半。",diagram_svg:'<svg viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg"><path d="M70 160 L290 160 L290 33 Z" fill="#fffdf8" stroke="#5b341e" stroke-width="4"/><path d="M290 160 L272 160 L272 142 L290 142" fill="none" stroke="#5b341e" stroke-width="3"/><path d="M92 160 A34 34 0 0 0 101 136" fill="none" stroke="#df6d25" stroke-width="3"/><text x="104" y="145" font-size="18" fill="#df6d25">30°</text><text x="184" y="101" font-size="18">斜边</text><text x="296" y="100" font-size="18">对边</text></svg>',visual_note:"图形为30°直角三角形示意图。"},{id:"Q5",text:"在直角三角形中，若 sin A=3/5，则 cos A 等于多少？",options:{A:"4/5",B:"3/4",C:"5/4",D:"5/3"},answer:"A",knowledge:"已知一个三角函数值求其他三角函数值",difficulty:"中等",explanation:"设对边=3，斜边=5，则邻边=4，所以 cos A=4/5。",common_misconception:"不会由3、4、5直角三角形推导邻边。",coach_tip:"先把三角函数值转成边长比，再用毕氏定理补出第三边。",diagram_svg:'<svg viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg"><path d="M70 160 L250 160 L250 40 Z" fill="#fffdf8" stroke="#5b341e" stroke-width="4"/><path d="M250 160 L230 160 L230 140 L250 140" fill="none" stroke="#5b341e" stroke-width="3"/><text x="96" y="148" font-size="18">A</text><text x="258" y="104" font-size="18">对边=3</text><text x="148" y="184" font-size="18">邻边=? </text><text x="138" y="92" font-size="18">斜边=5</text></svg>',visual_note:"图形用于表示sin A=3/5中的对边与斜边。"},{id:"Q6",text:"在直角三角形中，若 tan A=5/12，则 sin A 等于多少？",options:{A:"12/13",B:"13/12",C:"5/13",D:"12/5"},answer:"C",knowledge:"已知正切求正弦",difficulty:"中等",explanation:"设对边=5，邻边=12，则斜边=13，所以 sin A=5/13。",common_misconception:"只记住对边和邻边，忘记先求斜边。",coach_tip:"正切给的是两条直角边的比，要先求斜边再求正弦。",diagram_svg:'<svg viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg"><path d="M60 160 L300 160 L300 60 Z" fill="#fffdf8" stroke="#5b341e" stroke-width="4"/><path d="M300 160 L282 160 L282 142 L300 142" fill="none" stroke="#5b341e" stroke-width="3"/><path d="M84 160 A28 28 0 0 0 91 145" fill="none" stroke="#df6d25" stroke-width="3"/><text x="96" y="148" font-size="18" fill="#df6d25">A</text><text x="160" y="184" font-size="18">邻边=12</text><text x="306" y="114" font-size="18">对边=5</text><text x="160" y="102" font-size="18">斜边=? </text></svg>',visual_note:"图形按5-12-13直角三角形关系绘制。"},{id:"Q7",text:"cos 60° 的值是？",options:{A:"√2/2",B:"1/2",C:"√3",D:"√3/2"},answer:"B",knowledge:"特别角的三角函数值",difficulty:"基础",explanation:"cos 60°=1/2。",common_misconception:"与 sin 60° 混淆。",coach_tip:"同一个特别角表中，sin 30° 和 cos 60° 都是1/2。",diagram_svg:"",visual_note:""},{id:"Q8",text:"某人站在地面上观察建筑物顶端，仰角为30°。若人到建筑物底部的水平距离为20 m，则建筑物高约为多少？",options:{A:"10√3 m",B:"20 m",C:"20√3/3 m",D:"40 m"},answer:"C",knowledge:"三角函数的应用：仰角问题",difficulty:"基础",explanation:"tan30°=h/20=√3/3，所以 h=20√3/3。",common_misconception:"混淆正切和余弦。",coach_tip:"仰角题通常用水平距离和高度组成直角三角形，再用tan。",diagram_svg:'<svg viewBox="0 0 380 230" xmlns="http://www.w3.org/2000/svg"><line x1="50" y1="180" x2="330" y2="180" stroke="#5b341e" stroke-width="4"/><line x1="300" y1="180" x2="300" y2="55" stroke="#5b341e" stroke-width="5"/><line x1="70" y1="180" x2="300" y2="55" stroke="#5b341e" stroke-width="4"/><path d="M96 180 A34 34 0 0 0 99 163" fill="none" stroke="#df6d25" stroke-width="3"/><text x="106" y="165" font-size="18" fill="#df6d25">30°</text><text x="172" y="205" font-size="18">20 m</text><text x="308" y="126" font-size="18">h</text><text x="50" y="205" font-size="16">观测点</text><text x="284" y="48" font-size="16">顶端</text></svg>',visual_note:"图形为仰角应用示意图，水平距离与高度构成直角三角形。"},{id:"Q9",text:"一架梯子靠在墙上，梯子长10 m，与地面成53°角，则梯子顶端离地面的高度最接近多少？取 sin53°≈0.8。",options:{A:"5 m",B:"6 m",C:"7 m",D:"8 m"},answer:"D",knowledge:"三角函数的应用：高度问题",difficulty:"基础",explanation:"高度=10×sin53°=10×0.8=8 m。",common_misconception:"把高度误认为邻边。",coach_tip:"梯子是斜边，高度是53°的对边，因此用正弦。",diagram_svg:'<svg viewBox="0 0 360 230" xmlns="http://www.w3.org/2000/svg"><line x1="65" y1="185" x2="315" y2="185" stroke="#5b341e" stroke-width="4"/><line x1="285" y1="185" x2="285" y2="45" stroke="#5b341e" stroke-width="5"/><line x1="90" y1="185" x2="285" y2="45" stroke="#df6d25" stroke-width="6"/><path d="M115 185 A36 36 0 0 0 121 164" fill="none" stroke="#5b341e" stroke-width="3"/><text x="128" y="167" font-size="18">53°</text><text x="177" y="105" font-size="18">梯子10 m</text><text x="294" y="120" font-size="18">高?</text></svg>',visual_note:"梯子为斜边，高度为竖直边。"},{id:"Q10",text:"从观测点 A 望向山顶 B，仰角为45°。若观测点到山脚的水平距离为18 m，则山高为多少？",options:{A:"9 m",B:"18 m",C:"18√2 m",D:"36 m"},answer:"B",knowledge:"三角函数的应用：仰角问题",difficulty:"挑战",explanation:"tan45°=h/18=1，所以 h=18 m。",common_misconception:"不会利用tan45°=1。",coach_tip:"45°仰角对应的直角三角形中，对边与邻边相等。",diagram_svg:'<svg viewBox="0 0 380 230" xmlns="http://www.w3.org/2000/svg"><line x1="55" y1="180" x2="330" y2="180" stroke="#5b341e" stroke-width="4"/><line x1="305" y1="180" x2="305" y2="55" stroke="#5b341e" stroke-width="5"/><line x1="80" y1="180" x2="305" y2="55" stroke="#5b341e" stroke-width="4"/><path d="M108 180 A40 40 0 0 0 115 151" fill="none" stroke="#df6d25" stroke-width="3"/><text x="125" y="158" font-size="18" fill="#df6d25">45°</text><text x="174" y="205" font-size="18">18 m</text><text x="313" y="123" font-size="18">h</text><text x="70" y="203" font-size="16">A</text><text x="310" y="50" font-size="16">B</text></svg>',visual_note:"图形为45°仰角示意图。"}];let order=[],idx=0,score=0,answers=[],started=false,unlocked=false;function $(id){return document.getElementById(id)}function shuffle(a){return a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1])}window.addEventListener('beforeunload',e=>{if(started&&!unlocked){e.preventDefault();e.returnValue='刷新或离开后，本次作答可能无法继续，请确认是否离开。'}});$('startBtn').onclick=()=>{if(!$('className').value.trim()||!$('studentNo').value.trim()||!$('studentName').value.trim()){alert('请填写班级、学号、姓名。');return}started=true;order=shuffle(QUESTIONS);$('home').classList.add('hidden');$('quiz').classList.remove('hidden');renderQ()};function renderQ(){const q=order[idx];$('qIndexText').textContent='第 '+(idx+1)+' / '+order.length+' 题';$('scoreText').textContent='已答对：'+score; $('bar').style.width=(idx/order.length*100)+'%';let html='<div class="tagrow"><span class="tag">'+q.difficulty+'</span><span class="tag">'+q.knowledge+'</span></div><p class="qTitle">'+q.text+'</p>';if(q.diagram_svg){html+='<div class="diagram">'+q.diagram_svg+'</div><div class="diagramNote">'+q.visual_note+'</div>'}for(const k of ['A','B','C','D'])html+='<button class="option" data-k="'+k+'">'+k+'. '+q.options[k]+'</button>';html+='<div id="fb" class="feedback"></div><button id="nextBtn" class="hidden">'+(idx===order.length-1?'完成并提交':'下一题')+'</button>';$('qArea').innerHTML=html;document.querySelectorAll('.option').forEach(btn=>btn.onclick=()=>choose(btn.dataset.k))}function choose(k){const q=order[idx];document.querySelectorAll('.option').forEach(b=>{b.disabled=true;if(b.dataset.k===q.answer)b.classList.add('correct');if(b.dataset.k===k&&k!==q.answer)b.classList.add('wrong')});const ok=k===q.answer;if(ok)score++;answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});const fb=$('fb');fb.className='feedback '+(ok?'ok':'bad');fb.innerHTML=(ok?'答对了。':'这题需要再检查。')+'<br>你的答案：'+k+'. '+q.options[k]+'<br>正确答案：'+q.answer+'. '+q.options[q.answer]+'<br>解析：'+q.explanation+'<br>AI学习提示：'+q.coach_tip+'<br>本题知识点：'+q.knowledge;$('nextBtn').classList.remove('hidden');$('nextBtn').onclick=()=>{idx++;if(idx<order.length)renderQ();else finish()}}function finish(){unlocked=true;$('bar').style.width='100%';$('quiz').classList.add('hidden');$('done').classList.remove('hidden');const wrong=answers.filter(a=>!a.is_correct),acc=Math.round(score/QUESTIONS.length*100);$('finalScore').textContent=score+'/'+QUESTIONS.length;$('finalAcc').textContent=acc+'%';$('wrongCount').textContent=wrong.length;$('finalInfo').innerHTML='学校：'+meta.school_name+'<br>老师：'+meta.teacher_name+'<br>练习编号：'+meta.practice_id+'<br>练习名称：'+meta.practice_name+'<br>章节：'+meta.chapter_name+'<br>班级：'+$('className').value+'<br>学号：'+$('studentNo').value+'<br>姓名：'+$('studentName').value+'<br>座号：'+$('seatNo').value;const weak=[...new Set(wrong.map(w=>w.knowledge_tag))];$('wrongList').innerHTML='错题记录：'+(wrong.length?wrong.map(w=>'第'+w.display_order+'题（'+w.knowledge_tag+'）').join('；'):'本次没有错题。');$('weakTags').innerHTML='薄弱知识点：'+(weak.length?weak.join('、'):'暂未发现明显薄弱点。');$('learnSummary').innerHTML='学习总结：'+(acc>=80?'本次掌握较好，请继续保持对边、邻边、斜边的判断习惯。':acc>=60?'基本概念已有基础，建议重点复习特别角函数值与应用题建模。':'建议先复习正弦、余弦、正切的定义，再练习仰角问题。');submitData(wrong,weak,acc)}function submitData(wrong,weak,acc){const payload={action:'submit_response',...meta,class_name:$('className').value,student_no:$('studentNo').value,student_name:$('studentName').value,seat_no:$('seatNo').value,score:score,accuracy:acc,total_questions:QUESTIONS.length,time_used:0,answers_json:JSON.stringify(answers),correct_json:JSON.stringify(QUESTIONS.map(q=>({question_id:q.id,answer:q.answer,answer_text:q.answer+'. '+q.options[q.answer]}))),wrong_question_ids:wrong.map(w=>w.question_id).join(','),weak_knowledge_tags:weak.join(','),abnormal_flag:''};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{$('submitStatus').textContent='已送达'}).catch(()=>{$('submitStatus').textContent='提交失败';alert('提交失败，请截图给老师。')})}</script></body></html>
