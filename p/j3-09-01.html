<!doctype html><html lang='zh-Hans'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>初三A｜轨迹与几何作图线上练习</title><style>*{box-sizing:border-box}html{font-size:18px}body{margin:0;min-height:100vh;font-family:Microsoft YaHei,Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid #ead8c1;border-radius:24px;box-shadow:0 18px 42px rgba(142,79,31,.18);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:#5b341e;font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:#7d6a58;line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;background:#fffefa;outline:none}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid #ead8c1}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:#5b341e}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d)}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;margin:0 0 14px}.diagram{margin:12px 0 16px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;background:#fff4dc}.small{color:#7d6a58;line-height:1.7;font-size:.9rem}.summary{line-height:1.8;background:#fff7ea;border:1px solid #ead8c1;border-radius:18px;padding:14px;margin-top:14px}</style></head><body><div class='page'><div class='card' id='start'><div class='topband'><h1>初三A｜轨迹与几何作图线上练习</h1><div class='pill'>练习编号：J3-09-01</div><p class='sub'>章节：初三下册第9章｜轨迹与几何作图<br>模式：练习模式｜选择题10题｜每题即时反馈</p></div><label>班级</label><input id='className' value='初三A' required><label>学号</label><input id='studentNo' placeholder='请输入学号' required><label>姓名</label><input id='studentName' placeholder='请输入姓名' required><label>座号（可选）</label><input id='seatNo' placeholder='可不填'><button onclick='begin()'>开始作答</button><p class='small'>开始后若刷新或离开，本次作答可能无法继续，请确认后再操作。</p></div><div class='card hidden' id='quiz'><div class='progressBox'><div class='progressMeta'><span id='idxText'></span><span id='scoreText'></span></div><div class='bar'><span id='bar'></span></div></div><div class='tagrow'><span class='tag' id='diff'></span><span class='tag' id='know'></span></div><p class='qTitle' id='qText'></p><div class='diagram' id='diagram'></div><div id='opts'></div><div class='feedback' id='fb'></div><button id='nextBtn' class='hidden' onclick='nextQ()'>下一题</button></div><div class='card hidden' id='done'><div class='topband'><h1>完成页</h1><div class='pill'>提交状态：<span id='submitStatus'>送达中</span></div><p class='sub'>作答数据已送达。请保留本页截图，以备老师核对。</p></div><div id='doneInfo' class='summary'></div></div></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'j3a',practice_id:'J3-09-01',practice_name:'初三下册第9章 轨迹与几何作图 线上练习',practice_round:'01',quiz_id:'J3-09-01-QZ',quiz_name:'初三A｜轨迹与几何作图线上练习',chapter_name:'初三下册第9章｜轨迹与几何作图'};const svgs={q1:`<svg viewBox='0 0 360 190'><line x1='70' y1='120' x2='290' y2='120' stroke='#5b341e' stroke-width='4'/><circle cx='70' cy='120' r='6' fill='#df6d25'/><circle cx='290' cy='120' r='6' fill='#df6d25'/><text x='58' y='148' font-size='20'>A</text><text x='282' y='148' font-size='20'>B</text><line x1='180' y1='35' x2='180' y2='170' stroke='#1f8f70' stroke-width='4' stroke-dasharray='8 6'/><text x='190' y='55' font-size='17'>PA=PB的轨迹</text><circle cx='180' cy='70' r='5' fill='#1f8f70'/><text x='160' y='62' font-size='18'>P</text></svg>`,q2:`<svg viewBox='0 0 360 220'><circle cx='180' cy='110' r='70' fill='none' stroke='#1f8f70' stroke-width='4'/><circle cx='180' cy='110' r='6' fill='#df6d25'/><line x1='180' y1='110' x2='250' y2='110' stroke='#5b341e' stroke-width='4'/><text x='168' y='100' font-size='18'>O</text><text x='200' y='100' font-size='17'>4 cm</text><text x='132' y='205' font-size='17'>OP=4 cm</text></svg>`,q3:`<svg viewBox='0 0 360 210'><line x1='40' y1='105' x2='320' y2='105' stroke='#5b341e' stroke-width='4'/><text x='325' y='110' font-size='18'>l</text><line x1='40' y1='55' x2='320' y2='55' stroke='#1f8f70' stroke-width='4' stroke-dasharray='7 6'/><line x1='40' y1='155' x2='320' y2='155' stroke='#1f8f70' stroke-width='4' stroke-dasharray='7 6'/><line x1='180' y1='55' x2='180' y2='105' stroke='#df6d25' stroke-width='3'/><text x='190' y='85' font-size='17'>2 cm</text><line x1='215' y1='105' x2='215' y2='155' stroke='#df6d25' stroke-width='3'/><text x='225' y='135' font-size='17'>2 cm</text></svg>`,q4:`<svg viewBox='0 0 360 210'><line x1='80' y1='120' x2='280' y2='120' stroke='#5b341e' stroke-width='4'/><circle cx='80' cy='120' r='5' fill='#df6d25'/><circle cx='280' cy='120' r='5' fill='#df6d25'/><text x='68' y='150' font-size='18'>A</text><text x='272' y='150' font-size='18'>B</text><path d='M80 120 A120 120 0 0 1 180 45' fill='none' stroke='#1f8f70' stroke-width='3'/><path d='M280 120 A120 120 0 0 0 180 45' fill='none' stroke='#1f8f70' stroke-width='3'/><path d='M80 120 A120 120 0 0 0 180 195' fill='none' stroke='#1f8f70' stroke-width='3'/><path d='M280 120 A120 120 0 0 1 180 195' fill='none' stroke='#1f8f70' stroke-width='3'/><text x='103' y='36' font-size='17'>弧线要相交</text></svg>`,q5:`<svg viewBox='0 0 360 220'><line x1='80' y1='170' x2='300' y2='170' stroke='#5b341e' stroke-width='4'/><line x1='80' y1='170' x2='260' y2='60' stroke='#5b341e' stroke-width='4'/><line x1='80' y1='170' x2='290' y2='95' stroke='#1f8f70' stroke-width='4' stroke-dasharray='8 6'/><circle cx='210' cy='125' r='5' fill='#1f8f70'/><text x='218' y='126' font-size='18'>P</text><text x='63' y='190' font-size='18'>O</text><text x='220' y='191' font-size='17'>角平分线</text></svg>`,q6:`<svg viewBox='0 0 360 210'><line x1='50' y1='150' x2='320' y2='150' stroke='#5b341e' stroke-width='4'/><text x='325' y='155' font-size='18'>l</text><circle cx='180' cy='55' r='6' fill='#df6d25'/><text x='190' y='58' font-size='18'>A</text><line x1='180' y1='55' x2='180' y2='150' stroke='#1f8f70' stroke-width='4'/><path d='M180 150 L205 150 L205 125 L180 125 Z' fill='none' stroke='#df6d25' stroke-width='3'/><text x='214' y='138' font-size='18'>90°</text></svg>`,q7:`<svg viewBox='0 0 360 220'><circle cx='180' cy='110' r='70' fill='none' stroke='#1f8f70' stroke-width='4'/><circle cx='180' cy='110' r='6' fill='#df6d25'/><line x1='180' y1='110' x2='250' y2='110' stroke='#5b341e' stroke-width='4'/><text x='168' y='100' font-size='18'>O</text><text x='207' y='100' font-size='17'>r</text><text x='120' y='200' font-size='17'>圆心 + 半径</text></svg>`,q8:`<svg viewBox='0 0 360 230'><circle cx='180' cy='115' r='80' fill='none' stroke='#1f8f70' stroke-width='4'/><circle cx='130' cy='160' r='6' fill='#df6d25'/><circle cx='235' cy='155' r='6' fill='#df6d25'/><circle cx='175' cy='55' r='6' fill='#df6d25'/><text x='116' y='184' font-size='18'>A</text><text x='242' y='176' font-size='18'>B</text><text x='165' y='45' font-size='18'>C</text><line x1='130' y1='160' x2='235' y2='155' stroke='#5b341e' stroke-width='3'/><line x1='235' y1='155' x2='175' y2='55' stroke='#5b341e' stroke-width='3'/><line x1='175' y1='55' x2='130' y2='160' stroke='#5b341e' stroke-width='3'/><circle cx='180' cy='115' r='5' fill='#1f8f70'/><text x='188' y='114' font-size='17'>圆心</text></svg>`,q9:`<svg viewBox='0 0 360 240'><line x1='70' y1='160' x2='270' y2='160' stroke='#5b341e' stroke-width='4'/><circle cx='70' cy='160' r='5' fill='#df6d25'/><circle cx='270' cy='160' r='5' fill='#df6d25'/><text x='58' y='188' font-size='18'>A</text><text x='262' y='188' font-size='18'>B</text><line x1='170' y1='45' x2='170' y2='220' stroke='#1f8f70' stroke-width='4' stroke-dasharray='8 6'/><circle cx='245' cy='95' r='65' fill='none' stroke='#df6d25' stroke-width='4'/><text x='252' y='93' font-size='18'>C</text><circle cx='170' cy='55' r='5' fill='#1f8f70'/><circle cx='170' cy='135' r='5' fill='#1f8f70'/><text x='120' y='40' font-size='17'>两个交点</text></svg>`,q10:`<svg viewBox='0 0 360 230'><line x1='80' y1='180' x2='300' y2='180' stroke='#5b341e' stroke-width='4'/><line x1='80' y1='180' x2='275' y2='70' stroke='#5b341e' stroke-width='4'/><line x1='80' y1='180' x2='285' y2='112' stroke='#1f8f70' stroke-width='4' stroke-dasharray='8 6'/><circle cx='80' cy='180' r='80' fill='none' stroke='#df6d25' stroke-width='3'/><circle cx='208' cy='138' r='6' fill='#1f8f70'/><text x='218' y='138' font-size='18'>P</text><text x='58' y='202' font-size='18'>O</text><text x='135' y='150' font-size='17'>OP=5 cm</text></svg>`};const qs=[{id:'Q1',text:'图中已知 A、B 为两个定点。若点 P 满足 PA = PB，则点 P 的轨迹是：',options:{A:'线段 AB 的垂直平分线',B:'直线 AB',C:'以 AB 为直径的圆',D:'线段 AB 上所有点'},answer:'A',knowledge:'到两定点距离相等',difficulty:'基础',explanation:'到两定点距离相等的点，组成线段 AB 的垂直平分线。',diagram_svg:svgs.q1,common_misconception:'把距离相等误看成在线段上。',coach_tip:'先抓关键词 PA=PB，再联想到垂直平分线。'},{id:'Q2',text:'图中已知定点 O。若点 P 满足 OP = 4 cm，则点 P 的轨迹是：',options:{A:'经过 O 的一条直线',B:'以 O 为圆心、4 cm 为半径的圆',C:'直径为 4 cm 的圆',D:'以 O 为端点的一条射线'},answer:'B',knowledge:'到定点距离为定值',difficulty:'基础',explanation:'到定点 O 距离恒为 4 cm 的点，构成以 O 为圆心、4 cm 为半径的圆。',diagram_svg:svgs.q2,common_misconception:'把半径4 cm误当成直径4 cm。',coach_tip:'看到 OP 等于定值，就是以 O 为圆心的圆。'},{id:'Q3',text:'图中已知直线 l。若点 P 到直线 l 的距离恒为 2 cm，则点 P 的轨迹是：',options:{A:'直线 l 本身',B:'一条与 l 相交的直线',C:'与 l 平行且距离为 2 cm 的两条直线',D:'一个圆'},answer:'C',knowledge:'到定直线距离为定值',difficulty:'基础',explanation:'到一条直线距离为定值的点，分布在该直线两侧，与其平行。',diagram_svg:svgs.q3,common_misconception:'只想到直线一侧，漏掉另一侧。',coach_tip:'到直线的距离是垂直距离，两侧都要考虑。'},{id:'Q4',text:'用尺规作线段 AB 的垂直平分线时，所取圆弧半径 r 应满足：',options:{A:'r < 1/2 AB',B:'r = 1/3 AB',C:'r ≤ 1/2 AB',D:'r > 1/2 AB'},answer:'D',knowledge:'垂直平分线的作图',difficulty:'基础',explanation:'半径大于线段一半，分别以 A、B 为圆心作弧时，弧线才会相交。',diagram_svg:svgs.q4,common_misconception:'没有注意两段弧线必须相交。',coach_tip:'尺规作图要先保证交点存在。'},{id:'Q5',text:'图中点 P 到 ∠AOB 两边的距离相等，则点 P 的轨迹是：',options:{A:'∠AOB 的角平分线',B:'过 O 的任意直线',C:'以 O 为圆心的圆',D:'线段 AB 的垂直平分线'},answer:'A',knowledge:'到角两边距离相等',difficulty:'基础',explanation:'到一个角两边距离相等的点，在该角的角平分线上。',diagram_svg:svgs.q5,common_misconception:'把到两边距离相等误判成到两点距离相等。',coach_tip:'两边距离相等对应角平分线；两点距离相等对应垂直平分线。'},{id:'Q6',text:'已知点 A 在直线 l 外，过点 A 作直线 l 的垂线。作成后，两直线所成的角是：',options:{A:'45°',B:'90°',C:'60°',D:'180°'},answer:'B',knowledge:'垂线的作图与判定',difficulty:'基础',explanation:'垂线与已知直线所成角为直角，即 90°。',diagram_svg:svgs.q6,common_misconception:'把垂直和斜交混淆。',coach_tip:'判断垂线时，要找直角标记或90°。'},{id:'Q7',text:'要用尺规确定一个圆，最基本需要知道的是：',options:{A:'两条弦',B:'一个圆周角',C:'一个切点',D:'圆心和半径'},answer:'D',knowledge:'圆的作图',difficulty:'基础',explanation:'圆心决定位置，半径决定大小，二者确定后圆唯一。',diagram_svg:svgs.q7,common_misconception:'只注意圆的大小，忽略圆心位置。',coach_tip:'确定圆要同时想位置和大小。'},{id:'Q8',text:'已知 A、B、C 三点不在同一直线上。要作经过 A、B、C 三点的圆，则该圆的圆心应是：',options:{A:'线段 AB 的中点',B:'线段 BC 的中点',C:'线段 AB 与 BC 的垂直平分线的交点',D:'三角形 ABC 的重心'},answer:'C',knowledge:'过三点作圆',difficulty:'中等',explanation:'过三点作圆时，圆心是三角形两边垂直平分线的交点。',diagram_svg:svgs.q8,common_misconception:'把中点、重心、外心混淆。',coach_tip:'要找圆心，就找距离三个顶点都相等的点。'},{id:'Q9',text:'图中点 P 需同时满足：① PA = PB；② PC = 3 cm。若图上 AB 的垂直平分线与以 C 为圆心、3 cm 为半径的圆相交于两点，则满足条件的点 P 有：',options:{A:'2个',B:'1个',C:'3个',D:'无数个'},answer:'A',knowledge:'两个轨迹的交点',difficulty:'中等',explanation:'先分别确定两个轨迹，再找交点个数；相交两点，所以共有 2 个。',diagram_svg:svgs.q9,common_misconception:'不会把同时满足转化为找两条轨迹交点。',coach_tip:'遇到多个条件，先分别画轨迹，再数交点。'},{id:'Q10',text:'图中点 P 在 ∠AOB 的内部，并满足：①到 ∠AOB 两边距离相等；② OP = 5 cm。则满足条件的点 P 有：',options:{A:'0个',B:'1个',C:'2个',D:'无数个'},answer:'B',knowledge:'角平分线与圆的交点',difficulty:'挑战',explanation:'条件①确定点在角平分线上，条件②确定点在以 O 为圆心、5 cm 为半径的圆上；在角内部只有 1 个交点。',diagram_svg:svgs.q10,common_misconception:'忽略在角内部这一限制。',coach_tip:'先画角平分线，再找它与圆的交点。'}];let order=[],i=0,score=0,started=false,submitted=false,startTime=0,student={},records=[];function shuffle(a){return a.map(x=>[Math.random(),x]).sort((m,n)=>m[0]-n[0]).map(x=>x[1])}function begin(){student={class_name:document.getElementById('className').value.trim(),student_no:document.getElementById('studentNo').value.trim(),student_name:document.getElementById('studentName').value.trim(),seat_no:document.getElementById('seatNo').value.trim()};if(!student.class_name||!student.student_no||!student.student_name){alert('请填写班级、学号、姓名。');return}started=true;startTime=Date.now();order=shuffle(qs);document.getElementById('start').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ()}window.addEventListener('beforeunload',e=>{if(started&&!submitted){e.preventDefault();e.returnValue='刷新或离开后，本次作答可能无法继续，请确认是否离开。'}});function showQ(){const q=order[i];document.getElementById('idxText').textContent='第 '+(i+1)+' / '+order.length+' 题';document.getElementById('scoreText').textContent='已得 '+score+' 分';document.getElementById('bar').style.width=(i/order.length*100)+'%';document.getElementById('diff').textContent=q.difficulty;document.getElementById('know').textContent=q.knowledge;document.getElementById('qText').textContent=q.text;document.getElementById('diagram').innerHTML=q.diagram_svg;document.getElementById('fb').className='feedback';document.getElementById('fb').innerHTML='';document.getElementById('nextBtn').classList.add('hidden');let html='';['A','B','C','D'].forEach(k=>{html+=`<button class='option' onclick='choose(this,\'${k}\')'>${k}. ${q.options[k]}</button>`});document.getElementById('opts').innerHTML=html}function choose(btn,k){const q=order[i];document.querySelectorAll('.option').forEach(b=>b.disabled=true);const ok=k===q.answer;if(ok){score++;btn.classList.add('correct')}else{btn.classList.add('wrong');document.querySelectorAll('.option').forEach(b=>{if(b.textContent.startsWith(q.answer+'.'))b.classList.add('correct')})}records.push({question_id:q.id,display_order:i+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});const fb=document.getElementById('fb');fb.className='feedback '+(ok?'ok':'bad');fb.innerHTML=`<b>${ok?'回答正确':'回答错误'}</b><br>你的答案：${k}. ${q.options[k]}<br>正确答案：${q.answer}. ${q.options[q.answer]}<br>解析：${q.explanation}<br>AI学习提示：${q.coach_tip}<br>本题知识点：${q.knowledge}`;const nb=document.getElementById('nextBtn');nb.textContent=i===order.length-1?'完成并提交':'下一题';nb.classList.remove('hidden');document.getElementById('scoreText').textContent='已得 '+score+' 分'}function nextQ(){if(i<order.length-1){i++;showQ()}else{finish()}}function finish(){submitted=true;document.getElementById('quiz').classList.add('hidden');document.getElementById('done').classList.remove('hidden');let acc=Math.round(score/order.length*100);let wrongs=records.filter(r=>!r.is_correct);let weak=[...new Set(wrongs.map(r=>r.knowledge_tag))];let timeUsed=Math.round((Date.now()-startTime)/1000);document.getElementById('doneInfo').innerHTML=`学校：${META.school_name}<br>老师：${META.teacher_name}<br>练习编号：${META.practice_id}<br>练习名称：${META.practice_name}<br>章节：${META.chapter_name}<br>班级：${student.class_name}<br>学号：${student.student_no}<br>姓名：${student.student_name}<br>座号：${student.seat_no||'未填'}<br>得分：${score} / ${order.length}<br>正确率：${acc}%<br>错题记录：${wrongs.length?wrongs.map(r=>r.question_id+'（'+r.knowledge_tag+'）').join('、'):'无'}<br>薄弱知识点：${weak.length?weak.join('、'):'暂未发现明显薄弱点'}<br>学习总结：${acc>=80?'本次掌握较好，继续注意作图条件与轨迹交点。':acc>=60?'基本概念已有基础，建议重点复习错题涉及的轨迹判断。':'建议重新梳理“到点距离、到直线距离、到角两边距离”的对应轨迹。'}<br>提交状态：<span id='statusText'>送达中</span>`;const payload={action:'submit_response',...META,class_name:student.class_name,student_no:student.student_no,student_name:student.student_name,seat_no:student.seat_no,score:score,accuracy:acc,total_questions:order.length,time_used:timeUsed,answers_json:records,correct_json:qs.map(q=>({question_id:q.id,answer:q.answer,answer_text:q.answer+'. '+q.options[q.answer],knowledge:q.knowledge,difficulty:q.difficulty})),wrong_question_ids:wrongs.map(r=>r.question_id),weak_knowledge_tags:weak,abnormal_flag:''};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{document.getElementById('submitStatus').textContent='已送达';document.getElementById('statusText').textContent='已送达'}).catch(()=>{document.getElementById('submitStatus').textContent='失败｜提交失败，请截图给老师。';document.getElementById('statusText').textContent='失败｜提交失败，请截图给老师。'})}</script></body></html>
