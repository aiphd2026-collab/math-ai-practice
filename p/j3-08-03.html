dius:18px;background:#f7fbff;border:1px solid #cfe7ff;line-height:1.7;margin-top:10px}@media(max-width:520px){html{font-size:16px}.grid{grid-template-columns:1fr}h1{font-size:1.65rem}.page{padding:10px 8px 22px}}</style></head><body><div class="page"><section id="intro" class="card"><div class="topband hero"><h1>初三忠｜圆练习03</h1><div class="pill">线上练习｜J3-08-03｜初三忠</div><p class="sub">共10题｜选择题｜7易2中1难</p></div><div class="body"><label>班级</label><input id="className" value="初三忠"><label>学号</label><input id="studentNo" placeholder="请输入学号"><label>姓名</label><input id="studentName" placeholder="请输入姓名，不能只填数字"><label>座号</label><input id="seatNo" placeholder="请输入座号"><button onclick="startQuiz()">开始练习</button><p class="small">本练习只收集班级、学号、姓名、座号与作答数据。</p></div></section><section id="quiz" class="card hidden"><div class="body"><div class="progressBox"><div class="progressMeta"><span id="qIndexText">第1题</span><span id="scoreText">答对0题</span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span id="diffTag" class="tag"></span><span id="knowTag" class="tag blue"></span></div><p id="qText" class="qTitle"></p><div id="diagram" class="diagram"></div><div id="options"></div><div id="feedback" class="feedback hidden"></div><button id="nextBtn" onclick="nextQuestion()" disabled>下一题</button></div></section><section id="finish" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">线上练习｜J3-08-03｜初三忠</div><p class="sub">初三忠｜圆练习03</p></div><div class="body"><div class="grid"><div class="stat"><span>答对题数</span><b id="finalCorrect">0/10</b></div><div class="stat"><span>正确率</span><b id="finalAccuracy">0%</b></div><div class="stat"><span>错题数</span><b id="finalWrong">0</b></div><div class="stat"><span>提交状态</span><b id="submitState">送达中…</b></div></div><h2>学生资料</h2><div class="info">学校：<span id="infoSchool"></span><br>老师：<span id="infoTeacher"></span><br>班级：<span id="infoClass"></span><br>姓名：<span id="infoStudent"></span><br>座号：<span id="infoSeat"></span><br>章节：<span id="infoChapter"></span></div><h2>用时记录</h2><div class="info">开始：<span id="startedAtDisplay"></span><br>完成：<span id="completedAtDisplay"></span><br>总用时：<span id="timeUsedDisplay"></span><br>平均每题：<span id="avgTimeDisplay"></span></div><h2>错题分析</h2><div id="wrongAnalysis" class="analysisBox"></div><h2>整体建议</h2><div id="overallAnalysis" class="analysisBox"></div><h2>肯定</h2><div id="warmEncouragement" class="analysisBox"></div><h2>提交提示</h2><div id="submitNotice" class="analysisBox">提交状态：送达中…</div></div></section></div><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"初三忠",practice_id:"J3-08-03",practice_name:"初三忠｜圆练习03",practice_round:3,quiz_id:"quiz-J3-08-03",quiz_name:"圆线上练习03",chapter_name:"圆"};const C='<svg viewBox="0 0 360 230" xmlns="http://www.w3.org/2000/svg"><style>.s{fill:none;stroke:#111827;stroke-width:3}.d{stroke-dasharray:5 5}.t{font:18px Microsoft YaHei,Arial;fill:#111827;font-weight:700}.r{fill:#fff;stroke:#111827;stroke-width:2}</style>';const END='</svg>';const QUESTIONS=[{id:1,difficulty:"易",knowledge:"圆心角与圆周角",text:"如图，圆心为 O，∠AOB=100°，点 C 在圆上且不在劣弧 AB 上，则 ∠ACB=多少？",options:{A:"50°",B:"80°",C:"100°",D:"200°"},answer:"A",explanation:"同弧所对圆周角等于圆心角的一半，所以∠ACB=50°。",common_misconception:"把圆周角误当成圆心角。",coach_tip:"看到同一条弧，先判断圆心角和圆周角的倍半关系。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="115" r="82"/><circle class="r" cx="180" cy="115" r="4"/><line class="s" x1="180" y1="115" x2="105" y2="82"/><line class="s" x1="180" y1="115" x2="255" y2="82"/><line class="s" x1="105" y1="82" x2="180" y2="197"/><line class="s" x1="255" y1="82" x2="180" y2="197"/><text class="t" x="174" y="109">O</text><text class="t" x="88" y="78">A</text><text class="t" x="260" y="78">B</text><text class="t" x="176" y="220">C</text><text class="t" x="166" y="58">100°</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"圆O中OA与OB形成100°圆心角，C在圆周上。"},{id:2,difficulty:"易",knowledge:"圆周角定理",text:"如图，∠ACB=35°，O 为圆心，A、B、C 在圆上，则 ∠AOB=多少？",options:{A:"35°",B:"55°",C:"70°",D:"145°"},answer:"C",explanation:"同弧所对圆心角是圆周角的2倍，所以∠AOB=70°。",common_misconception:"倍半关系用反。",coach_tip:"圆心角=同弧圆周角×2。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="115" r="82"/><circle class="r" cx="180" cy="115" r="4"/><line class="s" x1="105" y1="82" x2="180" y2="197"/><line class="s" x1="255" y1="82" x2="180" y2="197"/><line class="s" x1="180" y1="115" x2="105" y2="82"/><line class="s" x1="180" y1="115" x2="255" y2="82"/><text class="t" x="88" y="78">A</text><text class="t" x="260" y="78">B</text><text class="t" x="176" y="220">C</text><text class="t" x="186" y="118">O</text><text class="t" x="184" y="188">35°</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"圆周角ACB为35°，圆心角AOB对同弧AB。"},{id:3,difficulty:"易",knowledge:"直径所对圆周角",text:"如图，AB 是圆 O 的直径，C 在圆上，则 ∠ACB=多少？",options:{A:"45°",B:"90°",C:"120°",D:"180°"},answer:"B",explanation:"直径所对的圆周角是直角，所以∠ACB=90°。",common_misconception:"忘记直径条件。",coach_tip:"见到直径与圆周点相连，优先想到直角。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="115" r="82"/><line class="s" x1="98" y1="115" x2="262" y2="115"/><line class="s" x1="98" y1="115" x2="180" y2="33"/><line class="s" x1="262" y1="115" x2="180" y2="33"/><circle class="r" cx="180" cy="115" r="4"/><text class="t" x="80" y="120">A</text><text class="t" x="268" y="120">B</text><text class="t" x="176" y="28">C</text><text class="t" x="184" y="136">O</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"AB为圆O直径，C在圆周上并连接CA、CB。"},{id:4,difficulty:"易",knowledge:"切线判定",text:"如图，A 在圆 O 上，直线 l 经过 A，且 l ⟂ OA，则直线 l 是圆 O 的什么线？",options:{A:"弦",B:"割线",C:"直径",D:"切线"},answer:"D",explanation:"经过半径外端且垂直于半径的直线是切线。",common_misconception:"把切线与割线混淆。",coach_tip:"切线判定关键词：过半径外端、垂直半径。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="160" cy="115" r="70"/><line class="s" x1="160" y1="115" x2="230" y2="115"/><line class="s" x1="230" y1="45" x2="230" y2="185"/><path class="s" d="M218 115 v12 h12"/><circle class="r" cx="160" cy="115" r="4"/><text class="t" x="145" y="110">O</text><text class="t" x="236" y="118">A</text><text class="t" x="238" y="48">l</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"直线l过圆上点A，OA垂直于l。"},{id:5,difficulty:"易",knowledge:"垂径定理",text:"如图，圆 O 半径为13 cm，OM ⟂ AB，OM=5 cm，则弦 AB 的长是多少？",options:{A:"12 cm",B:"24 cm",C:"26 cm",D:"30 cm"},answer:"B",explanation:"垂径定理得M为AB中点，AM=√(13²−5²)=12，所以AB=24。",common_misconception:"只求半弦长就作答。",coach_tip:"垂径定理常先求半弦，再乘2。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="115" r="82"/><line class="s" x1="90" y1="165" x2="270" y2="165"/><line class="s" x1="180" y1="115" x2="180" y2="165"/><line class="s" x1="180" y1="115" x2="270" y2="165"/><path class="s" d="M180 153 h12 v12"/><circle class="r" cx="180" cy="115" r="4"/><text class="t" x="170" y="108">O</text><text class="t" x="82" y="185">A</text><text class="t" x="270" y="185">B</text><text class="t" x="186" y="185">M</text><text class="t" x="210" y="135">13 cm</text><text class="t" x="148" y="146">5 cm</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"圆O中OM垂直弦AB，OA为13cm，OM为5cm。"},{id:6,difficulty:"易",knowledge:"圆内接四边形",text:"圆内接四边形 ABCD 中，∠A=72°，则 ∠C=多少？",options:{A:"72°",B:"90°",C:"100°",D:"108°"},answer:"D",explanation:"圆内接四边形对角互补，∠C=180°−72°=108°。",common_misconception:"误以为对角相等。",coach_tip:"圆内接四边形要先看对角互补。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="115" r="82"/><polygon class="s" points="105,90 205,40 260,135 135,185"/><text class="t" x="90" y="88">A</text><text class="t" x="205" y="35">B</text><text class="t" x="265" y="140">C</text><text class="t" x="120" y="205">D</text><text class="t" x="118" y="112">72°</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"四边形ABCD内接于圆，角A标为72°。"},{id:7,difficulty:"易",knowledge:"弧、弦关系",text:"如图，圆 O 中，弧 AB 与弧 CD 相等，则弦 AB 与弦 CD 的关系是？",options:{A:"AB>CD",B:"AB<CD",C:"AB=CD",D:"无法判断"},answer:"C",explanation:"同圆中等弧所对的弦相等。",common_misconception:"忽略同圆条件。",coach_tip:"同圆里等弧、等弦、等圆心角可以互相转化。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="115" r="82"/><line class="s" x1="105" y1="80" x2="160" y2="35"/><line class="s" x1="200" y1="195" x2="255" y2="150"/><path class="s d" d="M105 80 Q130 45 160 35"/><path class="s d" d="M200 195 Q232 180 255 150"/><text class="t" x="88" y="78">A</text><text class="t" x="158" y="30">B</text><text class="t" x="194" y="216">C</text><text class="t" x="260" y="154">D</text><text class="t" x="169" y="118">O</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"同一圆中弧AB与弧CD标示为相等。"},{id:8,difficulty:"中",knowledge:"切线性质",text:"如图，PA、PB 是圆 O 的两条切线，切点为 A、B，∠AOB=120°，则 ∠APB=多少？",options:{A:"30°",B:"45°",C:"90°",D:"60°"},answer:"D",explanation:"OA⊥PA，OB⊥PB，四边形AOBP内角和为360°，所以∠APB=60°。",common_misconception:"漏用半径垂直切线。",coach_tip:"两切线题可用四边形内角和。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="120" r="60"/><line class="s" x1="180" y1="120" x2="135" y2="80"/><line class="s" x1="180" y1="120" x2="225" y2="80"/><line class="s" x1="135" y1="80" x2="180" y2="25"/><line class="s" x1="225" y1="80" x2="180" y2="25"/><circle class="r" cx="180" cy="120" r="4"/><text class="t" x="168" y="138">O</text><text class="t" x="122" y="78">A</text><text class="t" x="230" y="78">B</text><text class="t" x="176" y="20">P</text><text class="t" x="170" y="92">120°</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"PA、PB分别切圆于A、B，圆心角AOB为120°。"},{id:9,difficulty:"中",knowledge:"垂径定理与半径计算",text:"如图，AB 是圆 O 的弦，OM ⟂ AB，AB=16 cm，OM=6 cm，则圆 O 的半径是多少？",options:{A:"10 cm",B:"12 cm",C:"14 cm",D:"16 cm"},answer:"A",explanation:"M是AB中点，AM=8，半径OA=√(8²+6²)=10。",common_misconception:"把AB=16当作半弦。",coach_tip:"先由垂径定理得到半弦，再用勾股定理求半径。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="110" r="82"/><line class="s" x1="100" y1="162" x2="260" y2="162"/><line class="s" x1="180" y1="110" x2="180" y2="162"/><line class="s" x1="180" y1="110" x2="100" y2="162"/><path class="s" d="M180 150 h12 v12"/><circle class="r" cx="180" cy="110" r="4"/><text class="t" x="166" y="105">O</text><text class="t" x="92" y="184">A</text><text class="t" x="260" y="184">B</text><text class="t" x="186" y="184">M</text><text class="t" x="155" y="144">6 cm</text><text class="t" x="166" y="205">AB=16 cm</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"弦AB为16cm，OM垂直AB且OM为6cm。"},{id:10,difficulty:"难",knowledge:"直径所对圆周角、三角形内角和",text:"如图，AB 为圆 O 的直径，C、D 在圆上，CD 为切线在 C 点的弦切角条件：切线 CE 与弦 CA 夹角为40°，且 AB 为直径。若 ∠CAB=30°，则 ∠ABC=多少？",options:{A:"30°",B:"60°",C:"50°",D:"40°"},answer:"B",explanation:"AB为直径，所以∠ACB=90°；三角形ABC中，∠ABC=180°−90°−30°=60°。",common_misconception:"被切线条件干扰，未抓住直径条件。",coach_tip:"综合题要先找最强条件，本题关键是AB为直径。",image_required:true,diagram_type:"geometry",diagram_svg:C+'<circle class="s" cx="180" cy="115" r="82"/><line class="s" x1="98" y1="115" x2="262" y2="115"/><line class="s" x1="98" y1="115" x2="168" y2="34"/><line class="s" x1="262" y1="115" x2="168" y2="34"/><line class="s" x1="120" y1="16" x2="250" y2="128"/><path class="s d" d="M98 115 Q122 95 132 78"/><text class="t" x="116" y="105">30°</text><text class="t" x="185" y="43">40°</text><text class="t" x="80" y="120">A</text><text class="t" x="268" y="120">B</text><text class="t" x="160" y="30">C</text><text class="t" x="184" y="136">O</text><text class="t" x="252" y="135">E</text>'+END,diagram_note:"图形不按比例绘制",diagram_alt:"AB为圆O直径，C在圆上，切线CE与弦CA夹角40°，角CAB为30°。"}];let idx=0,score=0,selected=false,startTime=0,answers=[];function $(id){return document.getElementById(id)}function show(id){["intro","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden")}function fmt(ms){let s=Math.max(0,Math.round(ms/1000)),m=Math.floor(s/60);s%=60;return m+"分"+s+"秒"}function displayDate(d){return d.toLocaleString("zh-CN",{hour12:false})}function startQuiz(){const n=$("studentName").value.trim();if(!$("className").value.trim()||!$("studentNo").value.trim()||!n||/^\d+$/.test(n)){alert("请完整填写班级、学号、姓名；姓名不能只填数字。");return}idx=0;score=0;answers=[];startTime=Date.now();show("quiz");render()}function render(){selected=false;$("nextBtn").disabled=true;$("feedback").classList.add("hidden");const q=QUESTIONS[idx];$("qIndexText").textContent="第"+(idx+1)+"题 / 共"+QUESTIONS.length+"题";$("scoreText").textContent="答对"+score+"题";$("bar").style.width=(idx/QUESTIONS.length*100)+"%";$("diffTag").textContent="难度｜"+q.difficulty;$("knowTag").textContent="知识点｜"+q.knowledge;$("qText").textContent=q.text;$("diagram").style.display=q.image_required?"block":"none";$("diagram").innerHTML=q.image_required?q.diagram_svg+(q.diagram_note?'<div class="small">'+q.diagram_note+'</div>'):"";$("options").innerHTML="";Object.entries(q.options).forEach(([k,v])=>{const b=document.createElement("button");b.className="option";b.textContent=k+". "+v;b.onclick=()=>choose(k,b);$("options").appendChild(b)})}function choose(k,btn){if(selected)return;selected=true;const q=QUESTIONS[idx],ok=k===q.answer;document.querySelectorAll(".option").forEach(b=>{if(b.textContent.startsWith(q.answer+"."))b.classList.add("correct");if(b===btn&&!ok)b.classList.add("wrong")});if(ok)score++;answers.push({question_id:q.id,selected:k,answer:q.answer,is_correct:ok,knowledge:q.knowledge,difficulty:q.difficulty});$("feedback").classList.remove("hidden");$("feedback").innerHTML=(ok?"✅ 回答正确。":"❌ 回答错误。")+"<br>正确答案："+q.answer+"<br>解析："+q.explanation+"<br>提醒："+q.coach_tip;$("scoreText").textContent="答对"+score+"题";$("nextBtn").disabled=false;$("nextBtn").textContent=idx===QUESTIONS.length-1?"查看结果":"下一题"}function nextQuestion(){if(idx<QUESTIONS.length-1){idx++;render()}else finish()}function buildWrongAnalysisHtml(wrong){if(!wrong.length)return "本次没有错题，基础掌握很好。";return wrong.map(a=>"第"+a.question_id+"题："+a.knowledge+"。你的答案："+a.selected+"，正确答案："+a.answer+"。").join("<br>")}function buildOverallAnalysisHtml(weak,wrong,scoreValue){if(scoreValue>=80)return "整体掌握良好，可继续加强圆中多条件综合推理。";if(scoreValue>=60)return "基础概念已有一定掌握，建议重点复习错题涉及的定理条件。";return "建议先回到圆周角、切线性质、垂径定理三类基础题逐项巩固。"}function buildWarm(scoreValue){if(scoreValue>=80)return "表现很棒，继续保持严谨审题。";if(scoreValue>=60)return "已经具备基础，订正错题后会更稳。";return "不要灰心，先把关键定理条件整理清楚，再练会进步。"}function finish(){const completedAtMs=Date.now(),timeUsed=completedAtMs-startTime,avgTime=Math.round(timeUsed/QUESTIONS.length);const scoreValue=Math.round(score/QUESTIONS.length*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge))],startedAtDisplay=displayDate(new Date(startTime)),completedAtDisplay=displayDate(new Date(completedAtMs));$("bar").style.width="100%";$("finalCorrect").textContent=score+"/"+QUESTIONS.length;$("finalAccuracy").textContent=scoreValue+"%";$("finalWrong").textContent=wrong.length;$("infoSchool").textContent=META.school_name;$("infoTeacher").textContent=META.teacher_name;$("infoClass").textContent=$("className").value.trim();$("infoStudent").textContent=$("studentName").value.trim();$("infoSeat").textContent=$("seatNo").value.trim()||"未填写";$("infoChapter").textContent=META.chapter_name;$("startedAtDisplay").textContent=startedAtDisplay;$("completedAtDisplay").textContent=completedAtDisplay;$("timeUsedDisplay").textContent=fmt(timeUsed);$("avgTimeDisplay").textContent=fmt(avgTime)+"/题";$("wrongAnalysis").innerHTML=buildWrongAnalysisHtml(wrong);$("overallAnalysis").innerHTML=buildOverallAnalysisHtml(weak,wrong,scoreValue);$("warmEncouragement").innerHTML=buildWarm(scoreValue);show("finish");submitPayload(scoreValue,QUESTIONS.length,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime)}function submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime){const accuracyValue=scoreValue;const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),payload_student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:scoreValue,accuracy:accuracyValue,total_questions:total,payload_accuracy:accuracyValue,payload_total_questions:total,time_used:timeUsed,avg_time_used:avgTime,started_at:new Date(startTime).toISOString(),started_at_display:startedAtDisplay,completed_at:new Date(completedAtMs).toISOString(),completed_at_display:completedAtDisplay,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{$("submitState").textContent="已送达";$("submitNotice").innerHTML="<div>✅ 作答资料已成功发送给老师。</div><div>老师将依据您的作答情况进行分析，请等待老师后续讲解与反馈。</div><div class='small'>若老师尚未看到数据，请保留本页截图。</div>"}).catch(()=>{$("submitState").textContent="提交失败";$("submitNotice").innerHTML="<div>提交状态：提交失败。</div><div>请保留本页截图给老师核对。</div>"})}</script></body></html>
