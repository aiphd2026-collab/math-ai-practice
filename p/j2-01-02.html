<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>J2-01-02｜初二忠｜多项式练习02</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#f4e7ff,#ead4ff)}.stat b{display:block;font-size:1.34rem;color:var(--brown);line-height:1.2}.stat span{display:block;margin-top:8px;color:var(--muted);font-size:.9rem;font-weight:900}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.section h2{margin:0 0 8px;font-size:1.05rem;color:var(--brown)}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:linear-gradient(135deg,#fff6ec,#ffe8de);border:1px solid #e7c2ad;line-height:1.65}.small{font-size:.9rem;color:var(--muted);line-height:1.65}.infoGrid{display:grid;grid-template-columns:92px 1fr;gap:8px 12px;line-height:1.65;font-size:.96rem}.label{color:var(--muted);font-weight:900}.value{font-weight:700}.timeGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}.timeBox{background:linear-gradient(135deg,#fff8ee,#fff1dc);border:1px solid #ead6bc;border-radius:16px;padding:12px;line-height:1.45}.timeBox .label{display:block;font-size:.86rem}.timeBox .value{display:block;margin-top:5px;color:#4d2d1b}.wrongHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:6px;font-weight:900;color:var(--brown)}.line{margin:5px 0}.line b{color:#4c2e1c}.analysisBox{background:linear-gradient(135deg,#eef9f3,#e3f6ff);border:1px solid #c9e6d8;border-radius:18px;padding:14px;line-height:1.75}.submitNotice{background:linear-gradient(135deg,#e5f8ed,#d5f1ff);border-left:6px solid #2e9b74;border-radius:18px;padding:15px;line-height:1.75;font-weight:700}.okText{color:#2e9b74!important;font-weight:900}@media(max-width:520px){.timeGrid{grid-template-columns:1fr 1fr}.infoGrid{grid-template-columns:78px 1fr}}</style></head><body><main class="page"><section class="card" id="home"><div class="topband"><h1>初二忠｜多项式线上练习</h1><div class="pill">J2-01-02｜初二忠｜多项式练习02</div></div><p class="sub">请填写资料后开始作答。完成后系统会显示得分与错题分析，并自动发送给老师。</p><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo" placeholder="请输入学号"><label>姓名</label><input id="studentName" placeholder="请输入姓名"><label>座号（选填）</label><input id="seatNo" placeholder="请输入座号"><button id="startBtn">开始练习</button></section><section class="card hidden" id="quiz"><div class="progressBox"><div class="progressMeta"><span id="progressText"></span><span id="scoreText"></span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="difficulty"></span><span class="tag" id="knowledge"></span></div><div class="qTitle" id="questionText"></div><div class="diagram" id="diagram"></div><div id="diagramNote" class="diagramNote hidden"></div><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section class="hidden" id="finish"><section class="card"><div class="topband"><h1>练习完成</h1><div class="pill">J2-01-02｜初二忠｜多项式练习02</div></div><div class="stats"><div class="stat"><b id="finalScore">0/10</b><span>得分</span></div><div class="stat"><b id="finalRate">0%</b><span>正确率</span></div><div class="stat"><b id="finalWrong">0题</b><span>错题数</span></div><div class="stat"><b id="submitState">送达中…</b><span>提交状态</span></div></div></section><section class="card"><h2>作答资讯</h2><div class="infoGrid"><div class="label">学校</div><div class="value" id="infoSchool"></div><div class="label">老师</div><div class="value" id="infoTeacher"></div><div class="label">班级</div><div class="value" id="infoClass"></div><div class="label">姓名</div><div class="value" id="infoStudent"></div><div class="label">座号</div><div class="value" id="infoSeat"></div><div class="label">章节</div><div class="value" id="infoChapter"></div></div><div class="timeGrid"><div class="timeBox"><span class="label">开始时间</span><span class="value" id="startedAtDisplay"></span></div><div class="timeBox"><span class="label">完成时间</span><span class="value" id="completedAtDisplay"></span></div><div class="timeBox"><span class="label">总用时</span><span class="value" id="timeUsedDisplay"></span></div><div class="timeBox"><span class="label">平均每题</span><span class="value" id="avgTimeDisplay"></span></div></div></section><section class="card"><h2>详细错题分析</h2><div id="wrongAnalysis"></div></section><section class="card"><h2>整体学习分析</h2><div class="analysisBox" id="overallAnalysis"></div></section><section class="submitNotice" id="submitNotice"><div>提交状态：送达中…</div><div class="small">若老师尚未看到数据，请保留本页截图。</div></section></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"",practice_id:"J2-01-02",practice_name:"初二忠｜多项式练习02",practice_round:"02",quiz_id:"quiz-J2-01-02",quiz_name:"多项式线上练习02",chapter_name:"多项式"};const QUESTIONS=[{"id":"Q1","difficulty":"易","knowledge":"合并同类项","text":"合并同类项：3x+5x-2x=","options":{"A":"6x","B":"10x","C":"6x²","D":"5x"},"answer":"A","explanation":"同类项只把系数相加减，3+5-2=6，所以是6x。","common_misconception":"把系数相加时漏减号","coach_tip":"合并同类项时，字母部分不变。"},{"id":"Q2","difficulty":"易","knowledge":"项与常数项","text":"多项式 4x²-3x+7 的常数项是","options":{"A":"-3","B":"7","C":"4","D":"x"},"answer":"B","explanation":"不含字母的项是常数项，所以常数项为7。","common_misconception":"把一次项系数误认为常数项","coach_tip":"常数项不含字母。"},{"id":"Q3","difficulty":"易","knowledge":"单项式乘多项式","text":"计算：2a(3a+4)=","options":{"A":"5a²+8a","B":"6a+8","C":"6a²+8a","D":"6a²+4"},"answer":"C","explanation":"2a×3a=6a²，2a×4=8a，所以结果为6a²+8a。","common_misconception":"漏乘第二项","coach_tip":"括号内每一项都要乘。"},{"id":"Q4","difficulty":"易","knowledge":"平方差公式","text":"(x+5)(x-5)=","options":{"A":"x²+25","B":"x²-10x+25","C":"x²+10x+25","D":"x²-25"},"answer":"D","explanation":"(a+b)(a-b)=a²-b²，所以为x²-25。","common_misconception":"误用完全平方公式","coach_tip":"一加一减是平方差。"},{"id":"Q5","difficulty":"易","knowledge":"完全平方公式","text":"(y+3)²=","options":{"A":"y²+6y+9","B":"y²+9","C":"y²+3y+9","D":"y²-6y+9"},"answer":"A","explanation":"(a+b)²=a²+2ab+b²，所以(y+3)²=y²+6y+9。","common_misconception":"漏写中间项","coach_tip":"完全平方有三项。"},{"id":"Q6","difficulty":"易","knowledge":"多项式次数","text":"多项式 5x³-2x²+x-9 的次数是","options":{"A":"2","B":"3","C":"4","D":"9"},"answer":"B","explanation":"最高次项是5x³，所以多项式次数是3。","common_misconception":"把项数或常数项误当次数","coach_tip":"看最高指数，不看项数。"},{"id":"Q7","difficulty":"易","knowledge":"单项式除法","text":"计算：12x³÷4x=","options":{"A":"3x²","B":"8x²","C":"3x³","D":"3x"},"answer":"A","explanation":"12÷4=3，x³÷x=x²，所以结果为3x²。","common_misconception":"指数相减处理错误","coach_tip":"同底数幂相除，指数相减。"},{"id":"Q8","difficulty":"中","knowledge":"多项式乘法与合并同类项","text":"化简：(2x+3)(x-4)+5x=","options":{"A":"2x²-8x+3","B":"2x²-12","C":"2x²+0x-12","D":"2x²+13x-12"},"answer":"B","explanation":"(2x+3)(x-4)=2x²-8x+3x-12=2x²-5x-12，再加5x得2x²-12。","common_misconception":"展开后未正确合并一次项","coach_tip":"先展开，再合并同类项。"},{"id":"Q9","difficulty":"中","knowledge":"多项式乘法应用","text":"若长方形的长为 3x+2，宽为 x-1，则面积是","options":{"A":"3x²-x-2","B":"3x²+5x+2","C":"4x+1","D":"3x²-3"},"answer":"A","explanation":"面积=(3x+2)(x-1)=3x²-3x+2x-2=3x²-x-2。","common_misconception":"只相加长和宽，没有相乘","coach_tip":"长方形面积=长×宽。"},{"id":"Q10","difficulty":"难","knowledge":"平方差公式与面积模型","text":"已知一个正方形边长为 x+4，剪去一个边长为 x-2 的小正方形，剩余面积为","options":{"A":"12x+4","B":"6x+12","C":"x²+2x+12","D":"12x+12"},"answer":"D","explanation":"剩余面积=(x+4)²-(x-2)²=[(x+4)-(x-2)][(x+4)+(x-2)]=6(2x+2)=12x+12。","common_misconception":"不会把面积差转化为平方差","coach_tip":"面积差可用平方差公式快速化简。"}];let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=t=>String(t??"").replace(/[&<>\"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / ${order.length}题`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent="难度："+q.difficulty;$("knowledge").textContent="知识点："+q.knowledge;$("questionText").textContent=q.text;$("diagram").style.display="none";$("diagram").innerHTML="";$("diagramNote").classList.add("hidden");$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成练习":"下一题";$("options").innerHTML=Object.entries(q.options).map(([k,v])=>`<button class="option" data-key="${k}">${k}. ${esc(v)}</button>`).join("");document.querySelectorAll(".option").forEach(btn=>btn.addEventListener("click",()=>choose(btn.dataset.key)))}function choose(key){const q=order[index];document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.dataset.key===q.answer)btn.classList.add("correct");if(btn.dataset.key===key&&key!==q.answer)btn.classList.add("wrong")});const ok=key===q.answer;if(ok)score++;answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:key,selected_answer_text:q.options[key],correct_answer:q.answer,correct_answer_text:q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty,explanation:q.explanation,common_misconception:q.common_misconception,coach_tip:q.coach_tip});$("feedback").className="feedback "+(ok?"ok":"bad");$("feedback").innerHTML=(ok?"答对了！":"再想一想。")+"<br>解析："+esc(q.explanation);$("nextBtn").disabled=false}$("nextBtn").addEventListener("click",()=>{index++;if(index<order.length)renderQuestion();else finishQuiz()});function fmt(ms){const s=Math.max(0,Math.round(ms/1000));const m=Math.floor(s/60),r=s%60;return m?`${m}分${r}秒`:`${r}秒`}function displayTime(d){return d.toLocaleString("zh-MY",{hour12:false})}function buildWrongAnalysisHtml(wrong){if(!wrong.length)return "<div class='analysisBox'>本次没有错题，保持这个节奏。</div>";return wrong.map(a=>`<div class="wrongItem"><div class="wrongHead"><span>第${a.display_order}题</span><span>${esc(a.knowledge_tag)}</span></div><div class="line"><b>你的答案：</b>${esc(a.selected_answer)}. ${esc(a.selected_answer_text)}</div><div class="line"><b>正确答案：</b>${esc(a.correct_answer)}. ${esc(a.correct_answer_text)}</div><div class="line"><b>解析：</b>${esc(a.explanation)}</div><div class="line"><b>提醒：</b>${esc(a.coach_tip)}</div></div>`).join("")}function buildOverallAnalysisHtml(weak,wrong,scoreValue){if(scoreValue>=80)return "整体掌握良好。请继续保持计算步骤清楚，特别注意展开与合并同类项的符号。";if(scoreValue>=60)return "基础已有一定掌握，但仍需加强："+esc(weak.join("、"))+"。建议重做错题并写出展开步骤。";return "本次多项式基础较薄弱，建议先复习项、系数、同类项、乘法公式，再进行针对练习。"}function finishQuiz(){const total=order.length;const scoreValue=Math.round(score/total*100);const wrong=answers.filter(a=>!a.is_correct);const weak=[...new Set(wrong.map(a=>a.knowledge_tag))];const completedAtMs=Date.now();const timeUsed=completedAtMs-startTime;const avgTime=Math.round(timeUsed/total);const startedAtDisplay=displayTime(new Date(startTime));const completedAtDisplay=displayTime(new Date(completedAtMs));$("finalScore").textContent=score+"/"+total;$("finalRate").textContent=scoreValue+"%";$("finalWrong").textContent=wrong.length+"题";$("submitState").textContent="送达中…";$("infoSchool").textContent=META.school_name;$("infoTeacher").textContent=META.teacher_name;$("infoClass").textContent=$("className").value.trim();$("infoStudent").textContent=$("studentName").value.trim();$("infoSeat").textContent=$("seatNo").value.trim()||"未填写";$("infoChapter").textContent=META.chapter_name;$("startedAtDisplay").textContent=startedAtDisplay;$("completedAtDisplay").textContent=completedAtDisplay;$("timeUsedDisplay").textContent=fmt(timeUsed);$("avgTimeDisplay").textContent=fmt(avgTime);$("wrongAnalysis").innerHTML=buildWrongAnalysisHtml(wrong);$("overallAnalysis").innerHTML=buildOverallAnalysisHtml(weak,wrong,scoreValue);$("submitNotice").innerHTML="<div>提交状态：送达中…</div><div class='small'>若老师尚未看到数据，请保留本页截图。</div>";show("finish");submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime)}function submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime){const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:scoreValue,accuracy:scoreValue,total_questions:total,time_used:timeUsed,avg_time_used:avgTime,started_at:new Date(startTime).toISOString(),started_at_display:startedAtDisplay,completed_at:new Date(completedAtMs).toISOString(),completed_at_display:completedAtDisplay,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已送达";$("submitNotice").innerHTML="<div>✅ 作答资料已成功发送给老师。</div><div>老师将依据您的作答情况进行分析，请等待老师后续讲解与反馈。</div><div class='small'>若老师尚未看到数据，请保留本页截图。</div>"}).catch(()=>{$("submitState").textContent="提交失败";$("submitNotice").innerHTML="<div>提交失败，请保留本页截图给老师。</div>"})}</script></body></html>
