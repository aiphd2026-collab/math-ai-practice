<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>一元一次方程式线上练习</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:'Microsoft YaHei',Arial,sans-serif;background:linear-gradient(155deg,#fff7e9,#ffe7cd 45%,#f8cfa6);color:#2b2119}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid #ead8c1;border-radius:24px;box-shadow:0 18px 42px rgba(142,79,31,.18);padding:20px 16px}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);text-align:center}h1{margin:0;color:#5b341e;font-size:1.45rem}.pill{display:inline-block;margin-top:14px;padding:10px 16px;border-radius:999px;background:#fffdf6;border:1px solid #cf8f43;font-weight:900}.sub{text-align:center;color:#7d6a58;line-height:1.7}label{display:block;margin:16px 0 8px;font-weight:900}input{width:100%;min-height:56px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem}button{width:100%;min-height:56px;margin-top:14px;border:0;border-radius:18px;color:#fff;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24)}.hidden{display:none}.tag{display:inline-block;margin:0 8px 8px 0;padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:#fffefa;color:#2b2119;font-weight:900;text-align:left}.option.correct{border-color:#1f8f70;background:#d7f1e4;color:#0f5b48}.option.wrong{border-color:#c95342;background:#ffe1d9;color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1}.feedback.ok{display:block;background:#d7f1e4;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;color:#7b2a22}.diagram{margin:12px 0 18px;padding:12px;border-radius:18px;background:#fff0dc;border:1px solid #ead2b7}.diagram svg{width:100%;height:auto}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0}.stat{padding:16px 10px;border-radius:18px;text-align:center;background:#fff0c7}.small{font-size:.9rem;color:#7d6a58;line-height:1.65}.bar{height:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;background:#f08a35}</style></head><body><div class="page"><section id="home" class="card"><div class="topband"><h1>一元一次方程式线上练习</h1><div class="pill">练习编号：J10-10-02</div><p class="sub">第10章 一元一次方程式｜练习模式｜选择题10题</p></div><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo"><label>姓名</label><input id="studentName"><label>座号</label><input id="seatNo"><button onclick="startQuiz()">开始练习</button></section><section id="quiz" class="card hidden"><div><b id="progressText"></b><div class="bar"><span id="bar"></span></div></div><div id="qBox"></div><div id="feedback" class="feedback"></div><button id="nextBtn" class="hidden" onclick="nextQuestion()">下一题</button></section><section id="done" class="card hidden"><div class="topband"><h1>完成练习</h1><div class="pill">提交状态：<span id="submitStatus">提交中</span></div></div><div class="stats"><div class="stat"><b id="scoreText"></b><span>得分</span></div><div class="stat"><b id="correctText"></b><span>正确题数</span></div></div><p class="small">练习编号：J10-10-02<br>请保留此页面截图给老师。</p></section></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'初二忠',practice_id:'J10-10-02',practice_name:'一元一次方程式线上练习',practice_round:'02',quiz_id:'quiz_J10_10_02_20260623',quiz_name:'一元一次方程式线上练习',chapter_name:'第10章 一元一次方程式'};const QUESTIONS=[{id:'Q1',text:'解方程：x + 7 = 15',options:{A:'8',B:'9',C:'22',D:'-8'},answer:'A',knowledge:'移项',difficulty:'易',explanation:'两边同时减7，x=15-7=8。',common_misconception:'移项后加减号弄错。',coach_tip:'把常数项移到等号另一边时要变号。'},{id:'Q2',text:'解方程：3x = 24',options:{A:'6',B:'7',C:'8',D:'9'},answer:'C',knowledge:'等式性质',difficulty:'易',explanation:'两边同时除以3，x=8。',common_misconception:'把乘法关系误看成加法。',coach_tip:'3x表示3乘x，要用除法还原。'},{id:'Q3',text:'解方程：2x - 5 = 11',options:{A:'3',B:'8',C:'16',D:'6'},answer:'B',knowledge:'移项',difficulty:'易',explanation:'2x=11+5=16，所以x=8。',common_misconception:'-5移项未变成+5。',coach_tip:'先处理常数，再处理未知数系数。'},{id:'Q4',text:'解方程：5(x - 2)=20',options:{A:'2',B:'4',C:'5',D:'6'},answer:'D',knowledge:'去括号',difficulty:'中',explanation:'两边先除以5，得x-2=4，所以x=6。',diagram_svg:'<svg viewBox="0 0 620 150" xmlns="http://www.w3.org/2000/svg"><rect x="30" y="55" width="90" height="48" rx="12" fill="#fff" stroke="#8a5a2b"/><text x="75" y="86" text-anchor="middle" font-size="24">x</text><path d="M125 79 H230" stroke="#8a5a2b" stroke-width="4" marker-end="url(#a)"/><rect x="235" y="55" width="120" height="48" rx="12" fill="#fff" stroke="#8a5a2b"/><text x="295" y="86" text-anchor="middle" font-size="22">x − 2</text><path d="M360 79 H465" stroke="#8a5a2b" stroke-width="4" marker-end="url(#a)"/><rect x="470" y="55" width="115" height="48" rx="12" fill="#fff" stroke="#8a5a2b"/><text x="528" y="86" text-anchor="middle" font-size="22">20</text><text x="177" y="52" text-anchor="middle" font-size="18">减2</text><text x="413" y="52" text-anchor="middle" font-size="18">乘5</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#8a5a2b"/></marker></defs></svg>',common_misconception:'漏乘括号内每一项。',coach_tip:'也可以先把两边除以5，减少计算。'},{id:'Q5',text:'一个数的3倍加4等于19，这个数是？',options:{A:'5',B:'6',C:'7',D:'8'},answer:'A',knowledge:'列方程',difficulty:'易',explanation:'设这个数为x，3x+4=19，得3x=15，x=5。',diagram_svg:'<svg viewBox="0 0 620 150" xmlns="http://www.w3.org/2000/svg"><rect x="50" y="55" width="90" height="45" fill="#fff" stroke="#8a5a2b"/><rect x="145" y="55" width="90" height="45" fill="#fff" stroke="#8a5a2b"/><rect x="240" y="55" width="90" height="45" fill="#fff" stroke="#8a5a2b"/><rect x="350" y="55" width="70" height="45" fill="#ffe6b8" stroke="#8a5a2b"/><text x="95" y="84" text-anchor="middle" font-size="22">x</text><text x="190" y="84" text-anchor="middle" font-size="22">x</text><text x="285" y="84" text-anchor="middle" font-size="22">x</text><text x="385" y="84" text-anchor="middle" font-size="22">4</text><text x="470" y="84" font-size="24">= 19</text></svg>',common_misconception:'把“加4”写成“乘4”。',coach_tip:'先把文字翻译成方程：3倍就是3x。'},{id:'Q6',text:'解方程：4x + 3 = 2x + 13',options:{A:'3',B:'4',C:'5',D:'6'},answer:'C',knowledge:'含未知数两边',difficulty:'中',explanation:'4x-2x=13-3，得2x=10，所以x=5。',common_misconception:'未知数项没有移到同一边。',coach_tip:'未知数放一边，常数放另一边。'},{id:'Q7',text:'解方程：x/3 + 2 = 6',options:{A:'10',B:'11',C:'12',D:'13'},answer:'C',knowledge:'去分母',difficulty:'易',explanation:'x/3=4，所以x=12。',common_misconception:'只乘部分项。',coach_tip:'先减2，再乘3，步骤更清楚。'},{id:'Q8',text:'小明买3本同价笔记本，付20令吉，找回5令吉。每本多少钱？',options:{A:'3令吉',B:'4令吉',C:'6令吉',D:'5令吉'},answer:'D',knowledge:'应用题列方程',difficulty:'易',explanation:'实际花费为20-5=15令吉，3x=15，所以x=5。',diagram_svg:'<svg viewBox="0 0 620 150" xmlns="http://www.w3.org/2000/svg"><rect x="45" y="52" width="95" height="50" rx="10" fill="#fff" stroke="#8a5a2b"/><text x="92" y="83" text-anchor="middle" font-size="20">20令吉</text><path d="M145 77 H230" stroke="#8a5a2b" stroke-width="4" marker-end="url(#b)"/><rect x="238" y="52" width="110" height="50" rx="10" fill="#ffe6b8" stroke="#8a5a2b"/><text x="293" y="83" text-anchor="middle" font-size="20">找回5</text><path d="M355 77 H440" stroke="#8a5a2b" stroke-width="4" marker-end="url(#b)"/><rect x="448" y="52" width="125" height="50" rx="10" fill="#fff" stroke="#8a5a2b"/><text x="510" y="83" text-anchor="middle" font-size="20">3本 = 15</text><defs><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#8a5a2b"/></marker></defs></svg>',common_misconception:'忘记先算实际花费。',coach_tip:'找回的钱要从付款中扣除。'},{id:'Q9',text:'解方程：2(x+3)-4=10',options:{A:'4',B:'5',C:'6',D:'7'},answer:'A',knowledge:'去括号与合并',difficulty:'易',explanation:'2x+6-4=10，2x+2=10，x=4。',common_misconception:'括号外的2漏乘3。',coach_tip:'去括号时，括号内每一项都要乘。'},{id:'Q10',text:'一条绳子剪去8 cm后，剩下长度是原来的一半。原来长多少？',options:{A:'12 cm',B:'14 cm',C:'16 cm',D:'18 cm'},answer:'C',knowledge:'列方程应用',difficulty:'难',explanation:'设原长x cm，x-8=x/2，两边乘2得2x-16=x，所以x=16。',diagram_svg:'<svg viewBox="0 0 620 150" xmlns="http://www.w3.org/2000/svg"><line x1="70" y1="55" x2="550" y2="55" stroke="#8a5a2b" stroke-width="8"/><line x1="310" y1="40" x2="310" y2="70" stroke="#c95342" stroke-width="4"/><text x="310" y="32" text-anchor="middle" font-size="20">原长 x</text><line x1="70" y1="105" x2="310" y2="105" stroke="#c95342" stroke-width="8"/><line x1="310" y1="105" x2="550" y2="105" stroke="#1f8f70" stroke-width="8"/><text x="190" y="132" text-anchor="middle" font-size="20">剪去8 cm</text><text x="430" y="132" text-anchor="middle" font-size="20">剩下 x/2</text></svg>',visual_note:'线段图按题意表示“剪去8 cm后剩下一半”，解题以文字数字为准。',common_misconception:'把“剩下一半”理解成“剪去一半”。',coach_tip:'剩下长度既是x-8，也是原长的一半。'}];let idx=0,answers=[],startTime=0;function startQuiz(){if(!studentName.value.trim()||!studentNo.value.trim()||!seatNo.value.trim()){alert('请填写学号、姓名和座号');return}startTime=Date.now();home.classList.add('hidden');quiz.classList.remove('hidden');renderQ()}function renderQ(){let q=QUESTIONS[idx];progressText.textContent='第 '+(idx+1)+' / '+QUESTIONS.length+' 题';bar.style.width=((idx)/QUESTIONS.length*100)+'%';let html='<div><span class="tag">'+q.difficulty+'</span><span class="tag">'+q.knowledge+'</span></div><p class="qTitle">'+q.text+'</p>';if(q.diagram_svg)html+='<div class="diagram">'+q.diagram_svg+'</div>'+(q.visual_note?'<p class="small">'+q.visual_note+'</p>':'');for(const k of ['A','B','C','D'])html+='<button class="option" onclick="choose(\''+k+'\')" id="op'+k+'">'+k+'. '+q.options[k]+'</button>';qBox.innerHTML=html;feedback.className='feedback';feedback.innerHTML='';nextBtn.classList.add('hidden');nextBtn.textContent=idx===QUESTIONS.length-1?'完成并提交':'下一题'}function choose(k){let q=QUESTIONS[idx];for(const x of ['A','B','C','D']){document.getElementById('op'+x).disabled=true;if(x===q.answer)document.getElementById('op'+x).classList.add('correct')}if(k!==q.answer)document.getElementById('op'+k).classList.add('wrong');let ok=k===q.answer;answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});feedback.className='feedback '+(ok?'ok':'bad');feedback.innerHTML=(ok?'答对了！':'再检查一次。')+'<br>你的答案：'+k+'. '+q.options[k]+'<br>正确答案：'+q.answer+'. '+q.options[q.answer]+'<br>解析：'+q.explanation+'<br>AI学习提示：'+q.coach_tip+'<br>知识点：'+q.knowledge+'<br>常见错因：'+q.common_misconception;nextBtn.classList.remove('hidden')}function nextQuestion(){idx++;if(idx<QUESTIONS.length)renderQ();else finishQuiz()}function finishQuiz(){quiz.classList.add('hidden');done.classList.remove('hidden');bar.style.width='100%';let correct=answers.filter(a=>a.is_correct).length;scoreText.textContent=correct*10+'分';correctText.textContent=correct+' / '+QUESTIONS.length;let payload={action:'submit_response',submitted_at:new Date().toISOString(),school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:className.value.trim(),student_no:studentNo.value.trim(),student_name:studentName.value.trim(),seat_no:seatNo.value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:correct*10,accuracy:correct/QUESTIONS.length,total_questions:QUESTIONS.length,time_used:Math.round((Date.now()-startTime)/1000),answers_json:answers,correct_json:QUESTIONS.map(q=>({question_id:q.id,answer:q.answer})),wrong_question_ids:answers.filter(a=>!a.is_correct).map(a=>a.question_id),weak_knowledge_tags:[...new Set(answers.filter(a=>!a.is_correct).map(a=>a.knowledge_tag))],submit_attempt:1,duplicate_status:'unchecked',is_latest:true,abnormal_flag:''};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>submitStatus.textContent='已提交').catch(()=>submitStatus.textContent='提交可能失败，请截图交给老师')}window.addEventListener('beforeunload',e=>{if(!done.classList.contains('hidden'))return;e.preventDefault();e.returnValue=''});</script></body></html>
