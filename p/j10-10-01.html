<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>一元一次方程式线上练习</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(145deg,#fff7e8,#ffd9ad);color:#241a13}.page{max-width:760px;margin:0 auto;padding:14px}.card{background:#fffdf8;border:1px solid #ead8c1;border-radius:24px;box-shadow:0 18px 42px rgba(142,79,31,.18);padding:20px 16px}.topband{margin:-20px -16px 18px;padding:22px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-radius:24px 24px 0 0;text-align:center}h1{margin:0;color:#5b341e;font-size:1.45rem}.pill{display:inline-block;margin-top:12px;padding:10px 16px;border-radius:999px;background:#fff7e5;color:#70401f;font-weight:900}.sub{text-align:center;color:#7d6a58;line-height:1.7}label{display:block;margin:14px 0 7px;font-weight:900}input{width:100%;min-height:56px;border:2px solid #ead9c4;border-radius:18px;padding:0 14px;font-size:1rem}button{width:100%;min-height:56px;margin-top:16px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24)}button:disabled{opacity:.55}.hidden{display:none}.progressBox{position:sticky;top:0;background:rgba(255,253,248,.95);padding:10px 0 12px;border-bottom:1px solid #ead8c1}.progressMeta{display:flex;justify-content:space-between;font-weight:900;color:#5b341e}.bar{height:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35,#c65b2d)}.tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900}.diagram{margin:12px 0 16px;padding:12px;border-radius:18px;background:#fff4e3;border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{text-align:center;color:#7d6a58;font-size:.82rem}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:#fffaf1;color:#2b2119;font-weight:900;text-align:left}.option.correct{border-color:#1f8f70;background:#d7f1e4;color:#0f5b48}.option.wrong{border-color:#c95342;background:#ffe1d9;color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{padding:16px 10px;border-radius:18px;background:#fff0c7;text-align:center;font-weight:900}.small{color:#7d6a58;line-height:1.7}.err{background:#ffe1d9;color:#7b2a22;padding:12px;border-radius:16px;margin-top:12px}</style></head><body><div class="page"><section id="start" class="card"><div class="topband"><h1>一元一次方程式线上练习</h1><div class="pill">练习编号：J10-10-01</div><p class="sub">第10章 一元一次方程式｜练习模式｜选择题10题</p></div><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo"><label>姓名</label><input id="studentName"><label>座号</label><input id="seatNo"><button id="startBtn">开始作答</button><p class="small">请逐题作答。每题提交后会立即显示反馈。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="qNum">第1题</span><span id="scoreText">已得 0 分</span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="knowledge"></span><span class="tag" id="difficulty"></span></div><p class="qTitle" id="qText"></p><div id="diagram" class="diagram"></div><div id="visualNote" class="diagramNote"></div><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finish" class="card hidden"><div class="topband"><h1>完成练习</h1><p class="sub">请保留本页截图，以备老师核对。</p></div><div class="stats"><div class="stat">得分<br><span id="finalScore"></span></div><div class="stat">正确率<br><span id="finalRate"></span></div><div class="stat">错题数<br><span id="finalWrong"></span></div><div class="stat">提交状态<br><span id="submitStatus">送达中</span></div></div><div id="studentSummary" class="small"></div><div id="wrongList" class="small"></div></section><div id="runtimeError" class="err hidden">页面运行异常，请截图交给老师。</div></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'chu2_zhong',practice_id:'J10-10-01',practice_name:'一元一次方程式线上练习',practice_round:'01',quiz_id:'quiz_J10_10_01_20260623',quiz_name:'一元一次方程式线上练习',chapter_name:'第10章 一元一次方程式'};const QUESTIONS=[{"id":"Q1","text":"下列哪一个是一元一次方程？","options":{"A":"x²+1=5","B":"2x+3y=8","C":"3x-5=10","D":"4+5=9"},"answer":"C","knowledge":"一元一次方程的定义","difficulty":"易","explanation":"一元一次方程只含一个未知数，且未知数次数为1。3x-5=10符合。","diagram_svg":"<svg viewBox='0 0 640 180' xmlns='http://www.w3.org/2000/svg'><rect x='70' y='55' width='500' height='80' rx='18' fill='#fff' stroke='#b36b2c' stroke-width='4'/><text x='320' y='105' text-anchor='middle' font-size='30' fill='#5b341e'>一个未知数 x，次数是 1，并且是等式</text></svg>","visual_note":"图示强调判断标准，不代表计算步骤。","common_misconception":"把含两个未知数或二次项的等式也误判为一元一次方程。"},{"id":"Q2","text":"解方程：x+7=19，x 的值是？","options":{"A":"12","B":"26","C":"-12","D":"11"},"answer":"A","knowledge":"等式性质","difficulty":"易","explanation":"两边同时减7，x=19-7=12。","diagram_svg":"<svg viewBox='0 0 640 220' xmlns='http://www.w3.org/2000/svg'><line x1='320' y1='35' x2='320' y2='165' stroke='#7d6a58' stroke-width='5'/><line x1='150' y1='165' x2='490' y2='165' stroke='#7d6a58' stroke-width='5'/><rect x='105' y='80' width='170' height='60' rx='12' fill='#fff7df' stroke='#d07a2d' stroke-width='4'/><text x='190' y='119' text-anchor='middle' font-size='28'>x + 7</text><rect x='365' y='80' width='170' height='60' rx='12' fill='#fff7df' stroke='#d07a2d' stroke-width='4'/><text x='450' y='119' text-anchor='middle' font-size='28'>19</text><text x='320' y='205' text-anchor='middle' font-size='23' fill='#5b341e'>两边同时减 7</text></svg>","visual_note":"天平表示等式两边保持相等。","common_misconception":"只在一边减7，破坏等式平衡。"},{"id":"Q3","text":"解方程：3x=24，x 的值是？","options":{"A":"6","B":"8","C":"21","D":"72"},"answer":"B","knowledge":"等式性质","difficulty":"易","explanation":"3x表示3份相同的x，总共24，所以每份x=24÷3=8。","diagram_svg":"<svg viewBox='0 0 640 190' xmlns='http://www.w3.org/2000/svg'><rect x='78' y='55' width='120' height='70' rx='14' fill='#e4f4ea' stroke='#1f8f70' stroke-width='4'/><rect x='260' y='55' width='120' height='70' rx='14' fill='#e4f4ea' stroke='#1f8f70' stroke-width='4'/><rect x='442' y='55' width='120' height='70' rx='14' fill='#e4f4ea' stroke='#1f8f70' stroke-width='4'/><text x='138' y='99' text-anchor='middle' font-size='32'>x</text><text x='320' y='99' text-anchor='middle' font-size='32'>x</text><text x='502' y='99' text-anchor='middle' font-size='32'>x</text><text x='320' y='160' text-anchor='middle' font-size='28' fill='#5b341e'>三份合起来是 24，所以每份是 8</text></svg>","visual_note":"三块大小相同，表示三个相等的 x。","common_misconception":"把3x误看成3+x。"},{"id":"Q4","text":"解方程：2x-5=11，x 的值是？","options":{"A":"3","B":"6","C":"7","D":"8"},"answer":"D","knowledge":"移项与合并","difficulty":"易","explanation":"2x-5=11，两边加5得2x=16，再除以2，x=8。","diagram_svg":"<svg viewBox='0 0 640 210' xmlns='http://www.w3.org/2000/svg'><rect x='50' y='70' width='130' height='56' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='115' y='106' text-anchor='middle' font-size='25'>x</text><path d='M180 98 H285' stroke='#5b341e' stroke-width='4' marker-end='url(#a)'/><rect x='285' y='70' width='130' height='56' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='350' y='106' text-anchor='middle' font-size='25'>2x</text><path d='M415 98 H520' stroke='#5b341e' stroke-width='4' marker-end='url(#a)'/><rect x='520' y='70' width='85' height='56' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='562' y='106' text-anchor='middle' font-size='25'>11</text><text x='232' y='62' text-anchor='middle' font-size='22'>×2</text><text x='468' y='62' text-anchor='middle' font-size='22'>−5</text><defs><marker id='a' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L0,6 L9,3 z' fill='#5b341e'/></marker></defs><text x='320' y='175' text-anchor='middle' font-size='24' fill='#5b341e'>反向运算：先 +5，再 ÷2</text></svg>","visual_note":"流程图表示先乘2再减5得到11。","common_misconception":"移项时忘记变号。"},{"id":"Q5","text":"解方程：5(x-2)=20，x 的值是？","options":{"A":"2","B":"4","C":"6","D":"10"},"answer":"C","knowledge":"去括号与等式性质","difficulty":"易","explanation":"两边除以5，x-2=4；两边加2，x=6。","diagram_svg":"<svg viewBox='0 0 640 210' xmlns='http://www.w3.org/2000/svg'><rect x='60' y='72' width='130' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='125' y='109' text-anchor='middle' font-size='25'>x</text><path d='M190 101 H300' stroke='#5b341e' stroke-width='4' marker-end='url(#b)'/><rect x='300' y='72' width='130' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='365' y='109' text-anchor='middle' font-size='25'>x−2</text><path d='M430 101 H535' stroke='#5b341e' stroke-width='4' marker-end='url(#b)'/><rect x='535' y='72' width='75' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='572' y='109' text-anchor='middle' font-size='25'>20</text><text x='245' y='64' text-anchor='middle' font-size='22'>−2</text><text x='482' y='64' text-anchor='middle' font-size='22'>×5</text><defs><marker id='b' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L0,6 L9,3 z' fill='#5b341e'/></marker></defs><text x='320' y='174' text-anchor='middle' font-size='24' fill='#5b341e'>x 先减 2，再乘 5，结果为 20</text></svg>","visual_note":"图中数字与题干关系一致：先减2，再乘5。","common_misconception":"先把5和x相加，或忘记括号整体。"},{"id":"Q6","text":"解方程：x/4+3=9，x 的值是？","options":{"A":"24","B":"12","C":"3","D":"48"},"answer":"A","knowledge":"去分母","difficulty":"易","explanation":"两边先减3，x/4=6；两边乘4，x=24。","diagram_svg":"<svg viewBox='0 0 640 210' xmlns='http://www.w3.org/2000/svg'><rect x='60' y='72' width='120' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='120' y='109' text-anchor='middle' font-size='25'>x</text><path d='M180 101 H300' stroke='#5b341e' stroke-width='4' marker-end='url(#c)'/><rect x='300' y='72' width='120' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='360' y='109' text-anchor='middle' font-size='25'>x/4</text><path d='M420 101 H535' stroke='#5b341e' stroke-width='4' marker-end='url(#c)'/><rect x='535' y='72' width='75' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='572' y='109' text-anchor='middle' font-size='25'>9</text><text x='240' y='64' text-anchor='middle' font-size='22'>÷4</text><text x='478' y='64' text-anchor='middle' font-size='22'>+3</text><defs><marker id='c' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L0,6 L9,3 z' fill='#5b341e'/></marker></defs><text x='320' y='174' text-anchor='middle' font-size='24' fill='#5b341e'>反向运算：先 −3，再 ×4</text></svg>","visual_note":"流程图表示 x 除以4后再加3得到9。","common_misconception":"先乘4时忘记同时处理+3。"},{"id":"Q7","text":"解方程：4x+6=2x+18，x 的值是？","options":{"A":"4","B":"5","C":"6","D":"12"},"answer":"C","knowledge":"移项与合并同类项","difficulty":"易","explanation":"4x-2x=18-6，得2x=12，所以x=6。","diagram_svg":"<svg viewBox='0 0 640 230' xmlns='http://www.w3.org/2000/svg'><line x1='320' y1='35' x2='320' y2='170' stroke='#7d6a58' stroke-width='5'/><line x1='130' y1='170' x2='510' y2='170' stroke='#7d6a58' stroke-width='5'/><rect x='70' y='78' width='220' height='64' rx='12' fill='#fff7df' stroke='#d07a2d' stroke-width='4'/><text x='180' y='118' text-anchor='middle' font-size='28'>4x + 6</text><rect x='350' y='78' width='220' height='64' rx='12' fill='#fff7df' stroke='#d07a2d' stroke-width='4'/><text x='460' y='118' text-anchor='middle' font-size='28'>2x + 18</text><text x='320' y='210' text-anchor='middle' font-size='23' fill='#5b341e'>把 x 项移到左边，常数移到右边</text></svg>","visual_note":"天平表示方程两边相等，移项后仍需保持平衡。","common_misconception":"移项忘记变号。"},{"id":"Q8","text":"小明今年的年龄加上5岁等于18岁。设小明今年x岁，方程应为？","options":{"A":"x-5=18","B":"x+5=18","C":"5x=18","D":"x+18=5"},"answer":"B","knowledge":"列一元一次方程","difficulty":"中","explanation":"今年年龄是x，加上5岁后是18，所以列式x+5=18。","diagram_svg":"<svg viewBox='0 0 640 180' xmlns='http://www.w3.org/2000/svg'><rect x='95' y='65' width='150' height='58' rx='12' fill='#e4f4ea' stroke='#1f8f70' stroke-width='4'/><text x='170' y='102' text-anchor='middle' font-size='25'>今年 x 岁</text><text x='300' y='102' text-anchor='middle' font-size='34'>+</text><rect x='345' y='65' width='95' height='58' rx='12' fill='#fff7df' stroke='#d07a2d' stroke-width='4'/><text x='392' y='102' text-anchor='middle' font-size='25'>5</text><text x='475' y='102' text-anchor='middle' font-size='34'>=</text><rect x='515' y='65' width='80' height='58' rx='12' fill='#fff7df' stroke='#d07a2d' stroke-width='4'/><text x='555' y='102' text-anchor='middle' font-size='25'>18</text></svg>","visual_note":"数量关系图与题干一致：今年年龄加5等于18。","common_misconception":"把“加上5岁”写成减5。"},{"id":"Q9","text":"一本练习本 RM3，小华买了 x 本，又买了一支 RM2 的笔，总共 RM17。应列哪一个方程？","options":{"A":"3+x+2=17","B":"3x-2=17","C":"2x+3=17","D":"3x+2=17"},"answer":"D","knowledge":"价格应用题建模","difficulty":"中","explanation":"x本练习本共3x元，再加笔2元，总共17元，所以3x+2=17。","diagram_svg":"<svg viewBox='0 0 640 200' xmlns='http://www.w3.org/2000/svg'><rect x='65' y='60' width='210' height='70' rx='12' fill='#fff7df' stroke='#d07a2d' stroke-width='4'/><text x='170' y='103' text-anchor='middle' font-size='25'>练习本：3x</text><text x='315' y='103' text-anchor='middle' font-size='34'>+</text><rect x='355' y='60' width='120' height='70' rx='12' fill='#e4f4ea' stroke='#1f8f70' stroke-width='4'/><text x='415' y='103' text-anchor='middle' font-size='25'>笔：2</text><text x='515' y='103' text-anchor='middle' font-size='34'>= 17</text><text x='320' y='165' text-anchor='middle' font-size='23' fill='#5b341e'>单价 × 数量 + 另一项价钱 = 总价</text></svg>","visual_note":"图中RM3、x本、RM2与RM17对应题干。","common_misconception":"把x本练习本写成3+x。"},{"id":"Q10","text":"一个数的2倍加上3，再乘以4，结果是44。设这个数为x，x 的值是？","options":{"A":"4","B":"5","C":"8","D":"19"},"answer":"A","knowledge":"综合列方程与去括号","difficulty":"难","explanation":"根据题意列4(2x+3)=44。两边除以4得2x+3=11，再减3得2x=8，所以x=4。","diagram_svg":"<svg viewBox='0 0 640 220' xmlns='http://www.w3.org/2000/svg'><rect x='45' y='75' width='90' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='90' y='112' text-anchor='middle' font-size='25'>x</text><path d='M135 104 H240' stroke='#5b341e' stroke-width='4' marker-end='url(#d)'/><rect x='240' y='75' width='100' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='290' y='112' text-anchor='middle' font-size='25'>2x</text><path d='M340 104 H445' stroke='#5b341e' stroke-width='4' marker-end='url(#d)'/><rect x='445' y='75' width='100' height='58' rx='12' fill='#fff' stroke='#d07a2d' stroke-width='4'/><text x='495' y='112' text-anchor='middle' font-size='25'>2x+3</text><path d='M545 104 H600' stroke='#5b341e' stroke-width='4' marker-end='url(#d)'/><text x='620' y='112' text-anchor='middle' font-size='25'>44</text><text x='188' y='64' text-anchor='middle' font-size='22'>×2</text><text x='392' y='64' text-anchor='middle' font-size='22'>+3</text><text x='574' y='64' text-anchor='middle' font-size='22'>×4</text><defs><marker id='d' markerWidth='10' markerHeight='10' refX='8' refY='3' orient='auto'><path d='M0,0 L0,6 L9,3 z' fill='#5b341e'/></marker></defs><text x='320' y='180' text-anchor='middle' font-size='23' fill='#5b341e'>列式：4(2x+3)=44</text></svg>","visual_note":"流程顺序为先×2，再+3，最后×4，和题干一致。","common_misconception":"把“再乘以4”只乘在3上，漏乘整个2x+3。"}];let order=[],index=0,score=0,answers=[],started=false,submitted=false,startTime=0;const $=id=>document.getElementById(id);function esc(s){return String(s||'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}function showRuntimeError(){$('runtimeError').classList.remove('hidden')}function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}function answerText(q,k){return k+'. '+q.options[k]}function coachTip(q,correct){if(correct)return '继续保持：先找等量关系，再按等式性质变形。';return '先圈出未知数、等号和运算顺序，移项时特别注意变号。'}function renderQuestion(){const q=order[index];$('qNum').textContent='第 '+(index+1)+' / '+order.length+' 题';$('knowledge').textContent=q.knowledge;$('difficulty').textContent=q.difficulty;$('qText').textContent=q.text;$('diagram').innerHTML=q.diagram_svg||'';$('diagram').style.display=q.diagram_svg?'block':'none';$('visualNote').textContent=q.visual_note||'';$('options').innerHTML='';['A','B','C','D'].forEach(k=>{const b=document.createElement('button');b.className='option';b.dataset.option=k;b.textContent=k+'. '+q.options[k];$('options').appendChild(b)});$('feedback').className='feedback';$('feedback').innerHTML='';$('nextBtn').disabled=true;$('nextBtn').textContent=index===order.length-1?'完成并提交':'下一题'}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll('.option').forEach(btn=>{btn.disabled=true;if(btn.dataset.option===q.answer)btn.classList.add('correct');if(btn.dataset.option===selected&&!correct)btn.classList.add('wrong')});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge,difficulty:q.difficulty});$('feedback').className='feedback '+(correct?'ok':'bad');$('feedback').innerHTML='<b>'+(correct?'答对了':'还差一点')+'</b><br>你的答案：'+esc(selectedText)+'<br>正确答案：'+esc(correctText)+'<br>解析：'+esc(q.explanation)+'<br><b>AI学习提示：</b>'+esc(coachTip(q,correct))+'<br>知识点：'+esc(q.knowledge);$('nextBtn').disabled=false;$('barFill').style.width=((index+1)/order.length*100)+'%';$('scoreText').textContent='已得 '+Math.round(score/order.length*100)+' 分'}$('options').addEventListener('click',e=>{const btn=e.target.closest('.option');if(!btn||btn.disabled)return;try{chooseAnswer(btn.dataset.option)}catch(err){showRuntimeError()}});$('startBtn').addEventListener('click',()=>{if(!$('studentNo').value.trim()||!$('studentName').value.trim()||!$('seatNo').value.trim()){alert('请填写学号、姓名、座号');return}started=true;startTime=Date.now();order=shuffle(QUESTIONS.slice());$('start').classList.add('hidden');$('quiz').classList.remove('hidden');renderQuestion()});$('nextBtn').addEventListener('click',()=>{if(index<order.length-1){index++;renderQuestion()}else{renderFinish()}});function renderFinish(){submitted=true;$('quiz').classList.add('hidden');$('finish').classList.remove('hidden');const total=order.length,finalScore=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))],timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000));$('finalScore').textContent=finalScore+'分';$('finalRate').textContent=finalScore+'%';$('finalWrong').textContent=wrong.length+'题';$('studentSummary').innerHTML='学校：'+esc(META.school_name)+'<br>老师：'+esc(META.teacher_name)+'<br>练习编号：'+esc(META.practice_id)+'<br>班级：'+esc($('className').value)+'<br>姓名：'+esc($('studentName').value)+'<br>用时：'+timeUsed+'秒';$('wrongList').innerHTML='<h3>错题记录</h3>'+(wrong.length?wrong.map(w=>'第'+w.display_order+'题：'+esc(w.question_text)+'<br>你的答案：'+esc(w.selected_answer_text)+'；正确答案：'+esc(w.correct_answer_text)).join('<hr>'):'全部答对，继续保持。')+'<h3>薄弱知识点</h3>'+(weak.join('、')||'暂无');const payload={action:'submit_response',school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$('className').value,student_no:$('studentNo').value,student_name:$('studentName').value,seat_no:$('seatNo').value,practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:finalScore,accuracy:finalScore,total_questions:total,time_used:timeUsed,answers_json:answers,correct_json:order.map(q=>({question_id:q.id,correct_answer:q.answer,correct_answer_text:answerText(q,q.answer)})),wrong_question_ids:wrong.map(w=>w.question_id),weak_knowledge_tags:weak,submit_attempt:1};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{$('submitStatus').textContent='已送达'}).catch(()=>{$('submitStatus').textContent='提交失败'})}window.addEventListener('beforeunload',e=>{if(started&&!submitted){e.preventDefault();e.returnValue=''}});</script></body></html>
