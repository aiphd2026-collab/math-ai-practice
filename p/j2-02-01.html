<style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#f4e7ff,#ead4ff)}.stat b{display:block;font-size:1.34rem;color:var(--brown);line-height:1.2}.stat span{display:block;margin-top:8px;color:var(--muted);font-size:.9rem;font-weight:900}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.section h2{margin:0 0 8px;font-size:1.05rem;color:var(--brown)}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:linear-gradient(135deg,#fff6ec,#ffe8de);border:1px solid #e7c2ad;line-height:1.65}.small{font-size:.9rem;color:var(--muted);line-height:1.65}.infoGrid{display:grid;grid-template-columns:92px 1fr;gap:8px 12px;line-height:1.65;font-size:.96rem}.label{color:var(--muted);font-weight:900}.value{font-weight:700}.timeGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}.timeBox{background:linear-gradient(135deg,#fff8ee,#fff1dc);border:1px solid #ead6bc;border-radius:16px;padding:12px;line-height:1.45}.analysisBox{background:linear-gradient(135deg,#eef9f3,#e3f6ff);border:1px solid #c9e6d8;border-radius:18px;padding:14px;line-height:1.75}.submitNotice{background:linear-gradient(135deg,#e5f8ed,#d5f1ff);border-left:6px solid #2e9b74;border-radius:18px;padding:15px;line-height:1.75;font-weight:700}@media(max-width:520px){.stats,.timeGrid{grid-template-columns:1fr 1fr}.infoGrid{grid-template-columns:78px 1fr}h1{font-size:1.38rem}}</style>

<body><main class="page">
<section class="card" id="home"><div class="topband"><h1>因式分解线上练习01</h1><div class="pill">J2-02-01｜初二忠</div></div><p class="sub">请填写学生资料后开始作答。完成后系统会显示得分、正确率、错题分析与提交状态。</p><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo" placeholder="请输入学号"><label>姓名</label><input id="studentName" placeholder="请输入姓名"><label>座号（可选）</label><input id="seatNo" placeholder="请输入座号"><button id="startBtn">开始练习</button></section>
<section class="card hidden" id="quiz"><div class="progressBox"><div class="progressMeta"><span id="progressText">第1题 / 共10题</span><span id="scoreText">已得 0 分</span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="difficulty"></span><span class="tag" id="knowledge"></span></div><h1 class="qTitle" id="questionText"></h1><div class="diagram" id="diagram"></div><div id="options"></div><div class="feedback" id="feedback"></div><button id="nextBtn" disabled>下一题</button></section>
<section class="hidden" id="finish"><section class="card"><div class="topband"><h1>练习完成</h1><div class="pill">J2-02-01｜初二忠｜因式分解练习01</div></div><div class="stats"><div class="stat"><b id="finalScore">0/10</b><span>得分</span></div><div class="stat"><b id="finalRate">0%</b><span>正确率</span></div><div class="stat"><b id="finalWrong">0题</b><span>错题数</span></div><div class="stat"><b id="submitState">送达中…</b><span>提交状态</span></div></div></section><section class="card"><h2>作答资讯</h2><div class="infoGrid"><div class="label">学校</div><div class="value" id="infoSchool"></div><div class="label">老师</div><div class="value" id="infoTeacher"></div><div class="label">班级</div><div class="value" id="infoClass"></div><div class="label">姓名</div><div class="value" id="infoStudent"></div><div class="label">座号</div><div class="value" id="infoSeat"></div><div class="label">章节</div><div class="value" id="infoChapter"></div></div><div class="timeGrid"><div class="timeBox"><span class="label">开始时间</span><span class="value" id="startedAtDisplay"></span></div><div class="timeBox"><span class="label">完成时间</span><span class="value" id="completedAtDisplay"></span></div><div class="timeBox"><span class="label">总用时</span><span class="value" id="timeUsedDisplay"></span></div><div class="timeBox"><span class="label">平均每题</span><span class="value" id="avgTimeDisplay"></span></div></div></section><section class="card"><h2>详细错题分析</h2><div id="wrongAnalysis"></div></section><section class="card"><h2>整体学习分析</h2><div class="analysisBox" id="overallAnalysis"></div></section><section class="submitNotice" id="submitNotice"><div>提交状态：送达中…</div></section></section>
</main><script>
const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";
const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:"2026",semester:"上学期",class_id:"c_j2_zhong",practice_id:"J2-02-01",practice_name:"初二忠｜因式分解练习01",practice_round:"01",quiz_id:"quiz-J2-02-01",quiz_name:"因式分解线上练习01",chapter_name:"因式分解"};
const QUESTIONS=[{"id":"Q1","text":"下列哪个是 x²−9 的正确因式分解？","options":{"A":"(x+3)(x−3)","B":"(x−9)(x+1)","C":"(x−3)²","D":"x(x−9)"},"answer":"A","difficulty":"易","knowledge":"平方差公式","explanation":"x²−9=x²−3²=(x+3)(x−3)。","common_misconception":"不会辨认平方差结构。","image_required":false},{"id":"Q2","text":"因式分解：6x+12","options":{"A":"6(x+12)","B":"3(2x+4)","C":"6(x+2)","D":"2(3x+12)"},"answer":"C","difficulty":"易","knowledge":"提取公因式","explanation":"6x和12的最大公因式是6，所以6x+12=6(x+2)。","common_misconception":"公因式提取不完全。","image_required":false},{"id":"Q3","text":"下列哪个是完全平方公式？","options":{"A":"a²−b²=(a−b)²","B":"(a+b)²=a²+ab+b²","C":"(a+b)²=a²+2ab+b²","D":"(a+b)²=a²+b²"},"answer":"C","difficulty":"易","knowledge":"完全平方公式","explanation":"完全平方公式为(a+b)²=a²+2ab+b²。","common_misconception":"漏掉中间项2ab。","image_required":false},{"id":"Q4","text":"因式分解：x²+8x+16","options":{"A":"(x+4)²","B":"(x+8)²","C":"(x+2)(x+8)","D":"(x−4)²"},"answer":"A","difficulty":"易","knowledge":"完全平方公式","explanation":"x²+8x+16=x²+2·x·4+4²=(x+4)²。","common_misconception":"平方数或中间项判断错误。","image_required":false},{"id":"Q5","text":"因式分解：5x²−15x","options":{"A":"5x(x−3)","B":"5(x²−3)","C":"x(5x−15x)","D":"15x(x−1)"},"answer":"A","difficulty":"易","knowledge":"提取公因式","explanation":"5x²和−15x的公因式是5x，所以结果为5x(x−3)。","common_misconception":"遗漏公共因式x。","image_required":false},{"id":"Q6","text":"下列哪一个已经完成因式分解？","options":{"A":"x²−4x","B":"x(x−4)","C":"x²+4","D":"2x²"},"answer":"B","difficulty":"易","knowledge":"因式分解概念","explanation":"因式分解要写成因式相乘的形式，x(x−4)符合。","common_misconception":"分不清化简与因式分解。","image_required":false},{"id":"Q7","text":"因式分解：9a²−25","options":{"A":"(3a−5)²","B":"(9a−25)(a+1)","C":"(3a+5)(3a−5)","D":"3(a²−25)"},"answer":"C","difficulty":"易","knowledge":"平方差公式","explanation":"9a²−25=(3a)²−5²=(3a+5)(3a−5)。","common_misconception":"把平方差误认为完全平方。","image_required":false},{"id":"Q8","text":"因式分解：x²+7x+12","options":{"A":"(x+2)(x+5)","B":"(x+3)(x+4)","C":"(x+1)(x+12)","D":"(x+6)(x+2)"},"answer":"B","difficulty":"中","knowledge":"交叉相乘法","explanation":"找两个数，使乘积为12、和为7，即3和4，所以为(x+3)(x+4)。","common_misconception":"只看乘积，不检查和是否正确。","image_required":false},{"id":"Q9","text":"因式分解：2x²+7x+3","options":{"A":"(2x+1)(x+3)","B":"(2x+3)(x+1)","C":"(x+3)(x+1)","D":"(2x−1)(x−3)"},"answer":"A","difficulty":"中","knowledge":"交叉相乘法","explanation":"(2x+1)(x+3)=2x²+6x+x+3=2x²+7x+3。","common_misconception":"交叉乘积计算错误。","image_required":false},{"id":"Q10","text":"已知长方形面积为 2x²+5x+2，若一边长为 2x+1，另一边长应为","options":{"A":"x+1","B":"2x+2","C":"x+2","D":"2x+1"},"answer":"C","difficulty":"难","knowledge":"因式分解与实际应用","explanation":"2x²+5x+2=(2x+1)(x+2)，已知一边是2x+1，所以另一边是x+2。","common_misconception":"没有先把面积式分解为两个因式再比较边长。","image_required":false}];
let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=t=>String(t??"").replace(/[&<>\"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / 共${order.length}题`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent="难度："+(q.difficulty||"基础");$("knowledge").textContent="知识点："+(q.knowledge||"知识点");$("questionText").textContent=q.text;$("diagram").style.display="none";$("diagram").innerHTML="";$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.dataset.option=key;btn.textContent=`${key}. ${value}`;btn.addEventListener("click",()=>chooseAnswer(key));$("options").appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||""}`}function coachTip(q,correct){if(correct)return "继续保持：先确认题目结构，再选择合适的分解方法。";return q.common_misconception?`常见错因：${q.common_misconception}`:"AI提示：先判断是否可提公因式，再看平方差、完全平方或交叉相乘。"}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.dataset.option===q.answer)btn.classList.add("correct");if(btn.dataset.option===selected&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||"",explanation:q.explanation||"",common_misconception:q.common_misconception||"",coach_tip:coachTip(q,correct)});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<b>${correct?"答对了":"需要修正"}</b><br>正确答案：${esc(correctText)}<br>解析：${esc(q.explanation)}<br>${esc(coachTip(q,correct))}`;$("nextBtn").disabled=false}$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else finishQuiz()});function formatDuration(ms){let s=Math.max(0,Math.round(ms/1000));const m=Math.floor(s/60);s=s%60;return m>0?`${m}分${s}秒`:`${s}秒`}function displayTime(ms){return new Date(ms).toLocaleString("zh-CN",{hour12:false})}function buildWrongAnalysisHtml(wrong){if(!wrong.length)return "<div class='analysisBox'>本次没有错题，保持这个节奏。</div>";return wrong.map(a=>`<div class='wrongItem'><div><b>第${a.display_order}题：</b>${esc(a.question_text)}</div><div>你的答案：${esc(a.selected_answer_text)}</div><div>正确答案：${esc(a.correct_answer_text)}</div><div>知识点：${esc(a.knowledge_tag)}</div><div>解析：${esc(a.explanation)}</div><div>常见错因：${esc(a.common_misconception)}</div></div>`).join("")}function buildOverallAnalysisHtml(weak,wrong,rate){if(rate>=85)return "整体掌握较好，继续保持对公式结构与符号细节的检查。";if(rate>=60)return "基础已有一定掌握，建议重点复习错题对应知识点："+esc(weak.join("、")||"因式分解方法");return "本次基础仍需加强，建议按顺序复习：提公因式、平方差、完全平方、交叉相乘。"}function finishQuiz(){const total=order.length,completedAtMs=Date.now(),timeUsed=completedAtMs-startTime,avgTime=Math.round(timeUsed/total),scoreValue=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))],startedAtDisplay=displayTime(startTime),completedAtDisplay=displayTime(completedAtMs);$("finalScore").textContent=score+"/"+total;$("finalRate").textContent=scoreValue+"%";$("finalWrong").textContent=wrong.length+"题";$("submitState").textContent="送达中…";$("infoSchool").textContent=META.school_name;$("infoTeacher").textContent=META.teacher_name;$("infoClass").textContent=$("className").value.trim();$("infoStudent").textContent=$("studentName").value.trim();$("infoSeat").textContent=$("seatNo").value.trim()||"未填写";$("infoChapter").textContent=META.chapter_name;$("startedAtDisplay").textContent=startedAtDisplay;$("completedAtDisplay").textContent=completedAtDisplay;$("timeUsedDisplay").textContent=formatDuration(timeUsed);$("avgTimeDisplay").textContent=formatDuration(avgTime);$("wrongAnalysis").innerHTML=buildWrongAnalysisHtml(wrong);$("overallAnalysis").innerHTML=buildOverallAnalysisHtml(weak,wrong,scoreValue);$("submitNotice").innerHTML="<div>提交状态：送达中…</div>";show("finish");submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime)}function submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime){const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:scoreValue,accuracy:scoreValue,total_questions:total,time_used:timeUsed,avg_time_used:avgTime,started_at:new Date(startTime).toISOString(),started_at_display:startedAtDisplay,completed_at:new Date(completedAtMs).toISOString(),completed_at_display:completedAtDisplay,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已送达";$("submitNotice").innerHTML="<div>✅ 作答资料已成功发送给老师。</div><div>老师将依据您的作答情况进行分析，请等待老师后续讲解与反馈。</div><div class='small'>若老师尚未看到数据，请保留本页截图。</div>"}).catch(()=>{$("submitState").textContent="提交失败";$("submitNotice").innerHTML="<div>提交状态：提交失败。</div><div>请保留本页截图给老师核对。</div>"})}
</script></body></html>
