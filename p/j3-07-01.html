<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>初三下册第7章《三角函数》课后练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d)}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;background:#fff0c7}.small{font-size:.9rem;color:#6f5847;line-height:1.65}.wrongList{margin-top:12px;padding:12px;border-radius:16px;background:#fff7ea;border:1px solid #ead8c1;line-height:1.7}</style></head><body><div class="page"><section id="start" class="card"><div class="topband"><h1>初三下册第7章《三角函数》课后练习</h1><div class="pill">练习编号：J3-07-01</div><p class="sub">宽柔中学古来分校｜陈天龙老师｜2026上学期<br>章节：初三下册第7章 三角函数｜模式：练习模式</p></div><label>班级</label><input id="className" value="初三仁" required><label>学号</label><input id="studentNo" required><label>姓名</label><input id="studentName" required><label>座号（可选）</label><input id="seatNo"><button onclick="startQuiz()">开始练习</button><p class="small">请认真作答。每题作答后会显示反馈；完成后请截图保存完成页。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="qCount">第1题/10</span><span id="scoreNow">得分 0</span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span class="tag" id="diffTag"></span><span class="tag" id="knowTag"></span></div><div id="qText" class="qTitle"></div><div id="diagram" class="diagram"></div><div id="diagramNote" class="diagramNote"></div><div id="opts"></div><div id="fb" class="feedback"></div><button id="nextBtn" class="hidden" onclick="nextQuestion()">下一题</button></section><section id="done" class="card hidden"><div class="topband"><h1>完成页</h1><div class="pill">练习编号：J3-07-01</div><p class="sub">请截图保存本页，并确认已发送。</p></div><div id="summary"></div></section></div><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"j3ren",practice_id:"J3-07-01",practice_name:"初三下册第7章《三角函数》课后练习",practice_round:"01",quiz_id:"J3-07-01",quiz_name:"初三下册第7章《三角函数》课后练习",chapter_name:"初三下册第7章 三角函数"};const Q=[{id:"Q1",text:"在直角三角形 ABC 中，∠C = 90°，对于锐角 A，若对边 BC = 3，斜边 AB = 5，则 sin A =（ ）",options:{A:"3/5",B:"4/5",C:"5/3",D:"3/4"},answer:"A",knowledge:"锐角三角函数的意义",difficulty:"基础",explanation:"sin A = 对边 ÷ 斜边 = 3/5。",common_misconception:"把对边和邻边看错。",coach_tip:"先找角A，再判断对边、邻边和斜边。",diagram_svg:'<svg viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg"><line x1="60" y1="160" x2="300" y2="160" stroke="#5b341e" stroke-width="4"/><line x1="300" y1="160" x2="300" y2="52" stroke="#5b341e" stroke-width="4"/><line x1="60" y1="160" x2="300" y2="52" stroke="#5b341e" stroke-width="4"/><path d="M282 160 L282 142 L300 142" fill="none" stroke="#5b341e" stroke-width="3"/><text x="48" y="182" font-size="18">A</text><text x="310" y="180" font-size="18">C</text><text x="306" y="50" font-size="18">B</text><text x="185" y="88" font-size="18">5</text><text x="314" y="112" font-size="18">3</text></svg>',visual_note:"图形已尽量按比例绘制，解题以题目数字为准。"},{id:"Q2",text:"cos 30° 的值是（ ）",options:{A:"1/2",B:"√3/2",C:"√2/2",D:"√3"},answer:"B",knowledge:"特别角三角函数值",difficulty:"基础",explanation:"cos30° = √3/2。",common_misconception:"混淆 sin30° 与 cos30°。",coach_tip:"特别角可以用30°-60°-90°三角形帮助记忆。",diagram_svg:"",visual_note:""},{id:"Q3",text:"tan45° + sin30° =（ ）",options:{A:"1/2",B:"1",C:"3/2",D:"2"},answer:"C",knowledge:"特别角三角函数值综合计算",difficulty:"基础",explanation:"tan45° = 1，sin30° = 1/2，所以和为 3/2。",common_misconception:"把 tan45° 误记为 √2/2。",coach_tip:"先分别写出每个特别角函数值，再进行分数运算。",diagram_svg:"",visual_note:""},{id:"Q4",text:"若锐角 A 满足 sin A = 5/13，则 cos A =（ ）",options:{A:"5/12",B:"13/12",C:"5/13",D:"12/13"},answer:"D",knowledge:"已知一个三角函数值求另一个三角函数值",difficulty:"基础",explanation:"sin A = 对边/斜边 = 5/13，可得邻边为12，所以 cos A = 12/13。",common_misconception:"没有先构造直角三角形。",coach_tip:"已知比值时，可把分子分母看成直角三角形中的边。",diagram_svg:"",visual_note:""},{id:"Q5",text:"若锐角 θ 满足 tan θ = √3，则 θ =（ ）",options:{A:"60°",B:"45°",C:"30°",D:"90°"},answer:"A",knowledge:"特别角三角函数值反推角度",difficulty:"基础",explanation:"tan60° = √3，所以 θ = 60°。",common_misconception:"把 tan30° 和 tan60° 记反。",coach_tip:"tan30°=√3/3，tan45°=1，tan60°=√3。",diagram_svg:"",visual_note:""},{id:"Q6",text:"一把长10 m的梯子靠在墙上，梯子与地面夹角为30°，则梯子顶端离地面的高度是（ ）",options:{A:"10 m",B:"5 m",C:"5√3 m",D:"10√3 m"},answer:"B",knowledge:"三角函数在高度问题中的应用",difficulty:"基础",explanation:"高度是30°的对边，h = 10sin30° = 5 m。",common_misconception:"用错 sin 与 cos。",coach_tip:"看到高度时，先判断它相对给定角是对边还是邻边。",diagram_svg:'<svg viewBox="0 0 360 230" xmlns="http://www.w3.org/2000/svg"><line x1="70" y1="180" x2="310" y2="180" stroke="#5b341e" stroke-width="4"/><line x1="310" y1="180" x2="310" y2="55" stroke="#5b341e" stroke-width="4"/><line x1="85" y1="180" x2="310" y2="55" stroke="#c65b2d" stroke-width="5"/><path d="M292 180 L292 162 L310 162" fill="none" stroke="#5b341e" stroke-width="3"/><path d="M112 180 A36 36 0 0 1 121 159" fill="none" stroke="#1f8f70" stroke-width="3"/><text x="126" y="170" font-size="17">30°</text><text x="190" y="104" font-size="18">10 m</text><text x="318" y="122" font-size="18">h</text><text x="248" y="204" font-size="16">地面</text><text x="317" y="72" font-size="16">墙</text></svg>',visual_note:"图形已尽量按比例绘制，解题以题目数字为准。"},{id:"Q7",text:"某人站在离塔底20 m处，测得塔顶的仰角为45°，则塔高是（ ）",options:{A:"10 m",B:"10√2 m",C:"20 m",D:"20√2 m"},answer:"C",knowledge:"仰角问题",difficulty:"基础",explanation:"tan45° = 塔高/20 = 1，所以塔高为20 m。",common_misconception:"没有把水平距离和高度组成直角三角形。",coach_tip:"仰角在观察点处，介于水平线和向上视线之间。",diagram_svg:'<svg viewBox="0 0 380 240" xmlns="http://www.w3.org/2000/svg"><line x1="55" y1="190" x2="325" y2="190" stroke="#5b341e" stroke-width="4"/><line x1="325" y1="190" x2="325" y2="65" stroke="#5b341e" stroke-width="6"/><line x1="70" y1="190" x2="325" y2="65" stroke="#c65b2d" stroke-width="4"/><path d="M98 190 A42 42 0 0 1 110 164" fill="none" stroke="#1f8f70" stroke-width="3"/><text x="115" y="174" font-size="18">45°</text><text x="170" y="214" font-size="18">20 m</text><text x="335" y="132" font-size="18">塔高</text><circle cx="70" cy="190" r="5" fill="#5b341e"/></svg>',visual_note:"图形已尽量按比例绘制，解题以题目数字为准。"},{id:"Q8",text:"从高18 m的楼顶观察地面上一点，俯角为30°，则该点到楼底的水平距离是（ ）",options:{A:"6√3 m",B:"9√3 m",C:"18 m",D:"18√3 m"},answer:"D",knowledge:"俯角问题",difficulty:"中等",explanation:"tan30° = 18/水平距离，所以水平距离 = 18 ÷ tan30° = 18√3 m。",common_misconception:"把俯角位置放错，导致 tan 关系写反。",coach_tip:"俯角在观察点处，从水平线向下看。",diagram_svg:'<svg viewBox="0 0 390 250" xmlns="http://www.w3.org/2000/svg"><line x1="75" y1="205" x2="340" y2="205" stroke="#5b341e" stroke-width="4"/><line x1="75" y1="205" x2="75" y2="70" stroke="#5b341e" stroke-width="6"/><line x1="75" y1="70" x2="330" y2="205" stroke="#c65b2d" stroke-width="4"/><line x1="75" y1="70" x2="225" y2="70" stroke="#888" stroke-width="3" stroke-dasharray="8 6"/><path d="M112 70 A38 38 0 0 1 109 88" fill="none" stroke="#1f8f70" stroke-width="3"/><text x="119" y="93" font-size="18">30°</text><text x="36" y="142" font-size="18">18 m</text><text x="165" y="230" font-size="18">水平距离</text><circle cx="330" cy="205" r="5" fill="#5b341e"/></svg>',visual_note:"图形已尽量按比例绘制，解题以题目数字为准。"},{id:"Q9",text:"sin²30° + cos²30° =（ ）",options:{A:"1",B:"1/2",C:"3/4",D:"2"},answer:"A",knowledge:"同角三角函数关系",difficulty:"中等",explanation:"sin²30° + cos²30° = (1/2)² + (√3/2)² = 1/4 + 3/4 = 1。",common_misconception:"只平方一个三角函数值。",coach_tip:"带平方时，要把每个三角函数值分别平方后再相加。",diagram_svg:"",visual_note:""},{id:"Q10",text:"某人沿直线向塔底走近20 m。开始时测得塔顶仰角为30°，走近后测得仰角为45°。若塔底与两次观测点在同一直线上，则塔高为（ ）",options:{A:"10 m",B:"10(√3 + 1) m",C:"20 m",D:"20(√3 − 1) m"},answer:"B",knowledge:"三角函数应用综合",difficulty:"挑战",explanation:"设走近后到塔底距离为x，则塔高为x。开始距离为x+20，且 tan30° = x/(x+20)，解得 x = 10(√3 + 1)。",common_misconception:"两次距离关系没有设清楚。",coach_tip:"综合题先设未知量，再把两次观测形成的直角三角形分开列式。",diagram_svg:"",visual_note:""}];let order=[],idx=0,score=0,answers=[],started=false,startTime=0;function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}function startQuiz(){let c=className.value.trim(),n=studentNo.value.trim(),s=studentName.value.trim();if(!c||!n||!s){alert("请填写班级、学号、姓名");return}started=true;startTime=Date.now();order=shuffle(Q);document.getElementById("start").classList.add("hidden");document.getElementById("quiz").classList.remove("hidden");render()}function render(){let q=order[idx];qCount.textContent=`第${idx+1}题/10`;scoreNow.textContent=`得分 ${score}`;bar.style.width=((idx)/Q.length*100)+"%";diffTag.textContent=q.difficulty;knowTag.textContent=q.knowledge;qText.textContent=q.text;fb.className="feedback";fb.innerHTML="";nextBtn.classList.add("hidden");nextBtn.textContent=idx===Q.length-1?"完成并提交":"下一题";diagram.innerHTML=q.diagram_svg||"";diagram.style.display=q.diagram_svg?"block":"none";diagramNote.textContent=q.visual_note||"";opts.innerHTML="";Object.keys(q.options).forEach(k=>{let b=document.createElement("button");b.className="option";b.textContent=k+". "+q.options[k];b.onclick=()=>choose(k,b);opts.appendChild(b)})}function choose(k,b){let q=order[idx];Array.from(document.querySelectorAll(".option")).forEach(x=>x.disabled=true);let ok=k===q.answer;if(ok){score++;b.classList.add("correct");fb.className="feedback ok"}else{b.classList.add("wrong");Array.from(document.querySelectorAll(".option")).forEach(x=>{if(x.textContent.startsWith(q.answer+"."))x.classList.add("correct")});fb.className="feedback bad"}let selectedText=k+". "+q.options[k],correctText=q.answer+". "+q.options[q.answer];fb.innerHTML=`<b>${ok?"答对了":"再检查一次"}</b><br>你的答案：${selectedText}<br>正确答案：${correctText}<br>解析：${q.explanation}<br>AI学习提示：${ok?"做得好，继续保持判断边与角的位置。":q.coach_tip}<br>本题知识点：${q.knowledge}`;answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});scoreNow.textContent=`得分 ${score}`;nextBtn.classList.remove("hidden")}function nextQuestion(){if(idx<Q.length-1){idx++;render()}else{finish()}}function finish(){started=false;bar.style.width="100%";let wrong=answers.filter(a=>!a.is_correct);let weak=[...new Set(wrong.map(a=>a.knowledge_tag))];let acc=Math.round(score/Q.length*100);let timeUsed=Math.round((Date.now()-startTime)/1000);let payload={action:"submit_response",...META,class_name:className.value.trim(),student_no:studentNo.value.trim(),student_name:studentName.value.trim(),seat_no:seatNo.value.trim(),score,accuracy:acc,total_questions:Q.length,time_used:timeUsed,answers_json:answers,correct_json:Q.map(q=>({question_id:q.id,correct_answer:q.answer,correct_answer_text:q.answer+". "+q.options[q.answer]})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:""};document.getElementById("quiz").classList.add("hidden");document.getElementById("done").classList.remove("hidden");summary.innerHTML=`<p><b>学校：</b>${META.school_name}<br><b>老师：</b>${META.teacher_name}<br><b>练习编号：</b>${META.practice_id}<br><b>练习名称：</b>${META.practice_name}<br><b>章节：</b>${META.chapter_name}<br><b>班级：</b>${payload.class_name}<br><b>学号：</b>${payload.student_no}<br><b>姓名：</b>${payload.student_name}<br><b>座号：</b>${payload.seat_no||"未填"}</p><div class="stats"><div class="stat"><b>${score}/${Q.length}</b><br>得分</div><div class="stat"><b>${acc}%</b><br>正确率</div><div class="stat"><b>${wrong.length}</b><br>错题数</div><div class="stat"><b>${timeUsed}秒</b><br>用时</div></div><div class="wrongList"><b>错题记录：</b><br>${wrong.length?wrong.map(w=>w.question_id+"｜"+w.knowledge_tag+"｜你的答案："+w.selected_answer_text+"｜正确答案："+w.correct_answer_text).join("<br>"):"无"}</div><p><b>薄弱知识点：</b>${weak.length?weak.join("、"):"暂未发现明显薄弱点"}<br><b>学习总结：</b>${wrong.length?"建议回看错题，重点检查边角对应关系、特别角函数值和仰角俯角建模。":"本次掌握较好，可继续做综合应用题。"}<br><b>提交状态：</b><span id="submitStatus">正在发送……</span></p>`;fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitStatus.textContent="已发送。若老师稍后未看到数据，请截图给老师。"}).catch(()=>{submitStatus.textContent="提交失败，请截图给老师。"})}window.addEventListener("beforeunload",function(e){if(started){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});</script></body></html>
