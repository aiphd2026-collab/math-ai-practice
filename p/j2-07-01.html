<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>圆与扇形基础练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}input:focus{border-color:#e69b43;box-shadow:0 0 0 4px rgba(244,155,51,.16)}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48;box-shadow:0 8px 20px rgba(31,143,112,.18)}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21;box-shadow:0 8px 20px rgba(201,83,66,.18)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#f4e7ff,#ead4ff)}.stat b{display:block;font-size:1.28rem;color:var(--brown)}.stat span{display:block;margin-top:4px;color:var(--muted);font-size:.86rem;font-weight:900}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.section h2{margin:0 0 8px;font-size:1.05rem;color:var(--brown)}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:linear-gradient(135deg,#fff6ec,#ffe8de);border:1px solid #e7c2ad;line-height:1.65}.small{font-size:.9rem;color:var(--muted);line-height:1.65}</style></head><body><main class="page"><section id="home" class="card"><div class="topband"><h1>圆与扇形基础练习</h1><div class="pill">宽柔中学古来分校｜陈天龙｜J2-07-01</div></div><p class="sub">初二下册第7章｜圆与扇形｜练习模式｜即时反馈</p><label for="className">班级</label><input id="className" autocomplete="off" placeholder="请输入班级，例如：初二仁、初三仁"><label for="studentNo">学号</label><input id="studentNo" inputmode="numeric" autocomplete="off" placeholder="请输入学号"><label for="studentName">姓名</label><input id="studentName" autocomplete="off" placeholder="请输入姓名"><label for="seatNo">座号（可选）</label><input id="seatNo" inputmode="numeric" autocomplete="off" placeholder="如老师有要求，请填写座号"><button id="startBtn">开始练习</button><p class="small">每题作答后会立即显示解析，完成后会生成适合截图给老师的学习总结。作答资料会提交给老师用于学习记录。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="progressText"></span><span id="scoreText"></span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span id="difficulty" class="tag"></span><span id="knowledge" class="tag"></span></div><p id="questionText" class="qTitle"></p><div id="diagram" class="diagram"></div><div id="diagramNote" class="diagramNote hidden"></div><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finish" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">J2-07-01｜圆与扇形基础练习</div></div><div class="stats"><div class="stat"><b id="finalScore"></b><span>得分</span></div><div class="stat"><b id="finalRate"></b><span>正确率</span></div><div class="stat"><b id="finalWrong"></b><span>错题数</span></div><div class="stat"><b id="submitState">发送中</b><span>提交状态</span></div></div><div id="studentSummary" class="section"></div><div class="section"><h2>错题记录</h2><div id="wrongList"></div></div><div class="section"><h2>薄弱知识点</h2><div id="weakList"></div></div><div class="section"><h2>学习总结</h2><p id="studyAdvice"></p></div><div class="section"><h2>提交状态</h2><p id="submitMessage">正在发送学习数据...</p></div></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:"2026",semester:"上学期",class_id:"",practice_id:"J2-07-01",practice_name:"圆与扇形基础练习",practice_round:"01",quiz_id:"J2-07-01-Q",quiz_name:"圆与扇形基础练习",chapter_name:"初二下册第7章｜圆与扇形"};const QUESTIONS=[{"id":"Q1","text":"半径为 7 cm 的圆，直径是多少？","options":{"A":"14 cm","B":"7 cm","C":"21 cm","D":"49 cm"},"answer":"A","knowledge":"半径与直径","difficulty":"基础","explanation":"直径 d=2r，所以 d=2×7=14 cm。","diagram_svg":"<svg viewBox='0 0 320 170' xmlns='http://www.w3.org/2000/svg'><circle cx='160' cy='85' r='60' fill='none' stroke='#8b5a2b' stroke-width='4'/><line x1='160' y1='85' x2='220' y2='85' stroke='#d66b2a' stroke-width='4'/><circle cx='160' cy='85' r='4' fill='#5b341e'/><text x='184' y='76' font-size='18' fill='#5b341e'>r=7 cm</text></svg>","visual_note":"图中橙色线段表示半径。","common_misconception":"把半径误当成直径。","coach_tip":"AI提示：看到半径求直径，先想直径是两个半径。"},{"id":"Q2","text":"半径为 5 cm 的圆，周长是多少？取 π=3.14。","options":{"A":"15.7 cm","B":"31.4 cm","C":"78.5 cm","D":"10 cm"},"answer":"B","knowledge":"圆的周长","difficulty":"基础","explanation":"圆周长 C=2πr=2×3.14×5=31.4 cm。","diagram_svg":"<svg viewBox='0 0 320 170' xmlns='http://www.w3.org/2000/svg'><circle cx='160' cy='85' r='55' fill='none' stroke='#8b5a2b' stroke-width='4'/><path d='M215 85 A55 55 0 1 1 214 74' fill='none' stroke='#d66b2a' stroke-width='5'/><line x1='160' y1='85' x2='215' y2='85' stroke='#6f9f78' stroke-width='4'/><text x='175' y='76' font-size='18' fill='#5b341e'>r=5 cm</text></svg>","visual_note":"橙色弧线表示要求整个圆周长。","common_misconception":"把周长公式和面积公式混淆。","coach_tip":"AI提示：求圆周一圈的长度，用 C=2πr。"},{"id":"Q3","text":"半径为 6 cm 的圆，面积是多少？取 π=3.14。","options":{"A":"37.68 cm²","B":"18.84 cm²","C":"113.04 cm²","D":"36 cm²"},"answer":"C","knowledge":"圆的面积","difficulty":"基础","explanation":"圆面积 A=πr²=3.14×6²=3.14×36=113.04 cm²。","diagram_svg":"<svg viewBox='0 0 320 170' xmlns='http://www.w3.org/2000/svg'><circle cx='160' cy='85' r='58' fill='#ffe7bd' stroke='#8b5a2b' stroke-width='4'/><line x1='160' y1='85' x2='218' y2='85' stroke='#d66b2a' stroke-width='4'/><text x='176' y='75' font-size='18' fill='#5b341e'>r=6 cm</text></svg>","visual_note":"浅黄色区域表示要求圆的面积。","common_misconception":"忘记半径要平方。","coach_tip":"AI提示：求面积时，半径要先平方，再乘 π。"},{"id":"Q4","text":"一个圆的直径是 10 cm，它的半径是多少？","options":{"A":"20 cm","B":"10 cm","C":"15 cm","D":"5 cm"},"answer":"D","knowledge":"半径与直径","difficulty":"基础","explanation":"半径 r=d÷2=10÷2=5 cm。","diagram_svg":"<svg viewBox='0 0 320 170' xmlns='http://www.w3.org/2000/svg'><circle cx='160' cy='85' r='58' fill='none' stroke='#8b5a2b' stroke-width='4'/><line x1='102' y1='85' x2='218' y2='85' stroke='#d66b2a' stroke-width='4'/><text x='126' y='72' font-size='18' fill='#5b341e'>d=10 cm</text></svg>","visual_note":"橙色线段表示直径，穿过圆心。","common_misconception":"没有把直径除以 2。","coach_tip":"AI提示：直径穿过圆心，两端在圆上；半径是直径的一半。"},{"id":"Q5","text":"半径为 8 cm、圆心角为 90° 的扇形，弧长是多少？取 π=3.14。","options":{"A":"12.56 cm","B":"25.12 cm","C":"50.24 cm","D":"6.28 cm"},"answer":"A","knowledge":"扇形弧长","difficulty":"基础","explanation":"弧长 l=90/360×2πr=1/4×2×3.14×8=12.56 cm。","diagram_svg":"<svg viewBox='0 0 320 190' xmlns='http://www.w3.org/2000/svg'><path d='M160 135 L160 55 A80 80 0 0 1 240 135 Z' fill='#ffe7bd' stroke='#8b5a2b' stroke-width='4'/><path d='M160 55 A80 80 0 0 1 240 135' fill='none' stroke='#d66b2a' stroke-width='6'/><path d='M177 135 A17 17 0 0 0 160 118' fill='none' stroke='#5b341e' stroke-width='3'/><text x='174' y='116' font-size='17' fill='#5b341e'>90°</text><text x='189' y='150' font-size='17' fill='#5b341e'>r=8 cm</text></svg>","visual_note":"橙色弧线是要求的扇形弧长。","common_misconception":"忘记乘以 90/360。","coach_tip":"AI提示：扇形弧长是圆周长的一部分，先找圆心角占 360° 的几分之几。"},{"id":"Q6","text":"半径为 10 cm、圆心角为 72° 的扇形，面积是多少？取 π=3.14。","options":{"A":"31.4 cm²","B":"62.8 cm²","C":"78.5 cm²","D":"314 cm²"},"answer":"B","knowledge":"扇形面积","difficulty":"基础","explanation":"扇形面积 S=72/360×πr²=1/5×3.14×100=62.8 cm²。","diagram_svg":"<svg viewBox='0 0 320 190' xmlns='http://www.w3.org/2000/svg'><path d='M160 135 L160 45 A90 90 0 0 1 245.6 107.2 Z' fill='#ffe7bd' stroke='#8b5a2b' stroke-width='4'/><path d='M160 45 A90 90 0 0 1 245.6 107.2' fill='none' stroke='#d66b2a' stroke-width='6'/><path d='M178 135 A18 18 0 0 0 165.6 117.9' fill='none' stroke='#5b341e' stroke-width='3'/><text x='179' y='116' font-size='17' fill='#5b341e'>72°</text><text x='184' y='151' font-size='17' fill='#5b341e'>r=10 cm</text></svg>","visual_note":"浅黄色区域表示要求的扇形面积。","common_misconception":"把弧长公式误用于面积。","coach_tip":"AI提示：题目问面积，公式里要出现 r²。"},{"id":"Q7","text":"一个圆环的外半径为 6 cm，内半径为 4 cm，圆环面积是多少？取 π=3.14。","options":{"A":"31.4 cm²","B":"62.8 cm²","C":"125.6 cm²","D":"100.48 cm²"},"answer":"B","knowledge":"圆环面积","difficulty":"中等","explanation":"圆环面积 S=π(R²-r²)=3.14×(6²-4²)=3.14×20=62.8 cm²。","diagram_svg":"<svg viewBox='0 0 320 190' xmlns='http://www.w3.org/2000/svg'><circle cx='160' cy='95' r='70' fill='#ffe7bd' stroke='#8b5a2b' stroke-width='4'/><circle cx='160' cy='95' r='46' fill='#fffdf8' stroke='#8b5a2b' stroke-width='4'/><line x1='160' y1='95' x2='230' y2='95' stroke='#d66b2a' stroke-width='4'/><line x1='160' y1='95' x2='206' y2='95' stroke='#6f9f78' stroke-width='4'/><text x='198' y='83' font-size='16' fill='#5b341e'>R=6</text><text x='168' y='117' font-size='16' fill='#5b341e'>r=4</text></svg>","visual_note":"黄色区域表示圆环面积。图形按外半径大于内半径绘制。","common_misconception":"误用外半径减内半径后再平方。","coach_tip":"AI提示：圆环面积是大圆面积减小圆面积，不是半径相减后再平方。"},{"id":"Q8","text":"一个半径为 14 cm 的圆，圆周长是多少？取 π=22/7。","options":{"A":"44 cm","B":"616 cm","C":"88 cm","D":"154 cm"},"answer":"C","knowledge":"圆的周长","difficulty":"基础","explanation":"C=2πr=2×22/7×14=88 cm。","diagram_svg":"<svg viewBox='0 0 320 170' xmlns='http://www.w3.org/2000/svg'><circle cx='160' cy='85' r='62' fill='none' stroke='#8b5a2b' stroke-width='4'/><path d='M222 85 A62 62 0 1 1 221 74' fill='none' stroke='#d66b2a' stroke-width='5'/><line x1='160' y1='85' x2='222' y2='85' stroke='#6f9f78' stroke-width='4'/><text x='176' y='75' font-size='18' fill='#5b341e'>r=14 cm</text></svg>","visual_note":"橙色表示圆周长是一整圈。","common_misconception":"只算 πr，漏乘 2。","coach_tip":"AI提示：求圆周长时，半径前面有 2。"},{"id":"Q9","text":"一个扇形的半径为 12 cm，圆心角为 60°，它的面积是多少？取 π=3.14。","options":{"A":"75.36 cm²","B":"144 cm²","C":"452.16 cm²","D":"37.68 cm²"},"answer":"A","knowledge":"扇形面积","difficulty":"中等","explanation":"S=60/360×πr²=1/6×3.14×144=75.36 cm²。","diagram_svg":"<svg viewBox='0 0 320 190' xmlns='http://www.w3.org/2000/svg'><path d='M160 140 L160 50 A90 90 0 0 1 237.9 95 Z' fill='#ffe7bd' stroke='#8b5a2b' stroke-width='4'/><path d='M160 50 A90 90 0 0 1 237.9 95' fill='none' stroke='#d66b2a' stroke-width='6'/><path d='M178 140 A18 18 0 0 0 169 124.4' fill='none' stroke='#5b341e' stroke-width='3'/><text x='180' y='122' font-size='17' fill='#5b341e'>60°</text><text x='184' y='154' font-size='17' fill='#5b341e'>r=12 cm</text></svg>","visual_note":"图形为60°扇形示意，解题以题目数字为准。","common_misconception":"把 60° 当作半圆来算。","coach_tip":"AI提示：60° 是 360° 的六分之一，所以面积也是全圆面积的六分之一。"},{"id":"Q10","text":"一个圆形花坛半径为 3 m，外面铺一圈宽 1 m 的小路，小路面积是多少？取 π=3.14。","options":{"A":"12.56 m²","B":"28.26 m²","C":"50.24 m²","D":"21.98 m²"},"answer":"D","knowledge":"圆环实际应用","difficulty":"挑战","explanation":"外半径为 3+1=4 m，小路面积=3.14×(4²-3²)=3.14×7=21.98 m²。","diagram_svg":"<svg viewBox='0 0 320 200' xmlns='http://www.w3.org/2000/svg'><circle cx='160' cy='100' r='76' fill='#ffe7bd' stroke='#8b5a2b' stroke-width='4'/><circle cx='160' cy='100' r='57' fill='#d7f1e4' stroke='#6f9f78' stroke-width='4'/><line x1='160' y1='100' x2='217' y2='100' stroke='#6f9f78' stroke-width='4'/><line x1='217' y1='100' x2='236' y2='100' stroke='#d66b2a' stroke-width='4'/><text x='171' y='88' font-size='16' fill='#5b341e'>3 m</text><text x='220' y='122' font-size='16' fill='#5b341e'>1 m</text></svg>","visual_note":"绿色为花坛，黄色圆环为小路。外半径=花坛半径+小路宽度。","common_misconception":"没有把外半径看作 4 m。","coach_tip":"AI提示：圆环应用题要先找外半径，再用大圆面积减小圆面积。"}];let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=text=>String(text??"").replace(/[&<>\"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / ${order.length}题`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent=q.difficulty||"基础";$("knowledge").textContent=q.knowledge||"知识点";$("questionText").textContent=q.text;if(q.diagram_svg){$("diagram").style.display="block";$("diagram").innerHTML=q.diagram_svg;$("diagramNote").classList.remove("hidden");$("diagramNote").textContent=q.visual_note||"图形为示意图，解题以题目数字为准。"}else{$("diagram").style.display="none";$("diagram").innerHTML="";$("diagramNote").classList.add("hidden");$("diagramNote").textContent=""}$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.textContent=`${key}. ${value}`;btn.addEventListener("click",()=>chooseAnswer(key));$("options").appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||""}`}function coachTip(q,correct){if(q.coach_tip)return q.coach_tip;if(!correct&&q.common_misconception)return `常见错因：${q.common_misconception}`;return correct?"继续保持：先找条件，再确认题目问的是哪个量。":"AI提示：先画出数量关系，再决定使用哪个公式或性质。"}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.textContent.startsWith(q.answer+"."))btn.classList.add("correct");if(btn.textContent.startsWith(selected+".")&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||""});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<b>${correct?"答对了":"还差一点"}</b><br>你的答案：${esc(selectedText)}<br>正确答案：${esc(correctText)}<br>解析：${esc(q.explanation||"")}<br><b>AI学习提示：</b>${esc(coachTip(q,correct))}<br>知识点：${esc(q.knowledge||"")}`;$("nextBtn").disabled=false;$("barFill").style.width=`${(index+1)/order.length*100}%`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`}$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else{renderFinish()}});function renderFinish(){const total=order.length,finalScore=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))],timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000));$("finalScore").textContent=finalScore+"分";$("finalRate").textContent=finalScore+"%";$("finalWrong").textContent=wrong.length+"题";$("studentSummary").innerHTML=`<h2>学生资料</h2>学校：${esc(META.school_name)}<br>老师：${esc(META.teacher_name)}<br>练习编号：${esc(META.practice_id)}<br>练习名称：${esc(META.practice_name)}<br>章节：${esc(META.chapter_name)}<br>班级：${esc($("className").value.trim())}<br>学号：${esc($("studentNo").value.trim())}<br>姓名：${esc($("studentName").value.trim())}<br>座号：${esc($("seatNo").value.trim()||"未填写")}<br>得分：${finalScore}分<br>正确率：${finalScore}%`;$("wrongList").innerHTML=wrong.length?wrong.map(a=>`<div class="wrongItem">第${a.display_order}题（原题 ${esc(a.question_id)}）｜你的答案：${esc(a.selected_answer_text||a.selected_answer)}｜正确答案：${esc(a.correct_answer_text||a.correct_answer)}<br>${esc(a.question_text)}<br>知识点：${esc(a.knowledge_tag)}</div>`).join(""):"<p>本次没有错题，保持这个节奏。</p>";$("weakList").innerHTML=weak.length?weak.map(k=>`<span class="tag">${esc(k)}</span>`).join(" "):"<p>暂无明显薄弱知识点。</p>";$("studyAdvice").textContent=weak.length?`建议先复习：${weak.join("、")}，再做同类基础题巩固。`:"本次掌握较稳定，可以继续挑战中等题。";show("finish");submitPayload(finalScore,total,timeUsed,wrong,weak)}function submitPayload(finalScore,total,timeUsed,wrong,weak){const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:finalScore,accuracy:finalScore,total_questions:total,time_used:timeUsed,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已送达";$("submitMessage").textContent="作答数据已送达。请保留本页截图，以备老师核对。"}).catch(()=>{$("submitState").textContent="失败";$("submitMessage").textContent="提交失败，请截图给老师。"})}</script></body></html>
