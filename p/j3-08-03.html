id;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d4)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe4dc,#ffc4b5)}.stat:nth-child(4){background:linear-gradient(135deg,#e8eefc,#cad7fa)}.stat b{font-size:1.35rem;color:#5b341e}.stat span{margin-top:6px;font-size:.85rem;color:#6e5844;font-weight:900}.summaryBox{background:#fff7ea;border:1px solid #ead8c1;border-radius:18px;padding:14px;line-height:1.75;margin-top:12px}.mini{font-size:.88rem;color:#7d6a58;line-height:1.65}.metaList{line-height:1.8;color:#5b341e;font-weight:900}.wrongItem{padding:10px 0;border-bottom:1px dashed #e2c8aa}</style></head><body><div class="page"><section id="start" class="card"><div class="topband"><h1>初三下册第8章《圆》线上练习（三）</h1><div class="pill">练习编号：J3-08-03</div><p class="sub">章节：初三下册第8章｜圆｜模式：练习模式｜题数：10题</p></div><div class="metaList">学校：宽柔中学古来分校<br>老师：陈天龙<br>班级：初三A</div><label>班级</label><input id="className" value="初三A" required><label>学号</label><input id="studentNo" placeholder="请输入学号" required><label>姓名</label><input id="studentName" placeholder="请输入姓名" required><label>座号（可选）</label><input id="seatNo" placeholder="可不填"><button id="startBtn">开始作答</button><p class="mini">开始后请依序完成。每题作答后会立即显示反馈。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="qMeta">第1题 / 共10题</span><span id="scoreMeta">得分 0</span></div><div class="bar"><span id="barSpan"></span></div></div><div class="tagrow"><span class="tag" id="diffTag">基础</span><span class="tag" id="knowTag">知识点</span></div><p id="qTitle" class="qTitle"></p><div id="diagram" class="diagram"></div><div id="diagramNote" class="diagramNote"></div><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" class="hidden">下一题</button></section><section id="done" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">请保留本页截图，以备老师核对</div></div><div class="stats"><div class="stat"><b id="finalScore">0/10</b><span>得分</span></div><div class="stat"><b id="finalAcc">0%</b><span>正确率</span></div><div class="stat"><b id="wrongCount">0</b><span>错题数</span></div><div class="stat"><b id="submitStatus">送达中</b><span>提交状态</span></div></div><div class="summaryBox" id="doneMeta"></div><div class="summaryBox"><b>错题记录</b><div id="wrongList"></div></div><div class="summaryBox"><b>薄弱知识点</b><div id="weakTags"></div></div><div class="summaryBox"><b>学习总结</b><div id="learnSummary"></div></div></section></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'c3a',practice_id:'J3-08-03',practice_name:'初三下册第8章《圆》线上练习（三）',practice_round:'03',quiz_id:'J3-08-03_quiz',quiz_name:'初三下册第8章《圆》线上练习（三）',chapter_name:'初三下册第8章｜圆'};const circleSvg=(inner)=>'<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg"><rect width="320" height="220" rx="16" fill="#fffaf0"/><circle cx="160" cy="110" r="75" fill="none" stroke="#63391e" stroke-width="3"/>'+inner+'</svg>';const Q=[{id:'Q1',text:'图中，圆心角 ∠AOB = 80°，点 C 在圆周上，且 ∠ACB 所对的是同一段弧 AB。求 ∠ACB。',options:{A:'40°',B:'80°',C:'100°',D:'160°'},answer:'A',knowledge:'圆心角与圆周角关系',difficulty:'基础',explanation:'同弧所对圆周角等于圆心角的一半，所以 ∠ACB = 40°。',common_misconception:'把圆周角误认为等于圆心角。',coach_tip:'先找同一段弧，再判断圆心角与圆周角的倍半关系。',diagram_svg:circleSvg('<line x1="160" y1="110" x2="105" y2="59" stroke="#63391e" stroke-width="3"/><line x1="160" y1="110" x2="215" y2="59" stroke="#63391e" stroke-width="3"/><line x1="160" y1="185" x2="105" y2="59" stroke="#2d6a8d" stroke-width="3"/><line x1="160" y1="185" x2="215" y2="59" stroke="#2d6a8d" stroke-width="3"/><path d="M143 94 Q160 82 177 94" fill="none" stroke="#d86b2f" stroke-width="3"/><text x="150" y="88" font-size="16" fill="#d86b2f">80°</text><text x="155" y="108" font-size="16">O</text><text x="92" y="54" font-size="16">A</text><text x="219" y="54" font-size="16">B</text><text x="154" y="205" font-size="16">C</text>')},{id:'Q2',text:'图中，A、B、C、D 四点在同一圆上，∠ACB = 35°。若 ∠ADB 与 ∠ACB 所对同一弧 AB，则 ∠ADB =？',options:{A:'17.5°',B:'35°',C:'70°',D:'145°'},answer:'B',knowledge:'同弧所对圆周角相等',difficulty:'基础',explanation:'同弧 AB 所对的圆周角相等，所以 ∠ADB = 35°。',common_misconception:'误用圆心角与圆周角的倍半关系。',coach_tip:'两角的顶点都在圆周上，并且看同一段弧时，两个圆周角相等。',diagram_svg:circleSvg('<line x1="87" y1="92" x2="233" y2="92" stroke="#63391e" stroke-width="3"/><line x1="160" y1="185" x2="87" y2="92" stroke="#2d6a8d" stroke-width="3"/><line x1="160" y1="185" x2="233" y2="92" stroke="#2d6a8d" stroke-width="3"/><line x1="160" y1="35" x2="87" y2="92" stroke="#7b5eb8" stroke-width="3"/><line x1="160" y1="35" x2="233" y2="92" stroke="#7b5eb8" stroke-width="3"/><text x="76" y="90" font-size="16">A</text><text x="238" y="90" font-size="16">B</text><text x="154" y="205" font-size="16">C</text><text x="154" y="30" font-size="16">D</text><text x="165" y="172" font-size="16" fill="#d86b2f">35°</text>')},{id:'Q3',text:'图中，AB 是圆 O 的直径，点 C 在圆周上。求 ∠ACB。',options:{A:'45°',B:'60°',C:'90°',D:'180°'},answer:'C',knowledge:'直径所对圆周角是直角',difficulty:'基础',explanation:'直径所对的圆周角为 90°。',common_misconception:'只把 AB 看成普通弦，忽略它是直径。',coach_tip:'看到“直径 + 圆周上一点”，优先想到直径所对圆周角是直角。',diagram_svg:circleSvg('<line x1="85" y1="110" x2="235" y2="110" stroke="#63391e" stroke-width="3"/><line x1="85" y1="110" x2="160" y2="35" stroke="#2d6a8d" stroke-width="3"/><line x1="235" y1="110" x2="160" y2="35" stroke="#2d6a8d" stroke-width="3"/><path d="M154 42 L162 50 L170 42" fill="none" stroke="#d86b2f" stroke-width="3"/><text x="78" y="130" font-size="16">A</text><text x="238" y="130" font-size="16">B</text><text x="154" y="30" font-size="16">C</text><text x="155" y="104" font-size="16">O</text>')},{id:'Q4',text:'圆 O 中，直径 OM 垂直弦 AB 于 M，AB = 12 cm。求 AM。',options:{A:'12 cm',B:'8 cm',C:'4 cm',D:'6 cm'},answer:'D',knowledge:'垂径定理',difficulty:'基础',explanation:'OM 垂直 AB，所以 M 是 AB 的中点，AM = 12 ÷ 2 = 6 cm。',common_misconception:'忘记垂直于弦的直径会平分弦。',coach_tip:'看到半径或直径垂直弦，先把整条弦平分。',diagram_svg:circleSvg('<line x1="100" y1="130" x2="220" y2="130" stroke="#63391e" stroke-width="4"/><line x1="160" y1="110" x2="160" y2="130" stroke="#2d6a8d" stroke-width="3"/><path d="M160 130 l10 0 l0 -10" fill="none" stroke="#d86b2f" stroke-width="3"/><text x="94" y="150" font-size="16">A</text><text x="224" y="150" font-size="16">B</text><text x="166" y="126" font-size="16">M</text><text x="155" y="104" font-size="16">O</text><text x="137" y="155" font-size="16" fill="#d86b2f">12 cm</text>')},{id:'Q5',text:'圆 O 半径为 10 cm，弦 AB = 16 cm，OM 垂直 AB 于 M。求 OM。',options:{A:'6 cm',B:'8 cm',C:'10 cm',D:'12 cm'},answer:'A',knowledge:'垂径定理、毕氏定理',difficulty:'基础',explanation:'AM = 8 cm，OA = 10 cm，所以 OM = √(10²−8²)=6 cm。',common_misconception:'把整条弦 16 cm 当作直角边。',coach_tip:'先由垂径定理得半弦，再在直角三角形 OMA 中用毕氏定理。',diagram_svg:circleSvg('<line x1="80" y1="140" x2="240" y2="140" stroke="#63391e" stroke-width="4"/><line x1="160" y1="110" x2="160" y2="140" stroke="#2d6a8d" stroke-width="3"/><line x1="160" y1="110" x2="80" y2="140" stroke="#2d6a8d" stroke-width="3"/><path d="M160 140 l10 0 l0 -10" fill="none" stroke="#d86b2f" stroke-width="3"/><text x="72" y="160" font-size="16">A</text><text x="244" y="160" font-size="16">B</text><text x="166" y="137" font-size="16">M</text><text x="154" y="104" font-size="16">O</text><text x="96" y="120" font-size="16" fill="#d86b2f">10 cm</text><text x="136" y="165" font-size="16" fill="#d86b2f">16 cm</text>')},{id:'Q6',text:'四边形 ABCD 内接于圆，若 ∠A = 110°，求 ∠C。',options:{A:'110°',B:'70°',C:'90°',D:'55°'},answer:'B',knowledge:'圆内接四边形对角互补',difficulty:'基础',explanation:'圆内接四边形对角和为 180°，所以 ∠C = 180°−110°=70°。',common_misconception:'误认为圆内接四边形的对角相等。',coach_tip:'内接四边形看对角：不是相等，而是互补。',diagram_svg:circleSvg('<polygon points="95,75 220,65 235,145 110,170" fill="none" stroke="#2d6a8d" stroke-width="3"/><text x="84" y="74" font-size="16">A</text><text x="224" y="65" font-size="16">B</text><text x="240" y="150" font-size="16">C</text><text x="99" y="188" font-size="16">D</text><text x="116" y="90" font-size="16" fill="#d86b2f">110°</text><text x="204" y="142" font-size="16" fill="#d86b2f">?</text>')},{id:'Q7',text:'直线 l 与圆 O 相切于点 A，OA 为半径。求 ∠OAl。',options:{A:'45°',B:'60°',C:'90°',D:'120°'},answer:'C',knowledge:'切线性质',difficulty:'基础',explanation:'圆的切线垂直于过切点的半径，所以 ∠OAl = 90°。',common_misconception:'把切线看成普通直线，忽略半径垂直切线。',coach_tip:'切点处的半径与切线一定互相垂直。',diagram_svg:'<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg"><rect width="320" height="220" rx="16" fill="#fffaf0"/><circle cx="140" cy="110" r="65" fill="none" stroke="#63391e" stroke-width="3"/><line x1="205" y1="35" x2="205" y2="185" stroke="#2d6a8d" stroke-width="4"/><line x1="140" y1="110" x2="205" y2="110" stroke="#63391e" stroke-width="3"/><path d="M205 110 l-10 0 l0 -10" fill="none" stroke="#d86b2f" stroke-width="3"/><text x="134" y="105" font-size="16">O</text><text x="210" y="114" font-size="16">A</text><text x="214" y="45" font-size="16">l</text></svg>'},{id:'Q8',text:'直线 PT 是圆 O 在点 A 处的切线，AB 是弦。若弦 AB 所对的圆周角 ∠ACB = 50°，求弦切角 ∠TAB。',options:{A:'25°',B:'40°',C:'100°',D:'50°'},answer:'D',knowledge:'弦切角定理',difficulty:'中等',explanation:'弦切角等于它所夹弧在圆周上所对的圆周角，所以 ∠TAB = 50°。',common_misconception:'把弦切角误认为圆周角的一半。',coach_tip:'弦切角要找“切线 + 弦”，再找同弧上的圆周角。',diagram_svg:circleSvg('<line x1="235" y1="35" x2="235" y2="185" stroke="#2d6a8d" stroke-width="4"/><line x1="235" y1="110" x2="115" y2="70" stroke="#63391e" stroke-width="3"/><line x1="115" y1="70" x2="160" y2="185" stroke="#7b5eb8" stroke-width="3"/><line x1="235" y1="110" x2="160" y2="185" stroke="#7b5eb8" stroke-width="3"/><text x="240" y="115" font-size="16">A</text><text x="104" y="68" font-size="16">B</text><text x="154" y="205" font-size="16">C</text><text x="240" y="45" font-size="16">T</text><text x="168" y="174" font-size="16" fill="#d86b2f">50°</text>')},{id:'Q9',text:'圆中，∠AOB = 120°，点 C 在优弧 AB 上，∠ACB 对的是劣弧 AB。求 ∠ACB。',options:{A:'30°',B:'45°',C:'60°',D:'120°'},answer:'C',knowledge:'圆心角与圆周角关系',difficulty:'中等',explanation:'圆周角等于同弧所对圆心角的一半，所以 ∠ACB = 120° ÷ 2 = 60°。',common_misconception:'没有判断圆周角所对的是哪一段弧。',coach_tip:'先确认圆周角开口夹住的弧，再套用倍半关系。',diagram_svg:circleSvg('<line x1="160" y1="110" x2="95" y2="148" stroke="#63391e" stroke-width="3"/><line x1="160" y1="110" x2="225" y2="148" stroke="#63391e" stroke-width="3"/><line x1="160" y1="35" x2="95" y2="148" stroke="#2d6a8d" stroke-width="3"/><line x1="160" y1="35" x2="225" y2="148" stroke="#2d6a8d" stroke-width="3"/><path d="M139 123 Q160 145 181 123" fill="none" stroke="#d86b2f" stroke-width="3"/><text x="143" y="151" font-size="16" fill="#d86b2f">120°</text><text x="90" y="165" font-size="16">A</text><text x="229" y="165" font-size="16">B</text><text x="154" y="30" font-size="16">C</text><text x="155" y="105" font-size="16">O</text>')},{id:'Q10',text:'在圆 O 中，OA 是半径，点 A 在圆上。直线 l 经过 A，若 ∠OAl = 90°，则直线 l 与圆 O 的关系是？',options:{A:'割线',B:'弦',C:'直径',D:'切线'},answer:'D',knowledge:'切线判定',difficulty:'挑战',explanation:'经过半径外端且垂直于该半径的直线是圆的切线。',common_misconception:'只记得切线性质，不会反向用来判断切线。',coach_tip:'判定切线时，抓住“过半径外端 + 垂直半径”两个条件。',diagram_svg:'<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg"><rect width="320" height="220" rx="16" fill="#fffaf0"/><circle cx="140" cy="110" r="65" fill="none" stroke="#63391e" stroke-width="3"/><line x1="205" y1="40" x2="205" y2="180" stroke="#2d6a8d" stroke-width="4"/><line x1="140" y1="110" x2="205" y2="110" stroke="#63391e" stroke-width="3"/><path d="M205 110 l-10 0 l0 -10" fill="none" stroke="#d86b2f" stroke-width="3"/><text x="134" y="105" font-size="16">O</text><text x="210" y="114" font-size="16">A</text><text x="214" y_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});let fb=$('feedback');fb.className='feedback '+(ok?'ok':'bad');fb.innerHTML='<b>'+(ok?'答对了':'需要订正')+'</b><br>你的答案：'+k+'. '+q.options[k]+'<br>正确答案：'+q.answer+'. '+q.options[q.answer]+'<br>解析：'+q.explanation+'<br>AI学习提示：'+q.coach_tip+'<br>本题知识点：'+q.knowledge;$('nextBtn').classList.remove('hidden')}$('nextBtn').onclick=()=>{if(idx<order.length-1){idx++;render()}else finish()};function finish(){done=true;started=false;$('quiz').classList.add('hidden');$('done').classList.remove('hidden');let wrong=answers.filter(a=>!a.is_correct);let acc=Math.round(score/Q.length*100);$('finalScore').textContent=score+'/'+Q.length;$('finalAcc').textContent=acc+'%';$('wrongCount').textContent=wrong.length;$('doneMeta').innerHTML='学校：'+META.school_name+'<br>老师：'+META.teacher_name+'<br>练习编号：'+META.practice_id+'<br>练习名称：'+META.practice_name+'<br>章节：'+META.chapter_name+'<br>班级：'+student.class_name+'<br>学号：'+student.student_no+'<br>姓名：'+student.student_name+'<br>座号：'+(student.seat_no||'未填')+'<br>得分：'+score+'/'+Q.length+'<br>正确率：'+acc+'%';$('wrongList').innerHTML=wrong.length?wrong.map(w=>'<div class="wrongItem">第'+w.display_order+'题：你的答案 '+w.selected_answer_text+'；正确答案 '+w.correct_answer_text+'<br>知识点：'+w.knowledge_tag+'</div>').join(''):'本次没有错题。';let weak=[...new Set(wrong.map(w=>w.knowledge_tag))];$('weakTags').textContent=weak.length?weak.join('、'):'暂无明显薄弱知识点。';$('learnSummary').textContent=acc>=80?'整体掌握较好，继续注意圆中角度关系与切线条件。':acc>=60?'基础已有一定掌握，建议重点复习错题涉及的圆周角、垂径定理或切线关系。':'建议先回顾本章核心性质，再按错题知识点逐题订正。';submit(wrong,acc)}function submit(wrong,acc){let payload={action:'submit_response',school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.cl
