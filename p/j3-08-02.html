<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>圆线上练习02</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#fff7e8,#ffe1c2,#f8d0a1);color:#2c2118}.page{max-width:760px;margin:0 auto;padding:16px 10px 30px}.card{margin-bottom:18px;border-radius:28px;background:rgba(255,253,248,.94);box-shadow:0 18px 46px rgba(111,62,22,.15);overflow:hidden}.top{padding:28px 16px;text-align:center;background:linear-gradient(135deg,#fff0d8,#ffe2ae 48%,#dff4ff)}h1{margin:0;color:#17406f}.pill{display:inline-block;margin-top:12px;padding:10px 16px;border-radius:999px;background:#fff8;color:#6e401e;font-weight:900}.body{padding:17px 16px 20px}input{width:100%;min-height:52px;margin:8px 0 14px;border:2px solid #ead7bf;border-radius:18px;padding:0 15px;font-size:1rem}button{width:100%;min-height:54px;margin-top:14px;border:0;border-radius:18px;color:#fff;font-size:1rem;font-weight:900;background:linear-gradient(135deg,#f5aa41,#e8782c 60%,#b45825)}.hidden{display:none}.tag{display:inline-block;margin:4px 6px 10px 0;padding:7px 10px;border-radius:999px;font-size:.82rem;font-weight:900;background:#fff0c9;color:#6d4b13}.tag.blue{background:#e5f4ff;color:#24567c}.q{font-size:1.12rem;line-height:1.55;font-weight:900;margin:8px 0 12px}.diagram{margin:12px 0 16px;padding:12px;border-radius:18px;background:#fff8ed;border:1px solid #ead2b7;text-align:center}.diagram svg{max-width:100%;height:auto}.option{margin:10px 0;padding:14px;border:2px solid #eddac1;border-radius:18px;background:#fffefa;text-align:left;color:#2c2118}.correct{border-color:#2e9b74;background:#dff8ea}.wrong{border-color:#df6657;background:#ffe5df}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.75;background:#fff3ef}.feedback.show{display:block}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{padding:16px;border-radius:22px;text-align:center;background:#fff4cf}.stat b{display:block;font-size:1.6rem}.small{color:#7b6756;line-height:1.6}</style></head><body><main class="page"><section id="home" class="card"><div class="top"><h1>圆</h1><div class="pill">线上练习｜J3-08-02｜初三忠｜共10题</div></div><div class="body"><label>班级</label><input id="className" value="初三忠"><label>学号</label><input id="studentNo"><label>姓名</label><input id="studentName"><label>座号（可不填）</label><input id="seatNo"><button id="startBtn">开始练习</button></div></section><section id="quiz" class="card hidden"><div class="body"><div><span class="tag" id="progress"></span><span class="tag blue" id="knowledge"></span></div><div class="q" id="qtext"></div><div class="diagram hidden" id="diagram"></div><div id="options"></div><div class="feedback" id="feedback"></div><button id="nextBtn" disabled>下一题</button></div></section><section id="finish" class="card hidden"><div class="top"><h1>练习完成</h1><div class="pill">J3-08-02｜圆线上练习02</div></div><div class="body"><div class="stats"><div class="stat"><b id="finalScore"></b><span>答对题数</span></div><div class="stat"><b id="finalRate"></b><span>正确率</span></div><div class="stat"><b id="wrongCount"></b><span>错题数</span></div><div class="stat"><b id="submitState">送达中…</b><span>提交状态</span></div></div><div id="wrongBox" class="small"></div></div></section></main><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={school_id:'kds',school_name:'关丹德信中学',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:'2026',semester:'上学期',class_id:'c_初三忠',class_name:'初三忠',practice_id:'J3-08-02',practice_name:'初三忠｜圆练习02',practice_round:'02',quiz_id:'quiz-J3-08-02',quiz_name:'圆线上练习02',chapter_name:'圆'};const svg1='<svg viewBox="0 0 260 180"><circle cx="130" cy="92" r="70" fill="none" stroke="#17406f" stroke-width="3"/><circle cx="130" cy="92" r="3" fill="#17406f"/><path d="M130 92 L190 56 M130 92 L70 56 M70 56 L130 154 L190 56" fill="none" stroke="#e8782c" stroke-width="3"/><text x="134" y="90">O</text><text x="194" y="55">A</text><text x="58" y="55">B</text><text x="130" y="170">C</text><text x="115" y="52">120°</text></svg>';const svg2='<svg viewBox="0 0 260 180"><circle cx="130" cy="90" r="70" fill="none" stroke="#17406f" stroke-width="3"/><line x1="130" y1="20" x2="130" y2="160" stroke="#17406f" stroke-width="3"/><line x1="65" y1="110" x2="195" y2="110" stroke="#e8782c" stroke-width="3"/><line x1="130" y1="104" x2="136" y2="104" stroke="#333"/><line x1="136" y1="104" x2="136" y2="110" stroke="#333"/><text x="122" y="18">A</text><text x="122" y="174">B</text><text x="52" y="114">C</text><text x="202" y="114">D</text><text x="136" y="126">E</text><text x="104" y="102">CD=20cm</text></svg>';const svg4='<svg viewBox="0 0 260 180"><circle cx="130" cy="90" r="70" fill="none" stroke="#17406f" stroke-width="3"/><path d="M85 38 L195 78 L170 145 L65 115 Z" fill="none" stroke="#e8782c" stroke-width="3"/><text x="72" y="34">A</text><text x="203" y="80">B</text><text x="176" y="158">C</text><text x="50" y="120">D</text><text x="90" y="62">68°</text><text x="122" y="92">O</text></svg>';const svg6='<svg viewBox="0 0 260 180"><circle cx="130" cy="90" r="60" fill="none" stroke="#17406f" stroke-width="3"/><line x1="190" y1="30" x2="190" y2="150" stroke="#e8782c" stroke-width="3"/><line x1="130" y1="90" x2="190" y2="90" stroke="#17406f" stroke-width="3"/><line x1="184" y1="90" x2="184" y2="96" stroke="#333"/><line x1="184" y1="96" x2="190" y2="96" stroke="#333"/><text x="120" y="88">O</text><text x="196" y="92">T</text><text x="198" y="48">切线</text></svg>';const svg8='<svg viewBox="0 0 260 180"><circle cx="130" cy="90" r="70" fill="none" stroke="#17406f" stroke-width="3"/><line x1="70" y1="126" x2="190" y2="126" stroke="#e8782c" stroke-width="3"/><line x1="130" y1="90" x2="130" y2="126" stroke="#17406f" stroke-width="3"/><line x1="130" y1="90" x2="190" y2="126" stroke="#17406f" stroke-width="3"/><line x1="130" y1="120" x2="136" y2="120" stroke="#333"/><line x1="136" y1="120" x2="136" y2="126" stroke="#333"/><text x="122" y="86">O</text><text x="58" y="130">A</text><text x="198" y="130">B</text><text x="136" y="113">5</text><text x="158" y="100">13</text></svg>';const svg10='<svg viewBox="0 0 280 190"><circle cx="120" cy="95" r="55" fill="none" stroke="#17406f" stroke-width="3"/><circle cx="120" cy="95" r="3" fill="#17406f"/><line x1="220" y1="95" x2="152" y2="50" stroke="#e8782c" stroke-width="3"/><line x1="220" y1="95" x2="152" y2="140" stroke="#e8782c" stroke-width="3"/><line x1="120" y1="95" x2="152" y2="50" stroke="#17406f" stroke-width="3"/><line x1="120" y1="95" x2="152" y2="140" stroke="#17406f" stroke-width="3"/><text x="112" y="92">O</text><text x="224" y="99">P</text><text x="154" y="44">A</text><text x="154" y="154">B</text><text x="124" y="72">130°</text></svg>';const Q=[{id:1,d:'易',k:'圆心角与圆周角',t:'同弧所对的圆心角为 120°，则同弧所对的圆周角为：',o:{A:'60°',B:'90°',C:'120°',D:'30°'},a:'A',e:'同弧所对的圆周角等于圆心角的一半，所以为60°。',m:'把圆周角误认为等于圆心角。',svg:svg1},{id:2,d:'易',k:'垂径定理',t:'直径 AB 垂直弦 CD 于 E，若 CD=20 cm，则 CE 为：',o:{A:'20 cm',B:'12 cm',C:'5 cm',D:'10 cm'},a:'D',e:'垂直于弦的直径平分弦，所以CE=20÷2=10cm。',m:'忘记垂径定理中的平分弦。',svg:svg2},{id:3,d:'易',k:'切线概念',t:'与圆只有一个公共点的直线称为：',o:{A:'割线',B:'切线',C:'弦',D:'直径'},a:'B',e:'与圆只有一个公共点的直线是切线。',m:'混淆切线与割线。'},{id:4,d:'易',k:'圆内接四边形',t:'圆内接四边形 ABCD 中，∠A=68°，则∠C 为：',o:{A:'68°',B:'90°',C:'112°',D:'122°'},a:'C',e:'圆内接四边形对角互补，∠C=180°−68°=112°。',m:'误认为对角相等。',svg:svg4},{id:5,d:'易',k:'等弧所对圆周角',t:'等弧所对的圆周角：',o:{A:'相等',B:'互补',C:'互余',D:'无法判断'},a:'A',e:'等弧所对的圆周角相等。',m:'把等弧关系与圆内接四边形对角互补混淆。'},{id:6,d:'易',k:'切线判定',t:'半径垂直于过圆上一点的直线，则该直线是圆的：',o:{A:'割线',B:'弦',C:'切线',D:'直径'},a:'C',e:'经过半径外端且垂直于半径的直线是切线。',m:'忽略“过圆上一点”。',svg:svg6},{id:7,d:'易',k:'弧与圆周角',t:'若圆周角为 35°，则它所对的弧为：',o:{A:'35°',B:'105°',C:'17.5°',D:'70°'},a:'D',e:'圆周角等于所对弧度数的一半，所以弧为70°。',m:'把弧度数除以2。'},{id:8,d:'中',k:'垂径定理与毕氏定理',t:'圆半径为 13 cm，圆心到弦 AB 的距离为 5 cm，则弦 AB 长为：',o:{A:'10 cm',B:'24 cm',C:'12 cm',D:'26 cm'},a:'B',e:'半弦=√(13²−5²)=12，所以弦长=24cm。',m:'只求出半弦，忘记乘2。',svg:svg8},{id:9,d:'中',k:'圆内接四边形应用',t:'圆内接四边形 ABCD 中，∠A=3∠C，求∠C。',o:{A:'30°',B:'60°',C:'45°',D:'90°'},a:'C',e:'对角互补，3∠C+∠C=180°，所以∠C=45°。',m:'没有使用对角互补建立方程。'},{id:10,d:'难',k:'两切线与圆心角',t:'PA、PB 为圆 O 的两条切线，A、B 为切点。若∠AOB=130°，则∠APB 为：',o:{A:'130°',B:'65°',C:'40°',D:'50°'},a:'D',e:'OA⊥PA，OB⊥PB，四边形AOBP内角和360°，∠APB=360°−90°−90°−130°=50°。',m:'误用圆周角定理或忘记两个直角。',svg:svg10}];let order=[],idx=0,score=0,answers=[],start=0,submitted=false;const $=id=>document.getElementById(id);function show(id){['home','quiz','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden')}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}startBtn.onclick=()=>{if(!className.value.trim()||!studentNo.value.trim()||!studentName.value.trim()){alert('请填写班级、学号、姓名');return}order=shuffle(Q);idx=0;score=0;answers=[];start=Date.now();submitted=false;show('quiz');render()};function render(){let q=order[idx];progress.textContent=`第${idx+1}题 / 共${order.length}题｜${q.d}`;knowledge.textContent='知识点：'+q.k;qtext.textContent=q.t;if(q.svg){diagram.classList.remove('hidden');diagram.innerHTML=q.svg}else{diagram.classList.add('hidden');diagram.innerHTML=''}options.innerHTML='';feedback.className='feedback';feedback.innerHTML='';nextBtn.disabled=true;nextBtn.textContent=idx===order.length-1?'完成并提交':'下一题';Object.entries(q.o).forEach(([k,v])=>{let b=document.createElement('button');b.className='option';b.dataset.key=k;b.textContent=`${k}. ${v}`;options.appendChild(b)})}options.onclick=e=>{let b=e.target.closest('.option');if(!b||b.disabled)return;let q=order[idx],sel=b.dataset.key,ok=sel===q.a;if(ok)score++;document.querySelectorAll('.option').forEach(x=>{x.disabled=true;if(x.dataset.key===q.a)x.classList.add('correct');if(x.dataset.key===sel&&!ok)x.classList.add('wrong')});answers.push({question_id:q.id,display_order:idx+1,question_text:q.t,selected_answer:sel,selected_answer_text:sel+'. '+q.o[sel],correct_answer:q.a,correct_answer_text:q.a+'. '+q.o[q.a],is_correct:ok,knowledge_tag:q.k,difficulty:q.d,explanation:q.e,common_misconception:q.m});feedback.className='feedback show';feedback.innerHTML=`<b>${ok?'答对了':'还差一点'}</b><br>你的答案：${esc(sel+'. '+q.o[sel])}<br>正确答案：${esc(q.a+'. '+q.o[q.a])}<br>解析：${esc(q.e)}<br>改正建议：${esc(q.m)}`;nextBtn.disabled=false};nextBtn.onclick=()=>{if(idx<order.length-1){idx++;render()}else finish()};function finish(){let total=order.length,rate=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct);finalScore.textContent=score+'/'+total;finalRate.textContent=rate+'%';wrongCount.textContent=wrong.length+'题';wrongBox.innerHTML='<h2>错题分析</h2>'+(wrong.length?wrong.map(a=>`<p><b>第${a.display_order}题｜${esc(a.knowledge_tag)}</b><br>你的答案：${esc(a.selected_answer_text)}<br>正确答案：${esc(a.correct_answer_text)}<br>解析：${esc(a.explanation)}<br>改正建议：${esc(a.common_misconception)}</p>`).join(''):'<p>本次没有错题。</p>');show('finish');submit(rate,total,wrong)}function submit(rate,total,wrong){let payload={action:'submit_response',school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:className.value.trim(),student_no:studentNo.value.trim(),payload_student_no:studentNo.value.trim(),student_name:studentName.value.trim(),seat_no:seatNo.value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:rate,accuracy:rate,total_questions:total,payload_accuracy:rate,payload_total_questions:total,time_used:Math.round((Date.now()-start)/1000),started_at:new Date(start).toISOString(),completed_at:new Date().toISOString(),answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:[...new Set(wrong.map(a=>a.knowledge_tag))],abnormal_flag:'none'};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{submitted=true;submitState.textContent='已送达'}).catch(()=>{submitState.textContent='提交失败'})}</script></body></html>
