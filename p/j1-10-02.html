<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>初二忠｜一元一次方程式练习02</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}input:focus{border-color:#e69b43;box-shadow:0 0 0 4px rgba(244,155,51,.16)}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48;box-shadow:0 8px 20px rgba(31,143,112,.18)}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21;box-shadow:0 8px 20px rgba(201,83,66,.18)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#f4e7ff,#ead4ff)}.stat b{display:block;font-size:1.34rem;color:var(--brown);line-height:1.2;word-break:keep-all}.stat span{display:block;margin-top:8px;color:var(--muted);font-size:.9rem;font-weight:900;line-height:1.2}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.section h2{margin:0 0 8px;font-size:1.05rem;color:var(--brown)}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:linear-gradient(135deg,#fff6ec,#ffe8de);border:1px solid #e7c2ad;line-height:1.65}.small{font-size:.9rem;color:var(--muted);line-height:1.65}.infoGrid{display:grid;grid-template-columns:92px 1fr;gap:8px 12px;line-height:1.65;font-size:.96rem}.label{color:var(--muted);font-weight:900}.value{font-weight:700}.timeGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}.timeBox{background:linear-gradient(135deg,#fff8ee,#fff1dc);border:1px solid #ead6bc;border-radius:16px;padding:12px;line-height:1.45}.timeBox .label{display:block;font-size:.86rem}.timeBox .value{display:block;margin-top:5px;color:#4d2d1b}.wrongHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:6px;font-weight:900;color:var(--brown)}.line{margin:5px 0}.line b{color:#4c2e1c}.analysisBox{background:linear-gradient(135deg,#eef9f3,#e3f6ff);border:1px solid #c9e6d8;border-radius:18px;padding:14px;line-height:1.75}.submitNotice{background:linear-gradient(135deg,#e5f8ed,#d5f1ff);border-left:6px solid #2e9b74;border-radius:18px;padding:15px;line-height:1.75;font-weight:700}.okText{color:#2e9b74!important;font-weight:900}@media(max-width:520px){.timeGrid{grid-template-columns:1fr 1fr}.infoGrid{grid-template-columns:78px 1fr}}</style></head><body><main class="page"><section id="home" class="card"><div class="topband"><h1>初二忠｜一元一次方程式练习02</h1><div class="pill">关丹德信中学｜陈天龙｜J1-10-02</div></div><p class="sub">一元一次方程式｜练习模式｜即时反馈</p><label for="className">班级</label><input id="className" autocomplete="off" placeholder="请输入班级，例如：初二忠"><label for="studentNo">学号</label><input id="studentNo" inputmode="numeric" autocomplete="off" placeholder="请输入学号"><label for="studentName">姓名</label><input id="studentName" autocomplete="off" placeholder="请输入姓名"><label for="seatNo">座号（可选）</label><input id="seatNo" inputmode="numeric" autocomplete="off" placeholder="如老师有要求，请填写座号"><button id="startBtn">开始练习</button><p class="small">每题作答后会立即显示解析，完成后会生成适合截图给老师的学习总结。作答资料会提交给老师用于学习记录。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="progressText"></span><span id="scoreText"></span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span id="difficulty" class="tag"></span><span id="knowledge" class="tag"></span></div><p id="questionText" class="qTitle"></p><div id="diagram" class="diagram"></div><div id="diagramNote" class="diagramNote hidden"></div><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finish" class="hidden"><section class="card"><div class="topband"><h1>练习完成</h1><div class="pill">J1-10-02｜初二忠｜一元一次方程式练习02</div></div><div class="stats"><div class="stat"><b id="finalScore"></b><span>得分</span></div><div class="stat"><b id="finalRate"></b><span>正确率</span></div><div class="stat"><b id="finalWrong"></b><span>错题数</span></div><div class="stat"><b id="submitState"></b><span>提交状态</span></div></div></section><section class="card"><h2>作答资讯</h2><div class="infoGrid"><div class="label">学校</div><div class="value" id="infoSchool"></div><div class="label">老师</div><div class="value" id="infoTeacher"></div><div class="label">班级</div><div class="value" id="infoClass"></div><div class="label">姓名</div><div class="value" id="infoStudent"></div><div class="label">座号</div><div class="value" id="infoSeat"></div><div class="label">章节</div><div class="value" id="infoChapter"></div></div><div class="timeGrid"><div class="timeBox"><span class="label">开始时间</span><span class="value" id="startedAtDisplay"></span></div><div class="timeBox"><span class="label">完成时间</span><span class="value" id="completedAtDisplay"></span></div><div class="timeBox"><span class="label">总用时</span><span class="value" id="timeUsedDisplay"></span></div><div class="timeBox"><span class="label">平均每题</span><span class="value" id="avgTimeDisplay"></span></div></div></section><section class="card"><h2>详细错题分析</h2><div id="wrongAnalysis"></div></section><section class="card"><h2>整体学习分析</h2><div class="analysisBox" id="overallAnalysis"></div></section><section class="submitNotice" id="submitNotice"><div>提交状态：送达中…</div></section></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"chu_er_zhong",practice_id:"J1-10-02",practice_name:"初二忠｜一元一次方程式练习02",practice_round:"02",quiz_id:"quiz-J1-10-02",quiz_name:"一元一次方程式线上练习02",chapter_name:"一元一次方程式"};const QUESTIONS=[{"id":"q1","text":"解方程：x + 7 = 15","options":{"A":"8","B":"9","C":"22","D":"-8"},"answer":"A","knowledge":"移项","difficulty":"易","explanation":"x+7=15，两边同时减7，得 x=8。","common_misconception":"移项后符号处理错误。","coach_tip":"把加7移到右边要变成减7。"},{"id":"q2","text":"解方程：3x = 24","options":{"A":"6","B":"8","C":"21","D":"72"},"answer":"B","knowledge":"等式性质","difficulty":"易","explanation":"3x=24，两边同时除以3，得 x=8。","common_misconception":"把除以3误算成减3。","coach_tip":"未知数前有系数，最后一步通常是除以系数。"},{"id":"q3","text":"解方程：x - 5 = 12","options":{"A":"7","B":"-7","C":"17","D":"60"},"answer":"C","knowledge":"移项","difficulty":"易","explanation":"x-5=12，两边同时加5，得 x=17。","common_misconception":"把“-5”移项后仍写成“-5”。","coach_tip":"减5移到另一边要变成加5。"},{"id":"q4","text":"解方程：2x + 1 = 9","options":{"A":"3","B":"5","C":"8","D":"4"},"answer":"D","knowledge":"两步方程","difficulty":"易","explanation":"2x+1=9，先两边减1得2x=8，再除以2得x=4。","common_misconception":"先除以2，忽略先减1。","coach_tip":"先处理常数项，再处理未知数前的系数。"},{"id":"q5","text":"解方程：5x - 6 = 19","options":{"A":"5","B":"4","C":"13","D":"25"},"answer":"A","knowledge":"两步方程","difficulty":"易","explanation":"5x-6=19，两边加6得5x=25，再除以5得x=5。","common_misconception":"移项后加减号错误。","coach_tip":"看到减6，先把它移到右边变加6。"},{"id":"q6","text":"解方程：4(x - 2)=20","options":{"A":"3","B":"7","C":"6","D":"5"},"answer":"B","knowledge":"去括号","difficulty":"易","explanation":"4(x-2)=20，可先两边除以4得x-2=5，再加2得x=7。","common_misconception":"括号内每一项没有同时乘4。","coach_tip":"这题也可先除以4，减少去括号错误。"},{"id":"q7","text":"解方程：x/3 + 2 = 6","options":{"A":"8","B":"4","C":"12","D":"18"},"answer":"C","knowledge":"去分母","difficulty":"易","explanation":"x/3+2=6，先两边减2得x/3=4，再两边乘3得x=12。","common_misconception":"等式两边没有同时乘3。","coach_tip":"先把常数项移开，再处理分母。"},{"id":"q8","text":"小明买了3本同价笔记本和一支RM2的笔，共用RM17。每本笔记本多少元？","options":{"A":"RM3","B":"RM4","C":"RM6","D":"RM5"},"answer":"D","knowledge":"列一元一次方程","difficulty":"中","explanation":"设每本笔记本x元，3x+2=17，3x=15，所以x=5。","common_misconception":"把总价17直接除以3，忽略RM2。","coach_tip":"先设未知数，再把总价拆成笔记本费用和笔的费用。"},{"id":"q9","text":"一个数的2倍减去5，等于这个数加7。这个数是多少？","options":{"A":"10","B":"11","C":"12","D":"13"},"answer":"C","knowledge":"两边含未知数","difficulty":"中","explanation":"设这个数为x，2x-5=x+7。移项得2x-x=7+5，所以x=12。","common_misconception":"未知数项移项时忘记变号。","coach_tip":"未知数放一边，常数放另一边，每次移项都要变号。"},{"id":"q10","text":"某班购买练习本，若每人发3本，还剩8本；若每人发4本，则少12本。这个班有多少人？","options":{"A":"20","B":"18","C":"24","D":"16"},"answer":"A","knowledge":"隐含等量关系建模","difficulty":"难","explanation":"设有x人。练习本总数相同：3x+8=4x-12，移项得20=x，所以有20人。","common_misconception":"不清楚“总本数相同”，列成两个无关算式。","coach_tip":"难点是找共同量：两种发法对应的是同一批练习本总数。"}];let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=text=>String(text??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / ${order.length}题`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent="难度："+(q.difficulty||"基础");$("knowledge").textContent="知识点："+(q.knowledge||"知识点");$("questionText").textContent=q.text;$("diagram").style.display="none";$("diagram").innerHTML="";$("diagramNote").classList.add("hidden");$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.dataset.option=key;btn.textContent=`${key}. ${value}`;btn.addEventListener("click",()=>chooseAnswer(key));$("options").appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||""}`}function coachTip(q,correct){if(q.coach_tip)return q.coach_tip;if(correct)return "继续保持：先找条件，再确认题目问的是哪个量。";return q.common_misconception||"先找等量关系，再列方程。"}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.dataset.option===q.answer)btn.classList.add("correct");if(btn.dataset.option===selected&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||"",explanation:q.explanation||"",common_misconception:q.common_misconception||"",coach_tip:coachTip(q,correct)});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<b>${correct?"答对了。":"这题需要再看一次。"}</b><br>你的答案：${esc(selectedText)}<br>正确答案：${esc(correctText)}<br>解析：${esc(q.explanation)}<br>AI学习提示：${esc(coachTip(q,correct))}<br>知识点：${esc(q.knowledge)}`;$("nextBtn").disabled=false;$("barFill").style.width=`${(index+1)/order.length*100}%`}$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else{renderFinish()}});function formatDateTime(ms){const d=new Date(ms);const pad=n=>String(n).padStart(2,"0");return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}function formatDuration(sec){sec=Math.max(0,Math.round(Number(sec)||0));const m=Math.floor(sec/60),s=sec%60;return m>0?`${m}分${s}秒`:`${s}秒`}function buildWrongAnalysisHtml(wrong){if(!wrong.length)return "<p>本次没有错题，保持这个节奏。</p>";return wrong.map(a=>`<div class="wrongItem"><div class="wrongHead"><span>第 ${esc(a.display_order)} 题</span><span class="tag">${esc(a.knowledge_tag||"知识点")}</span></div><div class="line"><b>题目：</b>${esc(a.question_text)}</div><div class="line"><b>你的答案：</b>${esc(a.selected_answer_text||a.selected_answer||"未作答")}</div><div class="line"><b>正确答案：</b>${esc(a.correct_answer_text||a.correct_answer)}</div><div class="line"><b>解析：</b>${esc(a.explanation||"请根据课堂讲解回看本题。")}</div><div class="line"><b>学习提示：</b>${esc(a.common_misconception||a.coach_tip||"建议回看本题对应知识点，再做1题同类题。")}</div></div>`).join("")}function buildOverallAnalysisHtml(weak,wrong,scoreValue){if(!wrong.length)return "本次掌握较稳定，可以继续挑战中等题。";const weakText=weak.length?weak.join("、"):"相关知识点";const levelText=scoreValue>=80?"整体基础较稳，主要需要修正少数易错点。":"本次还有较明显卡点，建议先巩固基础题，再进入变式题。";return `<div><b>薄弱知识点：</b>${esc(weakText)}</div><div><b>整体表现：</b>${esc(levelText)}</div><div><b>下一步建议：</b>建议先复习 ${esc(weakText)}，再完成3至5题同类基础题。</div>`}function renderFinish(){const total=order.length;const scoreValue=Math.round(score/total*100);const wrong=answers.filter(a=>!a.is_correct);const weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))];const completedAtMs=Date.now();const timeUsed=Math.max(1,Math.round((completedAtMs-startTime)/1000));const avgTime=total?Math.round(timeUsed/total):0;const startedAtDisplay=formatDateTime(startTime);const completedAtDisplay=formatDateTime(completedAtMs);$("finalScore").textContent=score+"/"+total;$("finalRate").textContent=scoreValue+"%";$("finalWrong").textContent=wrong.length+"题";$("submitState").textContent="送达中…";$("infoSchool").textContent=META.school_name;$("infoTeacher").textContent=META.teacher_name;$("infoClass").textContent=$("className").value.trim();$("infoStudent").textContent=$("studentName").value.trim();$("infoSeat").textContent=$("seatNo").value.trim()||"未填写";$("infoChapt
