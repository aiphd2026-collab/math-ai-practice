<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>一元一次方程式基础练习</title><style>*{box-sizing:border-box}body{margin:0;font-family:'Microsoft YaHei',Arial,sans-serif;background:linear-gradient(135deg,#fff7e9,#ffd7b5);color:#2b2119}.page{max-width:720px;margin:0 auto;padding:16px}.card{background:#fffdf8;border:1px solid #ead8c1;border-radius:22px;box-shadow:0 18px 42px rgba(142,79,31,.18);padding:20px}h1{text-align:center;color:#5b341e;font-size:1.45rem}.sub{text-align:center;color:#7d6a58;line-height:1.7}.hidden{display:none}label{display:block;margin:14px 0 7px;font-weight:700}input{width:100%;min-height:50px;border:2px solid #ead9c4;border-radius:14px;padding:0 14px;font-size:1rem}button{width:100%;min-height:52px;margin-top:14px;border:0;border-radius:15px;background:linear-gradient(135deg,#f3a13a,#df6d25);color:white;font-weight:900;font-size:1rem}.opt{background:#fff8ef;color:#2b2119;border:2px solid #ecd9bf;text-align:left}.correct{background:#d7f1e4!important;border-color:#1f8f70!important;color:#0f5b48!important}.wrong{background:#ffe1d9!important;border-color:#c95342!important;color:#8b2b21!important}.tag{display:inline-block;background:#fff0cb;border-radius:999px;padding:6px 10px;margin:3px;font-weight:700;color:#6d4512}.fb{margin-top:12px;padding:12px;border-radius:14px;background:#fff7ea;line-height:1.7}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:#fff0c7;border-radius:16px;padding:14px;text-align:center;font-weight:900}.small{color:#7d6a58;font-size:.9rem;line-height:1.6}</style></head><body><div class="page"><section id="home" class="card"><h1>一元一次方程式基础练习</h1><p class="sub">二忠｜初一下册第10章 一元一次方程式｜练习编号：J1-10-01｜练习模式</p><label>班级</label><input id="className" value="二忠"><label>学号</label><input id="studentNo"><label>姓名</label><input id="studentName"><label>座号</label><input id="seatNo"><button onclick="startQuiz()">开始练习</button></section><section id="quiz" class="card hidden"><div><span class="tag" id="progress"></span><span class="tag" id="scoreNow"></span></div><h2 id="qText"></h2><div id="options"></div><div id="feedback" class="fb hidden"></div><button id="nextBtn" class="hidden" onclick="nextQuestion()">下一题</button></section><section id="done" class="card hidden"><h1>练习完成</h1><p class="sub">提交状态：<span id="submitStatus">正在提交...</span></p><div class="stats"><div class="stat">得分<br><span id="finalScore"></span></div><div class="stat">正确率<br><span id="accuracy"></span></div><div class="stat">错题数<br><span id="wrongCount"></span></div><div class="stat">练习编号<br>J1-10-01</div></div><p class="small" id="wrongList"></p></section></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const ACTION='submit_response';const QUESTIONS=[{"id":"Q1","text":"解方程：x + 7 = 15","options":{"A":"8","B":"9","C":"22","D":"-8"},"answer":"A","knowledge":"移项","difficulty":"易","explanation":"x=15-7=8。","common_misconception":"移项忘记变号。"},{"id":"Q2","text":"解方程：3x = 24","options":{"A":"6","B":"8","C":"21","D":"72"},"answer":"B","knowledge":"等式性质","difficulty":"易","explanation":"方程两边同除以3，x=8。","common_misconception":"把除以3误算成减3。"},{"id":"Q3","text":"解方程：x - 5 = 12","options":{"A":"7","B":"-7","C":"17","D":"60"},"answer":"C","knowledge":"移项","difficulty":"易","explanation":"x=12+5=17。","common_misconception":"把 -5 移项后仍写 -5。"},{"id":"Q4","text":"解方程：2x + 3 = 11","options":{"A":"7","B":"5","C":"8","D":"4"},"answer":"D","knowledge":"两步方程","difficulty":"易","explanation":"2x=11-3=8，所以x=4。","common_misconception":"先除以2，忽略 +3。"},{"id":"Q5","text":"解方程：5x - 6 = 19","options":{"A":"5","B":"13","C":"25","D":"4"},"answer":"A","knowledge":"两步方程","difficulty":"易","explanation":"5x=19+6=25，所以x=5。","common_misconception":"移项后计算 19+6 出错。"},{"id":"Q6","text":"解方程：4(x - 2)=20","options":{"A":"3","B":"5","C":"7","D":"6"},"answer":"C","knowledge":"去括号","difficulty":"易","explanation":"4x-8=20，4x=28，所以x=7。","common_misconception":"只乘 x，漏乘 -2。"},{"id":"Q7","text":"解方程：x/3 + 2 = 6","options":{"A":"4","B":"8","C":"12","D":"18"},"answer":"C","knowledge":"去分母","difficulty":"易","explanation":"x/3=4，所以x=12。","common_misconception":"只把 x/3 乘3，常数项未同步处理。"},{"id":"Q8","text":"小明买3本同价笔记本，付 RM20，找回 RM2。每本多少钱？","options":{"A":"RM5","B":"RM6","C":"RM7","D":"RM8"},"answer":"B","knowledge":"列一元一次方程","difficulty":"中","explanation":"设每本x元，3x+2=20，3x=18，x=6。","common_misconception":"把找回的钱当成加在商品总价之外。"},{"id":"Q9","text":"一个数的2倍减5等于这个数加7，这个数是多少？","options":{"A":"10","B":"11","C":"13","D":"12"},"answer":"D","knowledge":"两边含未知数","difficulty":"中","explanation":"设这个数为x，2x-5=x+7，x=12。","common_misconception":"未知数移项方向错误。"},{"id":"Q10","text":"甲、乙两人共有 RM84。甲的钱比乙的2倍少 RM6。乙有多少钱？","options":{"A":"RM30","B":"RM32","C":"RM36","D":"RM42"},"answer":"A","knowledge":"设未知数与数量关系建模","difficulty":"难","explanation":"设乙有x元，则甲有2x-6元，x+2x-6=84，3x=90，x=30。","common_misconception":"把“少 RM6”写成 +6。"}];let idx=0,score=0,answers=[],startTime=0,locked=false;function $(id){return document.getElementById(id)}function startQuiz(){if(!$('studentNo').value||!$('studentName').value||!$('seatNo').value){alert('请填写学号、姓名和座号');return}startTime=Date.now();$('home').classList.add('hidden');$('quiz').classList.remove('hidden');render()}function render(){locked=false;const q=QUESTIONS[idx];$('progress').textContent='第 '+(idx+1)+' / '+QUESTIONS.length+' 题';$('scoreNow').textContent='已得分：'+score;$('qText').textContent=q.text;$('feedback').classList.add('hidden');$('feedback').innerHTML='';$('nextBtn').classList.add('hidden');$('nextBtn').textContent=idx===QUESTIONS.length-1?'完成并提交':'下一题';$('options').innerHTML='';Object.keys(q.options).forEach(k=>{const b=document.createElement('button');b.className='opt';b.textContent=k+'. '+q.options[k];b.onclick=()=>choose(k,b);$('options').appendChild(b)})}function choose(k,btn){if(locked)return;locked=true;const q=QUESTIONS[idx];const ok=k===q.answer;if(ok)score++;document.querySelectorAll('.opt').forEach(b=>{const letter=b.textContent.charAt(0);if(letter===q.answer)b.classList.add('correct');if(letter===k&&!ok)b.classList.add('wrong')});answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:q.options[k],correct_answer:q.answer,correct_answer_text:q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});$('feedback').className='fb '+(ok?'correct':'wrong');$('feedback').innerHTML=(ok?'答对了。':'还需订正。')+'<br>你的答案：'+k+'. '+q.options[k]+'<br>正确答案：'+q.answer+'. '+q.options[q.answer]+'<br>解析：'+q.explanation+'<br>知识点：'+q.knowledge+'<br>常见错因：'+q.common_misconception;$('feedback').classList.remove('hidden');$('nextBtn').classList.remove('hidden')}function nextQuestion(){if(idx<QUESTIONS.length-1){idx++;render()}else finish()}function finish(){$('quiz').classList.add('hidden');$('done').classList.remove('hidden');const total=QUESTIONS.length;const wrong=answers.filter(a=>!a.is_correct);const acc=Math.round(score/total*100);$('finalScore').textContent=score+' / '+total;$('accuracy').textContent=acc+'%';$('wrongCount').textContent=wrong.length;$('wrongList').textContent=wrong.length?'错题：'+wrong.map(w=>w.question_id).join('，'):'全部答对';const payload={action:ACTION,submitted_at:new Date().toISOString(),school_id:'kds',school_name:'关丹德信中学',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'',class_name:$('className').value,student_no:$('studentNo').value,student_name:$('studentName').value,seat_no:$('seatNo').value,practice_id:'J1-10-01',practice_name:'一元一次方程式基础练习',practice_round:'01',quiz_id:'J1-10-01-quiz',quiz_name:'一元一次方程式基础练习',chapter_name:'初一下册第10章 一元一次方程式',score:score,accuracy:acc,total_questions:total,time_used:Math.round((Date.now()-startTime)/1000),answers_json:answers,correct_json:QUESTIONS.map(q=>({question_id:q.id,answer:q.answer})),wrong_question_ids:wrong.map(w=>w.question_id),weak_knowledge_tags:[...new Set(wrong.map(w=>w.knowledge_tag))],submit_attempt:1,duplicate_status:'first',is_latest:true,abnormal_flag:''};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{$('submitStatus').textContent='已提交'}).catch(()=>{$('submitStatus').textContent='提交可能失败，请截图交给老师'});}</script></body></html>
