<!doctype html>
<html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>圆线上练习02</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(150deg,#fff7e8,#ffe1c2,#f8d0a1);color:#2c2118}.page{max-width:760px;margin:0 auto;padding:16px 10px 30px}.card{margin-bottom:18px;overflow:hidden;border-radius:28px;background:rgba(255,253,248,.94);border:1px solid rgba(255,255,255,.66);box-shadow:0 18px 46px rgba(111,62,22,.15)}.topband,.hero{padding:28px 16px 24px;text-align:center;background:linear-gradient(135deg,#fff0d8,#ffe2ae 48%,#dff4ff);border-bottom:1px solid rgba(126,82,36,.12)}h1{margin:0;color:#17406f;font-size:2rem}.pill{display:inline-block;margin-top:12px;padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.68);color:#6e401e;font-weight:900}.sub{color:#7b6756;line-height:1.7}.body{padding:17px 16px 20px}label{display:block;margin:14px 0 8px;font-weight:900}input{width:100%;min-height:56px;border:2px solid #ead7bf;border-radius:18px;padding:0 15px;font-size:1rem;background:#fffefa}.hidden{display:none}button{width:100%;min-height:58px;margin-top:14px;border:0;border-radius:18px;color:#fff;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f5aa41,#e8782c 60%,#b45825);box-shadow:0 12px 26px rgba(199,91,30,.22);cursor:pointer}button:disabled{opacity:.55}.progressBox{position:sticky;top:0;z-index:4;margin:-17px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid rgba(125,89,53,.14)}.progressMeta{display:flex;justify-content:space-between;color:#5a351e;font-weight:900}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f1dec6;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd36a,#f59f3a,#35b983)}.tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px}.tag{padding:7px 10px;border-radius:999px;font-size:.82rem;font-weight:900;background:#fff0c9;color:#6d4b13}.tag.blue{background:#e5f4ff;color:#24567c}.qTitle{font-size:1.15rem;line-height:1.55;font-weight:900;margin:0 0 14px}.diagram{margin:12px 0 16px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7;text-align:center}.diagram svg{max-width:100%;height:auto}.option{width:100%;margin:10px 0;padding:14px;border:2px solid #eddac1;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ed);font-weight:900;line-height:1.5;text-align:left;color:#2c2118}.option.correct{border-color:#2e9b74;background:#dff8ea}.option.wrong{border-color:#df6657;background:#ffe5df}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.75;background:#fff3ef;border:1px solid rgba(244,118,104,.22)}.feedback.ok,.feedback.bad{display:block}.feedback.ok{background:#e6fbef}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-top:12px}.stat{padding:16px 12px;border-radius:24px;text-align:center;background:#fff4cf}.stat b{display:block;font-size:1.5rem}.section{margin-top:15px;padding:15px;border-radius:23px;border:1px solid rgba(125,89,53,.14);background:rgba(255,255,255,.66);line-height:1.75}.wrongItem{margin:10px 0;padding:12px;border-radius:18px;background:#fff8f5;border:1px solid rgba(244,118,104,.18)}.small{color:#7b6756;font-size:.9rem}</style></head><body><main class="page"><section id="home" class="card"><div class="topband"><h1>圆</h1><div class="pill">线上练习｜J3-08-02｜初三忠｜共10题</div><p class="sub">请填写资料后开始作答。</p></div><div class="body"><label>班级</label><input id="className" value="初三忠"><label>学号</label><input id="studentNo" inputmode="numeric"><label>姓名</label><input id="studentName"><label>座号（可不填）</label><input id="seatNo" inputmode="numeric"><button id="startBtn">开始练习</button></div></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><div id="progressText"></div><div id="scoreText"></div></div><div class="bar"><span id="barFill"></span></div></div><div class="body"><div class="tagrow"><span class="tag" id="difficulty"></span><span class="tag blue" id="knowledge"></span></div><div class="qTitle" id="questionText"></div><div class="diagram" id="diagram"></div><div id="options"></div><div class="feedback" id="feedback"></div><button id="nextBtn" disabled>下一题</button></div></section><section id="finish" class="card hidden"><div class="hero"><h1>练习完成</h1><div class="pill">J3-08-02｜初三忠｜圆</div></div><div class="body"><div class="stats"><div class="stat"><b id="finalScore"></b><span>答对题数</span></div><div class="stat"><b id="finalRate"></b><span>正确率</span></div><div class="stat"><b id="finalWrong"></b><span>错题数</span></div><div class="stat"><b id="submitState">送达中…</b><span>提交状态</span></div></div><div class="section"><b>错题分析</b><div id="wrongAnalysis"></div></div><div class="section" id="submitNotice">提交状态：送达中…</div></div></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:"2026",semester:"上学期",class_id:"c_初三忠",class_name:"初三忠",practice_id:"J3-08-02",practice_name:"初三忠｜圆练习02",practice_round:"02",quiz_id:"quiz-J3-08-02",quiz_name:"圆线上练习02",chapter_name:"圆"};const svg1='<svg width="260" height="210" viewBox="0 0 260 210"><circle cx="130" cy="105" r="78" fill="none" stroke="#17406f" stroke-width="3"/><circle cx="130" cy="105" r="3" fill="#17406f"/><text x="137" y="107">O</text><line x1="130" y1="105" x2="62" y2="66" stroke="#e8782c" stroke-width="3"/><line x1="130" y1="105" x2="198" y2="66" stroke="#e8782c" stroke-width="3"/><line x1="62" y1="66" x2="130" y2="183" stroke="#35b983" stroke-width="3"/><line x1="198" y1="66" x2="130" y2="183" stroke="#35b983" stroke-width="3"/><text x="54" y="58">A</text><text x="201" y="58">B</text><text x="127" y="201">C</text><text x="118" y="73">120°</text><text x="93" y="166">∠ACB</text></svg>';const svg2='<svg width="260" height="220" viewBox="0 0 260 220"><circle cx="130" cy="110" r="82" fill="none" stroke="#17406f" stroke-width="3"/><line x1="130" y1="28" x2="130" y2="192" stroke="#e8782c" stroke-width="3"/><line x1="65" y1="110" x2="195" y2="110" stroke="#35b983" stroke-width="3"/><circle cx="130" cy="110" r="3" fill="#17406f"/><text x="135" y="116">E</text><text x="123" y="22">A</text><text x="123" y="210">B</text><text x="51" y="115">C</text><text x="199" y="115">D</text><text x="103" y="101">90°</text><text x="101" y="91">CD=20 cm</text></svg>';const svg4='<svg width="260" height="220" viewBox="0 0 260 220"><circle cx="130" cy="110" r="82" fill="none" stroke="#17406f" stroke-width="3"/><polygon points="85,45 202,88 170,178 63,145" fill="rgba(97,181,247,.12)" stroke="#e8782c" stroke-width="3"/><text x="73" y="39">A</text><text x="207" y="87">B</text><text x="174" y="193">C</text><text x="45" y="151">D</text><text x="86" y="70">68°</text><text x="93" y="206">∠A+∠C=180°</text></svg>';const svg6='<svg width="260" height="210" viewBox="0 0 260 210"><circle cx="120" cy="105" r="72" fill="none" stroke="#17406f" stroke-width="3"/><circle cx="120" cy="105" r="3" fill="#17406f"/><line x1="120" y1="105" x2="192" y2="105" stroke="#e8782c" stroke-width="3"/><line x1="192" y1="38" x2="192" y2="172" stroke="#35b983" stroke-width="3"/><path d="M180 105 L180 117 L192 117" fill="none" stroke="#333" stroke-width="2"/><text x="110" y="99">O</text><text x="197" y="108">T</text><text x="199" y="64">切线</text><text x="142" y="94">半径</text></svg>';const svg8='<svg width="260" height="220" viewBox="0 0 260 220"><circle cx="130" cy="110" r="82" fill="none" stroke="#17406f" stroke-width="3"/><line x1="67" y1="163" x2="193" y2="163" stroke="#35b983" stroke-width="3"/><line x1="130" y1="110" x2="130" y2="163" stroke="#e8782c" stroke-width="3"/><line x1="130" y1="110" x2="193" y2="163" stroke="#9b7cf7" stroke-width="3"/><circle cx="130" cy="110" r="3" fill="#17406f"/><path d="M130 151 L142 151 L142 163" fill="none" stroke="#333" stroke-width="2"/><text x="124" y="104">O</text><text x="58" y="173">A</text><text x="197" y="173">B</text><text x="134" y="180">M</text><text x="139" y="138">5 cm</text><text x="164" y="131">13 cm</text></svg>';const svg10='<svg width="280" height="230" viewBox="0 0 280 230"><circle cx="130" cy="120" r="66" fill="none" stroke="#17406f" stroke-width="3"/><circle cx="130" cy="120" r="3" fill="#17406f"/><line x1="130" y1="120" x2="91" y2="67" stroke="#e8782c" stroke-width="3"/><line x1="130" y1="120" x2="169" y2="67" stroke="#e8782c" stroke-width="3"/><line x1="230" y1="32" x2="91" y2="67" stroke="#35b983" stroke-width="3"/><line x1="230" y1="32" x2="169" y2="67" stroke="#35b983" stroke-width="3"/><text x="124" y="139">O</text><text x="78" y="67">A</text><text x="172" y="67">B</text><text x="236" y="32">P</text><text x="116" y="89">130°</text><text x="196" y="56">切线</text></svg>';const QUESTIONS=[{id:1,difficulty:"易",knowledge:"圆心角与圆周角",text:"同弧所对的圆心角为 120°，则同弧所对的圆周角为：",options:{A:"60°",B:"90°",C:"120°",D:"30°"},answer:"A",explanation:"同弧所对圆周角等于圆心角的一半，所以为60°。",common_misconception:"把圆心角和圆周角当作相等。",diagram_svg:svg1},{id:2,difficulty:"易",knowledge:"垂径定理",text:"直径 AB 垂直弦 CD 于 E，若 CD=20 cm，则 CE 为：",options:{A:"20 cm",B:"12 cm",C:"5 cm",D:"10 cm"},answer:"D",explanation:"直径垂直弦，则平分该弦，CE=20÷2=10 cm。",common_misconception:"忘记垂径定理中的平分弦。",diagram_svg:svg2},{id:3,difficulty:"易",knowledge:"切线定义",text:"与圆只有一个公共点的直线称为：",options:{A:"割线",B:"切线",C:"弦",D:"直径"},answer:"B",explanation:"与圆只有一个公共点的直线是切线。",common_misconception:"把切线与割线混淆。",diagram_svg:""},{id:4,difficulty:"易",knowledge:"圆内接四边形",text:"圆内接四边形 ABCD 中，∠A=68°，则∠C 为：",options:{A:"68°",B:"90°",C:"112°",D:"122°"},answer:"C",explanation:"圆内接四边形对角互补，∠C=180°−68°=112°。",common_misconception:"误以为对角相等。",diagram_svg:svg4},{id:5,difficulty:"易",knowledge:"等弧与圆周角",text:"等弧所对的圆周角：",options:{A:"相等",B:"互补",C:"互余",D:"无法判断"},answer:"A",explanation:"等弧所对的圆周角相等。",common_misconception:"把等弧关系误判为互补。",diagram_svg:""},{id:6,difficulty:"易",knowledge:"切线判定",text:"半径垂直于过圆上一点的直线，则该直线是圆的：",options:{A:"割线",B:"弦",C:"切线",D:"直径"},answer:"C",explanation:"经过半径外端且垂直于半径的直线是圆的切线。",common_misconception:"忽略“过圆上一点”。",diagram_svg:svg6},{id:7,difficulty:"易",knowledge:"圆周角与弧",text:"若圆周角为 35°，则它所对的弧为：",options:{A:"35°",B:"105°",C:"17.5°",D:"70°"},answer:"D",explanation:"圆周角等于所对弧的一半，所以弧为70°。",common_misconception:"把弧度数误写成圆周角度数。",diagram_svg:""},{id:8,difficulty:"中",knowledge:"垂径定理与毕氏定理",text:"圆半径为 13 cm，圆心到弦 AB 的距离为 5 cm，则弦 AB 长为：",options:{A:"10 cm",B:"24 cm",C:"12 cm",D:"26 cm"},answer:"B",explanation:"垂线平分弦，半弦=√(13²−5²)=12，所以弦长=24 cm。",common_misconception:"只求出半弦，忘记乘2。",diagram_svg:svg8},{id:9,difficulty:"中",knowledge:"圆内接四边形",text:"圆内接四边形 ABCD 中，∠A=3∠C，求∠C。",options:{A:"30°",B:"60°",C:"45°",D:"90°"},answer:"C",explanation:"∠A+∠C=180°，3∠C+∠C=180°，∠C=45°。",common_misconception:"只用比例关系，忘记对角互补。",diagram_svg:""},{id:10,difficulty:"难",knowledge:"切线与圆心角综合",text:"PA、PB 为圆 O 的两条切线，A、B 为切点。若∠AOB=130°，则∠APB 为：",options:{A:"130°",B:"65°",C:"40°",D:"50°"},answer:"D",explanation:"OA⊥PA，OB⊥PB，四边形AOBP内角和360°，∠APB=360°−90°−90°−130°=50°。",common_misconception:"误把∠APB看成∠AOB的一半。",diagram_svg:svg10}];let order=[],index=0,score=0,startTime=0,answers=[],submitted=false;const $=id=>document.getElementById(id),esc=t=>String(t??"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden")}$("startBtn").onclick=()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");render()};function render(){let q=order[index];$("progressText").textContent=`第${index+1}题 / 共${order.length}题`;$("scoreText").textContent=`答对 ${score} 题`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent=`难度：${q.difficulty}`;$("knowledge").textContent=`知识点：${q.knowledge}`;$("questionText").textContent=q.text;$("diagram").style.display=q.diagram_svg?"block":"none";$("diagram").innerHTML=q.diagram_svg||"";$("options").innerHTML="";$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";Object.entries(q.options).forEach(([k,v])=>{let b=document.createElement("button");b.className="option";b.type="button";b.dataset.option=k;b.textContent=`${k}. ${v}`;$("options").appendChild(b)})}function choose(sel){let q=order[index],ok=sel===q.answer;if(ok)score++;document.querySelectorAll(".option").forEach(b=>{b.disabled=true;if(b.dataset.option===q.answer)b.classList.add("correct");if(b.dataset.option===sel&&!ok)b.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:sel,selected_answer_text:`${sel}. ${q.options[sel]}`,correct_answer:q.answer,correct_answer_text:`${q.answer}. ${q.options[q.answer]}`,is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty,explanation:q.explanation,common_misconception:q.common_misconception});$("feedback").className="feedback "+(ok?"ok":"bad");$("feedback").innerHTML=`<b>${ok?"答对了。":"还差一点。"}</b><br>你的答案：${esc(sel+'. '+q.options[sel])}<br>正确答案：${esc(q.answer+'. '+q.options[q.answer])}<br>解析：${esc(q.explanation)}<br>怎么改：${esc(q.common_misconception)}`;$("nextBtn").disabled=false;$("scoreText").textContent=`答对 ${score} 题`;$("barFill").style.width=`${(index+1)/order.length*100}%`}$("options").onclick=e=>{let b=e.target.closest(".option");if(b&&!b.disabled)choose(b.dataset.option)};$("nextBtn").onclick=()=>{if(index<order.length-1){index++;render()}else finish()};function finish(){let total=order.length,rate=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),completed=Date.now(),timeUsed=Math.max(1,Math.round((completed-startTime)/1000));$("finalScore").textContent=score+"/"+total;$("finalRate").textContent=rate+"%";$("finalWrong").textContent=wrong.length+"题";$("wrongAnalysis").innerHTML=wrong.length?wrong.map(a=>`<div class="wrongItem"><b>第${a.display_order}题｜${esc(a.knowledge_tag)}</b><br>你的答案：${esc(a.selected_answer_text)}<br>正确答案：${esc(a.correct_answer_text)}<br>解析：${esc(a.explanation)}<br>怎么改：${esc(a.common_misconception)}</div>`).join(""):"本次没有错题，继续保持。";show("finish");submit(rate,total,timeUsed,wrong)}function submit(rate,total,timeUsed,wrong){const weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))];const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),payload_student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:rate,accuracy:rate,total_questions:total,payload_accuracy:rate,payload_total_questions:total,time_used:timeUsed,started_at:new Date(startTime).toISOString(),completed_at:new Date().toISOString(),answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已送达";$("submitNotice").innerHTML="✅ 作答资料已成功发送给老师。"}).catch(()=>{$("submitState").textContent="提交失败";$("submitNotice").innerHTML="提交失败，请保留截图给老师。"})}</script></body></html>
