<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>初一仁｜一元一次方程式线上测验</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft YaHei",Arial,sans-serif;background:linear-gradient(145deg,#eef7ff 0%,#fff7ea 55%,#f7fbff 100%);color:#10212f;min-height:100vh}.wrap{max-width:720px;margin:0 auto;padding:16px}.card{background:rgba(255,255,255,.97);border-radius:18px;padding:18px;box-shadow:0 14px 30px rgba(30,82,130,.12);border:1px solid rgba(220,235,250,.9);margin-bottom:14px}h1{font-size:23px;margin:8px 0;text-align:center;color:#194b7d}.sub{width:max-content;max-width:100%;margin:10px auto 14px;padding:7px 14px;border-radius:999px;text-align:center;background:#eaf4ff;color:#225f99;font-size:14px;font-weight:700}label{display:block;margin:10px 0 6px;font-weight:700}input{width:100%;padding:13px 14px;border:1.5px solid #cfe3f8;border-radius:16px;font-size:16px;outline:none;background:#fff}input:focus{border-color:#3c8bdc;box-shadow:0 0 0 4px rgba(60,139,220,.13)}button{width:100%;padding:14px;border:0;border-radius:18px;background:linear-gradient(105deg,#2f86d9,#174d8d);color:#fff;font-size:17px;font-weight:800;margin-top:14px;cursor:pointer;box-shadow:0 8px 16px rgba(23,77,141,.2)}button:disabled{background:linear-gradient(105deg,#b8c9d5,#93a7b4);box-shadow:none;cursor:not-allowed}.q{font-size:20px;font-weight:800;margin:12px 0;line-height:1.5}.option{display:block;width:100%;text-align:left;background:#f9fcff;color:#203447;border:2px solid #dcecff;border-radius:16px;margin:10px 0;font-weight:700;box-shadow:0 2px 6px rgba(30,82,130,.05)}.option.selected{background:#dbeeff;border-color:#2f86d9}.explain{margin-top:14px;padding:13px;border-radius:16px;background:#fff9e8;border:1px solid #ffe0a3;line-height:1.6}.hidden{display:none}.result{font-size:20px;font-weight:800}.small{color:#5d6b75;font-size:14px;line-height:1.6}.ok{color:#2e7d32;font-weight:800}.warn{color:#c62828;font-weight:800}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#eef7ff;color:#225f99;font-weight:700;margin:2px}.notice{background:#f7fbff;border:1px solid #dcecff;border-radius:14px;padding:12px;line-height:1.6}.mono{white-space:pre-wrap}
</style>
</head>
<body>
<div class="wrap">
<div class="card" id="home">
<h1>初一仁｜一元一次方程式线上测验</h1>
<div class="sub">宽柔中学古来分校｜陈天龙老师｜2026 上半年</div>
<p class="small">章节：初一下册第10章｜一元一次方程式<br>模式：测验模式｜完成后提交学情数据</p>
<div class="notice small">测验进行中不会显示答案与解析。请独立完成，最后一题点击“完成并提交”。</div>
<label>班级</label><input id="className" value="初一仁" placeholder="请输入班级，例如：初一仁">
<label>学号</label><input id="studentNo" inputmode="numeric" placeholder="请输入学号">
<label>姓名</label><input id="studentName" placeholder="请输入姓名">
<label>座号（可选）</label><input id="seatNo" inputmode="numeric" placeholder="如老师有要求，请填写座号">
<button onclick="startQuiz()">开始测验</button>
</div>
<div class="card hidden" id="quiz">
<div class="small" id="progress"></div>
<div class="q" id="questionText"></div>
<div id="options"></div>
<button id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
</div>
<div class="card hidden" id="result">
<h1>测验完成</h1>
<div class="small" id="studentInfo"></div>
<p class="result" id="scoreText"></p>
<div id="summaryBox" class="explain"></div>
<p id="submitStatus">正在提交学习数据...</p>
<p class="small">本页适合截图交给老师。若提交失败，请截图此页。</p>
</div>
</div>
<script>
const SUBMIT_URL=(location.href.includes("script.google.com/macros/s/")&&location.href.includes("/exec"))?location.href:"";
const quizMeta={school_id:"school_kuanrou_kulai",school_name:"宽柔中学古来分校",teacher_id:"teacher_chen_tianlong",teacher_name:"陈天龙老师",academic_year:"2026",semester:"上半年",class_id:"1ren",practice_id:"j10_1ren_2026h1_test_001",practice_name:"初一仁｜一元一次方程式线上测验",practice_round:"1",quiz_id:"j10_1ren_2026h1_test_001",quiz_name:"初一仁｜一元一次方程式线上测验",chapter_id:"j10",chapter_name:"初一下册第10章｜一元一次方程式",mode:"测验模式",show_answer:false};
const questions=[{id:"Q1",text:"下列哪一个是一元一次方程式？",options:{A:"x² + 3 = 7",B:"2x + 5 = 11",C:"x + y = 9",D:"3 + 4 = 7"},answer:"B",knowledge:"一元一次方程式定义",explanation:"一元一次方程式只含一个未知数，且未知数次数为1。",difficulty:"基础",commonMistake:"没有注意未知数个数和次数"},{id:"Q2",text:"解方程：x + 8 = 15，x 的值是：",options:{A:"5",B:"6",C:"7",D:"23"},answer:"C",knowledge:"等式基本性质",explanation:"两边同时减8，x=15-8=7。",difficulty:"基础",commonMistake:"把加8误算成再加8"},{id:"Q3",text:"解方程：3x = 18，x 的值是：",options:{A:"3",B:"6",C:"15",D:"21"},answer:"B",knowledge:"两边同除以非零数",explanation:"两边同时除以3，x=6。",difficulty:"基础",commonMistake:"把乘法关系误当成加法关系"},{id:"Q4",text:"解方程：2x − 5 = 9，x 的值是：",options:{A:"2",B:"5",C:"7",D:"14"},answer:"C",knowledge:"移项与合并",explanation:"2x=9+5=14，所以x=7。",difficulty:"基础",commonMistake:"移项时忘记变号"},{id:"Q5",text:"解方程：4(x − 2) = 20，x 的值是：",options:{A:"3",B:"5",C:"7",D:"8"},answer:"C",knowledge:"去括号",explanation:"4x-8=20，4x=28，所以x=7。",difficulty:"基础",commonMistake:"去括号时漏乘括号内第二项"},{id:"Q6",text:"解方程：x/3 + 2 = 6，x 的值是：",options:{A:"4",B:"8",C:"12",D:"24"},answer:"C",knowledge:"去分母",explanation:"x/3=4，所以x=12。",difficulty:"中等",commonMistake:"去分母时漏乘常数项"},{id:"Q7",text:"小明买了3本相同的练习本和一支 RM2 的笔，共用 RM14。每本练习本的价钱是多少？",options:{A:"RM3",B:"RM4",C:"RM5",D:"RM6"},answer:"B",knowledge:"列一元一次方程解决购物问题",explanation:"设每本练习本RM x，3x+2=14，x=4。",difficulty:"中等",commonMistake:"没有把总价关系列清楚"},{id:"Q8",text:"一个数的2倍加上5，等于这个数的3倍减去4。这个数是：",options:{A:"7",B:"8",C:"9",D:"10"},answer:"C",knowledge:"列方程与移项",explanation:"设这个数为x，2x+5=3x-4，x=9。",difficulty:"挑战",commonMistake:"把两边等量关系列反"}];
let current=0,answers={},correctMap={},questionTimes={},questionStart=0,startTime=0,selected="";function $(id){return document.getElementById(id)}function startQuiz(){const c=$("className").value.trim(),no=$("studentNo").value.trim(),name=$("studentName").value.trim();if(!c||!no||!name){alert("请填写班级、学号和姓名");return}if(!/^\d+$/.test(no)){alert("学号请只填写数字");return}if(!SUBMIT_URL){alert("测验暂时无法提交，请联系老师。");return}startTime=Date.now();$("home").classList.add("hidden");$("quiz").classList.remove("hidden");renderQuestion()}function renderQuestion(){selected="";questionStart=Date.now();$("nextBtn").disabled=true;const q=questions[current];$("progress").textContent=`第 ${current+1} / ${questions.length} 题`;$("questionText").textContent=q.text;const box=$("options");box.innerHTML="";["A","B","C","D"].forEach(letter=>{const btn=document.createElement("button");btn.className="option";btn.textContent=`${letter}. ${q.options[letter]}`;btn.onclick=()=>{if(selected)return;selected=letter;answers[q.id]=letter;correctMap[q.id]=letter===q.answer;questionTimes[q.id]=Math.round((Date.now()-questionStart)/1000);document.querySelectorAll(".option").forEach(b=>b.disabled=true);btn.classList.add("selected");$("nextBtn").disabled=false};box.appendChild(btn)});$("nextBtn").textContent=current===questions.length-1?"完成并提交":"下一题"}function nextQuestion(){if(current<questions.length-1){current++;renderQuestion()}else{finishQuiz()}}function finishQuiz(){$("quiz").classList.add("hidden");$("result").classList.remove("hidden");const correctCount=Object.values(correctMap).filter(Boolean).length;const score=Math.round(correctCount/questions.length*100);const accuracy=`${score}%`;const timeUsed=Math.round((Date.now()-startTime)/1000);const wrongIds=[],weakTags=[],wrongItems=[];questions.forEach((q,i)=>{if(!correctMap[q.id]){wrongIds.push(q.id);weakTags.push(q.knowledge);wrongItems.push(`第${i+1}题：${q.knowledge}`)}});$("studentInfo").innerHTML=`学校：${quizMeta.school_name}｜老师：${quizMeta.teacher_name}<br>练习名称：${quizMeta.practice_name}<br>章节：${quizMeta.chapter_name}<br>班级：${$("className").value.trim()}｜学号：${$("studentNo").value.trim()}｜姓名：${$("studentName").value.trim()}｜座号：${$("seatNo").value.trim()||"未填"}<br>完成时间：${formatDateTime(new Date())}`;$("scoreText").textContent=`得分：${score}｜正确率：${accuracy}`;renderSummary(score,correctCount,wrongItems,[...new Set(weakTags)]);const payload={...quizMeta,submit_time:formatDateTime(new Date()),class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),score,accuracy,total_questions:questions.length,time_used:timeUsed,answers_json:answers,correct_json:correctMap,question_time_json:questionTimes,wrong_question_ids:wrongIds,weak_knowledge_tags:[...new Set(weakTags)],submit_count:1,is_latest_submit:true,abnormal_flag:timeUsed<30?"用时异常短":"none",questions_snapshot:questions.map(q=>({id:q.id,knowledge:q.knowledge,difficulty:q.difficulty,commonMistake:q.commonMistake}))};submitResult(payload)}function renderSummary(score,correctCount,wrongItems,weakTags){let level="",advice="";if(score===100){level="表现很好";advice="本章基础掌握稳定，可继续挑战应用题。"}else if(score>=70){level="基本掌握";advice="请回看错题对应知识点，重点检查移项、去括号或去分母步骤。"}else{level="需要巩固";advice="建议先复习方程基本性质，再练习基础解方程。"}$("summaryBox").innerHTML=`<strong>学习总结：${level}</strong><br>本次做对 ${correctCount} / ${questions.length} 题。<br>错题记录：${wrongItems.length?wrongItems.join("；"):"没有错题"}。<br>薄弱知识点：${weakTags.length?weakTags.join("、"):"暂无明显薄弱点"}。<br>下一步建议：${advice}<br><span class="small">测验模式不显示正确答案与解析。</span>`}function formatDateTime(date){const pad=n=>String(n).padStart(2,"0");return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`}async function submitResult(payload){try{await fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json; charset=utf-8"},body:JSON.stringify(payload)});$("submitStatus").innerHTML='<span class="ok">已提交。</span>老师稍后可查看学情数据。'}catch(err){$("submitStatus").innerHTML='<span class="warn">提交失败。</span>请截图结果交给老师。'}}</script>
</body>
</html>
