<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>一元一次方程式</title><style>*{box-sizing:border-box}body{margin:0;font-family:'Microsoft YaHei',Arial,sans-serif;background:linear-gradient(150deg,#fff7e8,#ffe1c2 48%,#f8d0a1);color:#2c2118}.page{max-width:760px;margin:0 auto;padding:16px 10px 30px}.card{margin-bottom:18px;overflow:hidden;border-radius:28px;background:rgba(255,253,248,.94);border:1px solid rgba(255,255,255,.66);box-shadow:0 18px 46px rgba(111,62,22,.15)}.topband{padding:28px 16px 24px;text-align:center;background:linear-gradient(135deg,#fff0d8,#ffe2ae 48%,#dff4ff);border-bottom:1px solid rgba(126,82,36,.12)}h1{margin:0;color:#17406f;font-size:2rem;line-height:1.25}.pill{display:inline-block;margin-top:12px;padding:10px 16px;border-radius:999px;background:rgba(255,255,255,.72);color:#6e401e;font-weight:900}.body{padding:17px 16px 20px}label{display:block;margin:14px 0 8px;font-weight:900}input{width:100%;min-height:56px;border:2px solid #ead7bf;border-radius:18px;padding:0 15px;font-size:1rem;background:#fffefa}.hidden{display:none}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:#fff;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f5aa41,#e8782c 60%,#b45825)}button:disabled{opacity:.55}.progressBox{position:sticky;top:0;z-index:4;margin:-17px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid rgba(125,89,53,.14)}.progressMeta{display:flex;justify-content:space-between;color:#5a351e;font-weight:900}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f1dec6;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd36a,#f59f3a,#35b983)}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:13px}.tag{padding:7px 10px;border-radius:999px;font-size:.82rem;font-weight:900;background:#fff0c9;color:#6d4b13}.tag.blue{background:#e5f4ff;color:#24567c}.qTitle{font-size:1.15rem;line-height:1.55;font-weight:900;margin:0 0 14px}.option{width:100%;margin:10px 0;padding:14px;border:2px solid #eddac1;border-radius:18px;background:#fff8ed;font-weight:900;text-align:left;color:#2c2118;box-shadow:none}.option.correct{border-color:#35b983;background:#e9fff5}.option.wrong{border-color:#f47668;background:#fff0ee}.feedback{margin-top:14px;padding:14px;border-radius:18px;background:#f8f1e8;line-height:1.7}.small{font-size:.9rem;color:#7b6756;line-height:1.65}.ok{color:#238b5c;font-weight:900}.bad{color:#c34b3f;font-weight:900}.resultGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.resultGrid div{padding:14px;border-radius:18px;background:#fff8ed;text-align:center;font-weight:900}</style></head><body><div class="page"><section id="start" class="card"><div class="topband"><h1>一元一次方程式</h1><div class="pill">线上练习｜J1-10-07｜初二忠</div><p class="small">关丹德信中学｜陈天龙老师｜2026 上学期</p></div><div class="body"><label>姓名</label><input id="student_name" autocomplete="name"><label>学号</label><input id="student_no"><button id="startBtn">开始作答</button></div></section><section id="quiz" class="card hidden"><div class="body"><div class="progressBox"><div class="progressMeta"><span id="progressText">第 1 / 10 题</span><span id="scoreText">答对 0 题</span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span class="tag" id="difficulty"></span><span class="tag blue" id="knowledge"></span></div><p class="qTitle" id="qTitle"></p><div id="options"></div><div id="feedback" class="feedback hidden"></div><button id="nextBtn" class="hidden">下一题</button></div></section><section id="result" class="card hidden"><div class="topband"><h1>完成练习</h1><div class="pill" id="resultStatus">提交状态：准备提交</div></div><div class="body"><div class="resultGrid"><div id="rScore">答对题数：0</div><div id="rRate">正确率：0%</div><div id="rWrong">错题数：0</div><div id="rSubmit">提交状态：提交中</div></div><h2>学生资料</h2><p id="studentInfo" class="small"></p><h2>用时记录</h2><p id="timeInfo" class="small"></p><h2>错题分析</h2><p id="wrongInfo" class="small"></p><h2>整体建议</h2><p id="advice" class="small"></p><h2>给你的肯定</h2><p class="small">你已经完成本次练习。请根据错题提醒，重点复习移项、去括号、去分母与列方程。</p></div></section></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const QUESTIONS=[{"id":1,"difficulty":"易","question":"下列哪一个是一元一次方程式？","options":{"A":"x²+1=5","B":"3x+5=14","C":"2x+3y=8","D":"5+6=11"},"answer":"B","knowledge":"定义判断","explanation":"一元一次方程式只含一个未知数，且未知数次数是1。","mistake":"混淆方程与代数式、混淆一次与二次"},{"id":2,"difficulty":"易","question":"解方程 x+7=19，x=？","options":{"A":"10","B":"11","C":"13","D":"12"},"answer":"D","knowledge":"等式性质","explanation":"两边同时减7，x=12。","mistake":"加减逆运算错误"},{"id":3,"difficulty":"易","question":"解方程 4x−5=11，x=？","options":{"A":"4","B":"3","C":"5","D":"6"},"answer":"A","knowledge":"移项与合并","explanation":"4x=16，所以x=4。","mistake":"移项忘变号"},{"id":4,"difficulty":"易","question":"解方程 3(x−2)=15，x=？","options":{"A":"3","B":"5","C":"7","D":"9"},"answer":"C","knowledge":"去括号","explanation":"x−2=5，所以x=7。","mistake":"括号处理错误"},{"id":5,"difficulty":"易","question":"解方程 x/3+2=6，x=？","options":{"A":"9","B":"12","C":"15","D":"18"},"answer":"B","knowledge":"去分母","explanation":"x/3=4，所以x=12。","mistake":"两边同乘时漏乘"},{"id":6,"difficulty":"易","question":"解方程 2x+5=x+13，x=？","options":{"A":"8","B":"6","C":"9","D":"10"},"answer":"A","knowledge":"两边含未知数","explanation":"2x−x=13−5，所以x=8。","mistake":"移项方向错误"},{"id":7,"difficulty":"易","question":"下列哪一个数是方程 5x−4=16 的解？","options":{"A":"2","B":"3","C":"4","D":"5"},"answer":"C","knowledge":"验根","explanation":"把x=4代入，5×4−4=16。","mistake":"未代回检查"},{"id":8,"difficulty":"中","question":"一本笔记本 x 元。小明买4本笔记本，又买2元胶带，共花30元。可列方程为：","options":{"A":"4x−2=30","B":"x+4+2=30","C":"2x+4=30","D":"4x+2=30"},"answer":"D","knowledge":"列方程","explanation":"4本笔记本共4x元，再加2元胶带，总价30元。","mistake":"数量与单价关系混淆"},{"id":9,"difficulty":"中","question":"哥哥年龄是弟弟的2倍多3岁。哥哥17岁，设弟弟 x 岁，可列方程为：","options":{"A":"2x−3=17","B":"2x+3=17","C":"x+2+3=17","D":"17+3=2x"},"answer":"B","knowledge":"年龄问题列方程","explanation":"哥哥年龄=弟弟年龄的2倍+3，所以2x+3=17。","mistake":"多3岁方向写反"},{"id":10,"difficulty":"难","question":"成人票每张12元，学生票每张8元。共买20张票，总价184元。设成人票 x 张，可列方程为：","options":{"A":"12x+8x=184","B":"12(20−x)+8x=184","C":"12x+8(20−x)=184","D":"8x+12x=20"},"answer":"C","knowledge":"复合情境列方程","explanation":"成人票x张，学生票20−x张，总价为12x+8(20−x)=184。","mistake":"成人票与学生票数量关系混淆"}];let idx=0,score=0,answers=[],startTime=0;const $=id=>document.getElementById(id);function show(id){$(id).classList.remove('hidden')}function hide(id){$(id).classList.add('hidden')}function render(){let q=QUESTIONS[idx];$('progressText').textContent='第 '+(idx+1)+' / '+QUESTIONS.length+' 题';$('scoreText').textContent='答对 '+score+' 题';$('bar').style.width=(idx/QUESTIONS.length*100)+'%';$('difficulty').textContent='难度：'+q.difficulty;$('knowledge').textContent='知识点：'+q.knowledge;$('qTitle').textContent=q.id+'. '+q.question;$('options').innerHTML='';hide('feedback');hide('nextBtn');Object.keys(q.options).forEach(k=>{let b=document.createElement('button');b.className='option';b.textContent=k+'. '+q.options[k];b.onclick=()=>choose(k,b);$('options').appendChild(b);});}function choose(k){let q=QUESTIONS[idx];let correct=k===q.answer;if(correct)score++;answers.push({id:q.id,answer:k,correct:correct,standard:q.answer,knowledge:q.knowledge,mistake:q.mistake});document.querySelectorAll('.option').forEach(btn=>{btn.disabled=true;let key=btn.textContent.charAt(0);if(key===q.answer)btn.classList.add('correct');if(key===k&&key!==q.answer)btn.classList.add('wrong');});$('feedback').innerHTML=(correct?'<span class="ok">答对了！</span>':'<span class="bad">答错了。</span>')+'<br>你的答案：'+k+'<br>正确答案：'+q.answer+'<br>解析：'+q.explanation+'<br>提醒：'+q.mistake;show('feedback');show('nextBtn');$('scoreText').textContent='答对 '+score+' 题';}function finish(){hide('quiz');show('result');let used=Math.round((Date.now()-startTime)/1000);let wrong=answers.filter(a=>!a.correct);let rate=Math.round(score/QUESTIONS.length*100);$('rScore').textContent='答对题数：'+score+'/'+QUESTIONS.length;$('rRate').textContent='正确率：'+rate+'%';$('rWrong').textContent='错题数：'+wrong.length;$('studentInfo').textContent='姓名：'+$('student_name').value+'；学号：'+$('student_no').value;$('timeInfo').textContent='用时：'+used+'秒';$('wrongInfo').textContent=wrong.length?wrong.map(a=>'第'+a.id+'题：'+a.knowledge+'，提醒：'+a.mistake).join('；'):'本次没有错题。';$('advice').textContent=wrong.length?'请把错题重新代回验算，特别注意等量关系、移项变号和括号处理。':'基础掌握良好，可继续挑战列方程应用题。';let payload={action:'submit_response',school_id:'kds',school_name:'关丹德信中学',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_name:'初二忠',chapter_name:'一元一次方程式',practice_id:'J1-10-07',practice_name:'初二忠｜一元一次方程式练习07',quiz_id:'quiz-J1-10-07',quiz_name:'一元一次方程式线上练习07',student_name:$('student_name').value,student_no:$('student_no').value,payload_student_no:$('student_no').value,total_questions:QUESTIONS.length,score:score,correct_count:score,wrong_count:wrong.length,accuracy:rate,answers:answers,time_used_seconds:used,submitted_at:new Date().toISOString()};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{$('rSubmit').textContent='提交状态：已提交';$('resultStatus').textContent='提交状态：已提交';}).catch(()=>{$('rSubmit').textContent='提交状态：提交可能失败，请截图交给老师';$('resultStatus').textContent='提交状态：需老师确认';});}$('startBtn').onclick=()=>{if(!$('student_name').value||!$('student_no').value){alert('请填写姓名和学号');return;}hide('start');show('quiz');startTime=Date.now();render();};$('nextBtn').onclick=()=>{idx++;if(idx>=QUESTIONS.length){finish()}else{render()}};</script></body></html>
