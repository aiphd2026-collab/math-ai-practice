<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>J2-09-01｜集合论基础概念图像练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}input:focus{border-color:#e69b43;box-shadow:0 0 0 4px rgba(244,155,51,.16)}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:block;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48;box-shadow:0 8px 20px rgba(31,143,112,.18)}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21;box-shadow:0 8px 20px rgba(201,83,66,.18)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#fff8df,#ffe5a8)}.stat b{display:block;font-size:1.35rem;color:#5b341e}.summary{line-height:1.8;background:#fff7ea;border:1px solid #ead8c1;border-radius:18px;padding:14px}.small{font-size:.9rem;color:#7d6a58;line-height:1.65}</style></head><body><div class="page"><div class="card"><section id="home"><div class="topband"><h1>集合论基础概念图像练习</h1><div class="pill">练习编号：J2-09-01</div><p class="sub">宽柔中学古来分校｜陈天龙老师<br>初二下册第9章｜集合论｜练习模式</p></div><label>班级</label><input id="className" value="初二A" required><label>学号</label><input id="studentNo" required><label>姓名</label><input id="studentName" required><label>座号（可选）</label><input id="seatNo"><button id="startBtn">开始练习</button><p class="small">开始后请依序作答。刷新或离开后，本次作答可能无法继续。</p></section><section id="quiz" class="hidden"><div class="progressBox"><div class="progressMeta"><span id="qIndex"></span><span id="scoreNow"></span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span class="tag" id="diffTag"></span><span class="tag" id="knowTag"></span></div><p class="qTitle" id="qText"></p><div id="diagram" class="diagram"></div><div id="diagramNote" class="diagramNote"></div><div id="opts"></div><div id="feedback" class="feedback"></div><button id="nextBtn" class="hidden">下一题</button></section><section id="done" class="hidden"><div class="topband"><h1>练习完成</h1><div class="pill">提交请求已发出</div><p class="sub">若老师稍后未看到数据，请截图给老师。</p></div><div class="stats"><div class="stat"><b id="finalScore"></b>得分</div><div class="stat"><b id="finalAcc"></b>正确率</div><div class="stat"><b id="finalWrong"></b>错题数</div><div class="stat"><b id="finalTime"></b>用时</div></div><div class="summary" id="doneInfo"></div><h3>错题记录</h3><div class="summary" id="wrongList"></div><h3>薄弱知识点</h3><div class="summary" id="weakList"></div><h3>学习总结</h3><div class="summary" id="learnSummary"></div></section></div></div><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"j2a",practice_id:"J2-09-01",practice_name:"集合论基础概念图像练习",practice_round:"01",quiz_id:"J2-09-01-Q",quiz_name:"集合论基础概念图像练习",chapter_name:"集合论",mode_label:"练习模式"};const svgBox=t=>`<svg viewBox='0 0 520 230' role='img'><rect x='12' y='12' width='496' height='206' rx='22' fill='#fffdf8' stroke='#b77d35' stroke-width='3'/><text x='260' y='45' text-anchor='middle' font-size='22' font-weight='700' fill='#5b341e'>${t}</text>`;const end=`</svg>`;const QUESTIONS=[{id:"Q1",text:"若集合 A = {2, 4, 6, 8}，下列哪一个元素属于集合 A？",options:{A:"4",B:"5",C:"7",D:"9"},answer:"A",knowledge:"元素与集合的关系",difficulty:"基础",explanation:"4 出现在集合 A 中，所以 4 ∈ A。",diagram_svg:svgBox('集合 A')+"<circle cx='260' cy='125' r='70' fill='#ffe1b8' stroke='#d68133' stroke-width='4'/><text x='260' y='125' text-anchor='middle' font-size='24' fill='#5b341e'>2, 4, 6, 8</text>"+end,visual_note:"集合示意图，圈内文字表示集合 A 的元素。",common_misconception:"把不属于集合的数误看成集合内元素。",coach_tip:"先看元素是否真的写在集合的大括号内。"},{id:"Q2",text:"若集合 B = {a, e, i, o, u}，则 n(B) 等于多少？",options:{A:"4",B:"5",C:"6",D:"7"},answer:"B",knowledge:"集合的基数",difficulty:"基础",explanation:"B 中有 5 个元素，所以 n(B)=5。",diagram_svg:svgBox('集合 B 的元素个数')+"<circle cx='260' cy='130' r='78' fill='#d7f1e4' stroke='#1f8f70' stroke-width='4'/><text x='215' y='110' font-size='25'>a</text><text x='260' y='105' font-size='25'>e</text><text x='305' y='110' font-size='25'>i</text><text x='235' y='155' font-size='25'>o</text><text x='285' y='155' font-size='25'>u</text>"+end,visual_note:"图中每个字母代表集合 B 的一个元素。",common_misconception:"把集合名称也算成元素。",coach_tip:"数基数时，只数集合里的元素，不数集合名称。"},{id:"Q3",text:"设 C = {1, 3, 5}，下列写法正确的是？",options:{A:"2 ∈ C",B:"4 ∈ C",C:"3 ∈ C",D:"6 ∈ C"},answer:"C",knowledge:"∈ 与 ∉ 的意义",difficulty:"基础",explanation:"3 是集合 C 的元素，所以 3 ∈ C。",diagram_svg:svgBox('集合 C')+"<circle cx='260' cy='130' r='75' fill='#ffe1d9' stroke='#c95342' stroke-width='4'/><text x='260' y='137' text-anchor='middle' font-size='26' fill='#6f2d22'>1, 3, 5</text>"+end,visual_note:"圈内列出的数就是集合 C 的元素。",common_misconception:"忽略集合中实际列出的元素。",coach_tip:"∈ 表示属于，先对照集合中是否有该元素。"},{id:"Q4",text:"下列哪一个符号表示空集？",options:{A:"{0}",B:"{ }",C:"{1}",D:"∅"},answer:"D",knowledge:"空集",difficulty:"基础",explanation:"空集可用 ∅ 表示；{0} 是含有元素 0 的集合，不是空集。",diagram_svg:svgBox('空集')+"<circle cx='260' cy='130' r='72' fill='#fffdf8' stroke='#7d6a58' stroke-width='4' stroke-dasharray='10 8'/><text x='260' y='137' text-anchor='middle' font-size='28' fill='#7d6a58'>没有元素</text>"+end,visual_note:"虚线空圈表示没有任何元素。",common_misconception:"把 {0} 当成空集。",coach_tip:"{0} 里有元素 0；空集是完全没有元素。"},{id:"Q5",text:"若集合 P 的每一个元素都属于集合 Q，则 P 与 Q 的关系是？",options:{A:"P ⊆ Q",B:"Q ⊆ P",C:"P = Q",D:"P ∩ Q = ∅"},answer:"A",knowledge:"子集",difficulty:"基础",explanation:"P 的每个元素都在 Q 中，所以 P 是 Q 的子集。",diagram_svg:svgBox('子集关系')+"<circle cx='260' cy='132' r='82' fill='#ffe6bd' stroke='#d68133' stroke-width='4'/><circle cx='260' cy='132' r='42' fill='#bfe6d2' stroke='#1f8f70' stroke-width='4'/><text x='260' y='90' text-anchor='middle' font-size='22'>Q</text><text x='260' y='139' text-anchor='middle' font-size='22'>P</text>"+end,visual_note:"小圆 P 完全在大圆 Q 内，表示 P 的元素都在 Q 中。",common_misconception:"把大集合和小集合的包含方向写反。",coach_tip:"看哪个圈在里面，里面的集合通常是外面集合的子集。"},{id:"Q6",text:"在维恩图中，A 与 B 的重叠部分表示什么？",options:{A:"A ∪ B",B:"A − B",C:"A ∩ B",D:"B − A"},answer:"C",knowledge:"交集",difficulty:"基础",explanation:"两个集合共同拥有的部分叫交集，记作 A ∩ B。",diagram_svg:svgBox('A 与 B 的重叠部分')+"<circle cx='220' cy='132' r='70' fill='#ffe1b8' stroke='#d68133' stroke-width='4'/><circle cx='300' cy='132' r='70' fill='#d7f1e4' stroke='#1f8f70' stroke-width='4'/><path d='M260 73 A70 70 0 0 1 260 191 A70 70 0 0 1 260 73' fill='#f08a73' opacity='.85'/><text x='185' y='132' font-size='22'>A</text><text x='325' y='132' font-size='22'>B</text>"+end,visual_note:"深色重叠区域表示两个集合共同的部分。",common_misconception:"把交集和联集混淆。",coach_tip:"交集看“共同”，只看重叠区域。"},{id:"Q7",text:"在维恩图中，A 与 B 两个圆的全部区域表示什么？",options:{A:"A ∪ B",B:"A ∩ B",C:"A − B",D:"∅"},answer:"A",knowledge:"联集",difficulty:"基础",explanation:"A ∪ B 表示属于 A 或属于 B 的所有元素。",diagram_svg:svgBox('A 与 B 的全部区域')+"<circle cx='220' cy='132' r='70' fill='#ffc985' stroke='#d68133' stroke-width='4'/><circle cx='300' cy='132' r='70' fill='#bfe6d2' stroke='#1f8f70' stroke-width='4' opacity='.9'/><text x='185' y='132' font-size='22'>A</text><text x='325' y='132' font-size='22'>B</text>"+end,visual_note:"两个圆的全部着色区域表示联集。",common_misconception:"只看重叠部分，漏掉两边各自独有部分。",coach_tip:"联集看“全部合起来”，两个集合中的元素都算。"},{id:"Q8",text:"在维恩图中，只属于 A 而不属于 B 的区域表示什么？",options:{A:"A ∩ B",B:"A ∪ B",C:"A − B",D:"B − A"},answer:"C",knowledge:"差集",difficulty:"中等",explanation:"A−B 表示在 A 中但不在 B 中的元素。",diagram_svg:svgBox('只属于 A 的部分')+"<circle cx='220' cy='132' r='70' fill='#f08a73' stroke='#d68133' stroke-width='4'/><circle cx='300' cy='132' r='70' fill='none' stroke='#1f8f70' stroke-width='4'/><path d='M260 73 A70 70 0 0 1 260 191 A70 70 0 0 1 260 73' fill='#fffdf8' opacity='.95'/><text x='185' y='132' font-size='22'>A</text><text x='325' y='132' font-size='22'>B</text>"+end,visual_note:"左边独有的着色区域表示 A 中有、B 中没有的部分。",common_misconception:"把 A−B 与 B−A 方向写反。",coach_tip:"A−B 要先站在 A 里面，再删掉与 B 重叠的部分。"},{id:"Q9",text:"若 U 是泛集，A′ 表示 A 的余集，则 A′ 是指什么？",options:{A:"属于 A 的元素",B:"同时属于 A 和 U 的元素",C:"U 中不属于 A 的元素",D:"不属于 U 的元素"},answer:"C",knowledge:"余集",difficulty:"中等",explanation:"A′ 表示在泛集 U 中，但不属于 A 的元素。",diagram_svg:svgBox('余集 A′')+"<rect x='90' y='70' width='340' height='125' rx='18' fill='#ffe7bd' stroke='#b77d35' stroke-width='4'/><circle cx='260' cy='132' r='55' fill='#fffdf8' stroke='#c95342' stroke-width='4'/><text x='105' y='95' font-size='22'>U</text><text x='260' y='139' text-anchor='middle' font-size='24'>A</text><text x='370' y='165' font-size='22'>A′</text>"+end,visual_note:"矩形表示泛集 U，圆外但仍在矩形内的部分表示 A 的余集。",common_misconception:"忘记余集必须在泛集范围内讨论。",coach_tip:"余集不是随便在外面找，而是在泛集 U 里排除 A。"},{id:"Q10",text:"若 A ∩ B = ∅，则 A 与 B 是什么关系？",options:{A:"等集",B:"子集",C:"联集",D:"相离集"},answer:"D",knowledge:"相离集",difficulty:"挑战",explanation:"两个集合没有共同元素时，称为相离集。",diagram_svg:svgBox('没有重叠的两个集合')+"<circle cx='190' cy='132' r='58' fill='#ffe1b8' stroke='#d68133' stroke-width='4'/><circle cx='330' cy='132' r='58' fill='#d7f1e4' stroke='#1f8f70' stroke-width='4'/><text x='190' y='139' text-anchor='middle' font-size='24'>A</text><text x='330' y='139' text-anchor='middle' font-size='24'>B</text>"+end,visual_note:"两个圆完全分开，表示没有共同元素。",common_misconception:"看到两个集合就误认为一定有交集。",coach_tip:"如果交集是空集，就说明两个集合没有重叠部分。"}];let order=[],idx=0,score=0,started=false,submitted=false,startTime=0,student={},answers=[];function $(id){return document.getElementById(id)}function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}window.addEventListener("beforeunload",e=>{if(started&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").onclick=()=>{let c=$("className").value.trim(),no=$("studentNo").value.trim(),name=$("studentName").value.trim(),seat=$("seatNo").value.trim();if(!c||!no||!name){alert("请填写班级、学号、姓名。座号可不填。");return}student={class_name:c,student_no:no,student_name:name,seat_no:seat};order=shuffle(QUESTIONS);idx=0;score=0;answers=[];startTime=Date.now();started=true;$("home").classList.add("hidden");$("quiz").classList.remove("hidden");showQ()};function showQ(){let q=order[idx];$("qIndex").textContent=`第 ${idx+1} / ${order.length} 题`;$("scoreNow").textContent=`当前得分 ${score}`;$("bar").style.width=((idx)/order.length*100)+"%";$("diffTag").textContent=q.difficulty;$("knowTag").textContent=q.knowledge;$("qText").textContent=q.text;$("diagram").innerHTML=q.diagram_svg||"";$("diagramNote").textContent=q.visual_note||"";$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").classList.add("hidden");$("opts").innerHTML="";Object.keys(q.options).forEach(k=>{let btn=document.createElement("button");btn.className="option";btn.textContent=k+". "+q.options[k];btn.onclick=()=>choose(k);$("opts").appendChild(btn)})}function choose(k){let q=order[idx],ok=k===q.answer;document.querySelectorAll(".option").forEach(b=>{b.disabled=true;let key=b.textContent.slice(0,1);if(key===q.answer)b.classList.add("correct");if(key===k&&!ok)b.classList.add("wrong")});if(ok)score++;answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:q.options[k],correct_answer:q.answer,correct_answer_text:q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});let fb=$("feedback");fb.className="feedback "+(ok?"ok":"bad");fb.innerHTML=`<b>${ok?"回答正确":"回答错误"}</b><br>你的答案：${k}. ${q.options[k]}<br>正确答案：${q.answer}. ${q.options[q.answer]}<br>解析：${q.explanation}<br>AI学习提示：${q.coach_tip}<br>本题知识点：${q.knowledge}`;$("nextBtn").textContent=idx===order.length-1?"完成并提交":"下一题";$("nextBtn").classList.remove("hidden")}$("nextBtn").onclick=()=>{if(idx<order.length-1){idx++;showQ()}else finish()};function finish(){submitted=true;started=false;$("quiz").classList.add("hidden");$("done").classList.remove("hidden");let timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000));let wrong=answers.filter(a=>!a.is_correct);let acc=Math.round(score/QUESTIONS.length*100);let weak=[...new Set(wrong.map(a=>a.knowledge_tag))];$("finalScore").textContent=score+"/"+QUESTIONS.length;$("finalAcc").textContent=acc+"%";$("finalWrong").textContent=wrong.length;$("finalTime").textContent=timeUsed+"秒";$("doneInfo").i
