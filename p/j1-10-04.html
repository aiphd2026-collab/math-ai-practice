<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>一元一次方程式线上练习04</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#f4e7ff,#ead4ff)}.stat b{display:block;font-size:1.34rem;color:var(--brown);line-height:1.2}.stat span{display:block;margin-top:8px;color:var(--muted);font-size:.9rem;font-weight:900}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.section h2{margin:0 0 8px;font-size:1.05rem;color:var(--brown)}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:linear-gradient(135deg,#fff6ec,#ffe8de);border:1px solid #e7c2ad;line-height:1.65}.small{font-size:.9rem;color:var(--muted);line-height:1.65}.infoGrid{display:grid;grid-template-columns:92px 1fr;gap:8px 12px;line-height:1.65;font-size:.96rem}.label{color:var(--muted);font-weight:900}.value{font-weight:700}.timeGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}.timeBox{background:linear-gradient(135deg,#fff8ee,#fff1dc);border:1px solid #ead6bc;border-radius:16px;padding:12px;line-height:1.45}.submitNotice{background:linear-gradient(135deg,#e5f8ed,#d5f1ff);border-left:6px solid #2e9b74;border-radius:18px;padding:15px;line-height:1.75;font-weight:700}@media(max-width:520px){.timeGrid{grid-template-columns:1fr 1fr}.infoGrid{grid-template-columns:78px 1fr}}</style></head><body><main class="page"><section id="home" class="card"><div class="topband"><h1>一元一次方程式线上练习04</h1><div class="pill">关丹德信中学｜陈天龙｜J1-10-04</div></div><p class="sub">一元一次方程式｜练习｜即时反馈</p><label for="className">班级</label><input id="className" autocomplete="off" placeholder="请输入班级，例如：初二忠"><label for="studentNo">学号</label><input id="studentNo" inputmode="numeric" autocomplete="off" placeholder="请输入学号"><label for="studentName">姓名</label><input id="studentName" autocomplete="off" placeholder="请输入姓名"><label for="seatNo">座号（可选）</label><input id="seatNo" inputmode="numeric" autocomplete="off" placeholder="如老师有要求，请填写座号"><button id="startBtn">开始练习</button><p class="small">每题作答后会立即显示解析，完成后会生成适合截图给老师的学习总结。作答资料会提交给老师用于学习记录。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="progressText">第1题 / 共10题</span><span id="scoreText">已得 0 分</span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="difficulty"></span><span class="tag" id="knowledge"></span></div><h1 class="qTitle" id="questionText"></h1><div class="diagram" id="diagram"></div><div id="options"></div><div class="feedback" id="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finish" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">J1-10-04｜初二忠｜一元一次方程式练习04</div></div><div class="stats"><div class="stat"><b id="finalScore">0/10</b><span>得分</span></div><div class="stat"><b id="finalRate">0%</b><span>正确率</span></div><div class="stat"><b id="finalWrong">0题</b><span>错题数</span></div><div class="stat"><b id="submitState">送达中…</b><span>提交状态</span></div></div><div class="section"><h2>学生资料</h2><div class="infoGrid"><div class="label">学校</div><div class="value" id="infoSchool"></div><div class="label">老师</div><div class="value" id="infoTeacher"></div><div class="label">班级</div><div class="value" id="infoClass"></div><div class="label">姓名</div><div class="value" id="infoStudent"></div><div class="label">座号</div><div class="value" id="infoSeat"></div><div class="label">章节</div><div class="value" id="infoChapter"></div></div></div><div class="section"><h2>作答时间</h2><div class="timeGrid"><div class="timeBox"><span class="label">开始时间</span><span class="value" id="startedAtDisplay"></span></div><div class="timeBox"><span class="label">完成时间</span><span class="value" id="completedAtDisplay"></span></div><div class="timeBox"><span class="label">总用时</span><span class="value" id="timeUsedDisplay"></span></div><div class="timeBox"><span class="label">平均每题</span><span class="value" id="avgTimeDisplay"></span></div></div></div><div class="section"><h2>错题整理</h2><div id="wrongAnalysis"></div></div><div class="section"><h2>学习建议</h2><div id="overallAnalysis"></div></div><section class="submitNotice" id="submitNotice"><div>提交状态：送达中…</div></section><p class="small">若老师尚未看到数据，请保留本页截图给老师。</p></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"",practice_id:"J1-10-04",practice_name:"初二忠｜一元一次方程式练习04",practice_round:"04",quiz_id:"quiz-J1-10-04",quiz_name:"一元一次方程式线上练习04",chapter_name:"一元一次方程式"};const QUESTIONS=[{"id":"q1","text":"下列哪一个是一元一次方程？","options":["x²+1=5","2x+3=9","x+y=6","3÷x=1"],"answer":1,"difficulty":"易","knowledge":"一元一次方程定义","explanation":"一元一次方程只含一个未知数，且未知数的次数是1。2x+3=9符合条件。","mistake":"把含两个未知数或二次项的式子误判为一元一次方程。","image_required":false},{"id":"q2","text":"方程 x+7=12 的解是：","options":["19","7","5","-5"],"answer":2,"difficulty":"易","knowledge":"等式性质","explanation":"两边同时减7，x=12-7=5。","mistake":"加法移项时忘记变号。","image_required":false},{"id":"q3","text":"解方程 3x=18，x=：","options":["6","15","21","54"],"answer":0,"difficulty":"易","knowledge":"两边同除以非零数","explanation":"两边同时除以3，x=18÷3=6。","mistake":"把乘法关系误当成加减关系。","image_required":false},{"id":"q4","text":"方程 x-4=9 的解是：","options":["5","-13","36","13"],"answer":3,"difficulty":"易","knowledge":"移项","explanation":"两边同时加4，x=9+4=13。","mistake":"移项后符号处理错误。","image_required":false},{"id":"q5","text":"解方程 2x+5=13，x=：","options":["9","4","6","18"],"answer":1,"difficulty":"易","knowledge":"两步方程","explanation":"先减5得2x=8，再除以2得x=4。","mistake":"先除以2而忘记先减5。","image_required":false},{"id":"q6","text":"解方程 5x-3=2x+9，x=：","options":["4","2","6","-4"],"answer":0,"difficulty":"易","knowledge":"含未知数两边的方程","explanation":"5x-2x=9+3，3x=12，x=4。","mistake":"移项时未知数项或常数项忘记变号。","image_required":false},{"id":"q7","text":"解方程 4(x-2)=12，x=：","options":["2","3","5","10"],"answer":2,"difficulty":"易","knowledge":"去括号","explanation":"4x-8=12，4x=20，x=5。","mistake":"括号内每一项没有都乘以4。","image_required":false},{"id":"q8","text":"解方程 (x+3)/2=5，x=：","options":["7","10","13","8"],"answer":0,"difficulty":"中","knowledge":"去分母","explanation":"两边同乘2，x+3=10，所以x=7。","mistake":"去分母后忘记处理括号。","image_required":false},{"id":"q9","text":"小明买了3本同价笔记本和一支RM2的笔，共付RM14。每本笔记本多少钱？","options":["RM3","RM4","RM5","RM6"],"answer":1,"difficulty":"中","knowledge":"列一元一次方程","explanation":"设每本笔记本RM x，则3x+2=14，3x=12，x=4。","mistake":"没有把“3本同价”转化为3x。","image_required":false},{"id":"q10","text":"一个数的2倍减5，比这个数加7还多6。这个数是：","options":["12","15","18","20"],"answer":2,"difficulty":"难","knowledge":"文字题建模","explanation":"设这个数为x，2x-5=(x+7)+6，解得x=18。","mistake":"没有正确理解“比……还多6”的等量关系。","image_required":false}];let order=[],index=0,score=0,startTime=0,questionStart=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=t=>String(t??"").replace(/[&<>\"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}function fmt(ms){const s=Math.max(0,Math.round(ms/1000));const m=Math.floor(s/60);const r=s%60;return m+"分"+String(r).padStart(2,"0")+"秒"}function dateText(d){return d.toLocaleString("zh-CN",{hour12:false})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();questionStart=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];questionStart=Date.now();$("progressText").textContent=`第${index+1}题 / 共${order.length}题`;$("scoreText").textContent=`已得 ${score} 题`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent="难度："+(q.difficulty||"易");$("knowledge").textContent="知识点："+(q.knowledge||"知识点");$("questionText").textContent=q.text;$("diagram").style.display="none";$("diagram").innerHTML="";$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成练习":"下一题";const box=$("options");box.innerHTML="";q.options.forEach((op,i)=>{const btn=document.createElement("button");btn.className="option";btn.textContent=String.fromCharCode(65+i)+". "+op;btn.onclick=()=>choose(btn,i,q);box.appendChild(btn)})}function choose(btn,i,q){Array.from(document.querySelectorAll(".option")).forEach((b,k)=>{b.disabled=true;if(k===q.answer)b.classList.add("correct")});const ok=i===q.answer;if(!ok)btn.classList.add("wrong");if(ok)score++;const used=Date.now()-questionStart;answers.push({question_id:q.id,question_text:q.text,selected_index:i,selected_answer:q.options[i],correct_index:q.answer,correct_answer:q.options[q.answer],is_correct:ok,knowledge:q.knowledge,difficulty:q.difficulty,time_used:used});$("feedback").className="feedback "+(ok?"ok":"bad");$("feedback").innerHTML=(ok?"✅ 回答正确。":"❌ 回答错误。")+"<br><b>解析：</b>"+esc(q.explanation)+"<br><b>常见错因：</b>"+esc(q.mistake);$("nextBtn").disabled=false}$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else finish()});function buildWrongAnalysisHtml(wrong){if(!wrong.length)return "<div class='analysisBox'>本次没有错题，保持这个节奏。</div>";return wrong.map(w=>`<div class='wrongItem'><div><b>${esc(w.question_text)}</b></div><div>你的答案：${esc(w.selected_answer)}｜正确答案：${esc(w.correct_answer)}</div><div>知识点：${esc(w.knowledge)}</div></div>`).join("")}function buildOverallAnalysisHtml(weak,wrong,rate){if(rate>=80)return "<div class='analysisBox'>整体掌握较好，可继续练习文字题建模与去分母步骤。</div>";if(wrong.length>=4)return "<div class='analysisBox'>建议先复习移项、去括号、去分母三类基本步骤，再完成同类型订正。</div>";return "<div class='analysisBox'>基础已有掌握，注意审题并写清等量关系。</div>"}function finish(){const total=order.length;const wrong=answers.filter(a=>!a.is_correct);const scoreValue=Math.round(score/total*100);const completedAtMs=Date.now();const timeUsed=completedAtMs-startTime;const avgTime=Math.round(timeUsed/total);const weak=[...new Set(wrong.map(w=>w.knowledge))];const startedAtDisplay=dateText(new Date(startTime));const completedAtDisplay=dateText(new Date(completedAtMs));$("barFill").style.width="100%";$("finalScore").textContent=score+"/"+total;$("finalRate").textContent=scoreValue+"%";$("finalWrong").textContent=wrong.length+"题";$("submitState").textContent="送达中…";$("infoSchool").textContent=META.school_name;$("infoTeacher").textContent=META.teacher_name;$("infoClass").textContent=$("className").value.trim();$("infoStudent").textContent=$("studentName").value.trim();$("infoSeat").textContent=$("seatNo").value.trim()||"未填写";$("infoChapter").textContent=META.chapter_name;$("startedAtDisplay").textContent=startedAtDisplay;$("completedAtDisplay").textContent=completedAtDisplay;$("timeUsedDisplay").textContent=fmt(timeUsed);$("avgTimeDisplay").textContent=fmt(avgTime);$("wrongAnalysis").innerHTML=buildWrongAnalysisHtml(wrong);$("overallAnalysis").innerHTML=buildOverallAnalysisHtml(weak,wrong,scoreValue);$("submitNotice").innerHTML="<div>提交状态：送达中…</div>";show("finish");submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime)}function submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime){const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:scoreValue,accuracy:scoreValue,total_questions:total,time_used:timeUsed,avg_time_used:avgTime,started_at:new Date(startTime).toISOString(),started_at_display:startedAtDisplay,completed_at:new Date(completedAtMs).toISOString(),completed_at_display:completedAtDisplay,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已送达";$("submitNotice").innerHTML="<div>✅ 作答资料已成功发送给老师。</div><div>老师将依据您的作答情况进行分析，请等待老师后续讲解与反馈。</div>"}).catch(()=>{$("submitState").textContent="提交失败";$("submitNotice").innerHTML="<div>提交失败，请保留本页截图给老师。</div>"})}</script></body></html>
