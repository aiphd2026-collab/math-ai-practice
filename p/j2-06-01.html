<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>初二上第6章周长与面积基础练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}input:focus{border-color:#e69b43;box-shadow:0 0 0 4px rgba(244,155,51,.16)}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48;box-shadow:0 8px 20px rgba(31,143,112,.18)}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21;box-shadow:0 8px 20px rgba(201,83,66,.18)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#efe4ff,#d8c2ff)}.stat b{display:block;font-size:1.35rem;color:#5b341e}.list{padding:12px 14px;border-radius:18px;background:#fff7ea;border:1px solid #ead8c1;line-height:1.7;margin:10px 0}.small{font-size:.88rem;color:var(--muted);line-height:1.65}.status{margin-top:12px;padding:12px;border-radius:16px;background:#fff0cb;color:#6d4512;font-weight:900;text-align:center}</style></head><body><main class="page"><section id="start" class="card"><div class="topband"><h1>初二上第6章周长与面积基础练习</h1><div class="pill">练习编号：J2-06-01</div><p class="sub">宽柔中学古来分校｜陈天龙老师<br>初二上册第6章｜周长与面积｜练习模式</p></div><label>班级</label><input id="class_name" value="初二A" required><label>学号</label><input id="student_no" required><label>姓名</label><input id="student_name" required><label>座号（可选）</label><input id="seat_no"><button onclick="startQuiz()">开始练习</button><p class="small">开始作答后，请尽量不要刷新或离开页面。完成页适合截图保存。</p></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="qNum">第1题</span><span id="scoreNow">得分 0</span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span class="tag" id="diff"></span><span class="tag" id="know"></span></div><p class="qTitle" id="qText"></p><div class="diagram" id="diagram"></div><p class="diagramNote" id="diagramNote"></p><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" class="hidden" onclick="nextQuestion()">下一题</button></section><section id="done" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">练习编号：J2-06-01</div><p class="sub">作答数据已送达。请保留本页截图，以备老师核对。</p></div><div class="stats"><div class="stat"><b id="finalScore">0</b>得分</div><div class="stat"><b id="finalAcc">0%</b>正确率</div><div class="stat"><b id="finalWrong">0</b>错题数</div><div class="stat"><b id="finalTime">0秒</b>用时</div></div><div class="list" id="studentInfo"></div><div class="list" id="wrongList"></div><div class="list" id="weakList"></div><div class="list" id="summary"></div><div class="status" id="submitStatus">提交中……</div></section></main><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'j2a',practice_id:'J2-06-01',practice_name:'初二上第6章周长与面积基础练习',practice_round:'01',quiz_id:'J2-06-01',quiz_name:'初二上第6章周长与面积基础练习',chapter_name:'初二上册第6章｜周长与面积',total_questions:10};const QUESTIONS=[{id:'Q1',text:'一个长方形的长为 12 cm，宽为 5 cm，它的周长是？',options:{A:'34 cm',B:'60 cm',C:'17 cm',D:'30 cm'},answer:'A',knowledge:'长方形周长',difficulty:'基础',explanation:'周长 = 2 × (12 + 5) = 34 cm。',diagram_svg:'<svg viewBox="0 0 360 170" xmlns="http://www.w3.org/2000/svg"><rect x="55" y="45" width="240" height="80" fill="#fff8dd" stroke="#8a5a24" stroke-width="4"/><text x="175" y="35" text-anchor="middle" font-size="20" fill="#5b341e">12 cm</text><text x="315" y="92" font-size="20" fill="#5b341e">5 cm</text></svg>',visual_note:'图形按长宽大致比例绘制。',common_misconception:'把周长误算成面积。',coach_tip:'看到“周长”，先沿外边界走一圈，不要直接长乘宽。'},{id:'Q2',text:'一个正方形的边长是 9 cm，它的面积是？',options:{A:'18 cm²',B:'81 cm²',C:'36 cm²',D:'72 cm²'},answer:'B',knowledge:'正方形面积',difficulty:'基础',explanation:'面积 = 9 × 9 = 81 cm²。',diagram_svg:'<svg viewBox="0 0 260 190" xmlns="http://www.w3.org/2000/svg"><rect x="65" y="35" width="120" height="120" fill="#fff8dd" stroke="#8a5a24" stroke-width="4"/><text x="125" y="28" text-anchor="middle" font-size="20" fill="#5b341e">9 cm</text><text x="195" y="100" font-size="20" fill="#5b341e">9 cm</text></svg>',visual_note:'正方形四条边相等。',common_misconception:'把面积算成 4 × 边长。',coach_tip:'面积看“铺满里面”，正方形面积是边长乘边长。'},{id:'Q3',text:'一个三角形的底是 10 cm，高是 6 cm，面积是？',options:{A:'60 cm²',B:'16 cm²',C:'30 cm²',D:'40 cm²'},answer:'C',knowledge:'三角形面积',difficulty:'基础',explanation:'面积 = 10 × 6 ÷ 2 = 30 cm²。',diagram_svg:'<svg viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg"><polygon points="70,165 290,165 160,45" fill="#fff8dd" stroke="#8a5a24" stroke-width="4"/><line x1="160" y1="45" x2="160" y2="165" stroke="#c05d2b" stroke-width="3" stroke-dasharray="6 5"/><path d="M160 150 L175 150 L175 165" fill="none" stroke="#c05d2b" stroke-width="3"/><text x="180" y="110" font-size="19" fill="#5b341e">6 cm</text><text x="180" y="192" text-anchor="middle" font-size="20" fill="#5b341e">10 cm</text></svg>',visual_note:'虚线表示三角形的高。',common_misconception:'忘记除以 2。',coach_tip:'三角形面积是同底同高平行四边形的一半。'},{id:'Q4',text:'一个平行四边形的底是 8 cm，高是 7 cm，面积是？',options:{A:'15 cm²',B:'28 cm²',C:'30 cm²',D:'56 cm²'},answer:'D',knowledge:'平行四边形面积',difficulty:'基础',explanation:'面积 = 底 × 高 = 8 × 7 = 56 cm²。',diagram_svg:'<svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg"><polygon points="90,150 270,150 310,55 130,55" fill="#fff8dd" stroke="#8a5a24" stroke-width="4"/><line x1="130" y1="55" x2="130" y2="150" stroke="#c05d2b" stroke-width="3" stroke-dasharray="6 5"/><path d="M130 135 L145 135 L145 150" fill="none" stroke="#c05d2b" stroke-width="3"/><text x="180" y="178" text-anchor="middle" font-size="20" fill="#5b341e">8 cm</text><text x="145" y="105" font-size="19" fill="#5b341e">7 cm</text></svg>',visual_note:'虚线表示高，不是斜边。',common_misconception:'把斜边当作高。',coach_tip:'平行四边形面积只看底和垂直高度。'},{id:'Q5',text:'一个梯形的上底是 6 cm，下底是 14 cm，高是 5 cm，面积是？',options:{A:'50 cm²',B:'25 cm²',C:'70 cm²',D:'100 cm²'},answer:'A',knowledge:'梯形面积',difficulty:'基础',explanation:'面积 = (6 + 14) × 5 ÷ 2 = 50 cm²。',diagram_svg:'<svg viewBox="0 0 380 210" xmlns="http://www.w3.org/2000/svg"><polygon points="75,160 305,160 240,65 140,65" fill="#fff8dd" stroke="#8a5a24" stroke-width="4"/><line x1="140" y1="65" x2="140" y2="160" stroke="#c05d2b" stroke-width="3" stroke-dasharray="6 5"/><path d="M140 145 L155 145 L155 160" fill="none" stroke="#c05d2b" stroke-width="3"/><text x="190" y="55" text-anchor="middle" font-size="19" fill="#5b341e">6 cm</text><text x="190" y="188" text-anchor="middle" font-size="20" fill="#5b341e">14 cm</text><text x="155" y="115" font-size="19" fill="#5b341e">5 cm</text></svg>',visual_note:'上底和下底长度已按大致比例绘制。',common_misconception:'忘记乘高后再除以 2。',coach_tip:'梯形面积先求上下底的和，再乘高，最后除以2。'},{id:'Q6',text:'一个圆的半径是 7 cm，取 π = 22/7，它的周长是？',options:{A:'22 cm',B:'44 cm',C:'49 cm',D:'154 cm'},answer:'B',knowledge:'圆的周长',difficulty:'基础',explanation:'圆周长 = 2πr = 2 × 22/7 × 7 = 44 cm。',diagram_svg:'<svg viewBox="0 0 280 210" xmlns="http://www.w3.org/2000/svg"><circle cx="140" cy="105" r="70" fill="#fff8dd" stroke="#8a5a24" stroke-width="4"/><line x1="140" y1="105" x2="210" y2="105" stroke="#c05d2b" stroke-width="4"/><circle cx="140" cy="105" r="4" fill="#5b341e"/><text x="174" y="96" font-size="20" fill="#5b341e">7 cm</text></svg>',visual_note:'线段表示半径。',common_misconception:'把半径直接代入 πr。',coach_tip:'圆周长公式是2πr；若给直径才用πd。'},{id:'Q7',text:'一个圆的直径是 10 cm，取 π = 3.14，它的面积是？',options:{A:'31.4 cm²',B:'100 cm²',C:'78.5 cm²',D:'314 cm²'},answer:'C',knowledge:'圆的面积',difficulty:'基础',explanation:'半径 = 10 ÷ 2 = 5 cm，面积 = 3.14 × 5² = 78.5 cm²。',diagram_svg:'<svg viewBox="0 0 310 210" xmlns="http://www.w3.org/2000/svg"><circle cx="155" cy="105" r="70" fill="#fff8dd" stroke="#8a5a24" stroke-width="4"/><line x1="85" y1="105" x2="225" y2="105" stroke="#c05d2b" stroke-width="4"/><text x="155" y="92" text-anchor="middle" font-size="20" fill="#5b341e">10 cm</text></svg>',visual_note:'线段表示直径，求面积前要先除以2得到半径。',common_misconception:'把直径当作半径。',coach_tip:'圆面积一定用半径平方，不是直径平方。'},{id:'Q8',text:'一个由两个相同正方形拼成的长方形，每个正方形边长是 6 cm。这个长方形的周长是？',options:{A:'36 cm',B:'48 cm',C:'72 cm',D:'24 cm'},answer:'A',knowledge:'组合图形周长',difficulty:'中等',explanation:'拼成长方形后，长 = 12 cm，宽 = 6 cm，周长 = 2 × (12 + 6) = 36 cm。',diagram_svg:'<svg viewBox="0 0 360 190" xmlns="http://www.w3.org/2000/svg"><rect x="70" y="50" width="220" height="110" fill="#fff8dd" stroke="#8a5a24" stroke-width="4"/><line x1="180" y1="50" x2="180" y2="160" stroke="#8a5a24" stroke-width="3"/><text x="125" y="43" text-anchor="middle" font-size="18" fill="#5b341e">6 cm</text><text x="235" y="43" text-anchor="middle" font-size="18" fill="#5b341e">6 cm</text><text x="300" y="110" font-size="18" fill="#5b341e">6 cm</text></svg>',visual_note:'两个正方形拼成一个长方形，中间线不是外周长。',common_misconception:'把两个正方形周长直接相加，重复计算中间边。',coach_tip:'组合图形求周长时，只看最外面的边。'},{id:'Q9',text:'一个阴影图形可看作边长 10 cm 的正方形中挖去一个长 6 cm、宽 4 cm 的长方形。阴影部分面积是？',options:{A:'24 cm²',B:'60 cm²',C:'76 cm²',D:'100 cm²'},answer:'C',knowledge:'组合图形面积',difficulty:'中等',explanation:'正方形面积 = 100 cm²，长方形面积 = 24 cm²，阴影面积 = 100 − 24 = 76 cm²。',diagram_svg:'<svg viewBox="0 0 300 230" xmlns="http://www.w3.org/2000/svg"><rect x="70" y="40" width="150" height="150" fill="#f7d18b" stroke="#8a5a24" stroke-width="4"/><rect x="130" y="95" width="90" height="60" fill="#fffdf8" stroke="#c05d2b" stroke-width="4"/><text x="145" y="30" text-anchor="middle" font-size="18" fill="#5b341e">10 cm</text><text x="175" y="88" text-anchor="middle" font-size="18" fill="#5b341e">6 cm</text><text x="230" y="130" font-size="18" fill="#5b341e">4 cm</text></svg>',visual_note:'浅色小长方形表示被挖去的部分。',common_misconception:'只算被挖去部分，或忘记用大面积减小面积。',coach_tip:'阴影面积常用“大图形面积 − 挖去部分面积”。'},{id:'Q10',text:'一块长方形草地长 20 m，宽 12 m，四周铺一圈宽 1 m 的小路。小路的面积是多少？',options:{A:'240 m²',B:'304 m²',C:'64 m²',D:'68 m²'},answer:'D',knowledge:'环形组合面积',difficulty:'挑战',explanation:'外部长方形长 = 22 m，宽 = 14 m，面积 = 308 m²；草地面积 = 240 m²；小路面积 = 308 − 240 = 68 m²。',diagram_svg:'<svg viewBox="0 0 390 245" xmlns="http://www.w3.org/2000/svg"><rect x="45" y="35" width="300" height="170" fill="#e8c58a" stroke="#8a5a24" stroke-width="4"/><rect x="75" y="65" width="240" height="110" fill="#bfe6b8" stroke="#3c7b45" stroke-width="4"/><text x="195" y="60" text-anchor="middle" font-size="18" fill="#5b341e">小路宽 1 m</text><text x="195" y="198" text-anchor="middle" font-size="18" fill="#5b341e">草地长 20 m</text><text x="325" y="125" font-size="18" fill="#5b341e">草地宽 12 m</text></svg>',visual_note:'图中外圈表示小路，四周各增加1 m。',common_misconception:'只算一边小路，或没有把长和宽各增加 2 m。',coach_tip:'四周各宽1 m，外长和外宽都要增加2 m。'}];let order=[],idx=0,score=0,startTime=0,locked=false,done=false,answers=[];function shuffle(a){return a.map(x=>[Math.random(),x]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}function startQuiz(){const c=document.getElementById('class_name').value.trim(),no=document.getElementById('student_no').value.trim(),name=document.getElementById('student_name').value.trim();if(!c||!no||!name){alert('请填写班级、学号、姓名');return}order=shuffle(QUESTIONS);idx=0;score=0;answers=[];startTime=Date.now();locked=true;document.getElementById('start').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');render()}function render(){const q=order[idx];document.getElementById('qNum').textContent='第 '+(idx+1)+' / '+order.length+' 题';document.getElementById('scoreNow').textContent='得分 '+score;document.getElementById('bar').style.width=((idx)/order.length*100)+'%';document.getElementById('diff').textContent=q.difficulty;document.getElementById('know').textContent=q.knowledge;document.getElementById('qText').textContent=q.text;const d=document.getElementById('diagram'),dn=document.getElementById('diagramNote');if(q.diagram_svg){d.style.display='block';d.innerHTML=q.diagram_svg;dn.textContent=q.visual_note||''}else{d.style.display='none';d.innerHTML='';dn.textContent=''}const ops=document.getElementById('options');ops.innerHTML='';['A','B','C','D'].forEach(k=>{const b=document.createElement('button');b.className='option';b.textContent=k+'. '+q.options[k];b.onclick=()=>choose(k,b);ops.appendChild(b)});document.getElementById('feedback').className='feedback';document.getElementById('feedback').innerHTML='';document.getElementById('nextBtn').classList.add('hidden');document.getElementById('nextBtn').textContent=idx===order.length-1?'完成并提交':'下一题'}function choose(k,btn){const q=order[idx];document.querySelectorAll('.option').forEach(b=>b.disabled=true);const ok=k===q.answer;if(ok)score++;document.querySelectorAll('.option').forEach(b=>{if(b.textContent.startsWith(q.answer+'.'))b.classList.add('correct');if(b===btn&&!ok)b.classList.add('wrong')});answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});const f=document.getElementById('feedback');f.className='feedback '+(ok?'ok':'bad');f.innerHTML='<b>'+(ok?'答对了':'还可以再检查')+'</b><br>你的答案：'+k+'. '+q.options[k]+'<br>正确答案：'+q.answer+'. '+q.options[q.answer]+'<br>解析：'+q.explanation+'<br>AI学习提示：'+q.coach_tip+'<br>本题知识点：'+q.knowledge;document.getElementById('scoreNow').textContent='得分 '+score;document.getElementById('nextBtn').classList.remove('hidden')}function nextQuestion(){if(idx<order.length-1){idx++;render()}else finish()}function finish(){done=true;locked=false;document.getElementById('quiz').classList.add('hidden');document.getElementById('done').classList.remove('hidden');document.getElementById('bar').style.width='100%';const used=Math.max(1,Math.round((Date.now()-startTime)/1000));const wrong=answers.filter(a=>!a.is_correct);const weak=[...new Set(wrong.map(a=>a.knowledge_tag))];const acc=Math.round(score/order.length*100);document.getElementById('finalScore').textContent=score+' / '+order.length;document.getElementById('finalAcc').textContent=acc+'%';document.getElementById('finalWrong').textContent=wrong.length;document.getElementById('finalTime').textContent=used
