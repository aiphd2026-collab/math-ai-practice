<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>一元一次方程式线上练习06</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok:#2e9b74;--bad:#d85b4a;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;padding:14px;background:#fff8ee}.stat b{display:block;font-size:1.34rem;color:var(--brown)}.stat span{display:block;margin-top:8px;color:var(--muted);font-size:.9rem;font-weight:900}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.infoGrid{display:grid;grid-template-columns:92px 1fr;gap:8px 12px;line-height:1.65;font-size:.96rem}.label{color:var(--muted);font-weight:900}.value{font-weight:700}.timeGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}.timeBox{background:#fff8ee;border:1px solid #ead6bc;border-radius:16px;padding:12px;line-height:1.45}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:#fff6ec;border:1px solid #e7c2ad}.analysisBox{background:linear-gradient(135deg,#eef9f3,#e3f6ff);border:1px solid #c9e6d8;border-radius:18px;padding:14px;line-height:1.75}.submitNotice{background:linear-gradient(135deg,#e5f8ed,#d5f1ff);border-left:6px solid #2e9b74;border-radius:18px;padding:15px;line-height:1.75;font-weight:700}.small{font-size:.9rem;color:var(--muted)}@media(max-width:520px){.stats,.timeGrid{grid-template-columns:1fr 1fr}h1{font-size:1.28rem}}</style></head><body><main class="page"><section id="home" class="card"><div class="topband"><h1>一元一次方程式线上练习</h1><div class="pill">J1-10-06｜初二忠｜共10题</div></div><p class="sub">请填写资料后开始作答。系统会记录得分、正确率、错题、用时与薄弱知识点。</p><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo" placeholder="请输入学号"><label>姓名</label><input id="studentName" placeholder="请输入姓名"><label>座号（可不填）</label><input id="seatNo" placeholder="请输入座号"><button id="startBtn">开始练习</button></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><div id="progressText">第1题 / 共10题</div><div id="scoreText">已得 0 分</div></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="difficulty">难度</span><span class="tag" id="knowledge">知识点</span></div><div class="qTitle" id="questionText"></div><div class="diagram" id="diagram"></div><div id="diagramNote" class="small hidden"></div><div id="options"></div><div class="feedback" id="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finish" class="card hidden"><div class="topband"><h1>练习完成</h1><div class="pill">J1-10-06｜初二忠｜一元一次方程式练习06</div></div><div class="stats"><div class="stat"><b id="finalScore">0/10</b><span>得分</span></div><div class="stat"><b id="finalRate">0%</b><span>正确率</span></div><div class="stat"><b id="finalWrong">0题</b><span>错题数</span></div><div class="stat"><b id="submitState">送达中…</b><span>提交状态</span></div></div><div class="section"><h2>学生资料</h2><div class="infoGrid"><div class="label">学校</div><div class="value" id="infoSchool"></div><div class="label">老师</div><div class="value" id="infoTeacher"></div><div class="label">班级</div><div class="value" id="infoClass"></div><div class="label">姓名</div><div class="value" id="infoStudent"></div><div class="label">座号</div><div class="value" id="infoSeat"></div><div class="label">章节</div><div class="value" id="infoChapter"></div></div></div><div class="section"><h2>用时记录</h2><div class="timeGrid"><div class="timeBox"><span class="label">开始时间</span><span class="value" id="startedAtDisplay"></span></div><div class="timeBox"><span class="label">完成时间</span><span class="value" id="completedAtDisplay"></span></div><div class="timeBox"><span class="label">总用时</span><span class="value" id="timeUsedDisplay"></span></div><div class="timeBox"><span class="label">平均每题</span><span class="value" id="avgTimeDisplay"></span></div></div></div><div class="section"><h2>错题分析</h2><div id="wrongAnalysis"></div></div><div class="section"><h2>整体建议</h2><div class="analysisBox" id="overallAnalysis"></div></div><div class="section submitNotice" id="submitNotice"><div>提交状态：送达中…</div></div></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"初二忠",practice_id:"J1-10-06",practice_name:"初二忠｜一元一次方程式练习06",practice_round:"06",quiz_id:"quiz-J1-10-06",quiz_name:"一元一次方程式线上练习06",chapter_name:"一元一次方程式"};const QUESTIONS=[{"id":"Q1","difficulty":"易","text":"解方程：x + 7 = 15","options":{"A":"8","B":"7","C":"22","D":"-8"},"answer":"A","knowledge":"移项","explanation":"x = 15 - 7 = 8。","common_misconception":"移项后符号错误。","image_required":false},{"id":"Q2","difficulty":"易","text":"解方程：3x = 21","options":{"A":"6","B":"7","C":"18","D":"24"},"answer":"B","knowledge":"系数化为1","explanation":"两边同时除以3，x = 7。","common_misconception":"把除以3误算成减3。","image_required":false},{"id":"Q3","difficulty":"易","text":"解方程：x ÷ 5 = 4","options":{"A":"9","B":"1","C":"20","D":"-20"},"answer":"C","knowledge":"等式性质","explanation":"两边同时乘以5，x = 20。","common_misconception":"两边同乘5时漏乘。","image_required":false},{"id":"Q4","difficulty":"易","text":"解方程：2x - 3 = 11","options":{"A":"4","B":"5","C":"6","D":"7"},"answer":"D","knowledge":"两步方程","explanation":"2x = 14，所以 x = 7。","common_misconception":"先除再移项，顺序混乱。","image_required":false},{"id":"Q5","difficulty":"易","text":"解方程：2(x + 3) = 14","options":{"A":"4","B":"5","C":"7","D":"10"},"answer":"A","knowledge":"去括号","explanation":"2x + 6 = 14，2x = 8，x = 4。","common_misconception":"漏乘括号内常数项。","image_required":false},{"id":"Q6","difficulty":"易","text":"解方程：(x - 2) ÷ 3 = 5","options":{"A":"13","B":"17","C":"7","D":"15"},"answer":"B","knowledge":"逆运算","explanation":"x - 2 = 15，所以 x = 17。","common_misconception":"先加2、乘3的顺序颠倒。","image_required":false},{"id":"Q7","difficulty":"中","text":"爸爸今年的年龄比小明年龄的3倍多4岁。5年后，爸爸年龄比小明年龄的2倍多9岁。小明今年多少岁？","options":{"A":"6","B":"8","C":"10","D":"12"},"answer":"C","knowledge":"列一元一次方程","explanation":"设小明今年x岁，3x+4+5=2(x+5)+9，解得x=10。","common_misconception":"没有同时给两人的年龄加5。","image_required":false},{"id":"Q8","difficulty":"中","text":"一支笔 x 元，一本笔记本比一支笔贵3元。买2支笔和3本笔记本共19元。一支笔多少元？","options":{"A":"5","B":"4","C":"3","D":"2"},"answer":"D","knowledge":"数量关系建模","explanation":"2x+3(x+3)=19，5x+9=19，x=2。","common_misconception":"把“贵3元”写成乘3。","image_required":false},{"id":"Q9","difficulty":"易","text":"解方程：(x + 1) ÷ 2 = 3","options":{"A":"5","B":"4","C":"6","D":"7"},"answer":"A","knowledge":"去分母","explanation":"x + 1 = 6，所以 x = 5。","common_misconception":"只乘x，漏乘1。","image_required":false},{"id":"Q10","difficulty":"难","text":"商店原有练习本若干本，卖出原来的1/3后，又进货40本，此时比原来多10本。商店原有练习本多少本？","options":{"A":"60","B":"90","C":"120","D":"150"},"answer":"B","knowledge":"分数关系与方程建模","explanation":"设原有x本，x - x/3 + 40 = x + 10，解得x = 90。","common_misconception":"把“卖出1/3”误当作剩下1/3。","image_required":false}];let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=text=>String(text??"").replace(/[&<>\"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / 共${order.length}题`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent=`难度：${q.difficulty}`;$("knowledge").textContent=`知识点：${q.knowledge}`;$("questionText").textContent=q.text;if(q.image_required===true&&q.diagram_svg){$("diagram").style.display="block";$("diagram").innerHTML=q.diagram_svg}else{$("diagram").style.display="none";$("diagram").innerHTML=""}$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.dataset.option=key;btn.textContent=`${key}. ${value}`;$("options").appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||""}`}function coachTip(q,correct){if(correct)return "继续保持：先找条件，再确认题目问的是哪个量。";return `常见错因：${q.common_misconception||"建议回看本题对应知识点。"}`}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.dataset.option===q.answer)btn.classList.add("correct");if(btn.dataset.option===selected&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||"",explanation:q.explanation||"",common_misconception:q.common_misconception||"",coach_tip:coachTip(q,correct)});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<b>${correct?"答对了":"还差一点"}</b><br>你的答案：${esc(selectedText)}<br>正确答案：${esc(correctText)}<br>解析：${esc(q.explanation)}<br><b>AI学习提示：</b>${esc(coachTip(q,correct))}<br>知识点：${esc(q.knowledge)}`;$("nextBtn").disabled=false;$("barFill").style.width=`${(index+1)/order.length*100}%`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`}$("options").addEventListener("click",e=>{const btn=e.target.closest(".option");if(!btn||btn.disabled)return;chooseAnswer(btn.dataset.option)});$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else{renderFinish()}});function formatDateTime(ms){const d=new Date(ms);const pad=n=>String(n).padStart(2,"0");return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}function formatDuration(sec){sec=Math.max(0,Math.round(Number(sec)||0));const m=Math.floor(sec/60),s=sec%60;return m>0?`${m}分${s}秒`:`${s}秒`}function buildWrongAnalysisHtml(wrong){if(!wrong.length)return "<p>本次没有错题，保持这个节奏。</p>";return wrong.map(a=>`<div class="wrongItem"><b>第${a.display_order}题</b><div>题目：${esc(a.question_text)}</div><div>你的答案：${esc(a.selected_answer_text)}</div><div>正确答案：${esc(a.correct_answer_text)}</div><div>解析：${esc(a.explanation)}</div><div>学习提示：${esc(a.common_misconception||a.coach_tip)}</div></div>`).join("")}function buildOverallAnalysisHtml(weak,wrong,scoreValue){if(!wrong.length)return "本次掌握较稳定，可以继续挑战中等题。";const weakText=weak.length?weak.join("、"):"相关知识点";const levelText=scoreValue>=80?"整体基础较稳，主要需要修正少数易错点。":"本次还有较明显卡点，建议先巩固基础题，再进入变式题。";return `<div><b>薄弱知识点：</b>${esc(weakText)}</div><div><b>整体表现：</b>${esc(levelText)}</div><div><b>下一步建议：</b>建议先复习 ${esc(weakText)}，再完成3至5题同类基础题。</div>`}function renderFinish(){const total=order.length,scoreValue=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))],completedAtMs=Date.now(),timeUsed=Math.max(1,Math.round((completedAtMs-startTime)/1000)),avgTime=total?Math.round(timeUsed/total):0,startedAtDisplay=formatDateTime(startTime),completedAtDisplay=formatDateTime(completedAtMs);$("finalScore").textContent=score+"/"+total;$("finalRate").textContent=scoreValue+"%";$("finalWrong").textContent=wrong.length+"题";$("submitState").textContent="送达中…";$("infoSchool").textContent=META.school_name;$("infoTeacher").textContent=META.teacher_name;$("infoClass").textContent=$("className").value.trim();$("infoStudent").textContent=$("studentName").value.trim();$("infoSeat").textContent=$("seatNo").value.trim()||"未填写";$("infoChapter").textContent=META.chapter_name;$("startedAtDisplay").textContent=startedAtDisplay;$("completedAtDisplay").textContent=completedAtDisplay;$("timeUsedDisplay").textContent=formatDuration(timeUsed);$("avgTimeDisplay").textContent=formatDuration(avgTime);$("wrongAnalysis").innerHTML=buildWrongAnalysisHtml(wrong);$("overallAnalysis").innerHTML=buildOverallAnalysisHtml(weak,wrong,scoreValue);$("submitNotice").innerHTML="<div>提交状态：送达中…</div>";show("finish");submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime)}function submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime){const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value.trim(),student_no:$("studentNo").value.trim(),student_name:$("studentName").value.trim(),seat_no:$("seatNo").value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:scoreValue,accuracy:scoreValue,total_questions:total,time_used:timeUsed,avg_time_used:avgTime,started_at:new Date(startTime).toISOString(),started_at_display:startedAtDisplay,completed_at:new Date(completedAtMs).toISOString(),completed_at_display:completedAtDisplay,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已送达";$("submitNotice").innerHTML="<div>✅ 作答资料已成功发送给老师。</div><div>老师将依据您的作答情况进行分析，请等待老师后续讲解与反馈。</div><div class='small'>若老师尚未看到数据，请保留本页截图。</div>"}).catch(()=>{$("submitState").textContent="提交失败";$("submitNotice").innerHTML="<div>提交状态：提交失败。</div><div>请保留本页截图给老师核对。</div>"})}</script></body></html>
