<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>J1-10-05｜一元一次方程式线上练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}input:focus{border-color:#e69b43;box-shadow:0 0 0 4px rgba(244,155,51,.16)}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#f4e7ff,#ead4ff)}.stat b{display:block;font-size:1.34rem;color:var(--brown);line-height:1.2}.stat span{display:block;margin-top:8px;color:var(--muted);font-size:.9rem;font-weight:900}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.section h2{margin:0 0 8px;font-size:1.05rem;color:var(--brown)}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:linear-gradient(135deg,#fff6ec,#ffe8de);border:1px solid #e7c2ad;line-height:1.65}.small{font-size:.9rem;color:var(--muted);line-height:1.65}.infoGrid{display:grid;grid-template-columns:92px 1fr;gap:8px 12px;line-height:1.65;font-size:.96rem}.label{color:var(--muted);font-weight:900}.value{font-weight:700}.timeGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}.timeBox{background:linear-gradient(135deg,#fff8ee,#fff1dc);border:1px solid #ead6bc;border-radius:16px;padding:12px;line-height:1.45}.wrongHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:6px;font-weight:900;color:var(--brown)}.line{margin:5px 0}.analysisBox{background:linear-gradient(135deg,#eef9f3,#e3f6ff);border:1px solid #c9e6d8;border-radius:18px;padding:14px;line-height:1.75}.submitNotice{background:linear-gradient(135deg,#e5f8ed,#d5f1ff);border-left:6px solid #2e9b74;border-radius:18px;padding:15px;line-height:1.75;font-weight:700}</style></head><body><main class="page"><section class="card" id="home"><div class="topband"><h1>一元一次方程式线上练习</h1><div class="pill">J1-10-05｜初二忠</div></div><p class="sub">请填写资料后开始作答。完成后会显示得分、正确率、错题分析与提交状态。</p><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo" placeholder="请输入学号"><label>姓名</label><input id="studentName" placeholder="请输入姓名"><label>座号（可选）</label><input id="seatNo" placeholder="可不填"><button id="startBtn">开始练习</button></section><section class="card hidden" id="quiz"><div class="progressBox"><div class="progressMeta"><span id="progressText">第1题 / 共10题</span><span id="scoreText">已得 0 分</span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="difficulty"></span><span class="tag" id="knowledge"></span></div><div class="qTitle" id="questionText"></div><div class="diagram" id="diagram"></div><div class="diagramNote hidden" id="diagramNote"></div><div id="options"></div><div class="feedback" id="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section class="hidden" id="finish"><section class="card"><div class="topband"><h1>练习完成</h1><div class="pill">J1-10-05｜初二忠｜一元一次方程式练习05</div></div><div class="stats"><div class="stat"><b id="finalScore">0/10</b><span>得分</span></div><div class="stat"><b id="finalRate">0%</b><span>正确率</span></div><div class="stat"><b id="finalWrong">0题</b><span>错题数</span></div><div class="stat"><b id="submitState">送达中…</b><span>提交状态</span></div></div></section><section class="card"><h2>作答资讯</h2><div class="infoGrid"><div class="label">学校</div><div class="value" id="infoSchool"></div><div class="label">老师</div><div class="value" id="infoTeacher"></div><div class="label">班级</div><div class="value" id="infoClass"></div><div class="label">姓名</div><div class="value" id="infoStudent"></div><div class="label">座号</div><div class="value" id="infoSeat"></div><div class="label">章节</div><div class="value" id="infoChapter"></div></div><div class="timeGrid"><div class="timeBox"><span class="label">开始时间</span><span class="value" id="startedAtDisplay"></span></div><div class="timeBox"><span class="label">完成时间</span><span class="value" id="completedAtDisplay"></span></div><div class="timeBox"><span class="label">总用时</span><span class="value" id="timeUsedDisplay"></span></div><div class="timeBox"><span class="label">平均每题</span><span class="value" id="avgTimeDisplay"></span></div></div></section><section class="card"><h2>详细错题分析</h2><div id="wrongAnalysis"></div></section><section class="card"><h2>整体学习分析</h2><div class="analysisBox" id="overallAnalysis"></div></section><section class="submitNotice" id="submitNotice"><div>提交状态：送达中…</div></section></section></main><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kds",school_name:"关丹德信中学",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"初二忠",practice_id:"J1-10-05",practice_name:"初二忠｜一元一次方程式练习05",practice_round:"05",quiz_id:"quiz-J1-10-05",quiz_name:"一元一次方程式线上练习05",chapter_name:"一元一次方程式"};const QUESTIONS=[{id:"q1",text:"下列哪一个是一元一次方程式？",options:{A:"3x+2",B:"3x+2=8",C:"x²+1=5",D:"2x+y=7"},answer:"B",difficulty:"易",knowledge:"一元一次方程式定义",explanation:"一元一次方程式必须含有一个未知数，未知数次数为1，并且是等式。",common_misconception:"把代数式误认为方程。",coach_tip:"先看是否有等号，再看未知数个数和次数。",image_required:false},{id:"q2",text:"解方程：x+7=15。",options:{A:"6",B:"7",C:"9",D:"8"},answer:"D",difficulty:"易",knowledge:"等式性质",explanation:"x=15−7=8。",common_misconception:"移项时符号处理错误。",coach_tip:"移项时加号变减号。",image_required:false},{id:"q3",text:"解方程：4x=28。",options:{A:"7",B:"6",C:"8",D:"9"},answer:"A",difficulty:"易",knowledge:"两边同除以非零数",explanation:"x=28÷4=7。",common_misconception:"把乘法关系看成加法关系。",coach_tip:"未知数前有系数时，两边同除以这个系数。",image_required:false},{id:"q4",text:"解方程：x/3+2=6。",options:{A:"9",B:"10",C:"12",D:"15"},answer:"C",difficulty:"易",knowledge:"去分母与移项",explanation:"x/3=4，所以x=12。",common_misconception:"先减2后未乘以3。",coach_tip:"先移项，再去分母。",image_required:false},{id:"q5",text:"解方程：2(x−3)=10。",options:{A:"7",B:"8",C:"9",D:"10"},answer:"B",difficulty:"易",knowledge:"去括号",explanation:"x−3=5，所以x=8。",common_misconception:"去括号时漏乘常数项。",coach_tip:"可先两边除以2，再解括号内的方程。",image_required:false},{id:"q6",text:"解方程：5x−4=2x+11。",options:{A:"5",B:"4",C:"6",D:"7"},answer:"A",difficulty:"易",knowledge:"移项与合并同类项",explanation:"5x−2x=11+4，3x=15，x=5。",common_misconception:"移项忘记变号。",coach_tip:"未知数放一边，常数放另一边。",image_required:false},{id:"q7",text:"方程3(x−2)=3x−6的解是：",options:{A:"x=0",B:"x=1",C:"无解",D:"任意数"},answer:"D",difficulty:"易",knowledge:"特殊解情况",explanation:"左边展开为3x−6，与右边完全相同，所以任意数都成立。",common_misconception:"化简后忽略两边恒等。",coach_tip:"化简后若两边完全相同，则任意数都是解。",image_required:false},{id:"q8",text:"一本练习簿x元，小明买5本后又买3元铅笔，共花28元。x是多少？",options:{A:"4",B:"6",C:"5",D:"7"},answer:"C",difficulty:"中",knowledge:"列一元一次方程",explanation:"5x+3=28，5x=25，x=5。",common_misconception:"等量关系列成5+x+3=28。",coach_tip:"总价=练习簿总价+铅笔价。",image_required:false},{id:"q9",text:"三个连续整数的和是57，最小的整数是多少？",options:{A:"17",B:"18",C:"19",D:"20"},answer:"B",difficulty:"中",knowledge:"连续整数建模",explanation:"设最小整数为x，则x+(x+1)+(x+2)=57，3x+3=57，x=18。",common_misconception:"三个数都设成x。",coach_tip:"连续整数可设为x、x+1、x+2。",image_required:false},{id:"q10",text:"成人票12元，学生票8元，共买35张，总价340元。若设学生票为x张，则学生票有多少张？",options:{A:"15",B:"18",C:"20",D:"25"},answer:"C",difficulty:"难",knowledge:"一元一次方程应用题",explanation:"学生票x张，成人票35−x张，8x+12(35−x)=340，8x+420−12x=340，−4x=−80，x=20。",common_misconception:"成人票数量未写成35−x，导致方程错误。",coach_tip:"先用总张数表示另一类票，再根据总价列方程。",image_required:false}];let order=[],index=0,score=0,startTime=0,submitted=false,answers=[],questionStart=0;const $=id=>document.getElementById(id);const esc=text=>String(text??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{if(!$("className").value.trim()||!$("studentNo").value.trim()||!$("studentName").value.trim()){alert("请先填写班级、学号、姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];questionStart=Date.now();$("progressText").textContent=`第${index+1}题 / ${order.length}题`;$("scoreText").textContent=`已得 ${score} 分`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent="难度："+(q.difficulty||"基础");$("knowledge").textContent="知识点："+(q.knowledge||"知识点");$("questionText").textContent=q.text;if(q.image_required===true&&q.diagram_svg){$("diagram").style.display="block";$("diagram").innerHTML=q.diagram_svg;$("diagramNote").classList.remove("hidden");$("diagramNote").textContent=q.visual_note||"图中信息与题干一致。"}else{$("diagram").style.display="none";$("diagram").innerHTML="";$("diagramNote").classList.add("hidden");$("diagramNote").textContent=""}$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.dataset.option=key;btn.textContent=`${key}. ${value}`;btn.addEventListener("click",()=>selectOption(q,key,btn));$("options").appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||""}`}function selectOption(q,key,btn){Array.from($("options").children).forEach(b=>b.disabled=true);const correct=key===q.answer;if(correct){score++;btn.classList.add("correct")}else{btn.classList.add("wrong");Array.from($("options").children).forEach(b=>{if(b.dataset.option===q.answer)b.classList.add("correct")})}const used=Math.round((Date.now()-questionStart)/1000);answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:key,selected_answer_text:answerText(q,key),correct_answer:q.answer,correct_answer_text:answerText(q,q.answer),is_correct:correct,knowledge_tag:q.knowledge,difficulty:q.difficulty,explanation:q.explanation,common_misconception:q.common_misconception,coach_tip:q.coach_tip,time_used:used});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=(correct?"<b>答对了。</b>":"<b>本题答错。</b>")+`<div>正确答案：${esc(answerText(q,q.answer))}</div><div>解析：${esc(q.explanation)}</div><div>学习提示：${esc(correct?"继续保持：先找条件，再确认题目问的是哪个量。":q.coach_tip)}</div>`;$("nextBtn").disabled=false}$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else finishQuiz()});function formatDateTime(ms){const d=new Date(ms);const pad=n=>String(n).padStart(2,"0");return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}function formatDuration(sec){sec=Math.max(0,Math.round(Number(sec)||0));const m=Math.floor(sec/60);const s=sec%60;return m>0?`${m}分${s}秒`:`${s}秒`}function buildWrongAnalysisHtml(wrong){if(!wrong.length)return "<p>本次没有错题，保持这个节奏。</p>";return wrong.map(a=>`<div class="wrongItem"><div class="wrongHead"><span>第 ${esc(a.display_order)} 题</span><span class="tag">${esc(a.knowledge_tag)}</span></div><div class="line"><b>题目：</b>${esc(a.question_text)}</div><div class="line"><b>你的答案：</b>${esc(a.selected_answer_text)}</div><div class="line"><b>正确答案：</b>${esc(a.correct_answer_text)}</div><div class="line"><b>解析：</b>${esc(a.explanation)}</div><div class="line"><b>学习提示：</b>${esc(a.common_misconception||a.coach_tip)}</div></div>`).join("")}function buildOverallAnalysisHtml(weak,wrong,scoreValue){if(!wrong.length)return "本次掌握较稳定，可以继续挑战中等题。";const weakText=weak.length?weak.join("、"):"相关知识点";const levelText=scoreValue>=80?"整体基础较稳，主要需要修正少数易错点。":"本次还有较明显卡点，建议先巩固基础题，再进入变式题。";return `<div><b>薄弱知识点：</b>${esc(weakText)}</div><div><b>整体表现：</b>${esc(levelText)}</div><div><b>下一步建议：</b>建议先复习 ${esc(weakText)}，再完成3至5题同类基础题。</div>`}function finishQuiz(){const total=order.length;const scoreValue=Math.round(score/total*100);const wrong=answers.filter(a=>!a.is_correct);const weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))];const completedAtMs=Date.now();const timeUsed=Math.round((completedAtMs-startTime)/1000);const avgTime=Math.round(timeUsed/total);const startedAtDisplay=formatDateTime(startTime);const completedAtDisplay=formatDateTime(completedAtMs);$("finalScore").textContent=score+"/"+total;$("finalRate").textContent=scoreValue+"%";$("finalWrong").textContent=wrong.length+"题";$("submitState").textContent="送达中…";$("infoSchool").textContent=META.school_name;$("infoTeacher").textContent=META.teacher_name;$("infoClass").textContent=$("className").value.trim();$("infoStudent").textContent=$("studentName").value.trim();$("infoSeat").textContent=$("seatNo").value.trim()||"未填写";$("infoChapter").textContent=META.chapter_name;$("startedAtDisplay").textContent=startedAtDisplay;$("completedAtDisplay").textContent=completedAtDisplay;$("timeUsedDisplay").textContent=formatDuration(timeUsed);$("avgTimeDisplay").textContent=formatDuration(avgTime);$("wrongAnalysis").innerHTML=buildWrongAnalysisHtml(wrong);$("overallAnalysis").innerHTML=buildOverallAnalysisHtml(weak,wrong,scoreValue);$("submitNotice").innerHTML="<div>提交状态：送达中…</div>";show("finish");submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime)}function submitPayload(scoreValue,total,timeUsed,wrong,weak,startedAtDisplay,completedAtDisplay,completedAtMs,avgTime){const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,t
