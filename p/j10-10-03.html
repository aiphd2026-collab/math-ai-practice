<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>一元一次方程式线上练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;background:#fffefa}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat b{font-size:1.45rem;color:#5b341e}.small{font-size:.88rem;color:#7d6a58;line-height:1.65}.err{padding:12px;border-radius:14px;background:#ffe1d9;color:#7b2a22}</style></head><body><div class="page"><section id="startPage" class="card"><div class="topband"><h1>一元一次方程式线上练习</h1><div class="pill">练习编号：J10-10-03</div><p class="sub">第10章 一元一次方程式｜练习模式｜选择题10题</p></div><label>班级</label><input id="className" value="初二忠"><label>学号</label><input id="studentNo"><label>姓名</label><input id="studentName"><label>座号</label><input id="seatNo"><button id="startBtn">开始作答</button><p class="small">请填写资料后开始。每题作答后会立即显示反馈。</p></section><section id="quizPage" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="qCount">第1题</span><span id="scoreText">已得 0 分</span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="difficultyTag"></span><span class="tag" id="knowledgeTag"></span></div><div id="qTitle" class="qTitle"></div><div id="diagram" class="diagram"></div><div id="diagramNote" class="diagramNote"></div><div id="options"></div><div id="feedback" class="feedback"></div><button id="nextBtn" disabled>下一题</button></section><section id="finishPage" class="card hidden"><div class="topband"><h1>完成练习</h1><div class="pill">练习编号：J10-10-03</div></div><div class="stats"><div class="stat"><span>得分</span><b id="finalScore">0分</b></div><div class="stat"><span>正确率</span><b id="finalRate">0%</b></div><div class="stat"><span>错题数</span><b id="finalWrong">0题</b></div><div class="stat"><span>提交状态</span><b id="submitStatus">送达中</b></div></div><div id="studentSummary" class="small"></div><p class="small">作答数据已送达。请保留本页截图，以备老师核对。</p></section></div><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"初二忠",practice_id:"J10-10-03",practice_name:"一元一次方程式线上练习",practice_round:"03",quiz_id:"quiz_J10_10_03_20260623",quiz_name:"一元一次方程式线上练习",chapter_name:"第10章 一元一次方程式",mode_label:"练习模式"};const QUESTIONS=[{"id":"Q1","text":"解方程：x+7=15。","options":{"A":"7","B":"8","C":"9","D":"22"},"answer":"B","knowledge":"移项","difficulty":"易","explanation":"两边同时减7，x=15−7=8。","diagram_svg":"","visual_note":"","common_misconception":"把加7误看成减7。","coach_tip":"移项时要改变符号，也可想成两边同时减同一个数。"},{"id":"Q2","text":"解方程：3x=21。","options":{"A":"6","B":"8","C":"9","D":"7"},"answer":"D","knowledge":"等式性质","difficulty":"易","explanation":"两边同时除以3，x=7。","diagram_svg":"","visual_note":"","common_misconception":"把乘法关系误用成减法关系。","coach_tip":"系数乘着未知数时，用除法消去系数。"},{"id":"Q3","text":"解方程：2x−5=11。","options":{"A":"8","B":"6","C":"3","D":"16"},"answer":"A","knowledge":"两步方程","difficulty":"易","explanation":"先两边加5，得2x=16；再除以2，得x=8。","diagram_svg":"","visual_note":"","common_misconception":"先除以2，漏处理−5。","coach_tip":"先处理加减项，再处理乘除项。"},{"id":"Q4","text":"解方程：5(x−2)=20。","options":{"A":"2","B":"4","C":"6","D":"8"},"answer":"C","knowledge":"去括号与整体思想","difficulty":"易","explanation":"先把x−2看成整体：x−2=4，所以x=6。","diagram_svg":"<svg viewBox='0 0 640 180' xmlns='http://www.w3.org/2000/svg'><rect x='30' y='55' width='120' height='60' rx='14' fill='#fffdf8' stroke='#c98335' stroke-width='3'/><text x='90' y='92' text-anchor='middle' font-size='28' fill='#5b341e'>x</text><path d='M160 85 H250' stroke='#5b341e' stroke-width='4' marker-end='url(#a)'/><rect x='260' y='55' width='150' height='60' rx='14' fill='#fff3d8' stroke='#c98335' stroke-width='3'/><text x='335' y='92' text-anchor='middle' font-size='26' fill='#5b341e'>x−2</text><path d='M420 85 H510' stroke='#5b341e' stroke-width='4' marker-end='url(#a)'/><rect x='520' y='55' width='90' height='60' rx='14' fill='#e4f4ea' stroke='#1f8f70' stroke-width='3'/><text x='565' y='92' text-anchor='middle' font-size='26' fill='#0f5b48'>20</text><text x='205' y='125' text-anchor='middle' font-size='22' fill='#7d6a58'>先减2</text><text x='465' y='125' text-anchor='middle' font-size='22' fill='#7d6a58'>再乘5</text><defs><marker id='a' markerWidth='10' markerHeight='10' refX='9' refY='3' orient='auto'><path d='M0,0 L0,6 L9,3 z' fill='#5b341e'/></marker></defs></svg>","visual_note":"流程图表示x先减2，再乘5，结果为20。","common_misconception":"去括号漏乘−2或没有先看整体。","coach_tip":"看到括号整体乘5，可先两边除以5。"},{"id":"Q5","text":"解方程：x/3+4=10。","options":{"A":"18","B":"14","C":"6","D":"2"},"answer":"A","knowledge":"去分母","difficulty":"易","explanation":"两边先减4，得x/3=6；再乘3，得x=18。","diagram_svg":"","visual_note":"","common_misconception":"只把x除以3处理，忘记先消去+4。","coach_tip":"分数方程可先把加减项移走，再消去分母。"},{"id":"Q6","text":"解方程：4x−7=x+11。","options":{"A":"4","B":"5","C":"7","D":"6"},"answer":"D","knowledge":"未知数在两边","difficulty":"易","explanation":"移项得4x−x=11+7，所以3x=18，x=6。","diagram_svg":"","visual_note":"","common_misconception":"把x移到左边时忘记变号。","coach_tip":"未知数放一边，常数放另一边，移项必须变号。"},{"id":"Q7","text":"解方程：(x−1)/2=5。","options":{"A":"9","B":"11","C":"10","D":"6"},"answer":"B","knowledge":"去分母","difficulty":"易","explanation":"两边乘2，得x−1=10；再加1，x=11。","diagram_svg":"","visual_note":"","common_misconception":"得x−1=10后忘记加1。","coach_tip":"去分母后还要继续解括号内的一步方程。"},{"id":"Q8","text":"2支笔和1本笔记本共RM11，笔记本比一支笔贵RM2。一支笔多少？","options":{"A":"RM4","B":"RM2","C":"RM3","D":"RM5"},"answer":"C","knowledge":"列方程","difficulty":"中","explanation":"设一支笔RM x，则笔记本RM(x+2)。2x+(x+2)=11，3x=9，x=3。","diagram_svg":"<svg viewBox='0 0 640 220' xmlns='http://www.w3.org/2000/svg'><rect x='55' y='45' width='120' height='46' rx='10' fill='#fffdf8' stroke='#c98335' stroke-width='3'/><text x='115' y='76' text-anchor='middle' font-size='24' fill='#5b341e'>笔 x</text><rect x='190' y='45' width='120' height='46' rx='10' fill='#fffdf8' stroke='#c98335' stroke-width='3'/><text x='250' y='76' text-anchor='middle' font-size='24' fill='#5b341e'>笔 x</text><rect x='325' y='45' width='170' height='46' rx='10' fill='#fff3d8' stroke='#c98335' stroke-width='3'/><text x='410' y='76' text-anchor='middle' font-size='24' fill='#5b341e'>笔记本 x+2</text><line x1='55' y1='125' x2='495' y2='125' stroke='#1f8f70' stroke-width='4'/><text x='275' y='160' text-anchor='middle' font-size='26' fill='#0f5b48'>总价 RM11</text></svg>","visual_note":"数量关系图显示两支笔加一本笔记本合计RM11。","common_misconception":"把笔记本写成x−2。","coach_tip":"先设较简单的一支笔为x，再把笔记本用x+2表示。"},{"id":"Q9","text":"2张成人票和3张学生票共RM42，成人票比学生票贵RM6。学生票多少？","options":{"A":"RM6","B":"RM8","C":"RM10","D":"RM12"},"answer":"A","knowledge":"等量关系","difficulty":"中","explanation":"设学生票RM x，则成人票RM(x+6)。2(x+6)+3x=42，5x+12=42，x=6。","diagram_svg":"<svg viewBox='0 0 640 240' xmlns='http://www.w3.org/2000/svg'><rect x='55' y='35' width='130' height='46' rx='10' fill='#fff3d8' stroke='#c98335' stroke-width='3'/><text x='120' y='66' text-anchor='middle' font-size='22' fill='#5b341e'>成人 x+6</text><rect x='200' y='35' width='130' height='46' rx='10' fill='#fff3d8' stroke='#c98335' stroke-width='3'/><text x='265' y='66' text-anchor='middle' font-size='22' fill='#5b341e'>成人 x+6</text><rect x='75' y='105' width='100' height='42' rx='10' fill='#fffdf8' stroke='#c98335' stroke-width='3'/><text x='125' y='133' text-anchor='middle' font-size='22' fill='#5b341e'>学生 x</text><rect x='190' y='105' width='100' height='42' rx='10' fill='#fffdf8' stroke='#c98335' stroke-width='3'/><text x='240' y='133' text-anchor='middle' font-size='22' fill='#5b341e'>学生 x</text><rect x='305' y='105' width='100' height='42' rx='10' fill='#fffdf8' stroke='#c98335' stroke-width='3'/><text x='355' y='133' text-anchor='middle' font-size='22' fill='#5b341e'>学生 x</text><line x1='55' y1='180' x2='405' y2='180' stroke='#1f8f70' stroke-width='4'/><text x='230' y='215' text-anchor='middle' font-size='26' fill='#0f5b48'>总价 RM42</text></svg>","visual_note":"图中成人票比学生票多RM6，合计2张成人票与3张学生票。","common_misconception":"漏乘2张成人票中的+6。","coach_tip":"把成人票写成x+6后，整项2(x+6)都要乘2。"},{"id":"Q10","text":"一个两位数，十位数字比个位数字小3；若交换两个数字，新数比原数大27。原数是多少？","options":{"A":"36","B":"47","C":"58","D":"25"},"answer":"D","knowledge":"设未知数建模","difficulty":"难","explanation":"设个位为x，则十位为x−3，原数为10(x−3)+x，交换后为10x+(x−3)。由交换后比原数大27：10x+x−3=[10(x−3)+x]+27，解得x=5，所以原数为25。","diagram_svg":"<svg viewBox='0 0 640 250' xmlns='http://www.w3.org/2000/svg'><text x='95' y='42' text-anchor='middle' font-size='24' fill='#5b341e'>原数</text><rect x='45' y='60' width='90' height='70' rx='12' fill='#fff3d8' stroke='#c98335' stroke-width='3'/><rect x='140' y='60' width='90' height='70' rx='12' fill='#fffdf8' stroke='#c98335' stroke-width='3'/><text x='90' y='103' text-anchor='middle' font-size='28' fill='#5b341e'>x−3</text><text x='185' y='103' text-anchor='middle' font-size='28' fill='#5b341e'>x</text><text x='90' y='155' text-anchor='middle' font-size='20' fill='#7d6a58'>十位</text><text x='185' y='155' text-anchor='middle' font-size='20' fill='#7d6a58'>个位</text><path d='M255 95 H365' stroke='#5b341e' stroke-width='4' marker-end='url(#b)'/><text x='310' y='130' text-anchor='middle' font-size='20' fill='#7d6a58'>交换</text><text x='505' y='42' text-anchor='middle' font-size='24' fill='#5b341e'>新数</text><rect x='410' y='60' width='90' height='70' rx='12' fill='#fffdf8' stroke='#c98335' stroke-width='3'/><rect x='505' y='60' width='90' height='70' rx='12' fill='#fff3d8' stroke='#c98335' stroke-width='3'/><text x='455' y='103' text-anchor='middle' font-size='28' fill='#5b341e'>x</text><text x='550' y='103' text-anchor='middle' font-size='28' fill='#5b341e'>x−3</text><text x='320' y='210' text-anchor='middle' font-size='26' fill='#0f5b48'>新数 = 原数 + 27</text><defs><marker id='b' markerWidth='10' markerHeight='10' refX='9' refY='3' orient='auto'><path d='M0,0 L0,6 L9,3 z' fill='#5b341e'/></marker></defs></svg>","visual_note":"数位关系图显示十位与个位对调，新数比原数大27。","common_misconception":"把十位设成x+3或把新数、原数方向写反。","coach_tip":"数位题要写成10×十位+个位，再比较交换前后。"}];let order=[],index=0,score=0,answers=[],started=false,finished=false,startTime=0;const $=id=>document.getElementById(id);function esc(s){return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]))}function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}function answerText(q,key){return key+". "+q.options[key]}function renderQuestion(){const q=order[index];$("qCount").textContent=`第${index+1}题 / 共${order.length}题`;$("difficultyTag").textContent="难度："+q.difficulty;$("knowledgeTag").textContent="知识点："+q.knowledge;$("qTitle").textContent=q.text;$("diagram").innerHTML=q.diagram_svg||"";$("diagram").style.display=q.diagram_svg?"block":"none";$("diagramNote").textContent=q.visual_note||"";$("options").innerHTML=["A","B","C","D"].map(k=>`<button class='option' data-option='${k}'>${k}. ${esc(q.options[k])}</button>`).join("");$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题"}function coachTip(q,correct){if(correct)return "继续保持：先找条件，再确认题目问的是哪个量。";return q.coach_tip||"先画出数量关系，再决定使用哪个公式或性质。"}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.dataset.option===q.answer)btn.classList.add("correct");if(btn.dataset.option===selected&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||""});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<b>${correct?"答对了":"还差一点"}</b><br>你的答案：${esc(selectedText)}<br>正确答案：${esc(correctText)}<br>解析：${esc(q.explanation||"")}<br><b>AI学习提示：</b>${esc(coachTip(q,correct))}<br>知识点：${esc(q.knowledge||"")}`;$("nextBtn").disabled=false;$("barFill").style.width=`${(index+1)/order.length*100}%`;$("scoreText").textContent=`已得 ${Math.round(score/order.length*100)} 分`}$("options").addEventListener("click",e=>{const btn=e.target.closest(".option");if(!btn||btn.disabled)return;chooseAnswer(btn.dataset.option)});$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else{renderFinish()}});function renderFinish(){finished=true;window.onbeforeunload=null;const total=order.length,finalScore=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))],timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000));$("quizPage").classList.add("hidden");$("finishPage").classList.remove("hidden");$("finalScore").textContent=finalScore+"分";$("finalRate").textContent=finalScore+"%";$("finalWrong").textContent=wrong.length+"题";$("studentSummary").innerHTML=`<h2>学生资料</h2>学校：${esc(META.school_name)}<br>老师：${esc(META.teacher_name)}<br>练习编号：${esc(META.practice_id)}<br>班级：${esc($("className").value)}<br>学号：${esc($("studentNo").value)}<br>姓名：${esc($("studentName").value)}<br>座号：${esc($("seatNo").value)}<br>用时：${timeUsed}秒`;const payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$("className").value,student_no:$("studentNo").value,student_name:$("studentName").value,seat_no:$("seatNo").value,practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:finalScore,accuracy:finalScore,total_questions:total,time_used:timeUsed,answers_json:answers,correct_json:order.map(q=>({question_id:q.id,answer:q.answer,correct_answer_text:answerText(q,q.answer),knowledge_tag:q.knowledge,difficulty:q.difficulty})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,submit_attempt:1};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{$("submitStatus").textContent="已送达"}).catch(()=>{$("submitStatus").textContent="提交失败"})}$("startBtn").addEventListener("click",()=>{if(!$("studentNo").value||!$("studentName").value||!$("seatNo").value){alert("请完整填写学号、姓名和座号。");return}started=true;startTime=Date.now();order=shuffle(QUESTIONS);$("startPage").classList.add("hidden");$("quizPage").classList.remove("hidden");window.onbeforeunload=()=>finished?null:"作答尚未完成，确定离开吗？";renderQuestion()});</script></body></html>
