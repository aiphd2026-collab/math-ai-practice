<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>一元二次方程式与一元二次函数｜10题练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}input:focus{border-color:#e69b43;box-shadow:0 0 0 4px rgba(244,155,51,.16)}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48;box-shadow:0 8px 20px rgba(31,143,112,.18)}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21;box-shadow:0 8px 20px rgba(201,83,66,.18)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#efe5ff,#d8c6ff)}.stat b{display:block;font-size:1.35rem;color:#5b341e}.summary{line-height:1.75;background:#fff7ea;border:1px solid #ead8c1;border-radius:18px;padding:14px;margin-top:12px}.small{font-size:.86rem;color:#7d6a58;line-height:1.6}.statusOk{color:#0f5b48;font-weight:900}.statusBad{color:#8b2b21;font-weight:900}@media(max-width:420px){html{font-size:17px}.page{padding:10px 8px 22px}.card{border-radius:20px;padding:18px 12px}.topband{margin:-18px -12px 16px;padding:18px 12px}.stats{grid-template-columns:1fr 1fr}}</style></head><body><div class="page"><div class="card"><section id="startPage"><div class="topband"><h1>一元二次方程式与一元二次函数｜10题练习</h1><div class="pill">练习编号：J2-11-01</div><p class="sub">初二下册第11章｜一元二次方程式与一元二次函数<br>练习模式｜选择题10题｜每题即时反馈</p></div><div class="summary"><b>学校：</b>宽柔中学古来分校<br><b>老师：</b>陈天龙<br><b>班级：</b>初二A<br><b>说明：</b>请认真作答。开始后刷新或离开，本次作答可能无法继续。</div><label>班级</label><input id="className" value="初二A" required><label>学号</label><input id="studentNo" placeholder="请输入学号" required><label>姓名</label><input id="studentName" placeholder="请输入姓名" required><label>座号（可选）</label><input id="seatNo" placeholder="可不填"><button id="startBtn">开始作答</button></section><section id="quizPage" class="hidden"><div class="progressBox"><div class="progressMeta"><span id="progressText">第1题 / 共10题</span><span id="scoreText">已答0题</span></div><div class="bar"><span id="barFill"></span></div></div><div class="tagrow"><span class="tag" id="diffTag"></span><span class="tag" id="knowledgeTag"></span></div><div class="qTitle" id="qText"></div><div class="diagram" id="diagramBox"></div><div id="diagramNote" class="diagramNote hidden"></div><div id="optionsBox"></div><div id="feedbackBox" class="feedback"></div><button id="nextBtn" class="hidden">下一题</button></section><section id="finishPage" class="hidden"><div class="topband"><h1>完成页</h1><div class="pill">练习编号：J2-11-01</div><p class="sub">作答数据已送达。请保留本页截图，以备老师核对。</p></div><div class="stats"><div class="stat"><b id="finalScore">0</b>得分</div><div class="stat"><b id="finalAcc">0%</b>正确率</div><div class="stat"><b id="wrongCount">0</b>错题数</div><div class="stat"><b id="timeUsed">0秒</b>用时</div></div><div class="summary" id="finishInfo"></div><div class="summary" id="wrongInfo"></div><div class="summary" id="weakInfo"></div><div class="summary"><b>学习总结：</b><br><span id="studySummary"></span><br><br><b>提交状态：</b><span id="submitStatus">提交中……</span></div></section></div></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'j2a',practice_id:'J2-11-01',practice_name:'一元二次方程式与一元二次函数｜10题练习',practice_round:'01',quiz_id:'J2-11-01',quiz_name:'一元二次方程式与一元二次函数｜10题练习',chapter_name:'初二下册第11章｜一元二次方程式与一元二次函数'};const QUESTIONS=[{id:'Q1',text:'已知方程 x²-5x+6=0，它的解是（ ）',options:{A:'x=2 或 x=3',B:'x=-2 或 x=-3',C:'x=1 或 x=6',D:'x=-1 或 x=-6'},answer:'A',knowledge:'因式分解法解一元二次方程',difficulty:'基础',explanation:'x²-5x+6=(x-2)(x-3)，所以 x=2 或 x=3。',diagram_svg:'',visual_note:'',common_misconception:'分解后不会由两个因式分别等于0求解。',coach_tip:'注意把方程化成两个因式相乘等于0，再分别令每个因式等于0。'},{id:'Q2',text:'下列方程中，有两个相等实数根的是（ ）',options:{A:'x²-4=0',B:'x²-6x+9=0',C:'x²+x+1=0',D:'2x²-3x+1=0'},answer:'B',knowledge:'判别式与完全平方',difficulty:'基础',explanation:'x²-6x+9=(x-3)²，所以有两个相等实数根。',diagram_svg:'',visual_note:'',common_misconception:'看见二次方程就直接判断有两个不同实数根。',coach_tip:'遇到相等实数根，可以先找完全平方，也可以用判别式等于0判断。'},{id:'Q3',text:'若抛物线 y=x² 向右平移2个单位，再向上平移3个单位，所得函数解析式是（ ）',options:{A:'y=(x+2)²+3',B:'y=(x-2)²-3',C:'y=(x-2)²+3',D:'y=(x+2)²-3'},answer:'C',knowledge:'二次函数图像平移',difficulty:'中等',explanation:'向右平移2个单位写成 x-2，向上平移3个单位再加3，所以是 y=(x-2)²+3。',diagram_svg:'',visual_note:'',common_misconception:'把向右平移误写成 x+2。',coach_tip:'左右平移看括号内，方向常常与符号相反；上下平移看括号外，方向与符号相同。'},{id:'Q4',text:'函数 y=-2x²+8x-5 的开口方向是（ ）',options:{A:'向上',B:'先向上后向下',C:'无法判断',D:'向下'},answer:'D',knowledge:'二次函数图像开口方向',difficulty:'基础',explanation:'二次项系数 -2<0，所以抛物线开口向下。',diagram_svg:'',visual_note:'',common_misconception:'忽略二次项系数的正负号。',coach_tip:'判断开口方向只看 x² 的系数：正数向上，负数向下。'},{id:'Q5',text:'方程 x²+2x-8=0 的两根之和是（ ）',options:{A:'-2',B:'2',C:'8',D:'-8'},answer:'A',knowledge:'根与系数关系',difficulty:'基础',explanation:'对于 ax²+bx+c=0，两根之和为 -b/a，所以这里是 -2。',diagram_svg:'',visual_note:'',common_misconception:'把两根之和误写成常数项或两根之积。',coach_tip:'根之和对应 -b/a，根之积对应 c/a，两个公式不要调换。'},{id:'Q6',text:'下图为抛物线示意图，顶点在 (1,-4)，且经过点 (0,-3)。该抛物线的解析式是（ ）',options:{A:'y=(x+1)²-4',B:'y=(x-1)²-4',C:'y=-(x-1)²-4',D:'y=(x-1)²+4'},answer:'B',knowledge:'顶点式',difficulty:'中等',explanation:'顶点式为 y=a(x-1)²-4。代入 (0,-3)，得 -3=a-4，所以 a=1。',diagram_svg:'<svg viewBox="0 0 360 250" xmlns="http://www.w3.org/2000/svg"><rect width="360" height="250" fill="#fffdf8"/><line x1="35" y1="125" x2="330" y2="125" stroke="#6b5b4b" stroke-width="2"/><line x1="180" y1="25" x2="180" y2="220" stroke="#6b5b4b" stroke-width="2"/><text x="332" y="121" font-size="14" fill="#5b341e">x</text><text x="188" y="35" font-size="14" fill="#5b341e">y</text><path d="M85 45 C115 125,135 205,215 205 C255 205,285 125,315 45" fill="none" stroke="#d46b27" stroke-width="4"/><line x1="205" y1="25" x2="205" y2="220" stroke="#1f8f70" stroke-width="2" stroke-dasharray="6 6"/><circle cx="205" cy="205" r="5" fill="#1f8f70"/><circle cx="180" cy="175" r="5" fill="#c95342"/><text x="213" y="205" font-size="14" fill="#1f8f70">顶点(1,-4)</text><text x="84" y="171" font-size="14" fill="#c95342">(0,-3)</text><text x="207" y="116" font-size="13" fill="#1f8f70">x=1</text></svg>',visual_note:'示意图不按严格比例，解题以题目数字为准。',common_misconception:'顶点坐标代入顶点式时符号写反。',coach_tip:'看到顶点坐标，优先用顶点式 y=a(x-h)²+k。'},{id:'Q7',text:'已知抛物线 y=x²-4x+3 与 x 轴交于两点，则这两点的横坐标是（ ）',options:{A:'1 和 2',B:'-1 和 -3',C:'1 和 3',D:'-1 和 3'},answer:'C',knowledge:'二次函数与x轴交点',difficulty:'基础',explanation:'令 y=0，得 x²-4x+3=0，分解得 (x-1)(x-3)=0，所以横坐标是1和3。',diagram_svg:'<svg viewBox="0 0 360 250" xmlns="http://www.w3.org/2000/svg"><rect width="360" height="250" fill="#fffdf8"/><line x1="40" y1="150" x2="330" y2="150" stroke="#6b5b4b" stroke-width="2"/><line x1="95" y1="30" x2="95" y2="220" stroke="#6b5b4b" stroke-width="2"/><text x="332" y="146" font-size="14" fill="#5b341e">x</text><text x="103" y="38" font-size="14" fill="#5b341e">y</text><path d="M60 55 C100 180,170 205,260 55" fill="none" stroke="#d46b27" stroke-width="4"/><circle cx="140" cy="150" r="5" fill="#1f8f70"/><circle cx="230" cy="150" r="5" fill="#1f8f70"/><text x="132" y="171" font-size="14" fill="#1f8f70">1</text><text x="222" y="171" font-size="14" fill="#1f8f70">3</text><text x="174" y="215" font-size="13" fill="#7d6a58">与x轴交点</text></svg>',visual_note:'示意图不按严格比例，解题以题目数字为准。',common_misconception:'不会把交点问题转化为令 y=0 解方程。',coach_tip:'抛物线与 x 轴交点的横坐标，就是对应一元二次方程的根。'},{id:'Q8',text:'观察函数 y=x²-2x-3 的图像，其对称轴是（ ）',options:{A:'x=-2',B:'x=2',C:'x=1',D:'x=-1'},answer:'C',knowledge:'二次函数对称轴',difficulty:'基础',explanation:'a=1，b=-2，所以对称轴 x=-b/(2a)=1。',diagram_svg:'<svg viewBox="0 0 360 250" xmlns="http://www.w3.org/2000/svg"><rect width="360" height="250" fill="#fffdf8"/><line x1="40" y1="135" x2="330" y2="135" stroke="#6b5b4b" stroke-width="2"/><line x1="155" y1="30" x2="155" y2="220" stroke="#6b5b4b" stroke-width="2"/><text x="332" y="131" font-size="14" fill="#5b341e">x</text><text x="163" y="38" font-size="14" fill="#5b341e">y</text><path d="M65 48 C100 145,140 208,205 208 C270 208,300 145,330 48" fill="none" stroke="#d46b27" str ocument.getElementById('quizPage').classList.remove('hidden');renderQ()};function renderQ(){answered=false;const q=QUESTIONS[order[idx]];document.getElementById('progressText').textContent=`第${idx+1}题 / 共${QUESTIONS.length}题`;document.getElementById('scoreText').textContent=`已答${idx}题`;document.getElementById('barFill').style.width=(idx/QUESTIONS.length*100)+'%';document.getElementById('diffTag').textContent=q.difficulty;document.getElementById('knowledgeTag').textContent=q.knowledge;document.getElementById('qText').textContent=q.text;const d=document.getElementById('diagramBox'),dn=document.getElementById('diagramNote');if(q.diagram_svg){d.style.display='block';d.innerHTML=q.diagram_svg;dn.textContent=q.visual_note||'';dn.classList.toggle('hidden',!q.visual_note)}else{d.style.display='none';d.innerHTML='';dn.classList.add('hidden')}const box=document.getElementById('optionsBox');box.innerHTML='';Object.keys(q.options).forEach(k=>{const btn=document.createElement('button');btn.className='option';btn.textContent=k+'. '+q.options[k];btn.onclick=()=>choose(k,btn);box.appendChild(btn)});document.getElementById('feedbackBox').className='feedback';document.getElementById('feedbackBox').style.display='none';document.getElementById('nextBtn').classList.add('hidden');document.getElementById('nextBtn').textContent=(idx===QUESTIONS.length-1)?'完成并提交':'下一题'}function choose(k,btn){if(answered)return;answered=true;const q=QUESTIONS[order[idx]],ok=k===q.answer;Array.from(document.querySelectorAll('.option')).forEach(b=>{b.disabled=true;const letter=b.textContent.slice(0,1);if(letter===q.answer)b.classList.add('correct');if(letter===k&&!ok)b.classList.add('wrong')});selectedMap.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty,common_misconception:q.common_misconception})
