<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>J1-10-01｜一元一次方程式基础巩固练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--ok-bg:#d7f1e4;--bad-bg:#ffe1d9;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),radial-gradient(circle at 40% 92%,rgba(114,185,155,.26),transparent 32%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900;color:#231a14}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;color:#2b2119;background:#fffefa;outline:none}input:focus{border-color:#e69b43;box-shadow:0 0 0 4px rgba(244,155,51,.16)}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;color:#241a13;margin:0 0 14px}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48;box-shadow:0 8px 20px rgba(31,143,112,.18)}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21;box-shadow:0 8px 20px rgba(201,83,66,.18)}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea;color:#4b3524}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#fff8df,#ffe5a8)}.stat b{display:block;font-size:1.35rem;color:#5b341e}.summary{line-height:1.8;background:#fff7ea;border:1px solid #ead8c1;border-radius:18px;padding:14px}.small{font-size:.9rem;color:#7d6a58;line-height:1.65}.list{line-height:1.8;padding-left:1.2em}</style></head><body><div class="page"><div class="card"><section id="home"><div class="topband"><h1>一元一次方程式基础巩固练习</h1><div class="pill">练习编号：J1-10-01</div><p class="sub">宽柔中学古来分校｜陈天龙老师<br>初一下册第10章｜一元一次方程式｜练习模式</p></div><label>班级</label><input id="className" value="初一A班" required><label>学号</label><input id="studentNo" required><label>姓名</label><input id="studentName" required><label>座号（可选）</label><input id="seatNo"><button id="startBtn">开始练习</button><p class="small">开始后请依序作答。刷新或离开后，本次作答可能无法继续。</p></section><section id="quiz" class="hidden"><div class="progressBox"><div class="progressMeta"><span id="qIndex"></span><span id="scoreNow"></span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span class="tag" id="diffTag"></span><span class="tag" id="knowTag"></span></div><p class="qTitle" id="qText"></p><div id="opts"></div><div id="feedback" class="feedback"></div><button id="nextBtn" class="hidden">下一题</button></section><section id="done" class="hidden"><div class="topband"><h1>练习完成</h1><div class="pill">提交请求已发出</div><p class="sub">若老师稍后未看到数据，请截图给老师。</p></div><div class="stats"><div class="stat"><b id="finalScore"></b>得分</div><div class="stat"><b id="finalAcc"></b>正确率</div><div class="stat"><b id="finalWrong"></b>错题数</div><div class="stat"><b id="finalTime"></b>用时</div></div><div class="summary" id="doneInfo"></div><h3>错题记录</h3><div class="summary" id="wrongList"></div><h3>薄弱知识点</h3><div class="summary" id="weakList"></div><h3>学习总结</h3><div class="summary" id="learnSummary"></div></section></div></div><script>const SUBMIT_URL="https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec";const META={school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"j1a",practice_id:"J1-10-01",practice_name:"一元一次方程式基础巩固练习",practice_round:"01",quiz_id:"J1-10-01-Q",quiz_name:"一元一次方程式基础巩固练习",chapter_name:"一元一次方程式",mode_label:"练习模式"};const QUESTIONS=[{id:"Q1",text:"下列哪一个是一元一次方程式？",options:{A:"3x + 5 = 17",B:"x² + 1 = 5",C:"2x + y = 8",D:"5 + 3 = 8"},answer:"A",knowledge:"一元一次方程式的定义",difficulty:"基础",explanation:"一元一次方程式只含一个未知数，且未知数的最高次数是1。",common_misconception:"把含有两个未知数或未知数次数为2的式子误判为一元一次方程式。",coach_tip:"先检查未知数个数，再检查未知数最高次数是否为1。"},{id:"Q2",text:"解方程：x + 7 = 15，x 的值是？",options:{A:"7",B:"8",C:"9",D:"22"},answer:"B",knowledge:"等式性质与移项",difficulty:"基础",explanation:"x = 15 − 7 = 8。",common_misconception:"移项后忘记改变符号。",coach_tip:"把常数项移到右边时，要注意加减号的变化。"},{id:"Q3",text:"解方程：3x = 24，x 的值是？",options:{A:"72",B:"27",C:"8",D:"21"},answer:"C",knowledge:"系数化为1",difficulty:"基础",explanation:"x = 24 ÷ 3 = 8。",common_misconception:"把乘法关系误做加减法。",coach_tip:"未知数前面有系数时，用等式两边同除以这个系数。"},{id:"Q4",text:"解方程：2x − 5 = 11，x 的值是？",options:{A:"3",B:"6",C:"7",D:"8"},answer:"D",knowledge:"移项与除以系数",difficulty:"基础",explanation:"2x = 11 + 5 = 16，所以 x = 8。",common_misconception:"先除以2，漏处理 −5。",coach_tip:"先把含未知数的项整理出来，再把系数化为1。"},{id:"Q5",text:"解方程：5x + 4 = 2x + 19，x 的值是？",options:{A:"5",B:"6",C:"7",D:"8"},answer:"A",knowledge:"含未知数项移到同一边",difficulty:"基础",explanation:"5x − 2x = 19 − 4，3x = 15，所以 x = 5。",common_misconception:"移项时 2x 或 4 忘记变号。",coach_tip:"建议把含x的项放一边，常数项放另一边，并逐步写清楚。"},{id:"Q6",text:"解方程：4(x − 2) = 20，x 的值是？",options:{A:"3",B:"5",C:"7",D:"8"},answer:"C",knowledge:"去括号与解方程",difficulty:"基础",explanation:"4x − 8 = 20，4x = 28，所以 x = 7。",common_misconception:"去括号时漏乘括号内每一项。",coach_tip:"括号前的数要同时乘括号里的每一项。"},{id:"Q7",text:"解方程：x/3 + 2 = 6，x 的值是？",options:{A:"10",B:"12",C:"15",D:"18"},answer:"B",knowledge:"含分母的一元一次方程",difficulty:"基础",explanation:"x/3 = 4，所以 x = 12。",common_misconception:"只把部分项乘以3，漏乘常数项。",coach_tip:"遇到分母时，可以先把分数项单独留下，再求未知数。"},{id:"Q8",text:"某数的 3 倍加 5 等于 26。设这个数为 x，下列方程正确的是？",options:{A:"3 + x + 5 = 26",B:"3x − 5 = 26",C:"3x + 5 = 26",D:"x ÷ 3 + 5 = 26"},answer:"C",knowledge:"列一元一次方程式",difficulty:"中等",explanation:"“某数的3倍”是 3x，再加5等于26。",common_misconception:"没有分清“3倍”与“加3”。",coach_tip:"读应用题时，先把关键词翻译成数学式，例如“3倍”就是3x。"},{id:"Q9",text:"一支笔 x 元，买 4 支后还剩 6 元。若原有 30 元，下列方程正确的是？",options:{A:"4x + 6 = 30",B:"4x − 6 = 30",C:"x + 6 = 30",D:"30 + 4x = 6"},answer:"A",knowledge:"实际问题中的等量关系",difficulty:"中等",explanation:"花掉的钱 4x，加上剩下的6元，等于原有30元。",common_misconception:"把“剩下的钱”当成花掉的钱。",coach_tip:"找等量关系时，可以想：原有的钱 = 花掉的钱 + 剩下的钱。"},{id:"Q10",text:"若 x = 4 是方程 2x + a = 15 的解，则 a 的值是？",options:{A:"5",B:"6",C:"7",D:"8"},answer:"C",knowledge:"方程的解与代入检验",difficulty:"挑战",explanation:"把 x = 4 代入，2×4 + a = 15，所以 a = 7。",common_misconception:"不知道“x=4 是解”表示可代入原方程。",coach_tip:"已知某个数是方程的解，就把它代入原方程求未知参数。"}];let order=[],idx=0,score=0,started=false,submitted=false,startTime=0,student={},answers=[];function $(id){return document.getElementById(id)}function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}window.addEventListener("beforeunload",e=>{if(started&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").onclick=()=>{let c=$("className").value.trim(),no=$("studentNo").value.trim(),name=$("studentName").value.trim(),seat=$("seatNo").value.trim();if(!c||!no||!name){alert("请填写班级、学号、姓名。座号可不填。");return}student={class_name:c,student_no:no,student_name:name,seat_no:seat};order=shuffle(QUESTIONS);idx=0;score=0;answers=[];startTime=Date.now();started=true;$("home").classList.add("hidden");$("quiz").classList.remove("hidden");showQ()};function showQ(){let q=order[idx];$("qIndex").textContent=`第 ${idx+1} / ${order.length} 题`;$("scoreNow").textContent=`当前得分 ${score}`;$("bar").style.width=((idx)/order.length*100)+"%";$("diffTag").textContent=q.difficulty;$("knowTag").textContent=q.knowledge;$("qText").textContent=q.text;$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").classList.add("hidden");$("opts").innerHTML="";Object.keys(q.options).forEach(k=>{let btn=document.createElement("button");btn.className="option";btn.textContent=k+". "+q.options[k];btn.onclick=()=>choose(k,btn);$("opts").appendChild(btn)})}function choose(k,btn){let q=order[idx],ok=k===q.answer;document.querySelectorAll(".option").forEach(b=>{b.disabled=true;let key=b.textContent.slice(0,1);if(key===q.answer)b.classList.add("correct");if(key===k&&!ok)b.classList.add("wrong")});if(ok)score++;answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:q.options[k],correct_answer:q.answer,correct_answer_text:q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty});let fb=$("feedback");fb.className="feedback "+(ok?"ok":"bad");fb.innerHTML=`<b>${ok?"回答正确":"回答错误"}</b><br>你的答案：${k}. ${q.options[k]}<br>正确答案：${q.answer}. ${q.options[q.answer]}<br>解析：${q.explanation}<br>AI学习提示：${q.coach_tip}<br>本题知识点：${q.knowledge}`;$("nextBtn").textContent=idx===order.length-1?"完成并提交":"下一题";$("nextBtn").classList.remove("hidden")}$("nextBtn").onclick=()=>{if(idx<order.length-1){idx++;showQ()}else finish()};function finish(){submitted=true;started=false;$("quiz").classList.add("hidden");$("done").classList.remove("hidden");$("bar").style.width="100%";let timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000));let wrong=answers.filter(a=>!a.is_correct);let acc=Math.round(score/QUESTIONS.length*100);let weak=[...new Set(wrong.map(a=>a.knowledge_tag))];$("finalScore").textContent=score+"/"+QUESTIONS.length;$("finalAcc").textContent=acc+"%";$("finalWrong").textContent=wrong.length;$("finalTime").textContent=timeUsed+"秒";$("doneInfo").innerHTML=`学校：${META.school_name}<br>老师：${META.teacher_name}<br>练习编号：${META.practice_id}<br>练习名称：${META.practice_name}<br>章节：${META.chapter_name}<br>班级：${student.class_name}<br>学号：${student.student_no}<br>姓名：${student.student_name}<br>座号：${student.seat_no||"未填"}<br>提交状态：提交请求已发出。若老师稍后未看到数据，请截图给老师。`;$("wrongList").innerHTML=wrong.length?wrong.map(a=>`第${a.display_order}题：${a.question_text}<br>你的答案：${a.selected_answer}. ${a.selected_answer_text}<br>正确答案：${a.correct_answer}. ${a.correct_answer_text}`).join("<hr>"):"本次没有错题，继续保持。";$("weakList").textContent=weak.length?weak.join("、"):"暂未发现明显薄弱知识点。";$("learnSummary").textContent=wrong.length?"本次需要重点回看错题对应知识点，注意移项变号、去括号和等量关系转化。":"本次掌握较好，可以继续挑战含括号、含分母和应用题的综合练习。";let payload={action:"submit_response",school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:student.class_name,student_no:student.student_no,student_name:student.student_name,seat_no:student.seat_no,practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:score,accuracy:acc,total_questions:QUESTIONS.length,time_used:timeUsed,answers_json:JSON.stringify(answers),correct_json:JSON.stringify(QUESTIONS.map(q=>({question_id:q.id,correct_answer:q.answer,correct_answer_text:q.options[q.answer],knowledge_tag:q.knowledge,difficulty:q.difficulty}))),wrong_question_ids:wrong.map(a=>a.question_id).join(","),weak_knowledge_tags:weak.join("、"),abnormal_flag:""};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).catch(()=>{alert("提交失败，请截图给老师。")})}</script></body></html>
