<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>初二忠｜一元一次方程式练习01</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#fff7ed,#fff);color:#2b2118}.wrap{max-width:760px;margin:0 auto;padding:22px}.card{background:#fff;border:1px solid #f3d6b8;border-radius:22px;box-shadow:0 8px 24px #f1c9a655;padding:22px;margin:16px 0}.title{text-align:center;font-size:25px;font-weight:800;color:#9a4b13}.sub{text-align:center;color:#7a5a3a;margin-top:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.input{display:flex;flex-direction:column;font-size:14px;color:#6b4a2b}.input input{margin-top:6px;padding:13px;border-radius:14px;border:1px solid #e7c6a4;font-size:16px}.btn{border:0;border-radius:16px;background:#d97706;color:white;font-weight:800;padding:14px 18px;font-size:16px;margin-top:14px;cursor:pointer}.btn:disabled{background:#d6b58b}.opt{display:block;width:100%;text-align:left;background:#fffaf4;border:1px solid #eed2b2;border-radius:16px;padding:14px;margin:10px 0;font-size:16px}.opt.correct{background:#d1fae5;border-color:#10b981}.opt.wrong{background:#fee2e2;border-color:#ef4444}.tag{display:inline-block;background:#ffedd5;color:#9a3412;border-radius:999px;padding:6px 10px;margin:4px 4px 4px 0;font-size:13px}.feedback{background:#fffbeb;border:1px solid #fde68a;border-radius:16px;padding:14px;margin-top:12px}.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#fff7ed;border:1px solid #fed7aa;border-radius:16px;text-align:center;padding:12px}.stat b{display:block;font-size:20px;color:#c2410c}.hide{display:none}@media(max-width:560px){.grid,.statgrid{grid-template-columns:1fr}.wrap{padding:12px}.title{font-size:21px}}</style></head><body><div class="wrap"><section id="home" class="card"><div class="title">初二忠｜一元一次方程式练习01</div><div class="sub">章节：一元一次方程式｜模式：练习模式｜练习编号：J1-10-01</div><div class="grid"><label class="input">班级<input id="class_name" value="初二忠"></label><label class="input">学号<input id="student_no"></label><label class="input">姓名<input id="student_name"></label><label class="input">座号<input id="seat_no"></label></div><button class="btn" onclick="startQuiz()">开始作答</button></section><section id="quiz" class="card hide"><div><span class="tag" id="progress"></span><span class="tag">选择题</span></div><h2 id="qtext"></h2><div id="options"></div><div id="feedback" class="feedback hide"></div><button id="nextBtn" class="btn hide" onclick="nextQuestion()">下一题</button></section><section id="done" class="card hide"><div class="title">完成页</div><div class="statgrid"><div class="stat">得分<b id="scoreBox">0</b></div><div class="stat">正确率<b id="accBox">0%</b></div><div class="stat">错题数<b id="wrongBox">0</b></div><div class="stat">提交状态<b id="submitStatus">送达中</b></div></div><div id="summary"></div></section></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const QUESTIONS=[{"id":"Q1","text":"解方程：x + 7 = 15","options":{"A":"8","B":"7","C":"22","D":"-8"},"answer":"A","knowledge":"移项","difficulty":"易","explanation":"x+7=15，两边同时减7，x=8。","diagram_svg":"","common_misconception":"移项忘记变号。","coach_tip":"移项本质是等式两边做相同运算。"},{"id":"Q2","text":"解方程：3x = 24","options":{"A":"21","B":"72","C":"8","D":"6"},"answer":"C","knowledge":"方程基本性质","difficulty":"易","explanation":"两边同时除以3，x=8。","diagram_svg":"","common_misconception":"把除以3写成乘以3。","coach_tip":"未知数前有系数时，用除法消去系数。"},{"id":"Q3","text":"解方程：x - 5 = 12","options":{"A":"7","B":"17","C":"-17","D":"-7"},"answer":"B","knowledge":"移项","difficulty":"易","explanation":"x-5=12，两边同时加5，x=17。","diagram_svg":"","common_misconception":"把 -5 移项后仍写成 -5。","coach_tip":"减5的反向操作是加5。"},{"id":"Q4","text":"解方程：2x + 3 = 11","options":{"A":"7","B":"5","C":"3","D":"4"},"answer":"D","knowledge":"两步解方程","difficulty":"易","explanation":"2x=8，所以x=4。","diagram_svg":"","common_misconception":"先除以2，忽略加3。","coach_tip":"先处理常数项，再处理未知数系数。"},{"id":"Q5","text":"解方程：5x - 4 = 16","options":{"A":"4","B":"3","C":"20","D":"12"},"answer":"A","knowledge":"两步解方程","difficulty":"易","explanation":"5x=20，所以x=4。","diagram_svg":"","common_misconception":"移项后没有合并常数。","coach_tip":"每一步都保持等式两边相等。"},{"id":"Q6","text":"解方程：4(x - 2)=20","options":{"A":"3","B":"5","C":"6","D":"7"},"answer":"D","knowledge":"去括号","difficulty":"易","explanation":"4x-8=20，4x=28，x=7。","diagram_svg":"","common_misconception":"4只乘x，漏乘 -2。","coach_tip":"去括号时括号内每一项都要乘。"},{"id":"Q7","text":"解方程：x/3 + 2 = 6","options":{"A":"9","B":"10","C":"12","D":"18"},"answer":"C","knowledge":"去分母","difficulty":"易","explanation":"x/3=4，所以x=12。","diagram_svg":"","common_misconception":"只把x/3乘3，另一边没同步处理。","coach_tip":"含分母时可以先移项，也可以整体同乘分母。"},{"id":"Q8","text":"小明买了3本同价笔记本和一支5元的笔，共花29元。每本笔记本多少元？","options":{"A":"6","B":"8","C":"10","D":"12"},"answer":"B","knowledge":"列一元一次方程","difficulty":"中","explanation":"设每本x元，3x+5=29，3x=24，x=8。","diagram_svg":"","common_misconception":"把总价29误当作3本笔记本的钱。","coach_tip":"应用题先找总价等量关系。"},{"id":"Q9","text":"解方程：2(x + 3)=3x - 4","options":{"A":"10","B":"-10","C":"2","D":"-2"},"answer":"A","knowledge":"去括号与移项","difficulty":"中","explanation":"2x+6=3x-4，移项得10=x，所以x=10。","diagram_svg":"","common_misconception":"移项时符号变化错误。","coach_tip":"未知数移到一边，常数移到另一边。"},{"id":"Q10","text":"甲、乙两人共有86元，甲的钱比乙的2倍少7元。乙有多少元？","options":{"A":"24","B":"27","C":"30","D":"31"},"answer":"D","knowledge":"设未知数与数量关系","difficulty":"难","explanation":"设乙有x元，甲有2x-7元，x+2x-7=86，3x=93，x=31。","diagram_svg":"","common_misconception":"把“甲比乙的2倍少7元”列成2x+7。","coach_tip":"复杂关系先用一句话翻译成代数式。"}];let order=[],idx=0,answers=[],started=false,done=false,startTime=0,student={};function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1])}function startQuiz(){student={class_name:val('class_name'),student_no:val('student_no'),student_name:val('student_name'),seat_no:val('seat_no')};if(!student.class_name||!student.student_no||!student.student_name||!student.seat_no){alert('请完整填写班级、学号、姓名、座号');return}order=shuffle(QUESTIONS);idx=0;answers=[];started=true;startTime=Date.now();show('home',false);show('quiz',true);renderQ()}function val(id){return document.getElementById(id).value.trim()}function show(id,on){document.getElementById(id).classList.toggle('hide',!on)}function renderQ(){const q=order[idx];document.getElementById('progress').textContent='第 '+(idx+1)+' / '+order.length+' 题';document.getElementById('qtext').textContent=q.text;document.getElementById('feedback').classList.add('hide');const box=document.getElementById('options');box.innerHTML='';Object.keys(q.options).forEach(k=>{const b=document.createElement('button');b.className='opt';b.textContent=k+'. '+q.options[k];b.onclick=()=>choose(k,b);box.appendChild(b)});const n=document.getElementById('nextBtn');n.classList.add('hide');n.textContent=idx===order.length-1?'完成并提交':'下一题'}function choose(k,btn){const q=order[idx];document.querySelectorAll('.opt').forEach(b=>b.disabled=true);const correct=k===q.answer;document.querySelectorAll('.opt').forEach(b=>{if(b.textContent.startsWith(q.answer+'.'))b.classList.add('correct')});if(!correct)btn.classList.add('wrong');answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:correct,knowledge_tag:q.knowledge,difficulty:q.difficulty});const fb=document.getElementById('feedback');fb.innerHTML='<b>'+(correct?'答对了':'再想一想')+'</b><br>你的答案：'+k+'. '+q.options[k]+'<br>正确答案：'+q.answer+'. '+q.options[q.answer]+'<br>解析：'+q.explanation+'<br>AI学习提示：'+q.coach_tip+'<br>知识点：'+q.knowledge;fb.classList.remove('hide');document.getElementById('nextBtn').classList.remove('hide')}function nextQuestion(){if(idx<order.length-1){idx++;renderQ()}else finish()}function finish(){done=true;started=false;show('quiz',false);show('done',true);const correct=answers.filter(a=>a.is_correct).length;const wrong=answers.length-correct;const acc=Math.round(correct/QUESTIONS.length*100);document.getElementById('scoreBox').textContent=correct+'/'+QUESTIONS.length;document.getElementById('accBox').textContent=acc+'%';document.getElementById('wrongBox').textContent=wrong;const wrongIds=answers.filter(a=>!a.is_correct).map(a=>a.question_id);const weak=[...new Set(answers.filter(a=>!a.is_correct).map(a=>a.knowledge_tag))];document.getElementById('summary').innerHTML='<p>练习编号：J1-10-01</p><p>学生资料：'+student.class_name+'｜'+student.student_no+'｜'+student.student_name+'｜座号'+student.seat_no+'</p><p>错题记录：'+(wrongIds.join('、')||'无')+'</p><p>薄弱知识点：'+(weak.join('、')||'暂无明显薄弱点')+'</p><p>作答数据已送达。请保留本页截图，以备老师核对。</p>';submit_response(correct,acc,wrongIds,weak)}function submit_response(score,accuracy,wrongIds,weak){const payload={action:'submit_response',school_id:'kds',school_name:'关丹德信中学',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_name:student.class_name,student_no:student.student_no,student_name:student.student_name,seat_no:student.seat_no,practice_id:'J1-10-01',practice_name:'初二忠｜一元一次方程式练习01',practice_round:'01',quiz_id:'quiz-J1-10-01',quiz_name:'一元一次方程式线上练习01',chapter_name:'一元一次方程式',score:score,accuracy:accuracy,total_questions:QUESTIONS.length,time_used:Math.round((Date.now()-startTime)/1000),answers_json:answers,correct_json:QUESTIONS.map(q=>({question_id:q.id,correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer]})),wrong_question_ids:wrongIds,weak_knowledge_tags:weak};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{document.getElementById('submitStatus').textContent='已送达'}).catch(()=>{document.getElementById('submitStatus').textContent='提交失败'})}window.addEventListener('beforeunload',e=>{if(started&&!done){e.preventDefault();e.returnValue=''}});</script></body></html>
