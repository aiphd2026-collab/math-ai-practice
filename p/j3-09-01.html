<!doctype html><html lang='zh-Hans'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>J3-09-01｜轨迹与几何作图线上练习</title><style>*{box-sizing:border-box}:root{--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e}html{font-size:18px}body{margin:0;min-height:100vh;font-family:Microsoft YaHei,Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 42px rgba(142,79,31,.18);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;background:#fffefa}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26)}button:disabled{opacity:.55;box-shadow:none}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d)}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.tag:nth-child(2){background:#ffe1d8;color:#7f3428}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;margin:0 0 14px}.diagram{display:none;margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{padding:14px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d2)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe6df,#ffc9bd)}.stat:nth-child(4){background:linear-gradient(135deg,#f4e7ff,#ead4ff)}.stat b{display:block;font-size:1.28rem;color:var(--brown)}.section{margin-top:14px;padding-top:14px;border-top:1px dashed #d9bfa2;line-height:1.75}.wrongItem{margin:9px 0;padding:12px;border-radius:16px;background:linear-gradient(135deg,#fff6ec,#ffe8de);border:1px solid #e7c2ad;line-height:1.65}.small{font-size:.9rem;color:var(--muted);line-height:1.65}</style></head><body><main class='page'><section id='home' class='card'><div class='topband'><h1>轨迹与几何作图线上练习</h1><div class='pill'>宽柔中学古来分校｜陈天龙｜J3-09-01</div></div><p class='sub'>初三下册第9章｜轨迹与几何作图｜练习模式｜即时反馈</p><label for='className'>班级</label><input id='className' autocomplete='off' placeholder='请输入班级，例如：初三A' value='初三A'><label for='studentNo'>学号</label><input id='studentNo' inputmode='numeric' autocomplete='off' placeholder='请输入学号'><label for='studentName'>姓名</label><input id='studentName' autocomplete='off' placeholder='请输入姓名'><label for='seatNo'>座号（可选）</label><input id='seatNo' inputmode='numeric' autocomplete='off' placeholder='如老师有要求，请填写座号'><button id='startBtn'>开始练习</button><p class='small'>每题作答后会立即显示解析，完成后会生成适合截图给老师的学习总结。作答资料会提交给老师用于学习记录。</p></section><section id='quiz' class='card hidden'><div class='progressBox'><div class='progressMeta'><span id='progressText'></span><span id='scoreText'></span></div><div class='bar'><span id='barFill'></span></div></div><div class='tagrow'><span id='difficulty' class='tag'></span><span id='knowledge' class='tag'></span></div><p id='questionText' class='qTitle'></p><div id='diagram' class='diagram'></div><div id='diagramNote' class='diagramNote hidden'></div><div id='options'></div><div id='feedback' class='feedback'></div><button id='nextBtn' disabled>下一题</button></section><section id='finish' class='card hidden'><div class='topband'><h1>练习完成</h1><div class='pill'>J3-09-01｜轨迹与几何作图线上练习</div></div><div class='stats'><div class='stat'><b id='finalScore'></b><span>得分</span></div><div class='stat'><b id='finalRate'></b><span>正确率</span></div><div class='stat'><b id='finalWrong'></b><span>错题数</span></div><div class='stat'><b id='submitState'>发送中</b><span>提交状态</span></div></div><div id='studentSummary' class='section'></div><div class='section'><h2>错题记录</h2><div id='wrongList'></div></div><div class='section'><h2>薄弱知识点</h2><div id='weakList'></div></div><div class='section'><h2>学习总结</h2><p id='studyAdvice'></p></div><div class='section'><h2>提交状态</h2><p id='submitMessage'>正在发送学习数据...</p></div></section></main><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:'2026',semester:'上学期',class_id:'初三A',practice_id:'J3-09-01',practice_name:'轨迹与几何作图线上练习',practice_round:'01',quiz_id:'J3-09-01',quiz_name:'轨迹与几何作图线上练习',chapter_name:'初三下册第9章｜轨迹与几何作图'};const lineSvg=`<svg viewBox='0 0 320 180'><line x1='80' y1='100' x2='240' y2='100' stroke='#5b341e' stroke-width='3'/><line x1='160' y1='35' x2='160' y2='160' stroke='#1f8f70' stroke-width='3' stroke-dasharray='8 6'/><circle cx='80' cy='100' r='5' fill='#df6d25'/><circle cx='240' cy='100' r='5' fill='#df6d25'/><text x='66' y='88' font-size='18'>A</text><text x='245' y='88' font-size='18'>B</text></svg>`;const circleSvg=`<svg viewBox='0 0 320 180'><circle cx='160' cy='90' r='60' fill='none' stroke='#1f8f70' stroke-width='3'/><circle cx='160' cy='90' r='5' fill='#df6d25'/><line x1='160' y1='90' x2='220' y2='90' stroke='#5b341e' stroke-width='3'/><text x='145' y='83' font-size='18'>O</text><text x='184' y='82' font-size='16'>4 cm</text><text x='222' y='82' font-size='18'>P</text></svg>`;const arcSvg=`<svg viewBox='0 0 320 190'><line x1='80' y1='105' x2='240' y2='105' stroke='#5b341e' stroke-width='3'/><path d='M80 105 A100 100 0 0 1 160 45M80 105 A100 100 0 0 0 160 165' fill='none' stroke='#df6d25' stroke-width='2'/><path d='M240 105 A100 100 0 0 0 160 45M240 105 A100 100 0 0 1 160 165' fill='none' stroke='#1f8f70' stroke-width='2'/><line x1='160' y1='40' x2='160' y2='170' stroke='#5b341e' stroke-width='3' stroke-dasharray='7 5'/><text x='68' y='94' font-size='18'>A</text><text x='246' y='94' font-size='18'>B</text></svg>`;const angleSvg=`<svg viewBox='0 0 320 180'><line x1='90' y1='130' x2='260' y2='130' stroke='#5b341e' stroke-width='3'/><line x1='90' y1='130' x2='245' y2='45' stroke='#5b341e' stroke-width='3'/><line x1='90' y1='130' x2='260' y2='80' stroke='#1f8f70' stroke-width='3' stroke-dasharray='8 5'/><path d='M120 130 A30 30 0 0 1 116 115M116 115 A35 35 0 0 1 128 100' fill='none' stroke='#df6d25' stroke-width='2'/></svg>`;const triOut=`<svg viewBox='0 0 320 210'><circle cx='160' cy='105' r='72' fill='none' stroke='#1f8f70' stroke-width='3'/><polygon points='90,145 230,145 160,45' fill='none' stroke='#5b341e' stroke-width='3'/><circle cx='160' cy='105' r='5' fill='#df6d25'/><text x='168' y='101' font-size='18'>O</text></svg>`;const triIn=`<svg viewBox='0 0 320 210'><polygon points='75,165 245,165 150,45' fill='none' stroke='#5b341e' stroke-width='3'/><circle cx='158' cy='125' r='38' fill='none' stroke='#1f8f70' stroke-width='3'/><circle cx='158' cy='125' r='5' fill='#df6d25'/><line x1='150' y1='45' x2='158' y2='125' stroke='#df6d25' stroke-width='2' stroke-dasharray='7 5'/><line x1='75' y1='165' x2='158' y2='125' stroke='#df6d25' stroke-width='2' stroke-dasharray='7 5'/><line x1='245' y1='165' x2='158' y2='125' stroke='#df6d25' stroke-width='2' stroke-dasharray='7 5'/><text x='166' y='122' font-size='18'>I</text></svg>`;const parallelSvg=`<svg viewBox='0 0 320 190'><line x1='55' y1='135' x2='265' y2='135' stroke='#5b341e' stroke-width='3'/><line x1='95' y1='70' x2='265' y2='70' stroke='#1f8f70' stroke-width='3' stroke-dasharray='8 5'/><circle cx='95' cy='70' r='5' fill='#df6d25'/><text x='78' y='60' font-size='18'>P</text><text x='270' y='141' font-size='18'>l</text></svg>`;const hexSvg=`<svg viewBox='0 0 320 210'><circle cx='160' cy='105' r='70' fill='none' stroke='#1f8f70' stroke-width='3'/><polygon points='230,105 195,166 125,166 90,105 125,44 195,44' fill='none' stroke='#5b341e' stroke-width='3'/><line x1='160' y1='105' x2='230' y2='105' stroke='#df6d25' stroke-width='3'/><text x='187' y='98' font-size='18'>r</text></svg>`;const triArc=`<svg viewBox='0 0 320 210'><line x1='80' y1='165' x2='240' y2='165' stroke='#5b341e' stroke-width='3'/><path d='M80 165 A120 120 0 0 1 155 55' fill='none' stroke='#df6d25' stroke-width='2'/><path d='M240 165 A110 110 0 0 0 155 55' fill='none' stroke='#1f8f70' stroke-width='2'/><line x1='80' y1='165' x2='155' y2='55' stroke='#5b341e' stroke-width='3'/><line x1='240' y1='165' x2='155' y2='55' stroke='#5b341e' stroke-width='3'/><text x='67' y='185' font-size='18'>A</text><text x='245' y='185' font-size='18'>B</text><text x='157' y='48' font-size='18'>C</text></svg>`;const crossSvg=`<svg viewBox='0 0 320 200'><line x1='60' y1='160' x2='260' y2='40' stroke='#5b341e' stroke-width='3'/><line x1='60' y1='40' x2='260' y2='160' stroke='#5b341e' stroke-width='3'/><line x1='60' y1='100' x2='260' y2='100' stroke='#1f8f70' stroke-width='3' stroke-dasharray='8 5'/><line x1='160' y1='25' x2='160' y2='175' stroke='#1f8f70' stroke-width='3' stroke-dasharray='8 5'/></svg>`;const QUESTIONS=[{id:'Q1',text:'下列哪一个图形表示“到点 A 和点 B 距离相等的所有点”的轨迹？',options:{A:'线段 AB 的垂直平分线',B:'以 A 为圆心的圆',C:'经过 A、B 的任意直线',D:'线段 AB 本身'},answer:'A',knowledge:'轨迹｜垂直平分线',difficulty:'基础',explanation:'到两定点距离相等的点在这两点连线的垂直平分线上。',diagram_svg:lineSvg,visual_note:'图形为示意图，垂直平分线上的点到 A、B 距离相等。',common_misconception:'把“所有点”误以为只是线段中点。',coach_tip:'AI提示：看到“到两个定点距离相等”，优先想到垂直平分线。'},{id:'Q2',text:'点 P 到定点 O 的距离恒为 4 cm，则点 P 的轨迹是？',options:{A:'一条直线',B:'一个圆',C:'一条射线',D:'一个角'},answer:'B',knowledge:'轨迹｜圆',difficulty:'基础',explanation:'到定点距离等于定长的所有点组成一个圆。',diagram_svg:circleSvg,visual_note:'图中半径表示定长 4 cm，点 P 可在圆周上移动。',common_misconception:'只想到某一个点，没有想到所有满足条件的点。',coach_tip:'AI提示：轨迹题要找“所有可能位置”，不是只找一个点。'},{id:'Q3',text:'作线段 AB 的垂直平分线时，正确的关键步骤是？',options:{A:'只量出 AB 的中点即可',B:'经过 A 点任意画一条垂线',C:'以 A、B 为圆心，用相同半径画弧，两弧相交后连交点',D:'以 A 为圆心画一个圆即可'},answer:'C',knowledge:'垂线作图｜垂直平分线',difficulty:'基础',explanation:'用相同半径从 A、B 作弧，两交点连线就是 AB 的垂直平分线。',diagram_svg:arcSvg,visual_note:'两组圆弧半径相同，交点连线形成垂直平分线。',common_misconception:'只找中点，却没有保证垂直。',coach_tip:'AI提示：尺规作图要说明关键圆弧和交点，不能只凭眼睛看。'},{id:'Q4',text:'作一个角的角平分线时，最后得到的射线有什么性质？',options:{A:'与角的一边垂直',B:'与角的两边都平行',C:'一定经过角外一点',D:'把这个角分成两个相等的角'},answer:'D',knowledge:'角平分线作图',difficulty:'基础',explanation:'角平分线的作用是把原角分成两个相等的角。',diagram_svg:angleSvg,visual_note:'绿色虚线表示角平分线，分成的两个角相等。',common_misconception:'把角平分线误认为垂线。',coach_tip:'AI提示：角平分线看“角相等”，垂线看“90°”。'},{id:'Q5',text:'三角形外接圆的圆心是三角形三边的什么线的交点？',options:{A:'三边垂直平分线',B:'三条角平分线',C:'三条中线',D:'三条高'},answer:'A',knowledge:'三角形外接圆',difficulty:'基础',explanation:'外接圆圆心到三个顶点距离相等，所以在三边的垂直平分线上。',diagram_svg:triOut,visual_note:'图中 O 表示外接圆圆心，位于三边垂直平分线交点。',common_misconception:'把外接圆圆心和内切圆圆心混淆。',coach_tip:'AI提示：外接圆经过三角形三个顶点，所以圆心到三个顶点距离相等。'},{id:'Q6',text:'三角形内切圆的圆心是三角形三条什么线的交点？',options:{A:'边的垂直平分线',B:'角平分线',C:'中线',D:'高'},answer:'B',knowledge:'三角形内切圆',difficulty:'基础',explanation:'内切圆圆心到三边距离相等，因此是三条角平分线的交点。',diagram_svg:triIn,visual_note:'图中 I 表示内切圆圆心，虚线为角平分线示意。',common_misconception:'误选垂直平分线。',coach_tip:'AI提示：内切圆与三边相切，所以圆心到三边的距离相等。'},{id:'Q7',text:'过直线外一点 P 作已知直线 l 的平行线，常用的作图依据是？',options:{A:'任意连接 P 与直线上一点',B:'以 P 为圆心画圆',C:'作一个与已知角相等的角，使对应角相等',D:'作线段的中点'},answer:'C',knowledge:'平行线作图',difficulty:'基础',explanation:'复制一个相等角，可利用同位角相等来作平行线。',diagram_svg:parallelSvg,visual_note:'绿色虚线为过点 P 作出的平行线，对应角相等。',common_misconception:'只画“看起来平行”的线，没有依据。',coach_tip:'AI提示：作平行线时要有角相等的依据，不能只靠目测。'},{id:'Q8',text:'在圆中作正六边形时，若圆的半径为 r，则正六边形的边长应为？',options:{A:'2r',B:'r/2',C:'3r',D:'r'},answer:'D',knowledge:'正多边形作图｜正六边形',difficulty:'中等',explanation:'圆内接正六边形可用圆规按半径连续截取，所以边长等于半径。',diagram_svg:hexSvg,visual_note:'正六边形每一边与圆半径相等，图形已尽量按比例绘制。',common_misconception:'把半径与直径混淆。',coach_tip:'AI提示：圆内接正六边形是特殊图形，每边等于圆半径。'},{id:'Q9',text:'已知三边长度作三角形，正确的基本思路是？',options:{A:'先画一条边，再分别以两端点为圆心画弧确定第三个顶点',B:'先画任意角，再截取两边',C:'只画三条长度相等的线段',D:'先作外接圆，再随意取三点'},answer:'A',knowledge:'三角形作图｜三边确定三角形',difficulty:'中等',explanation:'已知三边时，先定一边，再用另外两边作为半径画弧，交点就是第三个顶点。',diagram_svg:triArc,visual_note:'两圆弧交点 C 同时满足到 A、B 的距离条件。',common_misconception:'忽略第三个顶点必须同时满足到两个端点的距离。',coach_tip:'AI提示：已知三边作三角形时，第三点是两个圆弧的交点。'},{id:'Q10',text:'到两条相交直线距离相等的点的轨迹是？',options:{A:'其中一条直线',B:'两条直线的垂线',C:'这两条相交直线所成角的角平分线',D:'连接两个任意点的线段'},answer:'C',knowledge:'轨迹｜角平分线',difficulty:'挑战',explanation:'到角的两边距离相等的点在这个角的角平分线上。',diagram_svg:crossSvg,visual_note:'两条绿色虚线表示两组角平分线，都是满足距离相等的轨迹。',common_misconception:'把“到两点距离相等”和“到两线距离相等”混淆。',coach_tip:'AI提示：到两点距离相等看垂直平分线；到两条相交线距离相等看角平分线。'}];let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=text=>String(text??'').replace(/[&<>]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){['home','quiz','finish'].forEach(x=>$(x).classList.add('hidden'));$(id).classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'})}window.addEventListener('beforeunload',e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue='刷新或离开后，本次作答可能无法继续，请确认是否离开。'}});$('startBtn').addEventListener('click',()=>{if(!$('className').value.trim()||!$('studentNo').value.trim()||!$('studentName').value.trim()){alert('请先填写班级、学号、姓名。');return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show('quiz');renderQuestion()});function renderQuestion(){const q=order[index];$('progressText').textContent=`第${index+1}题 / ${order.length}题`;$('scoreText').textContent=`已得 ${Math.round(score/order.length*100)} 分`;$('barFill').style.width=`${index/order.length*100}%`;$('difficulty').textContent=q.difficulty||'基础';$('knowledge').textContent=q.knowledge||'知识点';$('questionText').textContent=q.text;if(q.diagram_svg){$('diagram').style.display='block';$('diagram').innerHTML=q.diagram_svg;$('diagramNote').classList.remove('hidden');$('diagramNote').textContent=q.visual_note||'图形为示意图，解题以题目数字为准。'}else{$('diagram').style.display='none';$('diagram').innerHTML='';$('diagramNote').classList.add('hidden');$('diagramNote').textContent=''}$('feedback').className='feedback';$('feedback').innerHTML='';$('nextBtn').disabled=true;$('nextBtn').textContent=index===order.length-1?'完成并提交':'下一题';$('options').innerHTML='';Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement('button');btn.className='option';btn.type='button';btn.textContent=`${key}. ${value}`;btn.addEventListener('click',()=>chooseAnswer(key));$('options').appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||''}`}function coachTip(q,correct){if(q.coach_tip)return q.coach_tip;if(!correct&&q.common_misconception)return `常见错因：${q.common_misconception}`;return correct?'继续保持：先找条件，再确认题目问的是哪个轨迹或作图步骤。':'AI提示：先画出条件，再判断使用垂直平分线、角平分线、圆或圆弧交点。'}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll('.option').forEach(btn=>{btn.disabled=true;if(btn.textContent.startsWith(q.answer+'.'))btn.classList.add('correct');if(btn.textContent.startsWith(selected+'.')&&!correct)btn.classList.add('wrong')});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||'',difficulty:q.difficulty||''});$('feedback').className='feedback '+(correct?'ok':'bad');$('feedback').innerHTML=`<b>${correct?'答对了':'还差一点'}</b><br>你的答案：${esc(selectedText)}<br>正确答案：${esc(correctText)}<br>解析：${esc(q.explanation||'')}<br><b>AI学习提示：</b>${esc(coachTip(q,correct))}<br>知识点：${esc(q.knowledge||'')}`;$('nextBtn').disabled=false;$('barFill').style.width=`${(index+1)/order.length*100}%`;$('scoreText').textContent=`已得 ${Math.round(score/order.length*100)} 分`}$('nextBtn').addEventListener('click',()=>{if(index<order.length-1){index++;renderQuestion()}else{renderFinish()}});function renderFinish(){const total=order.length,finalScore=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))],timeUsed=Math.max(1,Math.round((Date.now()-startTime)/1000));$('finalScore').textContent=finalScore+'分';$('finalRate').textContent=finalScore+'%';$('finalWrong').textContent=wrong.length+'题';$('studentSummary').innerHTML=`<h2>学生资料</h2>学校：${esc(META.school_name)}<br>老师：${esc(META.teacher_name)}<br>练习编号：${esc(META.practice_id)}<br>练习名称：${esc(META.practice_name)}<br>章节：${esc(META.chapter_name)}<br>班级：${esc($('className').value.trim())}<br>学号：${esc($('studentNo').value.trim())}<br>姓名：${esc($('studentName').value.trim())}<br>座号：${esc($('seatNo').value.trim()||'未填写')}<br>得分：${finalScore}分<br>正确率：${finalScore}%`;$('wrongList').innerHTML=wrong.length?wrong.map(a=>`<div class='wrongItem'>第${a.display_order}题（原题 ${esc(a.question_id)}）｜你的答案：${esc(a.selected_answer_text||a.selected_answer)}｜正确答案：${esc(a.correct_answer_text||a.correct_answer)}<br>${esc(a.question_text)}<br>知识点：${esc(a.knowledge_tag)}</div>`).join(''):'<p>本次没有错题，保持这个节奏。</p>';$('weakList').innerHTML=weak.length?weak.map(k=>`<span class='tag'>${esc(k)}</span>`).join(' '):'<p>暂无明显薄弱知识点。</p>';$('studyAdvice').textContent=weak.length?`建议先复习：${weak.join('、')}，再做同类基础题巩固。`:'本次掌握较稳定，可以继续挑战中等题。';show('finish');submitPayload(finalScore,total,timeUsed,wrong,weak)}function submitPayload(finalScore,total,timeUsed,wrong,weak){const payload={action:'submit_response',school_id:META.school_id,school_name:META.school_name,teacher_id:META.teacher_id,teacher_name:META.teacher_name,academic_year:META.academic_year,semester:META.semester,class_id:META.class_id,class_name:$('className').value.trim(),student_no:$('studentNo').value.trim(),student_name:$('studentName').value.trim(),seat_no:$('seatNo').value.trim(),practice_id:META.practice_id,practice_name:META.practice_name,practice_round:META.practice_round,quiz_id:META.quiz_id,quiz_name:META.quiz_name,chapter_name:META.chapter_name,score:finalScore,accuracy:finalScore,total_questions:total,time_used:timeUsed,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:'none'};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{submitted=true;$('submitState').textContent='已送达';$('submitMessage').textContent='作答数据已送达。请保留本页截图，以备老师核对。'}).catch(()=>{$('submitState').textContent='失败';$('submitMessage').textContent='提交失败，请截图给老师。'})}</script></body></html>
