<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>一元一次方程式图文巩固练习</title><style>*{box-sizing:border-box}:root{--paper:#fffdf8;--line:#ead8c1;--muted:#7d6a58;--brown:#5b341e;--shadow:0 18px 42px rgba(142,79,31,.18)}html{font-size:18px}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei",Arial,sans-serif;color:#2b2119;background:radial-gradient(circle at 10% 6%,rgba(255,207,124,.72),transparent 28%),radial-gradient(circle at 92% 16%,rgba(240,138,115,.46),transparent 34%),linear-gradient(155deg,#fff7e9 0%,#ffe7cd 45%,#f8cfa6 100%)}.page{max-width:720px;margin:0 auto;padding:14px 10px 28px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px 16px;overflow:hidden}.topband{margin:-20px -16px 18px;padding:20px 16px;background:linear-gradient(135deg,#fff0d8,#ffd7b5 55%,#ffc46e);border-bottom:1px solid rgba(181,111,46,.18);text-align:center}h1{margin:0;color:var(--brown);font-size:1.45rem;line-height:1.35}.pill{display:inline-block;max-width:100%;margin-top:14px;padding:10px 16px;border-radius:999px;color:#70401f;background:linear-gradient(135deg,#fffdf6,#ffefd5);border:1px solid rgba(207,143,67,.32);font-weight:900;line-height:1.35}.sub{color:var(--muted);line-height:1.7;margin:14px 0 0;text-align:center}label{display:block;margin:16px 0 8px;font-weight:900}input{width:100%;min-height:58px;border:2px solid #ead9c4;border-radius:18px;padding:0 16px;font-size:1rem;background:#fffefa}button{width:100%;min-height:58px;margin-top:18px;border:0;border-radius:18px;color:white;font-size:1.05rem;font-weight:900;background:linear-gradient(135deg,#f3a13a,#df6d25 58%,#a94d24);box-shadow:0 12px 28px rgba(199,91,30,.26);cursor:pointer}.hidden{display:none}.progressBox{position:sticky;top:0;z-index:4;margin:-20px -16px 18px;padding:14px 16px 12px;background:rgba(255,253,248,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}.progressMeta{display:flex;justify-content:space-between;gap:12px;font-weight:900;color:var(--brown)}.bar{height:10px;margin-top:10px;border-radius:999px;background:#f2dfc8;overflow:hidden}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffd66f,#f08a35 54%,#c65b2d);transition:.25s}.tagrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.tag{padding:7px 10px;border-radius:999px;background:#fff0cb;color:#6d4512;font-size:.82rem;font-weight:900}.qTitle{font-size:1.18rem;line-height:1.55;font-weight:900;margin:0 0 14px}.diagram{margin:12px 0 18px;padding:12px;border-radius:18px;background:linear-gradient(135deg,#fff8ed,#fff0dc);border:1px solid #ead2b7}.diagram svg{display:block;width:100%;height:auto}.diagramNote{margin:-8px 2px 14px;color:var(--muted);font-size:.82rem;line-height:1.55;text-align:center}.option{width:100%;margin:10px 0;padding:15px 14px;border:2px solid #ecd9bf;border-radius:18px;background:linear-gradient(135deg,#fffefa,#fff8ef);color:#2b2119;font-weight:900;line-height:1.5;text-align:left;box-shadow:0 6px 18px rgba(111,69,32,.05)}.option.correct{border-color:#1f8f70;background:linear-gradient(135deg,#d7f1e4,#bce6d4);color:#0f5b48}.option.wrong{border-color:#c95342;background:linear-gradient(135deg,#ffe1d9,#ffc9bd);color:#8b2b21}.feedback{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.7;border:1px solid #ead8c1;background:#fff7ea}.feedback.ok{display:block;background:#d7f1e4;border-color:#82c7aa;color:#124f40}.feedback.bad{display:block;background:#ffe1d9;border-color:#e19386;color:#7b2a22}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0 18px}.stat{min-height:104px;padding:16px 10px;border-radius:18px;border:1px solid rgba(216,154,85,.24);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.stat:nth-child(1){background:linear-gradient(135deg,#fff0c7,#ffd991)}.stat:nth-child(2){background:linear-gradient(135deg,#e4f4ea,#bfe6d4)}.stat:nth-child(3){background:linear-gradient(135deg,#ffe0d9,#ffc1b5)}.stat:nth-child(4){background:linear-gradient(135deg,#efe3ff,#d8c5ff)}.stat b{font-size:1.35rem}.summary{padding:14px;border-radius:18px;background:#fff7ea;border:1px solid #ead8c1;line-height:1.75}.mini{font-size:.9rem;color:var(--muted);line-height:1.6}</style></head><body><div class="page"><section id="home" class="card"><div class="topband"><h1>一元一次方程式图文巩固练习</h1><div class="pill">练习编号：J1-10-02</div><p class="sub">宽柔中学古来分校｜陈天龙老师｜初一下册第10章｜练习模式</p></div><p class="summary">请填写资料后开始作答。每题选择后会即时显示反馈，完成页适合截图保存。</p><label>班级</label><input id="className" value="初一A班" required><label>学号</label><input id="studentNo" required><label>姓名</label><input id="studentName" required><label>座号（可选）</label><input id="seatNo"><button id="startBtn">开始练习</button></section><section id="quiz" class="card hidden"><div class="progressBox"><div class="progressMeta"><span id="qCount"></span><span id="scoreNow"></span></div><div class="bar"><span id="bar"></span></div></div><div class="tagrow"><span class="tag" id="diffTag"></span><span class="tag" id="knowTag"></span></div><p class="qTitle" id="qText"></p><div class="diagram" id="diagram"></div><p class="diagramNote" id="visualNote"></p><div id="opts"></div><div id="feedback" class="feedback"></div><button id="nextBtn" class="hidden">下一题</button></section><section id="done" class="card hidden"><div class="topband"><h1>完成页</h1><div class="pill">练习编号：J1-10-02</div><p class="sub">请保留本页截图，以备老师核对。</p></div><div class="stats"><div class="stat"><b id="finalScore"></b><span>得分</span></div><div class="stat"><b id="finalAcc"></b><span>正确率</span></div><div class="stat"><b id="wrongCount"></b><span>错题数</span></div><div class="stat"><b id="submitStatus">送达中</b><span>提交状态</span></div></div><div class="summary" id="doneInfo"></div><div class="summary" id="wrongList" style="margin-top:12px"></div></section></div><script>const SUBMIT_URL='https://script.google.com/macros/s/AKfycbxftIDXQRZcwvFSznSsMA60JBeiEzlmGfmPzvJdS_Np6d7_QcsfBOQ500tZTKQU-YG1/exec';const META={action:'submit_response',school_id:'kchc',school_name:'宽柔中学古来分校',teacher_id:'chen_tianlong',teacher_name:'陈天龙',academic_year:2026,semester:'上学期',class_id:'j1a',practice_id:'J1-10-02',practice_name:'一元一次方程式图文巩固练习',practice_round:'01',quiz_id:'J1-10-02-Q',quiz_name:'一元一次方程式图文巩固练习',chapter_name:'一元一次方程式',total_questions:10};const svg1='<svg viewBox="0 0 520 150"><rect x="55" y="58" width="90" height="46" rx="10" fill="#ffd991" stroke="#a94d24"/><text x="100" y="88" text-anchor="middle" font-size="22">3x</text><text x="162" y="88" font-size="26">+</text><rect x="195" y="58" width="58" height="46" rx="10" fill="#fff0c7" stroke="#a94d24"/><text x="224" y="88" text-anchor="middle" font-size="22">5</text><text x="275" y="88" font-size="26">=</text><rect x="315" y="58" width="80" height="46" rx="10" fill="#d7f1e4" stroke="#1f8f70"/><text x="355" y="88" text-anchor="middle" font-size="22">20</text></svg>';const svg2='<svg viewBox="0 0 520 150"><rect x="70" y="58" width="78" height="46" rx="10" fill="#ffd991" stroke="#a94d24"/><text x="109" y="88" text-anchor="middle" font-size="22">2x</text><text x="166" y="88" font-size="26">−</text><rect x="200" y="58" width="56" height="46" rx="10" fill="#ffe1d9" stroke="#c95342"/><text x="228" y="88" text-anchor="middle" font-size="22">7</text><text x="278" y="88" font-size="26">=</text><rect x="318" y="58" width="76" height="46" rx="10" fill="#d7f1e4" stroke="#1f8f70"/><text x="356" y="88" text-anchor="middle" font-size="22">11</text></svg>';const svgn=svg1;let Q=[{id:'Q1',text:'3x + 5 = 20，x =？',options:{A:'5',B:'6',C:'7',D:'8'},answer:'A',knowledge:'移项与除法',difficulty:'基础',explanation:'先把5移到右边：3x=15，所以x=5。',diagram_svg:svg1,visual_note:'图示表示等式两边保持平衡。',common_misconception:'移项忘记变号。',coach_tip:'先处理常数项，再把x的系数化为1。'},{id:'Q2',text:'2x − 7 = 11，x =？',options:{A:'8',B:'9',C:'10',D:'11'},answer:'B',knowledge:'解一元一次方程',difficulty:'基础',explanation:'两边同时加7，得2x=18，所以x=9。',diagram_svg:svg2,visual_note:'图示突出“减7”要用加7抵消。',common_misconception:'先加7后忘记除以2。',coach_tip:'看见减7，可以两边同时加7。'},{id:'Q3',text:'一个数的4倍少3等于17，这个数是？',options:{A:'3',B:'4',C:'5',D:'6'},answer:'C',knowledge:'列方程',difficulty:'基础',explanation:'设这个数为x，可列4x−3=17，解得x=5。',diagram_svg:svgn,visual_note:'图示帮助把“4倍少3”转成方程。',common_misconception:'把“少3”列成加3。',coach_tip:'先找未知数，再把文字转成式子。'},{id:'Q4',text:'5(x − 2) = 20，x =？',options:{A:'4',B:'5',C:'6',D:'7'},answer:'C',knowledge:'去括号或整体思想',difficulty:'基础',explanation:'把x−2看成整体，x−2=4，所以x=6。',diagram_svg:svgn,visual_note:'图示表示5组相同数量合成20。',common_misconception:'括号内先算错。',coach_tip:'可以先整体除以5，再解括号里的式子。'},{id:'Q5',text:'x/3 + 4 = 10，x =？',options:{A:'12',B:'15',C:'16',D:'18'},answer:'D',knowledge:'去分母',difficulty:'基础',explanation:'先得x/3=6，所以x=18。',diagram_svg:svgn,visual_note:'图示表示把x平均分成3份。',common_misconception:'只把部分项乘3。',coach_tip:'先移项会更简单：x/3=6。'},{id:'Q6',text:'一支笔x令吉，买3支共12令吉，方程应列为？',options:{A:'x + 3 = 12',B:'3x = 12',C:'x/3 = 12',D:'12x = 3'},answer:'B',knowledge:'数量关系',difficulty:'基础',explanation:'总价=单价×数量，所以3x=12。',diagram_svg:svgn,visual_note:'图示表示3支笔的总价。',common_misconception:'单价、数量、总价关系混乱。',coach_tip:'看到“每支”和“几支”，优先想到乘法。'},{id:'Q7',text:'2(x + 3) = 18，x =？',options:{A:'5',B:'6',C:'7',D:'8'},answer:'B',knowledge:'去括号',difficulty:'基础',explanation:'两边除以2，得x+3=9，所以x=6。',diagram_svg:svgn,visual_note:'图示表示2组相同数量合成18。',common_misconception:'2没有同时作用于括号内整体。',coach_tip:'先把括号整体看成一个量。'},{id:'Q8',text:'3x + 4 = x + 16，x =？',options:{A:'4',B:'5',C:'6',D:'7'},answer:'C',knowledge:'含未知数两边移项',difficulty:'中等',explanation:'移项得3x−x=16−4，即2x=12，所以x=6。',diagram_svg:svgn,visual_note:'图示表示等式左右两边都有未知数项。',common_misconception:'未知数项与常数项移错边。',coach_tip:'把含x的项放一边，数字项放另一边。'},{id:'Q9',text:'小明比小华多5岁，两人年龄和为25岁。小华x岁，应列方程为？',options:{A:'x + 5 = 25',B:'2x = 25',C:'x + x − 5 = 25',D:'x + x + 5 = 25'},answer:'D',knowledge:'应用题等量关系',difficulty:'中等',explanation:'小华x岁，小明x+5岁，两人和为25，所以x+x+5=25。',diagram_svg:svgn,visual_note:'图示表示两人的年龄条形关系。',common_misconception:'分不清谁比谁多5岁。',coach_tip:'先写出每个人的年龄表达式，再相加。'},{id:'Q10',text:'一个长方形长比宽多4 cm，周长为32 cm。宽为x cm，则x =？',options:{A:'5',B:'6',C:'7',D:'8'},answer:'B',knowledge:'几何情境列方程',difficulty:'挑战',explanation:'宽为x，长为x+4，2[x+(x+4)]=32，解得x=6。',diagram_svg:'<svg viewBox="0 0 520 180"><rect x="120" y="45" width="240" height="90" fill="#fff0c7" stroke="#a94d24" stroke-width="3"/><text x="240" y="38" text-anchor="middle" font-size="22">长 x+4</text><text x="96" y="95" text-anchor="middle" font-size="22">宽 x</text><text x="240" y="165" text-anchor="middle" font-size="20">周长 32 cm</text></svg>',visual_note:'长方形示意图已尽量体现长大于宽，解题以数字为准。',common_misconception:'周长公式漏乘2。',coach_tip:'几何应用题先写长、宽，再套周长公式。'}];Q=Q.sort(()=>Math.random()-.5);let idx=0,score=0,answers=[],started=false,done=false;function $(x){return document.getElementById(x)}window.addEventListener('beforeunload',e=>{if(started&&!done){e.preventDefault();e.returnValue='刷新或离开后，本次作答可能无法继续，请确认是否离开。'}});$('startBtn').onclick=()=>{if(!$('className').value.trim()||!$('studentNo').value.trim()||!$('studentName').value.trim()){alert('请填写班级、学号、姓名');return}started=true;$('home').classList.add('hidden');$('quiz').classList.remove('hidden');showQ()};function showQ(){let q=Q[idx];$('qCount').textContent='第 '+(idx+1)+' / '+Q.length+' 题';$('scoreNow').textContent='已答对 '+score+' 题';$('bar').style.width=(idx/Q.length*100)+'%';$('diffTag').textContent=q.difficulty;$('knowTag').textContent=q.knowledge;$('qText').textContent=q.text;$('diagram').innerHTML=q.diagram_svg||'';$('diagram').style.display=q.diagram_svg?'block':'none';$('visualNote').textContent=q.visual_note||'';$('opts').innerHTML='';$('feedback').className='feedback';$('feedback').innerHTML='';$('nextBtn').classList.add('hidden');Object.keys(q.options).forEach(k=>{let b=document.createElement('button');b.className='option';b.textContent=k+'. '+q.options[k];b.onclick=()=>choose(k,b);$('opts').appendChild(b)})}function choose(k,b){let q=Q[idx];[...document.querySelectorAll('.option')].forEach(x=>x.disabled=true);let ok=k===q.answer;if(ok)score++;b.classList.add(ok?'correct':'wrong');if(!ok){[...document.querySelectorAll('.option')].forEach(x=>{if(x.textContent.startsWith(q.answer+'.'))x.classList.add('correct')})}answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:ok,knowledge_tag:q.knowledge,difficulty:q.difficulty,common_misconception:q.common_misconception});$('feedback').className='feedback '+(ok?'ok':'bad');$('feedback').innerHTML=(ok?'答对了。':'答错了。')+'<br>你的答案：'+k+'. '+q.options[k]+'<br>正确答案：'+q.answer+'. '+q.options[q.answer]+'<br>解析：'+q.explanation+'<br>AI学习提示：'+q.coach_tip+'<br>本题知识点：'+q.knowledge;$('nextBtn').textContent=idx===Q.length-1?'完成并提交':'下一题';$('nextBtn').classList.remove('hidden')}$('nextBtn').onclick=()=>{if(idx<Q.length-1){idx++;showQ()}else finish()};function finish(){done=true;$('quiz').classList.add('hidden');$('done').classList.remove('hidden');$('bar').style.width='100%';let wrong=answers.filter(a=>!a.is_correct);let acc=Math.round(score/Q.length*100);$('finalScore').textContent=score+'/'+Q.length;$('finalAcc').textContent=acc+'%';$('wrongCount').textContent=wrong.length;$('doneInfo').innerHTML='学校：宽柔中学古来分校<br>老师：陈天龙<br>练习编号：J1-10-02<br>练习名称：一元一次方程式图文巩固练习<br>章节：一元一次方程式<br>班级：'+$('className').value+'<br>学号：'+$('studentNo').value+'<br>姓名：'+$('studentName').value+'<br>座号：'+$('seatNo').value+'<br>得分：'+score+'/'+Q.length+'<br>正确率：'+acc+'%<br>学习总结：'+(wrong.length?'请重点复习 '+[...new Set(wrong.map(x=>x.knowledge_tag))].join('、'):'本次基础掌握较稳，可以尝试应用题变式。')+'<br>薄弱知识点：'+(wrong.length?[...new Set(wrong.map(x=>x.knowledge_tag))].join('、'):'暂无明显薄弱点')+'<br>提交状态：送达中';$('wrongList').innerHTML='错题记录：<br>'+(wrong.length?wrong.map(w=>'第'+w.display_order+'题：你的答案 '+w.selected_answer_text+'；正确答案 '+w.correct_answer_text+'；知识点 '+w.knowledge_tag).join('<br>'):'没有错题。');submit(acc,wrong)}function submit(acc,wrong){let payload={...META,class_name:$('className').value,student_no:$('studentNo').value,student_name:$('studentName').value,seat_no:$('seatNo').value,score:score,accuracy:acc,total_questions:Q.length,time_used:0,answers_json:JSON.stringify(answers),correct_json:JSON.stringify(Q.map(q=>({question_id:q.id,answer:q.answer,answer_text:q.answer+'. '+q.options[q.answer]}))),wrong_question_ids:wrong.map(w=>w.question_id).join(','),weak_knowledge_tags:[...new Set(wrong.map(w=>w.knowledge_tag))].join(','),abnormal_flag:''};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{$('submitStatus').textContent='已送达';$('doneInfo').innerHTML=$('doneInfo').innerHTML.replace('提交状态：送达中','提交状态：已送达')}).catch(()=>{$('submitStatus').textContent='提交失败';$('doneInfo').innerHTML=$('doneInfo').innerHTML.replace('提交状态：送达中','提交状态：失败｜提交失败，请截图给老师。')})}</script></body></html>
