const META={action:"submit_response",school_id:"kchc",school_name:"宽柔中学古来分校",teacher_id:"chen_tianlong",teacher_name:"陈天龙",academic_year:2026,semester:"上学期",class_id:"c3-ren",practice_id:"J3-07-02",practice_name:"初三下册第7章三角函数基础练习（二）",practice_round:"02",quiz_id:"J3-07-02-QZ",quiz_name:"初三下册第7章三角函数基础练习（二）",chapter_name:"初三下册第7章｜三角函数",total_questions:10};
const QUESTIONS=[
{id:"Q1",text:"在直角三角形中，锐角 A 的对边为 3，斜边为 5，则 sin A 的值是？",options:{A:"3/5",B:"4/5",C:"3/4",D:"4/3"},answer:"A",knowledge:"锐角三角函数的意义",difficulty:"基础",explanation:"sin A = 对边 ÷ 斜边 = 3/5。",diagram_svg:"",visual_note:"",common_misconception:"把对边和邻边混淆。",coach_tip:"先找清楚角A，再判断对边、邻边和斜边。"},
{id:"Q2",text:"在直角三角形中，锐角 B 的邻边为 6，对边为 8，则 tan B 的值是？",options:{A:"3/4",B:"4/3",C:"3/5",D:"5/4"},answer:"B",knowledge:"正切的定义",difficulty:"基础",explanation:"tan B = 对边 ÷ 邻边 = 8/6 = 4/3。",diagram_svg:"",visual_note:"",common_misconception:"把 tan 误写成邻边 ÷ 对边。",coach_tip:"正切只看对边和邻边，不用斜边。"},
{id:"Q3",text:"sin 30° 的值是？",options:{A:"√3/2",B:"√2/2",C:"1/2",D:"1"},answer:"C",knowledge:"特别角三角函数值",difficulty:"基础",explanation:"sin 30° = 1/2。",diagram_svg:"",visual_note:"",common_misconception:"混淆 30° 与 60° 的正弦值。",coach_tip:"可把 30°、45°、60° 的函数值整理成表格记忆。"},
{id:"Q4",text:"cos 60° 的值是？",options:{A:"√3/2",B:"√2/2",C:"1",D:"1/2"},answer:"D",knowledge:"特别角三角函数值",difficulty:"基础",explanation:"cos 60° = 1/2。",diagram_svg:"",visual_note:"",common_misconception:"把 cos 60° 误记为 √3/2。",coach_tip:"注意 sin30° 与 cos60° 都是 1/2。"},
{id:"Q5",text:"若 tan A = 1，且 A 为锐角，则 A 等于多少？",options:{A:"45°",B:"30°",C:"60°",D:"90°"},answer:"A",knowledge:"特别角正切值",difficulty:"基础",explanation:"tan 45° = 1，所以 A = 45°。",diagram_svg:"",visual_note:"",common_misconception:"把 tan 45° 与 sin 45° 的形式混淆。",coach_tip:"tan45° 表示对边和邻边相等。"},
{id:"Q6",text:"一棵树的影长为 10 m，太阳光与地面成 30° 角，则树高约为多少？",options:{A:"10√3 m",B:"10/√3 m",C:"5 m",D:"20 m"},answer:"B",knowledge:"三角函数的应用",difficulty:"中等",explanation:"tan 30° = 树高 ÷ 影长，所以树高 = 10 × tan 30° = 10/√3 m。",diagram_svg:"<svg viewBox='0 0 360 190' xmlns='http://www.w3.org/2000/svg' aria-label='树高影长直角三角形'><line x1='45' y1='150' x2='285' y2='150' stroke='#6b4a2e' stroke-width='5'/><line x1='285' y1='150' x2='285' y2='65' stroke='#1f8f70' stroke-width='7'/><line x1='45' y1='150' x2='285' y2='65' stroke='#df6d25' stroke-width='4'/><path d='M70 150 A25 25 0 0 1 91 137' fill='none' stroke='#5b341e' stroke-width='3'/><text x='77' y='132' font-size='16' fill='#5b341e'>30°</text><text x='145' y='174' font-size='17' fill='#5b341e'>影长 10 m</text><text x='296' y='112' font-size='17' fill='#1f8f70'>树高 ?</text><path d='M285 150 L285 132 L267 132 L267 150' fill='none' stroke='#5b341e' stroke-width='3'/><circle cx='45' cy='150' r='4' fill='#5b341e'/></svg>",visual_note:"示意图已按影长较长、树高较短的大致关系绘制，解题以题目数字为准。",common_misconception:"把影长当作斜边。",coach_tip:"遇到影子问题，地面长度通常是邻边，树高通常是对边。"},
{id:"Q7",text:"从地面上一点看楼顶，仰角为 45°，该点到楼底的水平距离为 18 m，则楼高是多少？",options:{A:"9 m",B:"18√2 m",C:"18 m",D:"36 m"},answer:"C",knowledge:"仰角应用",difficulty:"基础",explanation:"tan 45° = 楼高 ÷ 18，楼高 = 18 m。",diagram_svg:"<svg viewBox='0 0 360 210' xmlns='http://www.w3.org/2000/svg' aria-label='楼高仰角直角三角形'><rect x='255' y='50' width='40' height='120' rx='4' fill='#ffd991' stroke='#8a5a2c' stroke-width='3'/><line x1='70' y1='170' x2='255' y2='170' stroke='#6b4a2e' stroke-width='5'/><line x1='70' y1='170' x2='255' y2='50' stroke='#df6d25' stroke-width='4'/><path d='M92 170 A30 30 0 0 1 116 154' fill='none' stroke='#5b341e' stroke-width='3'/><text x='102' y='145' font-size='16' fill='#5b341e'>45°</text><text x='137' y='195' font-size='17' fill='#5b341e'>水平距离 18 m</text><text x='302' y='112' font-size='17' fill='#1f8f70'>楼高 ?</text><path d='M255 170 L255 150 L235 150 L235 170' fill='none' stroke='#5b341e' stroke-width='3'/><circle cx='70' cy='170' r='5' fill='#5b341e'/></svg>",visual_note:"示意图已尽量画成 45° 情境，解题以题目数字为准。",common_misconception:"误用 sin 45°，把水平距离当斜边。",coach_tip:"看到水平距离和高度，优先考虑 tan。"},
{id:"Q8",text:"在直角三角形 ABC 中，∠C = 90°，AC = 5，BC = 12，AB = 13。若锐角 A 的对边是 BC，则 cos A 等于？",options:{A:"12/13",B:"12/5",C:"5/12",D:"5/13"},answer:"D",knowledge:"余弦的定义",difficulty:"基础",explanation:"cos A = 邻边 ÷ 斜边 = AC ÷ AB = 5/13。",diagram_svg:"<svg viewBox='0 0 360 230' xmlns='http://www.w3.org/2000/svg' aria-label='五十二十三直角三角形'><line x1='80' y1='170' x2='180' y2='170' stroke='#6b4a2e' stroke-width='5'/><line x1='180' y1='170' x2='180' y2='50' stroke='#1f8f70' stroke-width='5'/><line x1='80' y1='170' x2='180' y2='50' stroke='#df6d25' stroke-width='5'/><text x='72' y='193' font-size='17' fill='#5b341e'>A</text><text x='183' y='193' font-size='17' fill='#5b341e'>C</text><text x='185' y='47' font-size='17' fill='#5b341e'>B</text><text x='122' y='190' font-size='17' fill='#5b341e'>AC=5</text><text x='190' y='115' font-size='17' fill='#1f8f70'>BC=12</text><text x='92' y='101' font-size='17' fill='#df6d25'>AB=13</text><path d='M180 170 L180 150 L160 150 L160 170' fill='none' stroke='#5b341e' stroke-width='3'/></svg>",visual_note:"示意图按 5-12-13 的大致比例绘制。",common_misconception:"把 cos A 写成对边 ÷ 斜边。",coach_tip:"cos 看邻边与斜边，先站在角 A 的位置观察。"},
{id:"Q9",text:"若 sin A = 3/5，且 A 为锐角，则 cos A 的值是？",options:{A:"3/4",B:"5/4",C:"4/5",D:"5/3"},answer:"C",knowledge:"由一个三角函数值求另一个三角函数值",difficulty:"中等",explanation:"sin A = 对边 ÷ 斜边 = 3/5，可设对边为3，斜边为5，则邻边为4，所以 cos A = 4/5。",diagram_svg:"",visual_note:"",common_misconception:"不知道先构造直角三角形。",coach_tip:"由一个函数值求另一个，可先设边长，再用毕氏定理求第三边。"},
{id:"Q10",text:"一名学生从观察点看旗杆顶端的仰角为 60°，观察点到旗杆底部水平距离为 8 m，则旗杆高度为多少？",options:{A:"4√3 m",B:"8 m",C:"8/√3 m",D:"8√3 m"},answer:"D",knowledge:"三角函数实际应用",difficulty:"挑战",explanation:"tan 60° = 旗杆高度 ÷ 8，所以旗杆高度 = 8√3 m。",diagram_svg:"<svg viewBox='0 0 360 235' xmlns='http://www.w3.org/2000/svg' aria-label='旗杆仰角直角三角形'><line x1='70' y1='190' x2='210' y2='190' stroke='#6b4a2e' stroke-width='5'/><line x1='210' y1='190' x2='210' y2='50' stroke='#1f8f70' stroke-width='7'/><line x1='70' y1='190' x2='210' y2='50' stroke='#df6d25' stroke-width='4'/><path d='M93 190 A35 35 0 0 1 116 164' fill='none' stroke='#5b341e' stroke-width='3'/><text x='107' y='158' font-size='16' fill='#5b341e'>60°</text><text x='120' y='215' font-size='17' fill='#5b341e'>水平距离 8 m</text><text x='222' y='121' font-size='17' fill='#1f8f70'>旗杆高 ?</text><path d='M210 190 L210 170 L190 170 L190 190' fill='none' stroke='#5b341e' stroke-width='3'/><path d='M210 50 L245 62 L210 75 Z' fill='#f08a35'/><circle cx='70' cy='190' r='5' fill='#5b341e'/></svg>",visual_note:"示意图按 60° 情境绘制，高度明显大于水平距离，解题以题目数字为准。",common_misconception:"把 tan 60° 误记为 1/√3。",coach_tip:"tan60°=√3，所以对边=邻边×√3。"}
];
let order=[],idx=0,score=0,started=false,finished=false,startTime=0,answers=[];
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function el(id){return document.getElementById(id)}
el('startBtn').onclick=()=>{const cls=el('class_name').value.trim(),no=el('student_no').value.trim(),name=el('student_name').value.trim();if(!cls||!no||!name){alert('请填写班级、学号、姓名。');return}started=true;startTime=Date.now();order=shuffle(QUESTIONS);el('home').classList.add('hidden');el('quiz').classList.remove('hidden');renderQ()};
function renderQ(){const q=order[idx];el('qCount').textContent=`第${idx+1}题 / 共${order.length}题`;el('scoreNow').textContent=`已答${answers.length}题`;el('barFill').style.width=(idx/order.length*100)+'%';el('diffTag').textContent=q.difficulty;el('knowTag').textContent=q.knowledge;el('qText').textContent=q.text;const d=el('diagramBox');if(q.diagram_svg){d.style.display='block';d.innerHTML=q.diagram_svg+(q.visual_note?`<div class='diagramNote'>${q.visual_note}</div>`:'')}else{d.style.display='none';d.innerHTML=''}el('feedbackBox').className='feedback';el('feedbackBox').innerHTML='';el('nextBtn').classList.add('hidden');const box=el('optionsBox');box.innerHTML='';['A','B','C','D'].forEach(k=>{let btn=document.createElement('button');btn.className='option';btn.textContent=k+'. '+q.options[k];btn.onclick=()=>choose(k);box.appendChild(btn)})}
function choose(k){const q=order[idx];const correct=k===q.answer;document.querySelectorAll('.option').forEach(btn=>{btn.disabled=true;if(btn.textContent.startsWith(q.answer+'.'))btn.classList.add('correct');if(btn.textContent.startsWith(k+'.')&&!correct)btn.classList.add('wrong')});if(correct)score++;answers.push({question_id:q.id,display_order:idx+1,question_text:q.text,selected_answer:k,selected_answer_text:k+'. '+q.options[k],correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],is_correct:correct,knowledge_tag:q.knowledge,difficulty:q.difficulty});const fb=el('feedbackBox');fb.className='feedback '+(correct?'ok':'bad');fb.innerHTML=`<b>${correct?'答对了':'需要订正'}</b><br>你的答案：${k}. ${q.options[k]}<br>正确答案：${q.answer}. ${q.options[q.answer]}<br>解析：${q.explanation}<br>AI学习提示：${q.coach_tip}<br>本题知识点：${q.knowledge}<br>常见错因：${q.common_misconception}`;el('nextBtn').textContent=(idx===order.length-1)?'完成并提交':'下一题';el('nextBtn').classList.remove('hidden');el('scoreNow').textContent=`已答${answers.length}题`}
el('nextBtn').onclick=()=>{if(idx===order.length-1){finish()}else{idx++;renderQ()}};
function finish(){finished=true;started=false;const used=Math.max(1,Math.round((Date.now()-startTime)/1000));const wrong=answers.filter(a=>!a.is_correct);const acc=Math.round(score/META.total_questions*100);el('quiz').classList.add('hidden');el('done').classList.remove('hidden');el('finalScore').textContent=score+'/'+META.total_questions;el('finalAcc').textContent=acc+'%';el('wrongNum').textContent=wrong.length;el('timeUsed').textContent=used+'秒';const cls=el('class_name').value.trim(),no=el('student_no').value.trim(),name=el('student_name').value.trim(),seat=el('seat_no').value.trim();el('studentInfo').innerHTML=`<b>学生资料</b><br>学校：${META.school_name}<br>老师：${META.teacher_name}<br>练习编号：${META.practice_id}<br>练习名称：${META.practice_name}<br>章节：${META.chapter_name}<br>班级：${cls}<br>学号：${no}<br>姓名：${name}<br>座号：${seat||'未填'}`;el('wrongList').innerHTML=wrong.length?wrong.map(w=>`<li>第${w.display_order}题｜${w.knowledge_tag}<br>你的答案：${w.selected_answer_text}<br>正确答案：${w.correct_answer_text}</li>`).join(''):'<li>没有错题，保持稳定。</li>';const weak=[...new Set(wrong.map(w=>w.knowledge_tag))];el('weakBox').innerHTML='<b>薄弱知识点</b><br>'+(weak.length?weak.join('、'):'暂未发现明显薄弱点');el('studySummary').innerHTML='<b>学习总结</b><br>'+(acc>=80?'整体掌握较好，继续巩固特别角函数值与应用题画图。':acc>=60?'基本概念已有基础，建议重点复习错题对应知识点，并重新画图分析边角关系。':'本次需要加强基础定义，先分清对边、邻边、斜边，再练习特别角函数值。');const payload={...META,class_name:cls,student_no:no,student_name:name,seat_no:seat,score:score,accuracy:acc,total_questions:META.total_questions,time_used:used,answers_json:answers,correct_json:QUESTIONS.map(q=>({question_id:q.id,correct_answer:q.answer,correct_answer_text:q.answer+'. '+q.options[q.answer],knowledge_tag:q.knowledge,difficulty:q.difficulty})),wrong_question_ids:wrong.map(w=>w.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(()=>{el('submitStatus').textContent='已发送。若老师稍后未看到数据，请截图给老师。'}).catch(()=>{el('submitStatus').textContent='提交失败，请截图给老师。'});}
window.addEventListener('beforeunload',function(e){if(started&&!finished){e.preventDefault();e.returnValue='刷新或离开后，本次作答可能无法继续，请确认是否离开。';}});
</script>
