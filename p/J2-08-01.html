const QUESTIONS=[{"id":"Q1","difficulty":"易","knowledge":"毕氏定理求斜边","text":"在直角三角形中，两直角边分别为 6 cm 和 8 cm，斜边长是多少？","options":{"A":"9 cm","B":"10 cm","C":"12 cm","D":"14 cm"},"answer":"B","explanation":"6² + 8² = 36 + 64 = 100，斜边 = 10 cm。","common_misconception":"忘记最后要开平方。","coach_tip":"先平方相加，再开平方求斜边。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q2","difficulty":"易","knowledge":"毕氏定理求直角边","text":"一个直角三角形的斜边为 13 cm，一条直角边为 5 cm，另一条直角边是多少？","options":{"A":"8 cm","B":"10 cm","C":"11 cm","D":"12 cm"},"answer":"D","explanation":"13² − 5² = 169 − 25 = 144，另一边 = 12 cm。","common_misconception":"把斜边平方与直角边平方相加。","coach_tip":"求直角边时，用斜边平方减另一条直角边平方。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q3","difficulty":"易","knowledge":"毕氏定理逆定理","text":"下列三组数中，能构成直角三角形三边的是哪一组？","options":{"A":"3，4，5","B":"4，5，6","C":"5，6，7","D":"6，7，8"},"answer":"A","explanation":"3² + 4² = 9 + 16 = 25 = 5²。","common_misconception":"没有先把最长边当作斜边检查。","coach_tip":"先找最长边，再检查较短两边平方和是否等于最长边平方。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q4","difficulty":"易","knowledge":"距离公式","text":"点 A(1,2)，点 B(4,6)，AB 的长度是多少？","options":{"A":"4","B":"6","C":"5","D":"7"},"answer":"C","explanation":"横差 3，纵差 4，AB = √(3² + 4²) = 5。","common_misconception":"坐标差计算后忘记平方。","coach_tip":"把横差和纵差看成两条直角边。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q5","difficulty":"易","knowledge":"矩形对角线","text":"一个矩形的长为 9 cm，宽为 12 cm，它的对角线长是多少？","options":{"A":"13 cm","B":"15 cm","C":"18 cm","D":"21 cm"},"answer":"B","explanation":"对角线 = √(9² + 12²) = √225 = 15 cm。","common_misconception":"误把长和宽直接相加。","coach_tip":"矩形对角线与长、宽构成直角三角形。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q6","difficulty":"易","knowledge":"毕氏定理适用条件","text":"下列说法正确的是哪一项？","options":{"A":"任意三角形都能使用 a² + b² = c²","B":"斜边一定是直角三角形中最短的边","C":"只要三边相加相等，就能判断直角三角形","D":"毕氏定理只适用于直角三角形"},"answer":"D","explanation":"毕氏定理的前提是直角三角形。","common_misconception":"忽略“直角三角形”前提。","coach_tip":"使用公式前先确认题目中有直角或能构造直角三角形。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q7","difficulty":"易","knowledge":"实际应用求直角边","text":"一架梯子长 10 m，梯脚离墙 6 m，梯子顶端离地高度是多少？","options":{"A":"8 m","B":"10 m","C":"12 m","D":"16 m"},"answer":"A","explanation":"高度² = 10² − 6² = 100 − 36 = 64，高度 = 8 m。","common_misconception":"把梯子长度误当直角边。","coach_tip":"梯子是斜边，墙高和离墙距离是两条直角边。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q8","difficulty":"中","knowledge":"导航距离应用","text":"小明向东走 7 km，再向北走 24 km，他离出发点的直线距离是多少？","options":{"A":"25 km","B":"27 km","C":"25 km","D":"31 km"},"answer":"C","explanation":"距离 = √(7² + 24²) = √625 = 25 km。","common_misconception":"把路程总和 31 km 当作直线距离。","coach_tip":"题目问直线距离时，用毕氏定理，不是把两段路程相加。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q9","difficulty":"中","knowledge":"简单空间问题","text":"长方体的长、宽、高分别为 3 cm、4 cm、12 cm，体对角线长是多少？","options":{"A":"12 cm","B":"13 cm","C":"14 cm","D":"15 cm"},"answer":"B","explanation":"体对角线 = √(3² + 4² + 12²) = √169 = 13 cm。","common_misconception":"只求底面对角线，漏掉高度。","coach_tip":"空间题可分两步：先找底面对角线，再和高构成直角三角形。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""},{"id":"Q10","difficulty":"难","knowledge":"逆定理与三角形高","text":"三角形三边长为 8 cm、15 cm、17 cm。若以 15 cm 为底，则对应的高是多少？","options":{"A":"8 cm","B":"15 cm","C":"17 cm","D":"不能确定"},"answer":"A","explanation":"8² + 15² = 17²，所以是直角三角形；以直角边 15 cm 为底时，另一条直角边 8 cm 就是高。","common_misconception":"只判断直角三角形，没有对应到底和高的关系。","coach_tip":"先用逆定理判断三角形类型，再确定哪条边是对应的高。","image_required":false,"diagram_type":"","diagram_svg":"","diagram_note":"","diagram_alt":""}];
let order=[],index=0,score=0,startTime=0,submitted=false,answers=[];const $=id=>document.getElementById(id);const esc=text=>String(text??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));function shuffle(items){const arr=items.slice();for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}function show(id){["home","quiz","finish"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"})}window.addEventListener("beforeunload",e=>{if(startTime>0&&!submitted){e.preventDefault();e.returnValue="刷新或离开后，本次作答可能无法继续，请确认是否离开。"}});$("startBtn").addEventListener("click",()=>{const classValue=$("className").value.trim(),studentNoValue=$("studentNo").value.trim(),studentNameValue=$("studentName").value.trim();if(!classValue||!studentNoValue||!studentNameValue){alert("请先填写班级、学号、姓名。");return}if(/^\d+$/.test(studentNameValue)){alert("姓名不能只填数字，请填写真实姓名。");return}order=shuffle(QUESTIONS);index=0;score=0;answers=[];startTime=Date.now();submitted=false;show("quiz");renderQuestion()});function renderQuestion(){const q=order[index];$("progressText").textContent=`第${index+1}题 / 共${order.length}题`;$("scoreText").textContent=`答对 ${score} 题`;$("barFill").style.width=`${index/order.length*100}%`;$("difficulty").textContent=`难度：${q.difficulty||""}`;$("knowledge").textContent=`知识点：${q.knowledge||""}`;$("questionText").textContent=q.text;const hasDiagram=q.image_required===true&&typeof q.diagram_svg==="string"&&q.diagram_svg.trim().startsWith("<svg");if(hasDiagram){$("diagram").style.display="block";$("diagram").innerHTML=q.diagram_svg;$("diagram").setAttribute("role","img");$("diagram").setAttribute("aria-label",q.diagram_alt||"本题数学图形")}else{$("diagram").style.display="none";$("diagram").innerHTML="";$("diagram").removeAttribute("role");$("diagram").removeAttribute("aria-label")}const diagramNote=q.diagram_note||"";$("diagramNote").textContent=hasDiagram?diagramNote:"";$("diagramNote").classList.toggle("hidden",!hasDiagram||!diagramNote);$("feedback").className="feedback";$("feedback").innerHTML="";$("nextBtn").disabled=true;$("nextBtn").textContent=index===order.length-1?"完成并提交":"下一题";$("options").innerHTML="";Object.entries(q.options).forEach(([key,value])=>{const btn=document.createElement("button");btn.className="option";btn.type="button";btn.dataset.option=key;btn.textContent=`${key}. ${value}`;$("options").appendChild(btn)})}function answerText(q,key){return `${key}. ${q.options[key]||""}`}function coachTip(q,correct){if(q.coach_tip)return q.coach_tip;if(correct)return"继续保持：先找条件，再确认题目问的是哪个量。";return q.common_misconception?`常见错因：${q.common_misconception}`:"先找等量关系，再列式检验。"}function chooseAnswer(selected){const q=order[index],correct=selected===q.answer,selectedText=answerText(q,selected),correctText=answerText(q,q.answer);if(correct)score++;document.querySelectorAll(".option").forEach(btn=>{btn.disabled=true;if(btn.dataset.option===q.answer)btn.classList.add("correct");if(btn.dataset.option===selected&&!correct)btn.classList.add("wrong")});answers.push({question_id:q.id,display_order:index+1,question_text:q.text,selected_answer:selected,selected_answer_text:selectedText,correct_answer:q.answer,correct_answer_text:correctText,is_correct:correct,knowledge_tag:q.knowledge||"",difficulty:q.difficulty||"",explanation:q.explanation||"",common_misconception:q.common_misconception||"",coach_tip:q.coach_tip||coachTip(q,correct)});$("feedback").className="feedback "+(correct?"ok":"bad");$("feedback").innerHTML=`<div class="feedbackTitle">${correct?"答对了。":"还差一点，先看清楚题目关系。"}</div><div class="fbLine"><span class="fbLabel">你的答案</span>${esc(selectedText)}</div><div class="fbLine"><span class="fbLabel ok">正确答案</span>${esc(correctText)}</div><div class="fbLine"><span class="fbLabel blue">解析</span>${esc(q.explanation||"")}</div><div class="fbLine"><span class="fbLabel blue">提醒</span>${esc(coachTip(q,correct))}</div>`;$("nextBtn").disabled=false;$("barFill").style.width=`${(index+1)/order.length*100}%`;$("scoreText").textContent=`答对 ${score} 题`}$("options").addEventListener("click",e=>{const btn=e.target.closest(".option");if(!btn||btn.disabled)return;chooseAnswer(btn.dataset.option)});$("nextBtn").addEventListener("click",()=>{if(index<order.length-1){index++;renderQuestion()}else{renderFinish()}});function formatDateTime(ms){const d=new Date(ms);const pad=n=>String(n).padStart(2,"0");return`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}function formatDuration(sec){sec=Math.max(0,Math.round(Number(sec)||0));const m=Math.floor(sec/60),s=sec%60;return m?`${m}分${s}秒`:`${s}秒`}function buildWrongAnalysisHtml(wrong){if(!wrong.length)return"<div class='analysisBox'>本次没有错题，继续保持。</div>";return wrong.map(a=>`<div class="wrongItem"><b>第${a.display_order}题｜${esc(a.knowledge_tag)}</b><br>你的答案：${esc(a.selected_answer_text)}<br>正确答案：${esc(a.correct_answer_text)}<br><span class="mini">提醒：${esc(a.coach_tip||a.common_misconception||"")}</span></div>`).join("")}function buildOverallAnalysisHtml(weak,wrong,scoreValue){const weakText=weak.length?weak.join("、"):"暂无明显薄弱知识点";return`<div>目前表现：${scoreValue>=80?"整体基础较稳。":"还需要继续巩固基础方法。"}</div><div>主要卡点：${esc(weakText)}</div><div>下一步练习：先复习这些知识点，再做3至5题同类题，并代回检查。</div>`}function buildWarm(scoreValue){if(scoreValue>=80)return"你这次完成得很稳定，说明基础方法已经开始成形。";if(scoreValue>=50)return"你已经完成整份练习，这很好。现在重点是把每个条件读准。";return"愿意完成练习就是进步的开始。先把错题看懂，再做同类题。"}function renderFinish(){const total=order.length,scoreValue=Math.round(score/total*100),wrong=answers.filter(a=>!a.is_correct),weak=[...new Set(wrong.map(a=>a.knowledge_tag).filter(Boolean))],completedAtMs=Date.now(),timeUsed=Math.max(1,Math.round((completedAtMs-startTime)/1000)),avgTime=total?Math.round(timeUsed/total):0,startedAtDisplay=formatDateTime(startTime),completedAtDisplay=formatDateTime(completedAtMs);$("finalScore").textCon toISOString(),started_at_display:startedAtDisplay,completed_at:new Date(completedAtMs).toISOString(),completed_at_display:completedAtDisplay,answers_json:answers,correct_json:answers.map(a=>({question_id:a.question_id,is_correct:a.is_correct})),wrong_question_ids:wrong.map(a=>a.question_id),weak_knowledge_tags:weak,abnormal_flag:"none"};fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(()=>{submitted=true;$("submitState").textContent="已送达";$("submitNotice").innerHTML="<div>✅ 作答资料已成功发送给老师。</div><div>老师将依据您的作答情况进行分析，请等待老师后续讲解与反馈。</div><div class='small'>若老师尚未看到数据，请保留本页截图。</div>"}).catch(()=>{$("submitState").textContent="提交失败";$("submitNotice").innerHTML="<div>提交状态：提交失败。</div><div>请保留本页截图给老师核对。</div>"})}
